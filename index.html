<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f5f6f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NoEnglish Рђћ ВўЂьЈгВъљ ьЃѕВХю</title>
<!-- В║љВІю вг┤ьџеьЎћВџЕ в▓ёВаё ьЃюЖиИ. APP_VERSIONВЮё Вўгвд┤ вЋї ВЮ┤ ?v= Ж░њвЈё в░ўвЊюВІю Ж░ЎВЮ┤ Вўгвд┤ Ж▓Ѓ(Ж░ЎВЮђ вѓа ВЌгвЪг в▓ѕ в░░ьЈгьЋ┤вЈё В║љВІюЖ░ђ Ж░▒ВІављўвЈёвАЮ вѓаВДюЖ░ђ ВЋёвІї в▓ёВаё ЖИ░Вцђ) -->
<link rel="manifest" href="manifest.json?v=0.11.0">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="words.js?v=0.11.0"></script>
<script src="img/rat_run.js?v=0.11.0"></script>
<style>
/* ============================================================================
   NoEnglish Рђћ вћћВъљВЮИ ьєаьЂ░ (вЮ╝ВЮ┤ьіИ Вўевдг ┬и ьєаВіц/iOS ьєц + ьїЮ ВйћвЪ┤ ьЈгВЮИьіИ)
   Рђ╗ ьЈгВЮИьіИ В╗гвЪг(--accent)віћ ВъёВІю ьћїваѕВЮ┤ВіцьЎђвЇћ. вћћВъљВЮ┤вёѕЖ░ђ ЖхљВ▓┤ьЋа Въљвдг.
============================================================================ */
:root{
  --bg:#f5f6f8;          /* Вѓ┤ВДЮ В░еЖ░ђВџ┤ вЅ┤ьіИвЪ┤ в░░Ж▓й */
  --surface:#ffffff;
  --ink:#17181c;
  --ink-2:#3c3d44;
  --muted:#8b8c95;
  --line:#ececef;
  --fill:#eef0f3;
  --accent:#6b86ff;      /* ьЈгВЮИьіИ В╗гвЪг (ьјўвдгВюЎьЂ┤ вИћвБе) */
  --accent-deep:#3f56e0; /* ьЮ░ в░░Ж▓й Вюё ьЁЇВіцьіИ Ж░ЋВА░ (ВДёьЋю ьєц) */
  --accent-soft:#e9edff; /* ВўЁВЮђ в░░Ж▓й */
  --on-accent:#ffffff;
  --good:#12b886;
  --radius:20px;
  --shadow:0 1px 2px rgba(20,20,30,.04), 0 8px 24px rgba(20,20,30,.05);
  --shadow-sheet:0 -8px 40px rgba(20,20,30,.16);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--ink);}
#root{height:100%;}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);max-width:520px;margin:0 auto;position:relative;}
.topbar{padding:calc(env(safe-area-inset-top) + 12px) 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:20px;font-weight:800;letter-spacing:-0.4px;}
.brand b{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;box-shadow:var(--shadow);}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--fill);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.content{padding:8px 20px 28px;display:flex;flex-direction:column;gap:14px;}

/* Вё╣ВЁў вЮ╝в▓е */
.sec{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-0.2px;margin:6px 2px 0;}
.sec .more{float:right;font-size:12px;color:var(--muted);font-weight:600;}

/* В╣┤вЊю Ж│хьєх */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.card.tap{transition:transform .12s ease;}
.card.tap:active{transform:scale(.985);}

/* В║љвдГьё░ ьъѕВќ┤вАю */
.hero{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 16px 18px;text-align:center;}
.mascot{width:112px;height:112px;border-radius:26px;background:linear-gradient(160deg,#fff,#f1f2f5);border:1.5px dashed #cfd1d6;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);line-height:1.5;}
.sign{display:inline-block;background:var(--ink);color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;padding:6px 12px;border-radius:8px;transform:rotate(-3deg);}

/* В║љвдГьё░ ВіцьЁїВЮ┤ВДђ: Ж░ђВџ┤вЇ░ В║љвдГьё░ + вњцвАю в▒ЃВДђ Ж░ђвАюВіцьЂгвАц */
.stage{position:relative;height:240px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.badge-track{position:absolute;left:0;right:0;top:44%;transform:translateY(-50%);display:flex;gap:14px;align-items:center;overflow-x:auto;padding:0 42%;scrollbar-width:none;z-index:1;}
.badge-track::-webkit-scrollbar{display:none;}
.badge{flex:none;width:62px;height:62px;border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;text-align:center;line-height:1.15;padding:4px;transition:transform .1s;}
.badge:active{transform:scale(.94);}
.badge.earned{background:var(--accent-soft);color:var(--accent-deep);border:1.5px solid var(--accent);}
.badge.locked{background:var(--fill);color:var(--muted);font-size:20px;}
.hero-char{position:relative;z-index:2;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:9px;}
.char-face{width:156px;height:156px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);text-align:center;line-height:1.4;font-weight:600;background:var(--surface);}
/* вІгвдгвіћ Вћг(placeholder). ВІцВаю В║љвдГьё░віћ Lottie/Rive/ВіцьћёвЮ╝ВЮ┤ьіИвАю ВЮ┤ ВігвА» ЖхљВ▓┤ */
.hero-char.run .char-face{animation:runbob var(--bob,.5s) ease-in-out infinite alternate;}
@keyframes runbob{from{transform:translateY(1px) rotate(-1.5deg);}to{transform:translateY(-7px) rotate(1.5deg);}}
/* ВіцьћёвЮ╝ВЮ┤ьіИ ьћёваѕВъё ВаёьЎў ьЂгвАюВіцьјўВЮ┤вЊю Рђћ ьћёваѕВъёВЮ┤ вџЮвџЮ вЂіЖИ░ВДђ ВЋіЖ│а ВъљВЌ░ВіцвЪйЖ▓ї ВЮ┤Вќ┤ВДђвЈёвАЮ */
.sprite-frame{position:absolute;inset:0;display:block;}
@keyframes spriteFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spriteFadeOut{from{opacity:1;}to{opacity:0;}}
@media (prefers-reduced-motion: reduce){.sprite-frame{animation:none!important;opacity:1!important;}}
.road{position:absolute;left:0;right:0;bottom:16px;height:6px;z-index:0;border-radius:3px;
  background:repeating-linear-gradient(90deg,var(--line) 0 20px,transparent 20px 44px);
  animation:roadmove var(--road,.6s) linear infinite;}
@keyframes roadmove{from{background-position:0 0;}to{background-position:-44px 0;}}
.mlines{position:absolute;z-index:1;left:calc(50% - 96px);top:46%;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.mlines i{height:3px;border-radius:2px;background:var(--accent);animation:whoosh var(--bob,.5s) linear infinite;}
.mlines i:nth-child(1){width:28px;}
.mlines i:nth-child(2){width:18px;animation-delay:.16s;}
.mlines i:nth-child(3){width:24px;animation-delay:.32s;}
@keyframes whoosh{0%{opacity:0;transform:translateX(10px);}40%{opacity:.55;}100%{opacity:0;transform:translateX(-16px);}}
/* ЖхљьєхьЉюВДђьїљ(ВюёВа» ВйўВЁЅьіИ ьћёвдгви░) Рђћ ВЌ░ВєЇВЮ╝ВЌљ вћ░вЮ╝ ьЉюВДђЖ░ђ в░ћвђю */
.signpost{position:absolute;z-index:3;top:14px;left:14px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.sign-speed{width:46px;height:46px;border-radius:50%;background:#fff;border:5px solid #e5484d;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--ink);box-shadow:var(--shadow);font-variant-numeric:tabular-nums;}
.sign-warn{width:46px;height:41px;background:#ffcf3f;clip-path:polygon(50% 4%,96% 92%,4% 92%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-weight:800;font-size:17px;color:var(--ink);box-shadow:var(--shadow);}
.sign-lbl{font-size:10px;font-weight:700;color:var(--muted);}
@media (prefers-reduced-motion: reduce){.hero-char.run .char-face,.road,.mlines i{animation:none!important;}}
.char-picker{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:2px;}
.char-opt{font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);box-shadow:var(--shadow);}
.char-opt.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* в▒ЃВДђ ьїЮВЌЁ */
.dlg-backdrop{position:fixed;inset:0;background:rgba(20,20,30,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:32px;animation:fade .15s ease;}
.dlg{background:var(--surface);border-radius:24px;padding:28px 24px 22px;text-align:center;max-width:300px;width:100%;box-shadow:0 24px 64px rgba(20,20,30,.3);animation:pop .22s cubic-bezier(.2,.9,.3,1.2);}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.dlg-badge{width:80px;height:80px;border-radius:22px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;}
.dlg-badge.earned{background:var(--accent-soft);color:var(--accent-deep);border:2px solid var(--accent);}
.dlg-badge.locked{background:var(--fill);color:var(--muted);font-size:30px;}
.dlg-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;}
.dlg-sub{font-size:14px;color:var(--accent-deep);font-weight:800;margin-top:4px;}
.dlg-sub.locked{color:var(--muted);}
.dlg-date{font-size:13px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums;}
.dlg button{margin-top:20px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:12px;border-radius:13px;width:100%;}

/* ваѕв▓е 3В╣И */
.level-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:14px 8px;text-align:center;}
.stat .v{font-size:22px;font-weight:800;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;}
.stat .v.accent{color:var(--accent-deep);}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}

/* вБеьІ┤ ВіцьЁЮ */
.step{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:14px 16px;}
.step.active{border:1.5px solid var(--accent);}
.step-ico{width:38px;height:38px;border-radius:12px;background:var(--fill);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--ink-2);flex:none;}
.step.done .step-ico{background:var(--accent-soft);color:var(--accent-deep);}
.step-body{flex:1;min-width:0;}
.step-title{font-size:15px;font-weight:700;}
.step-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.step-cta{font-size:13px;font-weight:700;color:var(--accent-deep);flex:none;}
.step .check{color:var(--good);font-weight:800;}

/* Въћвћћ */
.grass{display:grid;grid-template-columns:repeat(17,1fr);gap:3px;}
.grass i{aspect-ratio:1;border-radius:3px;background:var(--fill);}
.grass i.g1{background:#ccd6ff;}.grass i.g2{background:#95a9ff;}.grass i.g3{background:var(--accent);}

/* ВѓгВаё Ж▓ђВЃЅ */
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;box-shadow:var(--shadow);}
.search input{flex:1;border:none;outline:none;font-size:15px;background:none;color:var(--ink);}
.search input::placeholder{color:var(--muted);}
.search .mag{color:var(--muted);display:flex;align-items:center;}
.icon{display:inline-block;vertical-align:middle;fill:currentColor;flex:none;}

.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ВѓгВаё ьЌѕвИї вфЕвАЮ ьЌцвЇћ */
.listhead{display:flex;align-items:center;gap:4px;margin:2px 0 0;}
.listhead .back{color:var(--muted);display:flex;padding:4px 8px 4px 0;}
.listhead b{font-size:17px;letter-spacing:-0.3px;}
.listhead .cnt{font-size:13px;color:var(--muted);font-weight:600;margin-left:2px;}

.addbar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);border-radius:14px;padding:12px 14px;}
.addbar .t{font-size:13px;color:var(--ink-2);}
.addbar .t b{color:var(--accent-deep);}
.addbar button{background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:8px 14px;border-radius:10px;}

/* вІеВќ┤ вдгВіцьіИ ьќЅ */
.wlist{display:flex;flex-direction:column;gap:8px;}
.wrow{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;transition:transform .1s;}
.wrow:active{transform:scale(.99);}
.wrow .w{font-size:16px;font-weight:700;}
.wrow .k{font-size:13px;color:var(--muted);margin-top:1px;}
.wrow .meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--fill);color:var(--muted);letter-spacing:.2px;}
.tag.lv{background:var(--accent-soft);color:var(--accent-deep);}
.tag.done{background:#e6f7f0;color:#0a9d6f;}
.tag.learning{background:#fff2e0;color:#c77a11;}

/* Вцђв╣ёВцЉ */
.soon{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:64px 24px;text-align:center;color:var(--muted);}
.soon .big{font-size:16px;font-weight:700;color:var(--ink-2);}
.soon .mascot{width:88px;height:88px;font-size:11px;}

/* ьЋўвІе ьЃГв░ћ (ьЎѕ ВцЉВЋЎ) */
.tabbar{display:flex;align-items:flex-end;justify-content:space-around;background:var(--surface);border-top:1px solid var(--line);padding:10px 8px calc(env(safe-area-inset-bottom) + 8px);position:relative;z-index:5;overflow:visible;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;padding:2px 0;overflow:visible;}
.tab.on{color:var(--accent-deep);}
.tab .ti{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
/* ьЎѕ: в░ћ ВюёвАю ьіђВќ┤вѓўВўцвіћ ВЏљьўЋ FAB. ВА░ВЃЂ overflowЖ░ђ ВъљвЦ┤ВДђ ВЋівЈёвАЮ tabbarвЦ╝ overflow:visibleвАю вЉљЖ│а
   ВЮїВѕў вДѕВДёВю╝вАю в░ћ ВЃЂвІеВёа ВюёвАю Вўгвд░вІц. .scrollВЮў вњц ьўЋВаювЮ╝ ВіцьЂгвАц ВйўьЁљВИа ВюёВЌљ ьЋГВЃЂ Вќ╣ьўђ ВЋѕ Въўвд░вІц. */
.tab.home{position:relative;}
.tab.home .ti{width:54px;height:54px;margin-top:-30px;margin-bottom:2px;border-radius:50%;background:var(--accent);color:#fff;box-shadow:0 8px 20px rgba(107,134,255,.5);border:4px solid var(--surface);}
.tab.home.on{color:var(--accent-deep);}

/* в░ћьЁђВІюьіИ (вІеВќ┤ ВЃЂВёИ) */
.sheet-backdrop{position:fixed;inset:0;background:rgba(20,20,30,.32);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .18s ease;}
.sheet{width:100%;max-width:520px;background:var(--surface);border-radius:24px 24px 0 0;box-shadow:var(--shadow-sheet);max-height:88vh;display:flex;flex-direction:column;animation:slideup .24s cubic-bezier(.2,.8,.2,1);}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grab{width:38px;height:4px;background:#d9dade;border-radius:2px;margin:10px auto 2px;flex:none;}
.sheet-head{display:flex;align-items:center;gap:10px;padding:6px 18px 10px;flex:none;}
.sheet-head .back{font-size:20px;color:var(--muted);padding:2px 6px;margin-left:-6px;}
.sheet-head .sp{flex:1;}
.sheet-head .fav{font-size:13px;font-weight:600;color:var(--muted);}
/* flex:1+min-height:0 ьЋёВѕў Рђћ ВЌєВю╝вЕ┤ вѓ┤ВџЕВЮ┤ ЖИИВќ┤ВДѕ вЋї(вІцВЮўВќ┤ вЊ▒) ВЮ┤ ВўЂВЌГВЮ┤ ВХЋВєївљўВДђ ВЋіЖ│а
   ВІюьіИ ВаёВ▓┤Ж░ђ ьЎћвЕ┤ в░ќВю╝вАю в░ђвац ВЃЂвІе ьЌцвЇћ(вІФЖИ░ в▓ёьі╝)Ж╣їВДђ вёўВќ┤Ж░ёвІц(flex item min-height:auto в▓ёЖиИ). */
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px 28px;display:flex;flex-direction:column;gap:16px;flex:1;min-height:0;}
.wd-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.wd-word{font-size:28px;font-weight:800;letter-spacing:-0.5px;}
.wd-ipa{font-size:14px;color:var(--muted);}
.wd-play{margin-left:auto;background:var(--fill);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--ink-2);}
.wd-pos{font-size:13px;color:var(--ink-2);line-height:1.6;}
.wd-en{font-size:13px;color:var(--muted);line-height:1.55;}
.wd-sec-t{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.2px;}
.wd-chips{display:flex;flex-wrap:wrap;gap:7px;}
.lchip{font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--fill);color:var(--ink);border:1px solid transparent;}
.lchip.link{background:var(--surface);border-color:var(--line);}
.lchip.link:active{background:var(--accent-soft);}
.lchip.affix{background:var(--ink);color:#fff;}
.lchip .g{color:var(--muted);font-weight:500;font-size:11px;margin-left:4px;}
.wd-ex{background:var(--bg);border-radius:14px;padding:13px 15px;}
.wd-ex .en{font-size:14px;font-weight:600;line-height:1.5;}
.wd-ex .en em{font-style:normal;color:var(--accent-deep);}

const SEED = (typeof window !== "undefined" && window.SEED) ? window.SEED : [];
const byWord = Object.fromEntries(SEED.map(w => [w.word, w]));

/* ВѓгВџЕВъљЖ░ђ ВДЂВаЉ ВХћЖ░ђьЋю вІеВќ┤(вѓ┤ вІеВќ┤ВъЦ) Рђћ localStorage в│┤ВА┤.
   v0ВЌљВёа ьћїваѕВЮ┤ВіцьЎђвЇћ ьЋГвфЕ ВЃЮВё▒вДї, вю╗┬иВўѕвгИ ВъљвЈЎ ВЃЮВё▒(LLM)ВЮђ ьћёвАЮВІю ВЌ░вЈЎ ВІю. */
let EXTRA = (() => { try { return JSON.parse(localStorage.getItem("en_mywords") || "{}"); } catch (e) { return {}; } })();
function saveExtra() { try { localStorage.setItem("en_mywords", JSON.stringify(EXTRA)); } catch (e) {} }
function wordOf(w) { return byWord[w] || EXTRA[w]; }
function allWords() { return SEED.concat(Object.values(EXTRA)); }

/* v0 вЇ░вфе ВдљЖ▓еВ░ЙЖИ░ */
const FAVS = new Set(["alert", "idiomatic"]);

/* ===================== SRS ВЌћВДё (Leitner ┬и localStorage) =====================
   ьЋЎВіх вІеВюё ьѓц = вІцВЮўВќ┤вЕ┤ `word#senseIndex`, вІеВЮ╝ ВЮўв»ИвЕ┤ `word`.
   boxРєЉ Рєњ вІцВЮї в│хВіх Ж░ёЖ▓ЕРєЉ(BOX_INTERVALS). ВўцвІх ВІю box=1вАю вдгВЁІ. box>=6ВЮ┤вЕ┤ 'ВЎёвБї'ВЌљ Жи╝ВаЉ. */
const DAY = 86400000;
const SRS = (() => {
  let store;
  try { store = JSON.parse(localStorage.getItem("en_srs") || "null"); } catch (e) {}
  if (!store) {
    const t = Date.now();
    store = { // В▓Ф ВІцьќЅ вЇ░вфе ВІювЊю(ВЋ▒ВЮ┤ в╣ёВќ┤ в│┤ВЮ┤ВДђ ВЋіЖ▓ї) Рђћ ВІцВаю ьЋЎВіхьЋўвЕ┤ вЇ«Вќ┤ВЇеВДљ
      "alert": { box: 4, due: t + 3 * DAY, seen: true },
      "possibility": { box: 6, due: t + 30 * DAY, seen: true },
      "interact": { box: 2, due: t - DAY, seen: true },
      "deadline": { box: 1, due: t + DAY, seen: true },
    };
  }
  const save = () => { try { localStorage.setItem("en_srs", JSON.stringify(store)); } catch (e) {} };
  return {
    get: k => store[k],
    status(k) {
      const s = store[k]; if (!s) return null;
      return { status: s.box >= 6 ? "done" : "learning", box: s.box, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) };
    },
    isDue: k => { const s = store[k]; return s && s.seen && s.due <= Date.now(); },

      s.seen = true;
      s.due = Date.now() + BOX_INTERVALS[s.box] * DAY;

      if (ok) POINTS.add(10); // ЖЙИВцђьЋю ьЋЎВіхВю╝вАювДї ВїЊВЮ┤віћ ьЈгВЮИьіИ Рђћ В║љвдГьё░ в│ђЖ▓й ВъаЖИѕ ьЋ┤ВаюВЌљ ВѓгВџЕ
      return s;

   ьЈгВЮИьіИвіћ В╣┤вЊю ВаЋвІх ВІюВЌљвДї ВаЂвдй Рђћ "ВЮ╝ВаЋ ьЋЎВіхвЪЅ ВюаВДђ"вЦ╝ Ж│ёвЪЅьЋўвіћ ВюаВЮ╝ьЋю ВДђьЉю. */
const CHAR_CHANGE_COST = 300;
const POINTS = (() => {
  let n = 0;
  try { n = parseInt(localStorage.getItem("en_points") || "0", 10) || 0; } catch (e) {}
  const save = () => { try { localStorage.setItem("en_points", String(n)); } catch (e) {} };
  return {
    get: () => n,
    add(v) { n += v; save(); },
    spend(v) { if (n < v) return false; n -= v; save(); return true; },

/* вІеВќ┤ВЮў ьЉюВІю ВЃЂьЃю: ВЮўв»И ВцЉ ьЋўвѓўвЮ╝вЈё ьЋЎВіх ВцЉВЮ┤вЕ┤ learning, ВаёвХђ doneВЮ┤вЕ┤ done */
function wordStatus(w) {
  const keys = (w.senses && w.senses.length) ? w.senses.map((_, i) => w.word + "#" + i) : [w.word];
  const sts = keys.map(k => SRS.status(k)).filter(Boolean);
  if (!sts.length) return null;
  if (sts.every(s => s.status === "done")) return { status: "done" };
  return sts.find(s => s.status === "learning") || sts[0];
}

/* ьЋЎВіх ВЋёВЮ┤ьЁю(В╣┤вЊю вІеВюё) = ВЮўв»Ив│ё 1Ж░ю. ВўѕвгИ ьЋўвѓўвЦ╝ вгИвДЦВю╝вАю ВѓгВџЕ */
function allItems() {
  const items = [];
  allWords().forEach(w => {
    if (w.senses && w.senses.length) {
      w.senses.forEach((s, i) => { if ((s.ex || []).length) items.push({ key: w.word + "#" + i, word: w.word, ko: s.ko, cue: s.cue, ex: s.ex[0], cefr: w.cefr }); });
    } else if ((w.ex || []).length) {
      items.push({ key: w.word, word: w.word, ko: w.ko, cue: null, ex: w.ex[0], cefr: w.cefr });
    }
  });
  return items;
}

/* ВўЂВќ┤ ВўѕвгИВЌљВёю ьЃђЖ╣Ѓ вІеВќ┤вЦ╝ в╣ѕВ╣ИВю╝вАю. Жх┤ВаѕьўЋ(saved/delivers)вЈё Вќ┤Ж░ё вДцВ╣Г. ВІцьїе ВІю null */
function makeBlank(en, word) {
  const stem = word.replace(/e$/, "").toLowerCase();
  const parts = en.split(/(\s+)/);
  for (let i = 0; i < parts.length; i++) {
    const clean = parts[i].replace(/[^A-Za-z']/g, "").toLowerCase();
    if (clean && (clean === word.toLowerCase() || (stem.length >= 3 && clean.startsWith(stem)))) {
      return { before: parts.slice(0, i).join(""), answer: clean, after: parts.slice(i + 1).join("") };
    }
  }
  return null;
}

/* Вўцвіў ВёИВЁў ВЋёВЮ┤ьЁю ВёаВаЋ: в│хВіх ВўѕВаЋ(due) Вџ░Вёа Рєњ ВІаЖию Вѕю, Вхювїђ nЖ░ю */
function pickSession(n = 10) {
  const its = allItems();
  const due = its.filter(it => SRS.isDue(it.key));
  const fresh = its.filter(it => !SRS.get(it.key));
  return due.concat(fresh).slice(0, n);
}

/* ьћёваѕВъё в░░ВЌ┤(svgo ВхюВаЂьЎћвљю ВъљВ▓┤ ВЃЮВё▒ SVG, ВЎИвХђ ВъЁваЦ ВЋёвІў) ВѕюьЎў ВъгВЃЮ Рђћ ВІцВаю В║љвдГьё░ ВЋёьіИ ВігвА».
   ьћёваѕВъё ВаёьЎўВЮђ ьЋўвЊюВ╗и вїђВІа ВЮ┤Ваё/вІцВЮї ьћёваѕВъёВЮё Ж▓╣В│љ ьЂгвАюВіцьјўВЮ┤вЊюьЋ┤ ВъљВЌ░ВіцвЪйЖ▓ї ВЮ┤Вќ┤ВДђвЈёвАЮ В▓ўвдг. */
function SpriteChar({ frames, size = 100, fps = 8 }) {
  const [i, setI] = useState(0);
  const [prevI, setPrevI] = useState(null);
  const reduceMotion = useMemo(
    () => typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches,
    []
  );
  useEffect(() => {
    if (!frames || frames.length < 2) return;
    const id = setInterval(() => {
      setI(v => { setPrevI(v); return (v + 1) % frames.length; });
    }, 1000 / fps);
    return () => clearInterval(id);
  }, [frames, fps]);
  if (!frames || !frames.length) return null;
  const dur = (1000 / fps) + "ms";
  const cur = frames[i % frames.length];
  const showCrossfade = !reduceMotion && frames.length > 1 && prevI != null && prevI !== i;
  const prev = showCrossfade ? frames[prevI % frames.length] : null;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      {prev && (
        <svg key={"p" + prevI + "-" + i} className="sprite-frame" width={size} height={size} viewBox={prev.vb}
             style={{ animation: `spriteFadeOut ${dur} linear forwards` }}
             dangerouslySetInnerHTML={{ __html: prev.inner }} />
      )}
      <svg key={"c" + i} className="sprite-frame" width={size} height={size} viewBox={cur.vb}
           style={{ animation: showCrossfade ? `spriteFadeIn ${dur} linear forwards` : "none" }}
           dangerouslySetInnerHTML={{ __html: cur.inner }} />
    </div>
  );
}

              {rows(mine)}

            <React.Fragment>
              <div className="chips">

/* ---------- вІеВќ┤В╣┤вЊю ВёИВЁў ---------- */
function CardSession({ items, onExit, onOpenWord }) {
  const [idx, setIdx] = useState(0);
  const [val, setVal] = useState("");
  const [res, setRes] = useState(null); // null | {ok, answer, dueIn}
  const [correct, setCorrect] = useState(0);
  const [hintLen, setHintLen] = useState(false);   // ЖИђВъљВѕў ьъїьіИ
  const [hintFirst, setHintFirst] = useState(false); // В▓Ф ЖИђВъљ ьъїьіИ

  const it = items[idx];
  const blank = useMemo(() => it ? makeBlank(it.ex.en, it.word) : null, [it]);
  const mode = blank ? "cloze" : "spell";
  const expected = blank ? blank.answer : it && it.word.toLowerCase();

  const speak = txt => { try { const u = new SpeechSynthesisUtterance(txt); u.lang = "en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch (e) {} };

  const check = () => {
    if (res || !val.trim()) return;
    const ok = val.trim().toLowerCase() === expected || val.trim().toLowerCase() === it.word.toLowerCase();
    const s = SRS.grade(it.key, ok);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok, answer: expected, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) });
    speak(it.ex.en);
  };
  const next = () => {
    if (idx + 1 >= items.length) { onExit(true, correct); return; }
    setIdx(idx + 1); setVal(""); setRes(null); setHintLen(false); setHintFirst(false);
  };

  // ьъїьіИ вгИЖхг: ЖИђВъљВѕў/В▓ФЖИђВъљвЦ╝ вЈЁвдй ьєаЖИђ
  const hintText = (() => {
    if (!expected) return "";
    const parts = [];
    if (hintFirst) parts.push("В▓Ф ЖИђВъљ " + expected[0]);
    if (hintLen) parts.push(expected.length + "ЖИђВъљ");
    return parts.join(" ┬и ");
  })();

  // в╣ѕВ╣И ВЋѕ ВЮИвЮ╝ВЮИ ВъЁваЦВ░й (ВДЂВаЉ ьЃђВЮ┤ьЋЉ)
  const blankInput = extraClass => (
    <input key={idx} className={extraClass} autoFocus value={val}
      onChange={e => setVal(e.target.value)}
      onKeyDown={e => e.key === "Enter" && check()}
      size={Math.max(6, val.length + 1, hintLen ? expected.length + 1 : 0)}
      placeholder={hintLen ? "┬и".repeat(expected.length) : ""}
      autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
      aria-label="в╣ѕВ╣И ВъЁваЦ" />
  );

  if (!it) {
    return (
      <div className="content"><div className="finish">
        <div className="msg">в│хВіхьЋа В╣┤вЊюЖ░ђ ВЌєВќ┤Вџћ</div>
        <div className="sub">ВЃѕ вІеВќ┤вЦ╝ ьЋЎВіхьЋўЖ▒░вѓў вѓ┤ВЮ╝ вІцВІю в│хВіхьЋ┤Вџћ.</div>
        <div className="qactions" style={{ width: "100%", marginTop: 16 }}><button className="primary" onClick={() => onExit(false, 0)}>вЈїВЋёЖ░ђЖИ░</button></div>
      </div></div>
    );
  }

  const renderEn = () => {
    if (mode === "spell") {
      return (
        <React.Fragment>
          <span className="qhint">Вюё вю╗ВЌљ ьЋ┤вІ╣ьЋўвіћ <b>ВўЂВќ┤ вІеВќ┤</b>вЦ╝ ВъЁваЦьЋўВёИВџћ.</span>
          <div className="qen" style={{ textAlign: "center" }}>
            {res
              ? <span className={"fill" + (res.ok ? "" : " bad")}>{res.ok ? res.answer : val.trim() || "Рђћ"}</span>
              : blankInput("spell-input")}
          </div>
        </React.Fragment>
      );
    }
    return (
      <div className="qen">
        {blank.before}
        {res
          ? <span className={"fill" + (res.ok ? "" : " bad")}>{res.ok ? res.answer : val.trim() || "Рђћ"}</span>
          : blankInput("binput")}
        {blank.after}
      </div>
    );
  };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={() => onExit(false, correct)} aria-label="ВбЁвБї"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: ((idx + (res ? 1 : 0)) / items.length * 100) + "%" }} /></div>
        <span className="study-n">{idx + 1} / {items.length}</span>
      </div>

      <div className="qcard">
        {it.cue && <div className="qcue">{it.cue}</div>}
        <div className="qko">{it.ko}</div>
        <div className="qdiv" />
        {mode === "cloze" ? renderEn() : <div className="qko" style={{ fontSize: 15, fontWeight: 600, color: "var(--muted)" }}>{it.ex.ko}</div>}
        {mode === "spell" && renderEn()}
        {res && <div className="qcue" style={{ marginTop: 2 }}>{it.ex.ko}</div>}
        {res && (
          <div className={"qres " + (res.ok ? "ok" : "no")}>
            {res.ok ? <Icon name="check" size={18} /> : <Icon name="close" size={18} />}
            {res.ok ? "ВаЋвІх!" : <span>ВаЋвІх: <b>{res.answer}</b></span>}
            <span className="due">{res.dueIn === 0 ? "Ж│Д в│хВіх" : res.dueIn + "ВЮ╝ вњц в│хВіх"}</span>
          </div>
        )}
      </div>

      {!res ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: "auto" }}>
          <div className="qhintrow">
            <button className={"qhint-btn" + (hintLen ? " on" : "")} onMouseDown={e => e.preventDefault()} onClick={() => setHintLen(v => !v)}>ЖИђВъљВѕў</button>
            <button className={"qhint-btn" + (hintFirst ? " on" : "")} onMouseDown={e => e.preventDefault()} onClick={() => setHintFirst(v => !v)}>В▓Ф ЖИђВъљ</button>
            {hintText && <span className="qmask">{hintText}</span>}
          </div>
          <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={check}>ьЎЋВЮИ</button>
        </div>
      ) : (
        <div className="qactions">
          <button className="ghost" onClick={() => onOpenWord(it.word)}>вІеВќ┤ ВаЋв│┤</button>
          <button className="primary" onClick={next}>{idx + 1 >= items.length ? "ьЋЎВіх ВЎёвБї" : "вІцВЮї вгИВаю"}</button>
        </div>
      )}
    </div>
  );
}

/* ---------- ьЋЎВіх ьЃГ ---------- */
function Learn({ onOpenWord }) {
  const [session, setSession] = useState(null); // null | {items} | "done"
  const [summary, setSummary] = useState(null);
  const dueCount = allItems().filter(it => SRS.isDue(it.key)).length;
  const newCount = allItems().filter(it => !SRS.get(it.key)).length;

  if (session === "done" && summary) {
    return <Finish total={summary.total} correct={summary.correct} onExit={() => { setSession(null); setSummary(null); }} />;
  }
  if (session) {
    return <CardSession items={session} onOpenWord={onOpenWord}
      onExit={(done, correct) => {
        if (done) { setSummary({ total: session.length, correct }); setSession("done"); }
        else setSession(null);
      }} />;
  }

  const start = () => {
    const items = pickSession(10);
    if (items.length) setSession(items);
  };

  const MENU = [
    { k: "card", icon: "school", title: "вІеВќ┤В╣┤вЊю", sub: `в│хВіх ${dueCount} ┬и ВІаЖию ${newCount} вїђЖИ░`, on: true },
    { k: "listen", icon: "volume_up", title: "вЊБЖИ░ ВёИВЁў (вћЋьЁїВЮ┤ВЁў)", sub: "вЊБЖ│а ЖиИвїђвАю ьЃђВЮ┤ьЋЉ", on: false },
    { k: "quiz", icon: "grid_view", title: "ьђ┤Вдѕ", sub: "вю╗┬иВіцьјавДЂ┬ив╣ѕВ╣И", on: false },
    { k: "level", icon: "add", title: "ваѕв▓е ьЁїВіцьіИ", sub: "Вќ┤ьюў + вгИВъЦЖхгВѓгваЦ", on: false },
  ];

  return (
    <div className="content learnmenu">
      <div className="stat" style={{ padding: "18px 8px", marginBottom: 2 }}>
        <div className="v accent">{dueCount}</div>
        <div className="l">ВДђЖИѕ в│хВіхьЋа В╣┤вЊю</div>
      </div>
      {MENU.map(m => (
        <div key={m.k} className={"step" + (m.on ? "" : " soon")} onClick={() => m.on && start()}>
          <div className="step-ico"><Icon name={m.icon} size={20} /></div>
          <div className="step-body">
            <div className="step-title">{m.title}</div>
            <div className="step-sub">{m.on ? m.sub : "Вцђв╣ё ВцЉ"}</div>
          </div>
          {m.on ? <div className="step-cta">ВІюВъЉ</div> : <span className="arrow" style={{ color: "var(--muted)" }}>Рђ║</span>}
        </div>
      ))}
    </div>
  );
}

function Settings({ charK, onChangeChar, onClose }) {
  const [pts, setPts] = useState(POINTS.get());
  const first = charK === null;

  const handlePick = k => {
    if (k === charK) return;
    if (first) { onChangeChar(k); return; } // В▓ўВЮї 1ьџївіћ вг┤вБї
    if (POINTS.spend(CHAR_CHANGE_COST)) { setPts(POINTS.get()); onChangeChar(k); }
  };

  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          <b style={{ fontSize: 16, fontWeight: 800 }}>ВёцВаЋ</b>
          <span className="sp" />

        </div>
        <div className="sheet-body">

              <div className="l">в│┤Вюа ьЈгВЮИьіИ</div>
              <div className="v">{pts}P</div>
            </div>
            <div className="l" style={{ textAlign: "right", maxWidth: 160 }}>вІеВќ┤В╣┤вЊю ВаЋвІхвДѕвІц 10P ВаЂвдй ┬и В║љвдГьё░ в│ђЖ▓йВЌљ {CHAR_CHANGE_COST}P ьЋёВџћ</div>
          </div>

          <div>
            <div className="wd-sec-t">В║љвдГьё░ {first ? "ВёаьЃЮ (В▓Ф ВёаьЃЮ вг┤вБї)" : "в│ђЖ▓й"}</div>
            <div className="wlist">
              {CHARACTERS.map(c => {
                const isCur = c.k === charK;
                const affordable = pts >= CHAR_CHANGE_COST;
                return (
                  <div key={c.k} className="charrow">
                    <div className="cf">
                      {c.k === "rat" && window.CHAR_RAT_RUN
                        ? <SpriteChar frames={window.CHAR_RAT_RUN} size={44} fps={6} />
                        : c.label}
                    </div>
                    <div className="body">
                      <div className="name">{c.label}</div>
                      <div className="move">{c.move}</div>
                    </div>
                    {isCur ? (
                      <div className="cta use">ВѓгВџЕ ВцЉ</div>
                    ) : first ? (
                      <button className="cta free" onClick={() => handlePick(c.k)}>ВёаьЃЮьЋўЖИ░</button>
                    ) : affordable ? (
                      <button className="cta buy" onClick={() => handlePick(c.k)}>{CHAR_CHANGE_COST}P в│ђЖ▓й</button>
                    ) : (
                      <div className="cta locked">{pts}/{CHAR_CHANGE_COST}P</div>
                    )}

                );
              })}
            </div>

          <div className="empty-note" style={{ textAlign: "center", marginTop: 4 }}>{APP_VERSION} ┬и {APP_BUILD}</div>
        </div>
      </div>
    </div>,
    document.body
  );
}

        {tab === "home" && <Home onGoTab={setTab} charK={charK} onOpenSettings={() => setSettingsOpen(true)} />}
        {tab === "dict" && <Dict onOpen={openWord} />}
        {tab === "learn" && <Learn onOpenWord={openWord} />}
        {tab === "talk" && <Soon title="ьџїьЎћ ьЃГВЮђ Вцђв╣ё ВцЉВъЁвІѕвІц" desc="вЕћВІаВађьўЋ вїђьЎћв░Е ┬и ВъЉвгИ ВЌ░Віх ┬и в░юВЮї ьЂ┤вдгвІЅ" />}
        {tab === "box" && <Soon title="в│┤Ж┤ђьЋеВЮђ Вцђв╣ё ВцЉВъЁвІѕвІц" desc="ВдљЖ▓еВ░ЙЖИ░ вІеВќ┤┬ивгИВъЦ ┬и в▒ЃВДђ В╗гваЅВЁў ┬и Вё▒ВъЦ ЖИ░вАЮ" />}
      </div>

      {settingsOpen && <Settings charK={charK} onChangeChar={changeChar} onClose={() => setSettingsOpen(false)} />}

      <div className="tabbar">
        {TABS.map(t => (
          <button key={t.k}
                  className={"tab" + (t.k === "home" ? " home" : "") + (tab === t.k ? " on" : "")}
                  onClick={() => setTab(t.k)}>
            <span className="ti"><Icon name={t.icon} size={t.k === "home" ? 26 : 24} /></span>
            {t.label}
          </button>
        ))}
      </div>

      {stack && <WordSheet stack={stack} onPush={pushWord} onPop={popWord} onClose={closeSheet} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
