      if (!aliveRef.current) { stream.getTracks().forEach(t => t.stop()); return; } // 권한 승인 중 방을 나감 — 스트림만 닫고 종료
      streamRef.current = stream;
      const mimeType = pickRecorderMimeType();
      // 48kbps로 캡(2026-07-20) — 음성 전사엔 충분한 음질이면서 base64 업로드 페이로드가 크게 줄어
      // "마이크 인식이 너무 오래 걸린다"(모바일 업로드 구간)의 체감을 줄인다.
      const recOpts = { audioBitsPerSecond: 48000 };
      if (mimeType) recOpts.mimeType = mimeType;
      const rec = new MediaRecorder(stream, recOpts);
      audioChunksRef.current = [];
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunksRef.current.push(e.data); };
      rec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        streamRef.current = null;
        recBusyRef.current = false;
        if (!aliveRef.current) return; // 언마운트 cleanup이 stop()을 부른 경우 — 전사하지 않음
        setListening(false);
        const blob = new Blob(audioChunksRef.current, { type: rec.mimeType || mimeType || "audio/webm" });
        if (blob.size < 500) { setErr("녹음된 소리가 너무 짧아요. 다시 시도해 주세요."); setVoiceMode(false); return; }
        setTranscribing(true);
        try {
          const text = await transcribeAudio(blob, rec.mimeType || mimeType || "audio/webm");
          if (text) {
            // 인식되면 바로 전송(2026-07-20, 사용자 요청 — 예전엔 입력창에 채워 검토 후 수동 전송).
            // 이미 타이핑해둔 내용이 있으면 앞에 붙여서 함께 보낸다. 전송이 막힌 상태(첨삭 대기 등)면
            // 예전처럼 입력창에만 채워 둔다.
            const existing = ((inputRef.current && inputRef.current.value) || "").trim();
            const combined = (existing ? existing + " " : "") + text;
            if (!sendBlockedRef.current) { setInput(""); sendRef.current(combined); }
            else setInput(combined);
          }
          else setErr("음성을 알아듣지 못했어요. 다시 시도해 주세요.");
        } catch (e) {
          setErr("음성 인식에 실패했어요. 다시 시도해 주세요.");
        } finally {
          setTranscribing(false);
          setVoiceMode(false);
        }
      };
      mediaRecorderRef.current = rec;
      rec.start();
      setListening(true);
    } catch (e) {
      recBusyRef.current = false;
      // getUserMedia 성공 후 MediaRecorder 생성/시작이 던진 경우 스트림을 닫아 마이크 점유 해제
      try { if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; } } catch (e2) {}
      setErr("마이크 권한이 필요해요. 브라우저 설정에서 허용해 주세요.");
    }
  };
  const stopListening = () => { if (mediaRecorderRef.current && listening) mediaRecorderRef.current.stop(); };

  // send()에서 분리(2026-07-19) — 실패 시 재시도가 필요해서 별도 함수로. msgIndex는 이 발화가
  // messages 배열의 몇 번째인지(재시도 시 같은 메시지의 feedback을 갱신하기 위함).
  const requestFeedback = async (text, histBefore, msgIndex) => {
    setLoadingFb(true); setErr(null); setFailedSend(null);
    pendingBotLineRef.current = null;
    try {
      const r = await talkFeedbackAndNext(persona, histBefore, text);
      if (!aliveRef.current) return; // 방을 나간 뒤 도착한 첨삭 — 음성 재생·대기 상태 진입 모두 금지(2026-07-20)
      const fb = { ok: r.ok, note_ko: r.note_ko || "", corrected: r.corrected || text, user_ko: r.user_ko || "" };
      setMessages(m => m.map((msg, i) => (i === msgIndex ? { ...msg, feedback: fb, ko: fb.user_ko || "" } : msg)));
      // 첨삭 문장(더 자연스러운 표현) 자동 1회 재생(2026-07-20) — 여기서 한 번만 호출되므로
      // 리렌더될 때마다 다시 읽어주는 일 없이 정확히 "도착한 순간"에만 재생됨. 이후 다시 듣고 싶으면
      // 말풍선 옆 스피커 아이콘으로 재생.
      if (!fb.ok && fb.corrected) speakText(fb.corrected);
      const botEn = (r.bot_en || "").trim();
      if (botEn) pendingBotLineRef.current = { en: botEn, ko: (r.bot_ko || "").trim() };
      setAwaitingAck(true);
    } catch (e) {
      // 예전엔 실패해도 조용히 { ok:true }로 덮어써서 "좋아요!"가 뜨고 넘어갔음 — 실제 문법 오류가
      // 있어도 사용자가 피드백을 전혀 못 받는 버그였음(2026-07-19, Gemini 강제 실패로 재현 확인).
      // 이제 에러를 노출하고 같은 문장으로 재시도할 수 있게(fetchBotLine의 다시 시도 패턴과 통일).
      setErr("첨삭을 받아오지 못했어요. (" + (e && e.message || "error") + ")");
      setFailedSend({ text, histBefore, msgIndex });
    } finally {
      setLoadingFb(false);
    }
  };
  // overrideText: 음성 인식(STT) 결과를 검토 없이 바로 전송하는 경로(2026-07-20)에서 넘어옴 —
  // input state 대신 그 텍스트를 쓴다. sendRef/sendBlockedRef는 rec.onstop처럼 오래된 클로저에서
  // 안전하게 최신 send·상태를 참조하기 위한 미러.
  const send = async (overrideText) => {
    const text = (overrideText != null ? overrideText : input).trim();
    if (!text || loadingBot || loadingFb || awaitingAck || playingAll) return;
    const histBefore = messages; // 이 턴 이전까지의 히스토리 — 다음 상대 대사 프롬프트용
    // 회화 세션 카운트(뱃지 talk) — 실제 대화로 진입한 방만 1회. 사용자 2번째 발화 시점에 기록해
    // "열자마자 닫음"은 안 세고, 한 방을 여러 번 드나들어도 mount당 한 번만(talkCountedRef).
    if (!talkCountedRef.current && histBefore.filter(m => m.role === "user").length >= 1) {
      talkCountedRef.current = true; ACT.addTalk();
    }
    setMessages(m => [...m, { role: "user", en: text, at: Date.now() }]);
    setInput("");
    requestFeedback(text, histBefore, histBefore.length);
  };
  const sendRef = useRef(send);
  sendRef.current = send;
  const sendBlockedRef = useRef(false);
  sendBlockedRef.current = loadingBot || loadingFb || awaitingAck || playingAll;
  const ackFeedback = () => {
    setAwaitingAck(false);
    const pending = pendingBotLineRef.current;
    if (pending) {
      pendingBotLineRef.current = null;
      const msg = { role: "bot", en: pending.en, ko: pending.ko, at: Date.now() };
      setMessages(m => [...m, msg]);
      speakText(msg.en, personaSpeakRate(persona), persona.accent, persona.gender);
    } else {
      fetchBotLine(messages); // talkFeedbackAndNext가 대사를 못 받아왔을 때(에러 등)만 예전 방식으로 폴백
    }
  };
  // 유저 발화 즐겨찾기는 원문이 아니라 교정문 우선(2026-07-19) — 오타·문법오류 원문 그대로
  // 저장되면 학습 자료로서 오히려 해가 됨. isFavSentence 표시(하트 채움)도 같은 텍스트 기준으로.
  const favTextOf = m => (m.role === "user" && m.feedback && m.feedback.corrected) ? m.feedback.corrected : m.en;
  const toggleFav = m => { toggleFavSentence(favTextOf(m), m.ko || "", persona.name); bump(v => v + 1); };
  const deleteMsg = i => {
    // 첨삭 대기 중(loadingFb) 삭제 금지(2026-07-20) — 그 사이 배열이 한 칸 줄면 requestFeedback이
    // 기억해둔 msgIndex가 어긋나 피드백이 증발하고 awaitingAck만 true로 남아 "확인" 버튼 없이
    // 입력창이 영구 잠기던 버그(방을 나갔다 와야 풀렸음).
    if (loadingFb || loadingBot) return;
    if (!confirm("이 메시지를 삭제할까요?")) return;
    if (awaitingAck && i === messages.length - 1) setAwaitingAck(false); // 삭제한 메시지가 확인 대기 중이던 마지막 메시지면 대기 해제
    setMessages(m => m.filter((_, idx) => idx !== i));
  };
  const corrections = messages.filter(m => m.role === "user" && m.feedback && !m.feedback.ok);
  // 잘한 표현(2026-07-19, PLAN 4.6 "대화 종료 시 요약(잘한 표현/교정 목록)" — 교정 목록만
  // 있고 잘한 표현은 없던 누락분). 한국어 섞인 입력을 자연스럽게 고쳐준 것과는 성격이 다르므로,
  // 순수 영어를 그 자체로 잘 쓴 경우만("한국어 없이 맞음") 여기 포함.
  const goodOnes = messages.filter(m => m.role === "user" && m.feedback && m.feedback.ok && !containsKorean(m.en));

  // "오늘 한 회화세션 통째로 듣기"(2026-07-20) — 오늘 날짜(talkDayKey)로 나눈 메시지만 순서대로
  // TTS로 이어 재생. 봇 대사는 페르소나 속도/억양/성별 그대로, 유저 발화는 다른 말풍선들처럼
  // 원문 대신 교정문(favTextOf)을 기본 설정으로 읽어준다(기존 "첨삭 문장 듣기"와 같은 방식).
  const todayKey = talkDayKey(Date.now());
  const todaysMsgs = messages.filter(m => m.en && talkDayKey(m.at) === todayKey);
  const playTodayAll = async () => {
    if (playingAll) { playAllStopRef.current = true; stopSpeaking(); setPlayingAll(false); return; }
    if (!todaysMsgs.length) return;
    unlockAudio(); // 클릭 핸들러 안에서 직접 호출 — 이후 순차 재생 전부가 이 제스처로 언락됨
    playAllStopRef.current = false;
    setPlayingAll(true);
    for (const m of todaysMsgs) {
      if (playAllStopRef.current || !aliveRef.current || document.visibilityState === "hidden") break;
      if (m.role === "bot") await speakText(m.en, personaSpeakRate(persona), persona.accent, persona.gender, true);
      else await speakText(favTextOf(m), undefined, undefined, undefined, true);
    }
    if (aliveRef.current) setPlayingAll(false);
  };

  if (showSummary) {
    return (
      <div className="content">
        <div className="talk-head">
          <button className="back" onClick={() => setShowSummary(false)} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
          <div className="talk-head-name">대화 요약 · {persona.name}</div>
        </div>
        {goodOnes.length > 0 && (
          <React.Fragment>
            <div className="sec">잘한 표현 ({goodOnes.length})</div>
            {goodOnes.map((m, i) => (
              <div key={i} className="talk-summary-item good">{m.en}</div>
            ))}
          </React.Fragment>
        )}
        <div className="sec">교정 ({corrections.length})</div>
        {corrections.length === 0 ? (
          <div className="empty-note">이번 대화에서는 교정할 부분이 없었어요. 잘하고 있어요.</div>
        ) : corrections.map((m, i) => (
          <div key={i} className="talk-summary-item">
            <div style={{ color: "var(--muted)", marginBottom: 4 }}>{m.en}</div>
            <div style={{ fontWeight: 700 }}>→ {m.feedback.corrected}</div>
            {m.feedback.note_ko && <div style={{ marginTop: 4, fontSize: 12, color: "var(--ink-2)" }}>{m.feedback.note_ko}</div>}
          </div>
        ))}
        <button className="qsub" style={{ marginTop: 10 }} onClick={() => setShowSummary(false)}>대화로 돌아가기</button>
      </div>
    );
  }

  return (
    <div className="content talk-room-screen">
      <div className="talk-head">
        <button className="back" onClick={onExit} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
        <div style={{ flex: 1 }}>
          <div className="talk-head-name">{persona.name}</div>
          <div className="talk-head-trait">{persona.trait}</div>
        </div>
        <div className="talk-head-actions">
          {(playingAll || todaysMsgs.length > 0) && (
            <button className={"talk-end-btn" + (playingAll ? " on" : "")} onClick={playTodayAll}>{playingAll ? "정지" : "오늘 대화 듣기"}</button>
          )}
          {messages.length > 1 && <button className="talk-end-btn" onClick={() => setShowSummary(true)}>대화 요약</button>}
        </div>
      </div>
      <div className="talk-toggles">
        <button className={"talk-toggle" + (showEn ? " on" : "")} onClick={() => setShowEn(v => !v)}>대사 {showEn ? "표시" : "숨김"}</button>
        <button className={"talk-toggle" + (showKo ? " on" : "")} onClick={() => setShowKo(v => !v)}>번역 {showKo ? "표시" : "숨김"}</button>
      </div>

      <div className="talk-msgs" ref={scrollRef} onPointerDown={() => { if (inputRef.current) inputRef.current.blur(); }}>
        {(() => {
          let lastDay = null;
          return messages.map((m, i) => {
            const day = talkDayKey(m.at);
            const showDivider = day !== lastDay;
            lastDay = day;
            const collapsed = !!collapsedDays[day];
            return (
              <React.Fragment key={i}>
                {showDivider && (
                  <div className="talk-daypill-row">
                    <button className="talk-daypill" onClick={() => setCollapsedDays(c => ({ ...c, [day]: !c[day] }))}>
                      {talkDayLabel(m.at)}
                      <Icon name={collapsed ? "expand_more" : "expand_less"} size={13} />
                    </button>
                  </div>
                )}
                {!collapsed && (
          <div className={"talk-msg-row " + m.role}>
            {m.role === "bot" && <div className={"talk-avatar-sm hi-" + persona.avatar}>{persona.letter}</div>}
            <div className={"talk-msg " + m.role}>
              <div className="talk-bubble">
                {m.role === "bot" && !showEn ? "•••" : m.role === "bot" ? <span><ChatBubbleWords text={m.en} onOpenWord={onOpenWord} /></span> : m.en}
                {m.role === "bot" && (
                  <button className="talk-play" onClick={() => speakText(m.en, personaSpeakRate(persona), persona.accent, persona.gender)} aria-label="다시 듣기">
                    <Icon name="volume_up" size={13} />
                  </button>
                )}
              </div>
              {showKo && m.ko && <div className="talk-msg-ko">{m.ko}</div>}
              <div className="talk-msg-actions">
                <button className={"talk-msg-fav" + (isFavSentence(favTextOf(m)) ? " on" : "")} onClick={() => toggleFav(m)} aria-label="문장 즐겨찾기">
                  <Icon name="favorite" size={14} />
                </button>
                {m.role === "user" && (
                  <button className="talk-msg-del" onClick={() => deleteMsg(i)} aria-label="메시지 삭제">
                    <Icon name="delete" size={15.4} />
                  </button>
                )}
              </div>
              {m.role === "user" && m.feedback && (
                <div className={"talk-fb" + (m.feedback.ok ? " ok" : "")}>
                  <div className="t">{m.feedback.ok ? "좋아요!" : containsKorean(m.en) ? "영어로 이렇게 말해보세요" : "이렇게 말하면 더 자연스러워요"}</div>
                  {!m.feedback.ok && m.feedback.corrected && (
                    <div className="talk-fb-corrected-row">
                      <span className="talk-fb-corrected">{m.feedback.corrected}</span>
                      <button className="talk-play" onClick={() => speakText(m.feedback.corrected)} aria-label="첨삭 문장 듣기">
                        <Icon name="volume_up" size={13} />
                      </button>
                    </div>
                  )}
                  {m.feedback.note_ko && <div>{m.feedback.note_ko}</div>}
                  {awaitingAck && i === messages.length - 1 && <button onClick={ackFeedback}>확인</button>}
                </div>
              )}
            </div>
          </div>
                )}
              </React.Fragment>
            );
          });
        })()}
        {loadingBot && <div className="empty-note">상대가 대답을 준비하고 있어요…</div>}
        {loadingFb && <div className="empty-note">확인하고 있어요…</div>}
        {err && (
          <div className="empty-note" style={{ color: "var(--danger)" }}>
            {err}
            {failedHist && <button className="qhint-btn" style={{ marginLeft: 8 }} onClick={() => fetchBotLine(failedHist)}>다시 시도</button>}
            {failedSend && <button className="qhint-btn" style={{ marginLeft: 8 }} onClick={() => requestFeedback(failedSend.text, failedSend.histBefore, failedSend.msgIndex)}>다시 시도</button>}
          </div>
        )}
      </div>

      <div className="talk-input-row">
        {voiceMode ? (
          <button className={"talk-voice-btn" + (listening ? " listening" : "")}
                  onClick={listening ? stopListening : startListening}
                  disabled={awaitingAck || loadingBot || loadingFb || transcribing}>
            <Icon name="mic" size={18} />
            {transcribing ? "인식하는 중…" : listening ? "듣고 있어요… 탭해서 멈추기" : "탭해서 말하기"}
          </button>
        ) : (
          <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} placeholder="영어로 답해보세요 (막히면 한국어도 괜찮아요)"
            disabled={awaitingAck || loadingBot || loadingFb}
            onKeyDown={e => { if (e.key === "Enter") send(); }}
            autoCapitalize="none" autoComplete="off" autoCorrect="off" />
        )}
        {STT_SUPPORTED && (
          <button className="talk-voice-toggle" onClick={() => { stopListening(); setVoiceMode(v => !v); }}
                  disabled={awaitingAck || loadingBot || loadingFb || transcribing} aria-label="입력 방식 전환">
            <Icon name={voiceMode ? "keyboard" : "mic"} size={18} />
          </button>
        )}
        {!voiceMode && <button onClick={send} disabled={!input.trim() || awaitingAck || loadingBot || loadingFb}>전송</button>}
      </div>
    </div>
  );
}

/* ---------- 발음 클리닉 (회화 탭) ----------
   짧은 문장을 듣고 따라 말하면 STT(MediaRecorder+Gemini 전사)로 받아쓴 뒤 목표 문장과
   단어 단위로 대조해 발음 점수·단어별 정오를 보여준다. 마이크가 없거나 STT 미지원이면
   "데모 채점"으로 같은 결과 UI를 보여줘 프레임이 항상 완성돼 보이게 한다(2026-07-17). */
const PRONUN_DRILLS = [
  { en: "I would like a cup of coffee.", ko: "커피 한 잔 주세요.", focus: "would like 연음" },
  { en: "She thought about the third theory.", ko: "그녀는 세 번째 이론에 대해 생각했다.", focus: "th 발음(θ)" },
  { en: "The weather is really lovely today.", ko: "오늘 날씨가 정말 좋네요.", focus: "r / l 구분" },
  { en: "Could you turn it off, please?", ko: "그것 좀 꺼 주시겠어요?", focus: "turn it off 연음" },
  { en: "I have already finished my work.", ko: "나는 이미 일을 끝냈어요.", focus: "강세·리듬" },
  { en: "We are going to the airport tomorrow.", ko: "우리는 내일 공항에 가요.", focus: "going to(gonna) 축약" },
];
function pronScore(target, said) {
  const norm = s => (s || "").toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
  const heard = new Set(norm(said).map(w => w.replace(/'.*$/, "")));
  const words = norm(target).map(w => ({ w, ok: heard.has(w.replace(/'.*$/, "")) }));
  const score = words.length ? Math.round(words.filter(x => x.ok).length / words.length * 100) : 0;
  return { score, words };
}
function PronunClinic({ onBack }) {
  const [idx, setIdx] = useState(0);
  const [result, setResult] = useState(null); // {score, words, said} | null
  const [recording, setRecording] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [err, setErr] = useState(null);
  const recRef = useRef(null);
  const chunksRef = useRef([]);
  const pronStreamRef = useRef(null); // 진행 중인 마이크 스트림 — 언마운트 시 반드시 정지
  const pronAliveRef = useRef(true);
  const pronBusyRef = useRef(false); // getUserMedia 대기 중 연타 차단(recording state는 rec.start() 후에야 true)
  const drill = PRONUN_DRILLS[idx];

  // 녹음 중 뒤로가기/탭 이동 시 레코더·스트림 정리(2026-07-20) — 안 하면 마이크 점유가 계속 남음
  useEffect(() => () => {
    pronAliveRef.current = false;
    stopSpeaking();
    try { if (recRef.current && recRef.current.state !== "inactive") recRef.current.stop(); } catch (e) {}
    try { if (pronStreamRef.current) pronStreamRef.current.getTracks().forEach(t => t.stop()); } catch (e) {}
  }, []);

  const play = () => { unlockAudio(); speakText(drill.en); };

  const next = () => { setResult(null); setErr(null); setIdx(i => (i + 1) % PRONUN_DRILLS.length); };
  const retry = () => { setResult(null); setErr(null); };

  // STT 미지원/오류 시: 목표 문장 기준 데모 채점(마지막 1~2개 단어를 '부정확'으로) — 프레임 완성용
  const demoScore = () => {
    const norm = drill.en.toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
    const weak = new Set(norm.slice(-1).concat(norm.length > 4 ? [norm[1]] : []));
    const words = norm.map(w => ({ w, ok: !weak.has(w) }));
    setResult({ score: Math.round(words.filter(x => x.ok).length / words.length * 100), words, demo: true });
  };

  const startRec = async () => {
    if (recording || scoring || pronBusyRef.current) return;
    pronBusyRef.current = true;
    setErr(null); setResult(null);
    if (!STT_SUPPORTED) { pronBusyRef.current = false; demoScore(); return; }
    try {
      unlockAudio();
      stopSpeaking(); // "들어보기" 재생 중 녹음 시작 시 스피커의 TTS가 마이크로 들어가 채점을 오염시키지 않게
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      if (!pronAliveRef.current) { stream.getTracks().forEach(t => t.stop()); return; }
      pronStreamRef.current = stream;
      const mimeType = pickRecorderMimeType();
      const rec = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      chunksRef.current = [];
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
      rec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        pronStreamRef.current = null;
        pronBusyRef.current = false;
        if (!pronAliveRef.current) return; // 언마운트 cleanup 경유 — 채점하지 않음
        setRecording(false);
        const blob = new Blob(chunksRef.current, { type: rec.mimeType || mimeType || "audio/webm" });
        if (blob.size < 500) { setErr("녹음이 너무 짧아요. 다시 시도해 주세요."); return; }
        setScoring(true);
        try {
          const said = await transcribeAudio(blob, rec.mimeType || mimeType || "audio/webm");
          if (said) setResult({ ...pronScore(drill.en, said), said });
          else setErr("음성을 알아듣지 못했어요. 다시 시도해 주세요.");
        } catch (e) { setErr("채점에 실패했어요. 잠시 후 다시 시도해 주세요."); }
        finally { setScoring(false); }
      };
      recRef.current = rec; rec.start(); setRecording(true);
    } catch (e) {
      pronBusyRef.current = false;
      try { if (pronStreamRef.current) { pronStreamRef.current.getTracks().forEach(t => t.stop()); pronStreamRef.current = null; } } catch (e2) {}
      setErr("마이크를 사용할 수 없어요. 권한을 확인해 주세요.");
    }
  };
  const stopRec = () => { if (recRef.current && recording) recRef.current.stop(); };

  // 점수 하이어라키(핑크<노랑<초록<파랑) — 형광펜 색
  const scoreHl = s => s >= 90 ? "blue" : s >= 75 ? "green" : s >= 60 ? "yellow" : "pink";

  return (
    <div className="content">
      <div className="sub-head">
        <button className="back" onClick={onBack} aria-label="뒤로">‹</button>
        <div className="sec" style={{ padding: 0 }}>발음 클리닉</div>
      </div>
      <div className="pron-prog">{idx + 1} / {PRONUN_DRILLS.length}</div>

      <div className="pron-card">
        <span className="tag">{drill.focus}</span>
        <div className="pron-en">{drill.en}</div>
        <div className="pron-ko">{drill.ko}</div>
        <button className="pron-play" onClick={play}><Icon name="volume_up" size={18} /> 들어보기</button>
      </div>

      {!result ? (
        <div className="pron-actions">
          <button className={"pron-mic" + (recording ? " on" : "")} onClick={recording ? stopRec : startRec} disabled={scoring}>
            <Icon name={recording ? "stop" : "mic"} size={22} />
            <span>{scoring ? "채점 중…" : recording ? "녹음 중 — 누르면 멈춤" : STT_SUPPORTED ? "눌러서 따라 말하기" : "데모 채점 보기"}</span>
          </button>
          {err && <div className="empty-note" style={{ color: "var(--danger)" }}>{err}</div>}
        </div>
      ) : (
        <div className="pron-result">
          <div className="pron-score">
            <span className={"pv hl hl-" + scoreHl(result.score)}>{result.score}</span><div className="pl">발음 점수</div>
          </div>
          <div className="pron-words">
            {result.words.map((x, i) => <span key={i} className={"pron-w" + (x.ok ? " ok" : " no")}>{x.w}</span>)}
          </div>
          <div className="pron-tip">
            {result.score >= 85 ? "아주 좋아요! 자연스러운 발음이에요."
              : result.score >= 60 ? "좋아요. 회색으로 표시된 단어를 또박또박 다시 발음해 보세요."
              : "천천히 또박또박 다시 해볼까요? 회색 단어에 집중해 보세요."}
            {result.demo && " (데모 채점 — 실제 기기에서는 녹음으로 채점돼요.)"}
          </div>
          <div className="qactions">
            <button className="ghost" onClick={retry}>다시 하기</button>
            <button className="primary" onClick={next}>다음 문장</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Talk({ onOpenWord, setImmersive }) {
  const [view, setView] = useState(null); // null=대화방 목록 | "sos" | "writing" | "pronun" | "create" | 페르소나 id
  const [, bumpP] = useState(0); // 커스텀 페르소나 추가/삭제 시 목록 리렌더
  /* 대화방·작문·발음클리닉·페르소나 생성은 몰입 화면이라 탭바를 숨김 — SOS·목록은 잠깐 들르는 도구라 탭바 유지.
     cleanup에서 항상 false로 되돌려야 상단 로고로 홈에 갔을 때도 탭바가 안 갇힘. */
  useEffect(() => {
    if (!setImmersive) return;
    setImmersive(!!view && view !== "sos");
    return () => setImmersive(false);
  }, [view]); // eslint-disable-line
  const openRoom = id => { markDailyTalkSeen(id); setView(id); }; // 오늘의 랜덤 말걸기 대상이면 뱃지 해제(2026-07-20)
  if (!PROXY_BASE) return <Soon title="회화 탭은 준비 중입니다" desc="메신저형 대화방 · 작문 연습 · 발음 클리닉" />;
  if (view === "sos") return <TalkSOS onBack={() => setView(null)} onOpenWord={onOpenWord} />;
  if (view === "writing") return <Writing onExit={() => setView(null)} />;
  if (view === "pronun") return <PronunClinic onBack={() => setView(null)} />;
  if (view === "create") return <PersonaCreate onDone={id => setView(id)} onCancel={() => setView(null)} />;
  if (view) {
    const persona = allPersonas().find(p => p.id === view);
    if (!persona) return <TalkRooms onOpenRoom={openRoom} onOpenSOS={() => setView("sos")} onOpenWriting={() => setView("writing")} onOpenPronun={() => setView("pronun")} onCreate={() => setView("create")} onDeletePersona={id => { removeCustomPersona(id); bumpP(v => v + 1); }} />;
    return <TalkRoom key={persona.id} persona={persona} onExit={() => setView(null)} onOpenWord={onOpenWord} />;
  }
  return <TalkRooms onOpenRoom={openRoom} onOpenSOS={() => setView("sos")} onOpenWriting={() => setView("writing")} onOpenPronun={() => setView("pronun")} onCreate={() => setView("create")} onDeletePersona={id => { removeCustomPersona(id); bumpP(v => v + 1); }} />;
}

/* 커스텀 대화 상대 만들기 — 이름·성격/상황·상세 설명·억양·아바타색을 받아 페르소나를 만든다.
   promptDesc는 입력을 조합해 생성하고, intro는 안 넣음(TalkRoom이 첫 대사를 Gemini로 생성). */
function PersonaCreate({ onDone, onCancel }) {
  const [name, setName] = useState("");
  const [trait, setTrait] = useState("");
  const [detail, setDetail] = useState("");
  const [accent, setAccent] = useState("us");
  const [gender, setGender] = useState("female");
  const [color, setColor] = useState("green");
  const COLORS = ["green", "yellow", "pink", "blue", "orange"];
  const ACCENTS = [{ k: "us", label: "미국" }, { k: "gb", label: "영국" }, { k: "au", label: "호주" }];
  const GENDERS = [{ k: "female", label: "여성" }, { k: "male", label: "남성" }];
  const canSave = name.trim() && trait.trim();
  const save = () => {
    if (!canSave) return;
    const nm = name.trim(), tr = trait.trim(), dt = detail.trim();
    const persona = {
      id: "custom_" + Date.now(), name: nm, trait: tr, accent, gender, avatar: color,
      letter: Array.from(nm)[0] || "?", custom: true,
      promptDesc: `역할극 상대 설정: 당신은 "${nm}"입니다. ${tr}.` + (dt ? ` ${dt}.` : "") +
        " 이 설정에 맞는 성격·말투·태도로 사용자와 영어로 자연스럽게 대화하세요. 항상 상대 역할만 연기하고 설명은 하지 마세요.",
    };
    addCustomPersona(persona);
    onDone(persona.id);
  };
  return (
    <div className="content">
      <div className="talk-head">
        <button className="back" onClick={onCancel} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
        <div className="talk-head-name">대화 상대 만들기</div>
      </div>
      <div className="pc-form">
        <label className="pc-label">이름</label>
        <input className="pc-input" value={name} onChange={e => setName(e.target.value)} placeholder="예: 깐깐한 면접관" maxLength={20} />
        <label className="pc-label">성격 · 상황 (한 줄)</label>
        <input className="pc-input" value={trait} onChange={e => setTrait(e.target.value)} placeholder="예: IT 대기업 · 압박 면접 · 미국인" maxLength={40} />
        <label className="pc-label">상세 설정 <span style={{ color: "var(--muted)", fontWeight: 400 }}>(선택)</span></label>
        <textarea className="pc-input" rows={3} value={detail} onChange={e => setDetail(e.target.value)} placeholder="말투·태도·대화 상황을 더 자세히 적으면 더 잘 맞춰줘요" maxLength={200} />
        <label className="pc-label">억양</label>
        <div className="pc-chips">
          {ACCENTS.map(a => <button key={a.k} className={"pc-chip" + (accent === a.k ? " on" : "")} onClick={() => setAccent(a.k)}>{a.label}</button>)}
        </div>
        <label className="pc-label">목소리</label>
        <div className="pc-chips">
          {GENDERS.map(g => <button key={g.k} className={"pc-chip" + (gender === g.k ? " on" : "")} onClick={() => setGender(g.k)}>{g.label}</button>)}
        </div>
        <label className="pc-label">아바타 색</label>
        <div className="pc-colors">
          {COLORS.map(c => <button key={c} className={"pc-color hi-" + c + (color === c ? " on" : "")} onClick={() => setColor(c)} aria-label={c}>{color === c ? Array.from(name.trim())[0] || "" : ""}</button>)}
        </div>
        <button className="qsub" style={{ marginTop: 18 }} disabled={!canSave} onClick={save}>만들고 대화 시작</button>
      </div>
    </div>
  );
}

/* ---------- 회화 탭 — SOS 미니 도구 (PLAN 4.12-5) ----------
   한국어로 하고 싶은 말을 입력 → Gemini 프록시가 자연스러운 영어 한 문장으로 알려줌.
   onBack이 있으면(대화방 목록에서 들어온 경우) 뒤로가기 헤더 표시, 없으면(구버전 단독 탭) 기존과 동일. */
function TalkSOS({ onBack, onOpenWord }) {
  const [ko, setKo] = useState("");
  const [result, setResult] = useState(null);
  const [resultKo, setResultKo] = useState(""); // 결과가 나온 시점의 한국어 원문(즐겨찾기에 같이 저장) — 이후 textarea를 수정해도 안 바뀜
  const [vocab, setVocab] = useState([]); // 결과 문장의 핵심 어휘 [{word, ko}]
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [, bump] = useState(0); // 즐겨찾기 하트 토글 리렌더용

  const ask = async () => {
    const text = ko.trim();
    if (!text || loading) return;
    setLoading(true); setErr(null); setResult(null); setVocab([]);
    try {
      const prompt = "당신은 한국인 영어 학습자를 돕는 회화 코치입니다. 아래 한국어 문장을 자연스럽고 " +
        "일상적인 영어 구어체 한 문장으로 번역하세요." +
        "\n그 영어 문장에 실제로 쓰인 단어 중 학습자가 새로 익히면 좋을 핵심 어휘를 최대 4개까지 뽑으세요." +
        " 각 단어는 문장에 쓰인 굴절형이 아니라 사전 원형(소문자, 예: 'smells'→'smell', 'loved'→'love')으로 쓰고," +
        " a/the/is/are/very 같은 아주 기초적인 단어는 제외하세요." +
        "\n아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON 객체 하나만 출력하세요." +
        '\n{"en":"번역된 영어 문장","vocab":[{"word":"사전 원형","ko":"그 단어의 뜻(1~3단어)"}]}' +
        "\n\n한국어: " + text;
      const r = await geminiJSON(prompt);
      setResult((r.en || "").trim());
      setVocab(Array.isArray(r.vocab) ? r.vocab.filter(v => v && v.word) : []);
      setResultKo(text);
    } catch (e) {
      setErr("지금 연결이 안 돼요. 잠시 후 다시 시도해 주세요. (" + (e && e.message || "error") + ")");
    } finally {
      setLoading(false);
    }
  };

  const openVocab = word => openVocabWord(word, onOpenWord);

  if (!PROXY_BASE) return <Soon title="회화 탭은 준비 중입니다" desc="메신저형 대화방 · 작문 연습 · 발음 클리닉" />;

  return (
    <div className="content">
      {onBack ? (
        <div className="talk-head">
          <button className="back" onClick={onBack} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
          <div className="talk-head-name">SOS — 하고 싶은 말을 영어로</div>
        </div>
      ) : (
        <div className="sec">SOS — 하고 싶은 말을 영어로</div>
      )}
      <div className="qcard">
        <textarea className="qdictate" rows={3} value={ko} onChange={e => setKo(e.target.value)}
          placeholder="예: 저 화장실 좀 다녀와도 될까요?" autoCapitalize="none" />
        <button className="qsub" disabled={loading || !ko.trim()} onClick={ask}>
          <Icon name="auto_awesome" size={16} /> {loading ? "생각 중…" : "영어로 보기"}
        </button>
        {err && <div className="empty-note" style={{ color: "var(--danger)" }}>{err}</div>}
        {result && (
          <div className="qdictate-result">
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
              <div style={{ fontWeight: 800, fontSize: 17 }}>{result}</div>
              <button className={"talk-msg-fav" + (isFavSentence(result) ? " on" : "")} style={{ flex: "none" }}
                      onClick={() => { toggleFavSentence(result, resultKo, "SOS"); bump(v => v + 1); }} aria-label="문장 즐겨찾기">
                <Icon name="favorite" size={16} />
              </button>
            </div>
            <button className="qhint-btn" style={{ marginTop: 10 }} onClick={() => speakText(result)}>
              <Icon name="volume_up" size={16} /> 들어보기
            </button>
            {vocab.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <div className="talk-msg-ko" style={{ padding: 0, marginBottom: 6 }}>핵심 어휘</div>
                <div className="qsyn-chips">
                  {vocab.map((v, i) => (
                    <button key={i} className="qsyn-chip link" onClick={() => openVocab(v.word)}>
                      {v.word}{v.ko ? " · " + v.ko : ""}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {!onBack && <div className="empty-note" style={{ marginTop: 4 }}>대화방·작문 연습·발음 클리닉은 준비 중이에요. 막힐 때 이 SOS부터 써보세요.</div>}
    </div>
  );
}

/* 성장 기록 — SRS 기록(box·at)에서 학습한 단어·완료·총 학습일·연속일을 실측하고, 마지막 학습
   시각(at)으로 최근 8주 학습량 막대그래프를 그린다. 데모 시드가 at을 최근 ~90일에 뿌려둬서
   실제 기록이 없어도 통계가 채워져 보인다(2026-07-17 — "성장 기록 준비 중" 자리 채움). */
function GrowthRecord() {
  const now = Date.now();
  const recs = allItems().map(it => SRS.get(it.key)).filter(Boolean);
  const learned = recs.length;
  const mastered = recs.filter(s => s.box >= 6).length;
  const dset = new Set(recs.map(s => (s.at != null ? Math.floor(s.at / DAY) : null)).filter(x => x != null));
  // 연속 학습일 = 가장 최근 학습일에서 하루씩 거슬러 끊기지 않고 이어진 날 수(오늘 학습 안 했어도 최근 구간 표시)
  const sortedDays = [...dset].sort((a, b) => b - a);
  let streak = 0;
  if (sortedDays.length) { streak = 1; let prev = sortedDays[0]; for (let k = 1; k < sortedDays.length; k++) { if (sortedDays[k] === prev - 1) { streak++; prev = sortedDays[k]; } else break; } }
  const thisWeek = recs.filter(s => s.at != null && now - s.at < 7 * DAY).length;
  const weeks = Array.from({ length: 8 }, () => 0);
  recs.forEach(s => { if (s.at == null) return; const w = Math.floor((now - s.at) / (7 * DAY)); if (w >= 0 && w < 8) weeks[7 - w]++; });
  const maxW = Math.max(1, ...weeks);
  // 포스트잇 색은 성취 색 하이어라키(핑크<노랑<초록<파랑) 순서로 4칸에 매핑
  const tiles = [
    { v: streak, l: "연속 학습일", hl: "pink" },
    { v: learned, l: "학습한 단어", hl: "yellow" },
    { v: mastered, l: "완료(마스터)", hl: "green" },
    { v: dset.size, l: "총 학습일", hl: "blue" },
  ];
  return (
    <div className="vault-sec">
      <div className="sec">성장 기록</div>
      <div className="growth-tiles">
        {tiles.map((t, i) => (
          <div key={t.l} className={"stat tier-" + t.hl}>
            <div className="v"><span className={"hl hl-" + t.hl} style={{ transform: "rotate(" + (i % 2 ? 1 : -1.3) + "deg)" }}>{t.v}</span></div>
            <div className="l">{t.l}</div>
          </div>
        ))}
      </div>
      <div className="growth-card">
        <div className="growth-head"><span>주간 학습량</span><span className="gsub">최근 8주 · 이번 주 {thisWeek}개</span></div>
        <div className="growth-bars">
          {weeks.map((c, i) => {
            const r = c / maxW; // 잔디와 같은 크림톤 강도 위계(빈칸/g1/g2/g3)
            const lvl = c === 0 ? "g0" : r < 0.4 ? "g1" : r < 0.7 ? "g2" : "g3";
            return (
              <div key={i} className="gbar-col">
                <div className="gbar-track"><div className={"gbar " + lvl} style={{ height: (c === 0 ? 4 : Math.round(r * 100)) + "%" }} /></div>
                <div className="gbar-lbl">{i === 7 ? "이번" : (7 - i) + "주"}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="growth-pts"><Icon name="star" size={15} /> 학습 포인트 <b>{POINTS.get()}</b>점</div>
    </div>
  );
}

/* ---------- 단어카드 세션 ---------- */
/* 정답 정렬 규칙 — 사용자가 글자만 치면 정답의 구분 기호(공백·하이픈·아포스트로피)를 해당 위치에
   자동으로 끼워 넣는다("ad-lib"·"backed me up" 같은 다단어/하이픈 정답도 힌트 없이 입력 가능하게).
   타이핑 onChange·음성 인식 결과 둘 다 이 함수로 정렬(2026-07-20, 음성 입력 추가하며 공용 함수로 분리
   — 예전엔 onChange 안에 인라인으로만 있어서 음성 인식 결과에는 적용할 방법이 없었음). */
function formatCardInput(rawValue, expected) {
  const raw = (rawValue || "").replace(/[^A-Za-z0-9]/g, "");
  if (!expected) return raw;
  let out = "", j = 0, aligned = true;
  while (j < raw.length && aligned && out.length < expected.length) {
    const ec = expected[out.length];
    if (!/[a-z0-9]/.test(ec)) { out += ec; continue; }
    out += raw[j++];
    if (out[out.length - 1].toLowerCase() !== ec) aligned = false;
  }
  return out + raw.slice(j);
}
/* 카드 위쪽에 얹는 "약한 힌트" — 단어를 직접 알려주지 않고 품사+사용 결만 옅게 귀띔.
   품사(단어별로 다름)와 CEFR(사용빈도/격식 근사)를 조합해 단어마다 문구가 달라지게(2026-07-17). */
function CardSession({ items, onExit, onOpenWord }) {
  const [queue, setQueue] = useState(items);
  const [idx, setIdx] = useState(0);
  const [val, setVal] = useState("");
  const [res, setRes] = useState(null); // null | {ok, answer, dueIn}
  const [correct, setCorrect] = useState(0);
  const [hintLen, setHintLen] = useState(false);   // 글자수 힌트
  const [hintFirst, setHintFirst] = useState(false); // 첫 글자 힌트
  const [hintMean, setHintMean] = useState(false);   // 뜻 열기 힌트(cloze 전용)
  const [hintUsed, setHintUsed] = useState(false);   // 이 카드에서 힌트를 썼는지 — 쓰면 이번 세션에 한 번 더 출제
  const [nudgeWord, setNudgeWord] = useState(null);  // 유의어를 입력했을 때 안내 문구에 쓸 단어
  const [retried, setRetried] = useState(false);     // 근접 오답 1회 재시도를 이미 줬는지
  const [retryMsg, setRetryMsg] = useState(false);   // 재시도 안내 문구 노출("거의 맞았어요")
  const [retryBoost, setRetryBoost] = useState(false); // 재시도 중 정보량이 거의 없을 때(힌트로 이미 본 글자뿐) 대신 뜨는 안내("힌트를 더 드릴게요")
  const [, bumpFav] = useState(0); // 카드 즐겨찾기(하트) 토글 리렌더용

  const it = queue[idx];
  const blank = useMemo(() => it ? makeBlank(it.ex.en, it.word) : null, [it]);
  const mode = blank ? "cloze" : "spell";
  const expected = blank ? blank.answer : it && it.word.toLowerCase();
  // 이 카드(문맥) 하나에 한정된 유의어 — 사전 상세의 표제어 전체 유의어와는 다름(itemsFromWords 참고)
  const synonyms = useMemo(() => (it && it.syn) || [], [it]);
  // 뜻 열기 힌트 문구: 품사(한글) + 단어 뜻. 예: "명사 · 의회, 협의회"
  // 다의어는 지금 카드가 다루는 의미 말고 다른 뜻도 있다는 걸 같이 알려준다(2026-07-20) — 예전엔
  // "대신 사용할 수 있는 단어" 칩에 다른 뜻(pedestrian#1 형용사 카드에 명사 "보행자"의 유의어)이
  // 잘못 섞여 나왔는데, 그건 정답 취급이라 문제였고, 이건 그냥 참고 정보라 힌트로 옮기는 게 안전.
  // **레이아웃 재정리(2026-07-20)**: 글자수 힌트와 따로 한 줄 전체를 차지하던 걸 다시 CEFR 배지 옆
  // 한 줄로 되돌리되(2줄로 나뉘는 게 최악이라는 지적), 다른 뜻 목록이 길어지지 않도록 요약한다 —
  // 데이터상 한 sense의 ko는 그 자체가 "버리다, 포기하다"처럼 같은 의미의 동의어 여러 개를 콤마로
  // 이어붙인 문자열이라, 그 중 첫 글자만 대표로 남기면 "비슷한 의미당 1개씩"이 자연히 된다. 다른
  // sense 자체가 여러 개(드묾)여도 최대 2개까지만 보여주고 나머지는 "등"으로 축약.
  // 2026-07-20 재정리(사용자 요청): "…" 말줄임에 기대지 말고 내용 자체를 줄인다 — 뜻은 콤마 항목
  // 최대 2개까지만, 다른 뜻은 가장 대표적인 것(첫 sense의 첫 항목) 딱 하나만("등"도 제거).
  // 품사/뜻/다른뜻을 색으로 구분해 렌더할 수 있게 문자열 대신 parts 객체로 반환.
  const meanParts = useMemo(() => {
    if (!it) return null;
    const mw = wordOf(it.word);
    const posKo = (mw && mw.pos) ? mw.pos.map(p => POS_KO[p] || p).filter(Boolean).join("·") : "";
    const main = (it.ko || "").split(",").slice(0, 2).map(s => s.trim()).filter(Boolean).join(", ");
    let extra = "";
    if (mw && mw.senses && mw.senses.length > 1) {
      const m = /#(\d+)$/.exec(it.key);
      const curIdx = m ? parseInt(m[1], 10) : 0;
      const other = mw.senses
        .filter((s, i) => i !== curIdx && s.ko && s.ko !== it.ko)
        .map(s => (s.ko.split(",")[0] || "").trim())
        .filter(Boolean)[0];
      if (other) extra = `(다른 뜻: ${other})`;
    }
    return { pos: posKo, main, extra };
  }, [it]);

  useEffect(() => () => stopSpeaking(), []); // 세션 나갈 때(언마운트) 재생 중인 음성 정지

  const speak = speakText;

  // 정답 판정: 빈칸의 정답 또는 원형 단어와 일치해야 정답. 유의어는 정답으로 인정하지 않음(문장에 안 맞을 수 있어서) —
  // 대신 유의어를 입력하면 아래 useEffect에서 안내 문구를 보여주고 힌트를 열어줌(패널티 없음).
  // 하이픈·공백·아포스트로피는 flatWord로 접어서 비교 — "carry-on"을 "carry on"/"carryon"으로
  // 써도, "don't"를 "dont"로 써도 정답(2026-07-19, 표기 구분 기호 때문에 오답 처리되던 버그 수정).
  const isAnswer = raw => {
    const v = raw.trim().toLowerCase();
    if (!v) return false;
    if (v === expected || v === it.word.toLowerCase()) return true;
    const f = flatWord(v);
    return !!f && (f === flatWord(expected) || f === flatWord(it.word));
  };

  // 정답 앞부분과 일치하는 글자 수(근접 오답 판정용)
  const correctPrefixLen = v => {
    let n = 0;
    for (let i = 0; i < v.length && i < expected.length; i++) { if (v[i].toLowerCase() === expected[i]) n++; else break; }
    return n;
  };
  const submit = raw => {
    if (res) return;
    const v = (raw !== undefined ? raw : val).trim();
    if (!v) return;
    const ok = isAnswer(v);
    // 근접 오답(맞은 글자가 좀 있는데 완전히는 틀림) — 첫 오답이면 오답 확정 대신 맞은 글자만
    // 남기고 한 번 더 기회를 준다(맞으면 정답, 또 틀리면 오답). 힌트 쓴 것으로 쳐서 재출제됨.
    if (!ok && !retried && expected) {
      const keep = correctPrefixLen(v);
      if (keep >= 1 && keep < expected.length) {
        setRetried(true); setHintUsed(true);
        // keep<=1이면 "맞은 글자"가 사실 첫 글자 힌트로 이미 봤던 것뿐이라 정보량이 0에 가깝다 —
        // 이 상태로 "거의 맞았어요"를 보여주면 아무 도움도 안 됐으면서 다 왔다고 하는 셈이라
        // 오히려 혼란스럽다는 지적(2026-07-20, 스크린샷: 힌트 다 쓰고 첫 글자만 있는 채로 오답).
        // 이럴 땐 대신 앞 3글자까지 더 보여주고 "한 번 더 생각해보라"는 다른 문구로 안내한다.
        if (keep <= 1) {
          setVal(expected.slice(0, Math.min(3, expected.length)));
          setHintLen(true);
          setRetryBoost(true);
        } else {
          setVal(expected.slice(0, keep));
          setHintLen(true);
          setRetryMsg(true);
        }
        setNudgeWord(null);
        blurHidden(); // 안내 문구가 키보드에 가려 안 보이던 문제(2026-07-20)
        return; // 채점하지 않음
      }
    }
    // 이번 카드에서 실제로 쓴 힌트 개수(뜻·글자수·첫 글자 + 근접오답 재시도) — SRS.grade의 간격 산정에 사용.
    const hintCount = [hintMean, hintLen, hintFirst].filter(Boolean).length;
    const s = SRS.grade(it.key, ok, hintCount);
    ACT.addCard(); // 홈 "오늘의 루틴"·학습 캘린더가 실시간으로 반영되도록(2026-07-20, 세션 완주 대기 없이 문항마다 기록)
    if (ok) setCorrect(c => c + 1);
    // 힌트를 쓰고도 결국 못 맞히면(2026-07-20) 사용자의 미완성 입력 대신 빈칸에 정답 자체를 채워서
    // 보여준다 — "힌트를 다 쓰고도 모르겠으면 확인 눌러서 정답 보고 넘어가기"가 자연스러운 흐름이라,
    // 그 상태에서 사용자가 마지막으로 친 글자만 어정쩡하게 남아있는 것보다 정답을 보여주는 게 맞음.
    // 힌트를 안 쓴 일반 오답은 그대로 사용자 입력을 보여줌(기존 동작 유지).
    else if (hintUsed) setVal(expected);
    setRes({ ok, answer: expected, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) });
    playDing(ok ? "done" : "wrong"); // 정답 띠링·오답 띠-(2026-07-20, 모든 학습에 공용 적용)
    speak(it.ex.en);
    blurHidden(); // 정답 화면은 입력폼이 아니므로 키보드를 내림(2026-07-20) — 다음 카드로 넘어갈 때 next()가 다시 포커스
  };

  // "모르겠어요"(2026-07-20) — 굳이 아무거나 찍어 오답을 유도할 필요 없이, 모르겠으면 바로 정답과
  // 해설을 보여주고 다음으로 넘어갈 수 있게. 근접 오답 재시도 없이 곧장 오답 확정(재시도는 "이미
  // 뭔가 맞게 쳤을 때"의 기회이지, "모르겠다"고 선언한 경우엔 의미가 없음) — 힌트를 쓴 것과 같은
  // 재출제 대상으로 처리(hintUsed=true, 이번 세션에 한 번 더 출제).
  const giveUp = () => {
    if (res) return;
    clearSubmitTimer();
    setHintUsed(true);
    setVal(expected);
    const s = SRS.grade(it.key, false);
    ACT.addCard();
    setRes({ ok: false, answer: expected, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) });
    playDing("wrong");
    speak(it.ex.en);
    blurHidden();
  };

  // 입력이 정답과 일치하면 '확인'을 누르지 않아도 채점되지만, 마지막 글자를 치자마자
  // 키보드가 바로 사라지면 너무 갑작스러워서 짧게 텀을 두고(완성된 답을 한 박자 보여준 뒤) 채점
  const submitTimer = React.useRef(null);
  const clearSubmitTimer = () => { if (submitTimer.current) { clearTimeout(submitTimer.current); submitTimer.current = null; } };
  useEffect(() => clearSubmitTimer, []);
  const handleChange = raw => {
    setVal(raw);
    if (retryMsg) setRetryMsg(false); // 다시 입력 시작하면 재시도 안내 문구 감춤
    if (retryBoost) setRetryBoost(false);
    clearSubmitTimer();
    if (isAnswer(raw)) submitTimer.current = setTimeout(() => submit(raw), 380);
  };

  // 음성 입력 모드(2026-07-20) — TalkRoom과 같은 MediaRecorder+STT 패턴(STT_SUPPORTED·
  // pickRecorderMimeType·transcribeAudio는 그쪽에서 이미 정의된 전역 헬퍼를 그대로 재사용).
  // 인식된 텍스트는 타이핑과 같은 정렬 로직(formatCardInput)을 거쳐 handleChange로 넣어
  // 자동채점(정답이면 380ms 뒤 자동 제출)까지 동일하게 탄다.
  const [voiceMode, setVoiceMode] = useState(false);
  const [listening, setListening] = useState(false);
  const [transcribing, setTranscribing] = useState(false);
  const [voiceErr, setVoiceErr] = useState(null);
  const mediaRecorderRef = React.useRef(null);
  const audioChunksRef = React.useRef([]);
  const voiceStreamRef = React.useRef(null); // 녹음 중 세션 이탈 시 마이크 점유 해제용(2026-07-20)
  const voiceAliveRef = React.useRef(true);
  const voiceBusyRef = React.useRef(false); // getUserMedia 대기 중 연타 차단
  useEffect(() => () => {
    voiceAliveRef.current = false;
    try { if (mediaRecorderRef.current && mediaRecorderRef.current.state !== "inactive") mediaRecorderRef.current.stop(); } catch (e) {}
    try { if (voiceStreamRef.current) voiceStreamRef.current.getTracks().forEach(t => t.stop()); } catch (e) {}
  }, []);
  useEffect(() => { setVoiceMode(false); setVoiceErr(null); }, [idx]); // 새 카드는 항상 키보드 모드로 시작

      if (!voiceAliveRef.current) { stream.getTracks().forEach(t => t.stop()); return; }

    }

  // 토글이었는데, 정작 페널티(hintUsed→이번 세션에 한 번 더 출제)는 껐다 켜도 절대 취소되지 않아서,

            {/* 빈칸 문제: 위에는 '문장의 한국어 뜻'을 제시(단어 뜻을 직접 주면 답을 알려주는 셈) */}

            {!res && retryBoost && <div className="qnudge">힌트를 조금 더 드릴게요! 한 번만 더 생각해 보세요.</div>}

                return (
