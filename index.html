.talk-bubble{padding:10px 13px;font-size:14px;line-height:1.5;font-weight:600;display:flex;align-items:center;gap:8px;position:relative;min-width:0;overflow-wrap:break-word;word-break:break-word;}
.talk-msg.bot .talk-bubble{background:var(--fill);color:var(--ink);}
.talk-msg.user .talk-bubble{background:var(--ink);color:var(--on-accent);}
/* 말풍선 꼬리 — 봇은 왼쪽 아래(아바타 쪽), 유저는 오른쪽 아래. 피드백(.talk-fb) 카드에는
   꼬리가 없어서 "대화"와 "어드바이스"가 형태로 구분된다(2026-07-17). */
.talk-msg.bot .talk-bubble::after{content:"";position:absolute;left:-7px;bottom:8px;width:0;height:0;
  border-top:10px solid transparent;border-bottom:10px solid transparent;border-right:9px solid var(--fill);}
.talk-msg.user .talk-bubble::after{content:"";position:absolute;right:-12px;bottom:8px;width:0;height:0;
  border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:14px solid var(--ink);}
.talk-play{color:inherit;opacity:.7;flex:none;}
.talk-msg-ko{font-size:11px;color:var(--muted);padding:0 3px;}
.talk-msg-actions{display:flex;align-items:center;gap:4px;}
.talk-msg-fav{color:var(--muted);padding:0 3px;}
.talk-msg-fav.on{color:var(--hi-pink-dark);}
.talk-msg-del{color:var(--muted);padding:0 3px;}
/* 날짜 알약(2026-07-18) — 좌우로 선이 뻗어나가는 구분선 가운데 알약, 탭하면 그 날짜 메시지 전체를 접고 폄. */
.talk-daypill-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
.talk-daypill-row::before, .talk-daypill-row::after{content:"";flex:1;height:1px;background:var(--card-border);}
.talk-daypill{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--muted);
  background:var(--fill);border-radius:999px;padding:4px 10px;white-space:nowrap;flex:none;}

.talk-fb{border:0.5px solid var(--card-border);background:var(--line);padding:11px 13px;font-size:12px;line-height:1.6;color:var(--ink-2);max-width:100%;}
.talk-fb.ok{border-color:var(--good);}
.talk-fb .t{font-weight:800;margin-bottom:3px;color:var(--ink);}
.talk-fb button{margin-top:8px;background:var(--ink);color:var(--on-accent);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;}
/* 첨삭 문장(2026-07-20) — 원문과 구분되게 밑줄+볼드로 강조, 옆 스피커 아이콘으로 다시 들을 수 있게.
   .talk-fb button(위 규칙)이 일반 버튼(검정 알약)을 기본으로 깔아서, 아이콘 버튼인 .talk-play는
   같은 특이도로 다시 초기화해야 검정 알약이 아니라 원래(작은 아이콘) 모습으로 보임. */
.talk-fb-corrected-row{display:flex;align-items:flex-start;gap:6px;margin-top:2px;}
.talk-fb-corrected{font-weight:800;color:var(--ink);text-decoration:underline;text-decoration-color:var(--muted);text-underline-offset:2px;}
.talk-fb button.talk-play{margin-top:2px;background:none;color:inherit;opacity:.7;padding:0;border-radius:0;flex:none;}

/* 대화가 짧을 때 메시지 영역과 입력창 사이에 큰 빈 여백이 생기던 버그(2026-07-18, "왜 패딩 있음?"
   리포트) — 원인은 .talk-msgs의 높이를 `calc(100dvh - 330px)` 매직넘버로 잡아뒀던 것. 실제 화면
   구성(상단바+헤더+토글+입력창 높이)이 그 330px 추정과 안 맞으면 어긋난 만큼 빈 공간이 그대로
   보였음. min-height:100%도 부모(.content)가 auto-height라 사실상 무효였음(퍼센트 높이는 부모가
   definite height일 때만 계산됨 — 이 앱의 실제 definite-height 조상은 `.scroll`뿐).
   고친 법: `.talk-room-screen`(=.content 그 자체, 부모가 .scroll이라 definite height 상속 가능)에
   height:100%를 줘서 진짜 높이를 확보하고, 아래 .talk-msgs를 flex:1로 바꿔 그 안에서 남는 공간을
   전부 채우게 함(매직넘버 제거, 화면 크기 달라져도 항상 입력창 바로 위까지 자연스럽게 채워짐). */
.talk-room-screen{height:100%;display:flex;flex-direction:column;padding-left:7px;padding-right:7px;position:relative;}
/* 위 padding-bottom을 여기서 별도 선언 — ".scroll.notab .content{padding-bottom:max(40px,...)}"가
   클래스 3개(.scroll·.notab·.content, 특이도 0,3,0)라 ".talk-room-screen" 단독(0,1,0)은 물론
   ".content.talk-room-screen"(0,2,0)로 올려도 여전히 못 이겨서 실제 여백이 40px로 깎여있었음
   (2026-07-18 발견 — flex:1이 그 잘못된 40px 기준으로 채워져서 .talk-msgs가 입력창 밑까지 침범,
   오히려 마이너스 간격이 남는 걸 실측으로 확인). 클래스 3개(.scroll .content.talk-room-screen)로
   맞춰서 뒤에서 확실히 덮어씀. */
.scroll .content.talk-room-screen{padding-bottom:calc(100px + var(--kb, 0px));}
/* 2026-07-18: sticky는 바깥 .scroll이 페이지 전체를 스크롤할 때 위치가 흔들려서(스크롤 컨테이너가
   .talk-msgs인지 .scroll인지 모호) absolute로 교체 — 컨테이닝 블록은 position:relative인 .app(최대
   520px 중앙 정렬)이라 자연히 그 폭에 맞음. 회화 대화방은 이제 항상 몰입 화면(탭바 숨김)이라
   bottom이 곧 화면 맨 아래 기준. 키보드 없을 때는 40px 고정(홈 인디케이터·둥근 모서리 R값 대응,
   2026-07-18) — 있을 때는 키보드 위 10px(kb가 40px보다 커지는 순간부터 kb+10이 40을 넘어서므로
   max()로 자연히 전환됨). */
.talk-input-row{display:flex;gap:8px;position:absolute;left:0;right:0;bottom:max(40px, calc(var(--kb, 0px) + 10px));
  background:var(--bg);padding:8px 7px 2px;z-index:2;}
.talk-input-row input{flex:1;min-width:0;border:0.5px solid var(--card-border);background:var(--surface);border-radius:0;padding:11px 13px;font:inherit;font-size:14px;outline:none;}
.talk-input-row input:disabled{opacity:.5;}
.talk-input-row button{background:var(--ink);color:var(--on-accent);border-radius:999px;padding:0 18px;font-weight:700;font-size:13px;flex:none;}
.talk-input-row button:disabled{opacity:.4;}
/* 배경 한 톤 더 진하게(2026-07-20) — 웜그레이 하이어라키에서 --fill(가장 밝음)→--line(설정 버튼과
   동일 톤)으로, 크림 배경 위에서 너무 옅어 존재감이 약하다는 지적. */
.talk-voice-toggle{background:var(--line) !important;color:var(--ink) !important;border-radius:50% !important;width:42px;height:42px;padding:0 !important;display:flex;align-items:center;justify-content:center;}
.talk-voice-btn{flex:1;min-width:0;background:var(--fill);color:var(--ink);border:0.5px solid var(--card-border);border-radius:0;padding:11px 13px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.talk-voice-btn.listening{background:var(--danger-container);color:var(--danger);border-color:var(--danger);}
.talk-voice-btn:disabled{opacity:.4;}

.talk-summary-item{border:0.5px solid var(--card-border);background:var(--surface);padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.6;}
.talk-summary-item.good{border-color:var(--good);background:var(--good-container);}
.finish .sub{font-size:13px;color:var(--muted);}
.finish .mascot{width:96px;height:96px;margin-bottom:6px;}

/* 학습 탭 허브 */
.learnmenu .step.soon{opacity:.5;}

/* 레벨 테스트 */
/* 문항 카드 — know↔meaning 전환 시 크기·폰트가 흔들리지 않게 고정(min-height + 동일 타이포) */
.lt-qcard{align-items:center;text-align:center;justify-content:center;min-height:150px;}
.lt-word{font-size:24px;font-weight:800;letter-spacing:-0.3px;}
.lt-choices{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.lt-choice{padding:14px;border-radius:0;font-weight:700;font-size:15px;background:var(--surface);border:0.5px solid var(--card-border);color:var(--ink);box-shadow:var(--shadow);text-align:center;}
.lt-choice:active{background:var(--fill);}
.lt-band{display:inline-flex;align-items:center;font-size:14px;font-weight:800;padding:6px 14px;border-radius:999px;background:var(--accent-deep);color:var(--on-accent);}
/* 결과 레벨 밴드 — 컬러위계 반영(핑크<옐로우<초록<블루, 2026-07-20 재정렬). .lt-band(0,1,0)를 이기려 (0,2,0)로 정의 */
.lt-band.tier-green{background:var(--hi-green);color:var(--hi-green-xdark);}
.lt-band.tier-yellow{background:var(--hi-yellow);color:var(--hi-yellow-xdark);}
.lt-band.tier-pink{background:var(--hi-pink);color:var(--hi-pink-xdark);}
.lt-band.tier-blue{background:var(--hi-blue);color:var(--hi-blue-xdark);}
.lt-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;}
/* 한국어 예시(Part B) — 예전엔 .qcue(12px 회색)라 너무 작았음. 문제문이므로 크게·볼드 */
.lt-ko{font-size:18px;font-weight:800;text-align:center;line-height:1.45;letter-spacing:-0.2px;margin:4px 0;color:var(--ink);}
/* 답 칸 — 조립한 답이 쌓이는 곳. 내용이 없거나 늘어나도 크기가 흔들리지 않게 높이 고정 */
.lt-answer{min-height:66px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;text-align:center;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:12px 14px;font-size:17px;font-weight:700;line-height:1.5;letter-spacing:.2px;}
.lt-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;}
@keyframes lt-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
.lt-chips .lchip.wrong{animation:lt-shake .35s ease;background:var(--danger-container);color:var(--danger);border-color:var(--danger);}
/* 탭한 칩은 자리를 유지한 채 흐려지기만 — 남은 칩이 당겨지면 다음 탭이 빗나간다 */
.lt-chips .lchip.picked{opacity:.22;pointer-events:none;}
.lt-note{font-size:12px;color:var(--ink-2);background:var(--fill);border-radius:0;padding:10px 12px;line-height:1.5;}
/* 분석 문장 속 핵심부만 형광펜으로 짚어줌(단순 볼드가 아니라 실제 마커 배경) */
.lt-note b{background:var(--hi-yellow-light);color:var(--ink);font-weight:800;padding:1px 3px;border-radius:0;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
.lt-note b.hl-green{background:var(--hi-green-light);}
.lt-note b.hl-pink{background:var(--hi-pink-light);}
.lt-note b.hl-blue{background:var(--hi-blue-light);}
/* 어휘력/문장구사력 결과 칩(단어 수·상위%)도 밴드 컬러위계를 연하게 반영 */
.chip.tier-green{background:var(--hi-green-light);color:var(--hi-green-xdark);border-color:transparent;}
.chip.tier-yellow{background:var(--hi-yellow-light);color:var(--hi-yellow-xdark);border-color:transparent;}
.chip.tier-pink{background:var(--hi-pink-light);color:var(--hi-pink-xdark);border-color:transparent;}
.chip.tier-blue{background:var(--hi-blue-light);color:var(--hi-blue-xdark);border-color:transparent;}

/* 설정 화면 (캐릭터 변경 등) — WordSheet와 동일한 바텀시트 패턴 재사용 */
.charrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:12px 14px;}
.charrow .cf{width:52px;height:52px;border-radius:0;background:var(--fill);display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;font-size:9px;color:var(--muted);text-align:center;line-height:1.2;}
/* 고양이유령 썸네일 외곽선 = 옅은 베이지(--line, 솔리드) — 진한 잉크 테두리는 너무 튀어서
   완화(2026-07-18). 캐릭터2/3/4(색상 스와치)는 위 .char-swatch-sm에서 무테로 유지. */
.charrow .cf img{box-sizing:border-box;border:1.5px solid var(--line);}
.charrow .body{flex:1;min-width:0;}
.charrow .name{font-size:14px;font-weight:700;}
.charrow .cta{flex:none;font-size:12px;font-weight:700;padding:9px 12px;border-radius:0;text-align:center;white-space:nowrap;}
.charrow .cta.use{background:var(--accent-soft);color:var(--accent-deep);}
.charrow .cta.free{background:var(--accent);color:var(--on-accent);}
.charrow .cta.buy{background:var(--ink);color:var(--on-accent);}
.charrow .cta.locked{background:var(--fill);color:var(--muted);}
/* 설정 > 계정(로그인/동기화, 2026-07-19 PLAN 6.6.0) — ptbox와 같은 톤(웜그레이 박스) */
.acct-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--line);border-radius:0;padding:14px 16px;}
.acct-info{min-width:0;}
.acct-email{font-size:14px;font-weight:800;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acct-sub{font-size:12px;color:var(--ink-2);word-break:keep-all;}
.acct-actions{display:flex;gap:6px;flex:none;}
/* 닉네임+계정 병합 행(2026-07-20) — 닉네임을 .acct-email 자리에, 이메일은 보조줄로. */
.acct-nick-line{display:flex;align-items:center;gap:4px;cursor:pointer;}
.acct-nick-edit{margin-top:2px;}
.acct-nick-input{width:100%;border:0.5px solid var(--card-border);background:var(--surface);border-radius:0;padding:9px 11px;font:inherit;font-size:14px;color:var(--ink);outline:none;}
.acct-nick-err{font-size:11px;color:var(--danger);margin-top:4px;}
.ptbox{display:flex;align-items:center;justify-content:space-between;background:var(--warmgray);border-radius:0;padding:14px 16px;}
.ptbox .v{font-size:20px;font-weight:800;color:var(--ink-2);font-variant-numeric:tabular-nums;}
.ptbox .l{font-size:12px;color:var(--ink-2);word-break:keep-all;}

/* 설정 — 일일 목표 스테퍼 · 듣기 속도 프리셋 */
.goalrow{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:0;box-shadow:var(--shadow);padding:11px 15px;margin-bottom:8px;}
.goal-lbl{font-size:14px;font-weight:700;flex:1;}
.goal-step{width:30px;height:30px;border-radius:999px;background:var(--fill);color:var(--ink-2);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;flex:none;}
.goal-v{font-size:14px;font-weight:800;color:var(--accent-deep);min-width:44px;text-align:center;font-variant-numeric:tabular-nums;flex:none;}
.prefrow{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border-radius:0;box-shadow:var(--shadow);padding:12px 15px;text-align:left;}
.prefrow.on{background:var(--warmgray);}

.prefrow.on .pf-name{color:var(--accent-deep);}
.pf-sub{font-size:12px;color:var(--muted);}

.cefrinfo-row{display:flex;align-items:center;gap:10px;padding:4px 0;}
.cefrinfo-nm{font-size:13px;color:var(--ink-2);}

   전엔 이 시드가 첫 실행 시 실사용자에게도 무조건 섞여 나가서, 실제 신규 가입자가 이미 학습한 척하는
   가짜 기록을 안고 시작했음(BETA_PLAN.md "미결 결정" 항목). ?tester=1로 접속하면 en_is_tester가
   localStorage에 저장되고(이후 파라미터 없이 재접속해도 유지), ?tester=0으로 끄기 전까지 계속 데모
   시드가 적용된 상태로 개발/시연용 앱을 볼 수 있다. 실사용자는 절대 이 파라미터를 안 붙이므로 기본값 false. */
const IS_TESTER = (() => {
  try {
    const p = new URLSearchParams(location.search).get("tester");
    if (p === "1") { localStorage.setItem("en_is_tester", "1"); return true; }
    if (p === "0") { localStorage.removeItem("en_is_tester"); return false; }
    return localStorage.getItem("en_is_tester") === "1";
  } catch (e) { return false; }
})();

const SEED = (typeof window !== "undefined" && window.SEED) ? window.SEED : [];
const byWord = Object.fromEntries(SEED.map(w => [w.word, w]));
const GRAMMAR_TAGS = (typeof window !== "undefined" && window.GRAMMAR_TAGS) ? window.GRAMMAR_TAGS : {};
/* 유의어 역인덱스(2026-07-20, 레벨테스트 4지선다 유의어 오답용) — w.syn은 "이 단어의 유의어" 방향만
   있어서, 반대로 "어떤 단어들이 이 단어를 유의어로 꼽았는지"는 역으로 뒤져야 함. 한 번만 만들어 재사용. */
const SYN_INDEX = {};
SEED.forEach(w => (w.syn || []).forEach(s => {
  const k = s.toLowerCase();
  (SYN_INDEX[k] || (SYN_INDEX[k] = [])).push(w.word);
}));

/* 사용자가 직접 추가한 단어(내 단어장) — localStorage 보존. */
let EXTRA = (() => { try { return JSON.parse(localStorage.getItem("en_mywords") || "{}"); } catch (e) { return {}; } })();
function saveExtra() { _byFlat = null; try { localStorage.setItem("en_mywords", JSON.stringify(EXTRA)); } catch (e) {} }
function wordOf(w) { return byWord[w] || EXTRA[w]; }
/* 표기 접기 폴백 조회 — "carry-on"·"carryon"으로도 표제어 "carry on"을 찾는다(2026-07-19).
   wordOf는 정확 키 조회 그대로 두고(EXTRA 키·중복 등록 가드 등 기존 의미 보존), 구분 기호
   차이만 흡수하고 싶은 자리(dictLookup, 회화 단어 탭)에서 이걸 쓴다. 인덱스는 첫 사용 때 만들고
   내 단어 추가/삭제(saveExtra) 시 무효화. */
let _byFlat = null;
function wordOfFlat(w) {
  const direct = wordOf(w);
  if (direct) return direct;
  if (!_byFlat) {
    _byFlat = {};
    allWords().forEach(x => { const k = flatWord(x.word); if (k && !_byFlat[k]) _byFlat[k] = x; });
  }
  return _byFlat[flatWord(w)] || null;
}
function allWords() { return SEED.concat(Object.values(EXTRA)); }
/* 특정 어근(affix)을 가진 단어 목록 — 단어상세의 어근 칩에서 "타고타고" 모달 스택 안으로
   바로 목록을 펼치는 데 사용(2026-07-20, 예전엔 사전 탭으로 강제 이동해 학습카드 세션이 끊겼음). */
function wordsByRoot(affix) {
  let gloss = "";
  const ws = allWords().filter(w => (w.roots || []).some(r => {
    if (r.affix !== affix) return false;
    if (!gloss) gloss = r.gloss;
    return true;
  })).sort((a, b) => a.word.localeCompare(b.word));
  return { gloss, ws };
}

/* 수동 추가 단어 자동 조회 — 폴백 체인: Free Dictionary(무료 공개 API, 영영 정의·IPA·품사) →
   Gemini 프록시(한국어 뜻·예문 생성, Free Dictionary가 준 영어 정의가 있으면 그걸 번역 기준으로 사용).
   WordSheet가 lookupStatus:"pending"인 내 단어를 열 때 호출 — 결과를 EXTRA에 그대로 병합. */
const _lookupInFlight = new Set();
async function autoLookupWord(key) {
  if (_lookupInFlight.has(key)) return;
  _lookupInFlight.add(key);
  let ipa = "", pos = [], enDef = "", fallbackEx = "";
  try {
    const r = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(key));
    if (r.ok) {
      const data = await r.json();
      const entry = Array.isArray(data) ? data[0] : null;
      if (entry) {
        const ph = (entry.phonetics || []).find(p => p.text) || {};
        ipa = (ph.text || "").replace(/^\/|\/$/g, "");
        const posSet = new Set();
        (entry.meanings || []).forEach(m => {
          if (m.partOfSpeech) posSet.add(m.partOfSpeech);
          const d0 = m.definitions && m.definitions[0];
          if (!enDef && d0) { enDef = d0.definition || ""; fallbackEx = d0.example || ""; }
        });
        pos = Array.from(posSet);
      }
    }
  } catch (e) { /* Free Dictionary 실패해도 Gemini만으로 계속 진행 */ }

  let ko = "", cefr = "", exEn = fallbackEx, exKo = "";
  try {
    const prompt = "영어 단어 \"" + key + "\"" +
      (enDef ? "(영어 정의: " + enDef + ")" : "") + (fallbackEx ? "(참고 예문: " + fallbackEx + ")" : "") +
      "에 대해 한국어 학습자용 정보를 아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON 객체 하나만 출력하세요.\n" +
      '{"ko":"간결한 한국어 뜻(품사 표시 없이)","cefr":"A1~C2 중 난이도 추정 한 값","ex_en":"자연스러운 영어 예문 한 문장","ex_ko":"그 예문의 자연스러운 한국어 번역"}';
    const resText = await geminiText(prompt);
    if (resText) {
      const cleaned = resText.replace(/^```json\s*|^```\s*|```\s*$/g, "").trim();
      const parsed = JSON.parse(cleaned);
      ko = (parsed.ko || "").trim();
      cefr = (parsed.cefr || "").trim();
      exEn = (parsed.ex_en || exEn || "").trim();
      exKo = (parsed.ex_ko || "").trim();
    }
  } catch (e) { /* 파싱 실패 — 아래에서 ko 비어있으면 에러 처리 */ }

  _lookupInFlight.delete(key);
  const cur = EXTRA[key];
  if (!cur) return; // 조회 도중 삭제됐으면 무시
  if (!ko) {
    cur.lookupStatus = "error";
  } else {
    cur.ko = ko;
    cur.en = enDef || cur.en;
    cur.ipa = ipa || cur.ipa;
    if (pos.length) cur.pos = pos;
    cur.cefr = /^(A1|A2|B1|B2|C1|C2)$/.test(cefr) ? cefr : "B1";
    if (exEn) cur.ex = [{ en: exEn, ko: exKo }];
    cur.lookupStatus = "done";
  }
  saveExtra();
}

/* 즐겨찾기 — localStorage 보존(EXTRA·SRS와 동일 패턴). 첫 실행 데모 시드는 tester 전용(2026-07-20). */
let FAVS = (() => {
  try {
    const raw = localStorage.getItem("en_favs");
    if (raw === null) return IS_TESTER ? new Set(["alert", "idiomatic"]) : new Set();
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(); }
})();
function saveFavs() { try { localStorage.setItem("en_favs", JSON.stringify([...FAVS])); } catch (e) {} }
function toggleFav(word) { if (FAVS.has(word)) FAVS.delete(word); else FAVS.add(word); saveFavs(); }

/* 내 단어장(커스텀 리스트) — localStorage 보존. { id, name, words:[word,...] } 배열.
   전체 표제어 중 고른 단어를 이름 붙인 리스트로 묶어서 그 리스트만 따로 학습할 수 있게 함. */
let WORDLISTS = (() => { try { return JSON.parse(localStorage.getItem("en_wordlists") || "[]"); } catch (e) { return []; } })();
function saveWordlists() { try { localStorage.setItem("en_wordlists", JSON.stringify(WORDLISTS)); } catch (e) {} }
function createWordlist(name) {
  const list = { id: "wl_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), name: name.trim(), words: [] };
  WORDLISTS.push(list); saveWordlists();
  return list;
}
function addToWordlist(id, words) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list) return;
  words.forEach(w => { if (!list.words.includes(w)) list.words.push(w); });
  saveWordlists();
}
function removeFromWordlist(id, word) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list) return;
  list.words = list.words.filter(w => w !== word);
  saveWordlists();
}
function renameWordlist(id, name) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list || !name.trim()) return;
  list.name = name.trim(); saveWordlists();
}
function deleteWordlist(id) {
  WORDLISTS = WORDLISTS.filter(l => l.id !== id);
  saveWordlists();
}

/* ===================== 학습 환경설정 (일일 목표 · 듣기 속도/악센트) — localStorage =====================
   속도는 SpeechSynthesisUtterance.rate로 실제 반영됨. 악센트는 lang 코드 + 가능하면 그 lang의 브라우저
   음성을 매칭(en-US/en-GB/en-AU) — 단, "뉴욕/캘리포니아/텍사스" 같은 도시 단위 악센트는 브라우저 TTS는
   물론 상용 TTS(Google/Azure 등)에도 그 단위로 구분된 음성이 없어 구현 불가. 국가 단위까지만 지원. */
const SPEED_PRESETS = {
  teacher: { label: "영어선생님", sub: "수능 듣기평가 수준", rate: 0.82 },
  casual: { label: "일상회화", sub: "연음 강조", rate: 1.0 },
  native: { label: "원어민대화", sub: "원어민 수준의 빠른 말", rate: 1.3 },
};
const ACCENT_PRESETS = {
  us: { label: "미국", lang: "en-US" },
  gb: { label: "영국", lang: "en-GB" },
  au: { label: "호주", lang: "en-AU" },
};
const PREFS = (() => {
  let p;
  try { p = JSON.parse(localStorage.getItem("en_prefs") || "null"); } catch (e) {}
  if (!p || typeof p !== "object") p = {};
  if (!SPEED_PRESETS[p.speed]) p.speed = "casual";
  if (!ACCENT_PRESETS[p.accent]) p.accent = "us";
  p.goalWords = Number.isFinite(p.goalWords) ? p.goalWords : 20;
  p.goalListen = Number.isFinite(p.goalListen) ? p.goalListen : 20;
  p.goalTalk = Number.isFinite(p.goalTalk) ? p.goalTalk : 10;
  const save = () => { try { localStorage.setItem("en_prefs", JSON.stringify(p)); } catch (e) {} };
  save();
  return { get: () => p, set(patch) { Object.assign(p, patch); save(); } };
})();

   이 키는 의도적으로 공개하는 결제 미연결 무료 키 — 위 주석 참고. */
const GEMINI_DIRECT_KEY = ""; // 2026-07-17: 내장 키가 AQ. 계정 버그로 401 고정 — Vercel 프록시(서울 리전 고정, 위치 문제 해결됨)로 완전 전환. 아래 두 줄은 그 시절 기록.
function getGeminiKey() { return GEMINI_DIRECT_KEY.trim(); }

/* Vercel 프록시(리전 서울 고정) — Cloudflare Worker는 실행 위치를 고정할 수 없어 Google 무료
   티어의 위치 검사에 걸리는 문제가 있어(api/gemini.js 상단 주석 참고), Gemini 텍스트·STT 호출만
   Vercel 서버리스 함수(/api/gemini, /api/stt)로 이전. 여기에 Vercel 배포 URL을 채우면 활성화되고,
   비어있으면 기존 Cloudflare 프록시(PROXY_BASE) 경유. TTS는 계속 Cloudflare가 담당(위치 문제 없음). */
const GEMINI_PROXY_BASE = "https://no-english.vercel.app";
function geminiEndpoint(kind) {
  return GEMINI_PROXY_BASE ? GEMINI_PROXY_BASE + "/api/" + kind : PROXY_BASE + "/" + kind;
}

/* ---------- Supabase (베타 백엔드: 로그인+DB+RLS, docs/PLAN.md 6.6) ----------
   SUPABASE_ANON_KEY는 "publishable key"(구 anon key) — RLS로 행 단위 접근이 이미 막혀있는 걸
   전제로 클라이언트에 공개해도 안전하게 설계된 키라 노출 문제 없음(service_role/secret 키와는
   다름, 그건 절대 클라이언트에 넣지 말 것). SUPABASE_URL이 비어있으면 로그인/동기화 기능 자체가
   조용히 비활성 — 게스트(localStorage만) 모드로 기존과 완전히 동일하게 동작(백엔드 배포 전에도
   앱이 안 깨지게 하기 위함, GEMINI_DIRECT_KEY와 같은 "비어있으면 폴백" 패턴). */
const SUPABASE_URL = "https://oqmslebtjtqayyjltcpt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_s4C8mg3QafZgea9wvvA7vw_8pvNnPjr";
const SB = (SUPABASE_URL && SUPABASE_ANON_KEY && typeof window !== "undefined" && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

/* 서버 동기화 대상 localStorage 키 전체(2026-07-19, PLAN 6.6.0 베타 스코프) — 세부 테이블로
   안 쪼개고 이 키들을 통째로 하나의 jsonb(learning_state.data)에 담아 올리고 내린다.
   앱에 새 localStorage 키를 추가하면 이 목록에도 반드시 같이 추가할 것 — 안 하면 그 데이터는
   로그인해도 기기 간에 안 넘어간다(조용히 누락되는 버그라 알아채기 어려움). */
const SYNC_KEYS = [
  "en_srs", "en_activity_v1", "en_points", "en_prefs", "en_char", "en_leveltest_v1",
  "en_custom_personas", "en_talk_rooms", "en_fav_sentences", "en_favs", "en_mywords",
  "en_wordlists", "en_writing_history", "en_writing_recent",
  "en_hero_stickers_v1", "en_hero_sticker_order_v1", "en_hero_sticker_removed_v1", "en_hero_badge_stickers_v1",
  "en_wrong_notes_v1", // 오답 노트(2026-07-20 신설 키) — 누락돼 기기 이동 시 오답노트만 증발하던 버그 수정
  "en_custom_stickers_v1", // 커스텀 스티커(PR#91)
];
function collectSyncState() {
  const out = {};
  SYNC_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v != null) out[k] = v; });
  return out;
}
function applySyncState(data) {
  if (!data) return;
  Object.entries(data).forEach(([k, v]) => { if (SYNC_KEYS.includes(k) && typeof v === "string") localStorage.setItem(k, v); });
}

/* 닉네임(2026-07-20) — Supabase profiles.display_name과 동기화. 구글 로그인 후에만 설정 가능
   (게스트는 닉네임 개념 자체가 없음 — 사용자 요청). 앱 안에서 "OO님"으로 불러줄 때 씀(레벨테스트
   결과 화면 등). 서버 왕복 없이 즉시 보이도록 localStorage에도 캐시 — 로그인 시 서버 값으로 갱신. */
const NICK_KEY = "en_nickname";
function loadNickname() { try { return localStorage.getItem(NICK_KEY) || ""; } catch (e) { return ""; } }
function saveNicknameLocal(name) { try { if (name) localStorage.setItem(NICK_KEY, name); else localStorage.removeItem(NICK_KEY); } catch (e) {} }
/* 한글/영어만 허용(사용자 요청) — 입력 즉시 그 외 문자(숫자·기호·이모지·공백)를 걷어내고 10자로 자름. */
function sanitizeNickname(s) { return (s || "").replace(/[^A-Za-z가-힣]/g, "").slice(0, 10); }
function nicknameLabel() { const n = loadNickname(); return n ? n + "님" : ""; }

/* 로그인·동기화 공용 헬퍼 — 베타 스코프대로 단순화(PLAN 6.6.0): 양방향 병합 없음, 로그인
   시점에 "서버에 이미 데이터가 있으면 그걸 내려받아 이 기기에 덮어쓰고, 없으면(첫 로그인)
   이 기기의 게스트 데이터를 그대로 올린다".
   2026-07-20 보강: 그 이후의 서버 반영이 수동 "지금 동기화" 버튼뿐이라 로그인 후 쌓은 진도가
   서버에 전혀 안 올라가던 문제(폰 분실/재설치 시 첫 로그인 시점으로 롤백) 수정 —
   앱이 백그라운드로 갈 때(visibilitychange hidden/pagehide)마다 자동 업로드(autoSync).
   업로드 전 서버 updated_at을 확인해서, 다른 기기가 더 최신 데이터를 올려뒀으면 이 기기의
   묵은 스냅샷으로 덮지 않는다(진짜 양방향 병합은 여전히 이후 단계 — 여기선 "묵은 쓰기 방지"만). */
const AUTH = (() => {
  let user = null;
  const listeners = new Set();
  const notify = () => listeners.forEach(cb => cb(user));
  const SYNCED_UID_KEY = "en_auth_synced_uid";
  const SYNC_STAMP_KEY = "en_sync_stamp"; // 이 기기가 마지막으로 서버와 맞춘 시점의 서버 updated_at
  async function serverRow() {
    const { data, error } = await SB.from("learning_state").select("data, updated_at").eq("user_id", user.id).maybeSingle();
    if (error) throw error;
    return data || null;
  }
  async function upload() {
    const now = new Date().toISOString();
    const { error } = await SB.from("learning_state").upsert({ user_id: user.id, data: collectSyncState(), updated_at: now });
    if (error) throw error;
    try { localStorage.setItem(SYNC_STAMP_KEY, now); } catch (e) {}
  }
  // 서버가 이 기기의 마지막 동기화 시점보다 최신인가 — 다른 기기가 그 사이 썼다는 뜻.
  // 2초 허용 오차: 서버가 우리가 쓴 updated_at을 다른 포맷(+00:00 등)으로 되돌려줘도 오탐 없게 Date로 비교.
  function serverIsNewer(row) {
    const last = localStorage.getItem(SYNC_STAMP_KEY);
    if (!row || !row.updated_at || !last) return false;
    return new Date(row.updated_at).getTime() > new Date(last).getTime() + 2000;
  }
  async function syncOnLogin() {
    if (!SB || !user) return;
    if (localStorage.getItem(SYNCED_UID_KEY) === user.id) return; // 세션 복원(재부팅)일 뿐 새 로그인이 아님 — 재동기화·재로드 금지
    try {
      const row = await serverRow();
      const serverData = row && row.data;
      if (serverData && Object.keys(serverData).length > 0) {
        localStorage.setItem(SYNCED_UID_KEY, user.id); // reload 이전에 먼저 기록 — 재부팅 시 같은 분기를 다시 안 타도록
        if (row.updated_at) { try { localStorage.setItem(SYNC_STAMP_KEY, row.updated_at); } catch (e) {} }
        applySyncState(serverData); // 서버가 진실의 원천 — 이 기기(게스트 상태 포함)를 덮어씀
        location.reload(); // 이미 메모리에 로드된 state가 많아 새로고침이 가장 안전
      } else {
        // 첫 업로드 — 마커는 반드시 업로드 "성공 후"에 기록(2026-07-20). 예전엔 업로드 전에
        // 기록해서, 네트워크 오류로 업로드가 실패하면 다음부터 위 가드에 걸려 영원히 재시도되지
        // 않았음(서버는 빈 채로 사용자만 동기화됐다고 믿는 상태).
        await upload();
        localStorage.setItem(SYNCED_UID_KEY, user.id);
      }
    } catch (e) { console.error("초기 동기화 실패", e); }
  }
  // 이 기기가 이미 동기화된 계정인데 로컬 학습 데이터가 통째로 비어 있으면(iOS PWA의 localStorage
  // wipe — 알려진 WebKit 이슈) 서버 백업에서 자동 복구(2026-07-20). 세션당 1회만 시도(무한루프 방지).
  async function maybeRestoreFromServer() {
    if (!SB || !user) return;
    if (localStorage.getItem(SYNCED_UID_KEY) !== user.id) return; // 새 로그인 흐름은 syncOnLogin 담당
    try {
      const srs = localStorage.getItem("en_srs");
      const hasLocal = srs && srs.length > 200; // 빈 {}/데모 최소치 이상이면 정상으로 간주
      if (hasLocal) return;
      if (sessionStorage.getItem("en_restore_attempted")) return;
      sessionStorage.setItem("en_restore_attempted", "1");
      const row = await serverRow();
      if (row && row.data && row.data.en_srs && row.data.en_srs.length > 200) {
        applySyncState(row.data);
        if (row.updated_at) { try { localStorage.setItem(SYNC_STAMP_KEY, row.updated_at); } catch (e) {} }
        location.reload();
      }
    } catch (e) {}
  }
  // 백그라운드 진입 시 자동 업로드 — 로그인 + 첫 동기화 완료 상태에서만.
  // 서버가 더 최신이면(다른 기기가 씀) 조용히 건너뜀 — 이 기기에서 "지금 동기화"를 누르면
  // syncNow가 그 상황을 감지해 내려받기로 해소해 준다.
  let autoSyncBusy = false;
  async function autoSync() {
    if (!SB || !user || autoSyncBusy) return;
    if (localStorage.getItem(SYNCED_UID_KEY) !== user.id) return;
    autoSyncBusy = true;
    try {
      const row = await serverRow();
      if (!serverIsNewer(row)) await upload();
    } catch (e) {} finally { autoSyncBusy = false; }
  }
  // "로그인이 풀린다" 버그 방어(2026-07-20): Supabase refresh token은 1회용(rotation)이라,
  // 백그라운드 진입 직전에 REST 호출(→만료 임박이면 내부적으로 토큰 갱신 발사)을 쏘고 iOS가
  // 곧바로 JS를 얼리면 "서버는 회전 완료, 클라이언트는 새 토큰 저장 실패"로 어긋나 다음 실행 때
  // Invalid Refresh Token → 세션 삭제(로그아웃)가 된다. 그래서 hidden 시점 업로드는 access token이
  // 넉넉히(2분+) 남아 갱신이 필요 없을 때만 수행하고, 대신 포그라운드 복귀 10초 뒤(라이브러리의
  // 자동 갱신이 끝난 뒤)에 한 번 더 업로드해 누락을 메꾼다.
  function tokenFreshEnough() {
    try {
      const key = Object.keys(localStorage).find(k => k.indexOf("sb-") === 0 && k.indexOf("-auth-token") === k.length - "-auth-token".length);
      if (!key) return false;
      const s = JSON.parse(localStorage.getItem(key) || "null");
      const exp = s && (s.expires_at || (s.currentSession && s.currentSession.expires_at));
      if (!exp) return true;
      return exp * 1000 - Date.now() > 120000;
    } catch (e) { return false; }
  }
  let fgSyncTimer = null;
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") { clearTimeout(fgSyncTimer); if (tokenFreshEnough()) autoSync(); }
    else { clearTimeout(fgSyncTimer); fgSyncTimer = setTimeout(() => { if (document.visibilityState === "visible") autoSync(); }, 10000); }
  });
  window.addEventListener("pagehide", () => { if (tokenFreshEnough()) autoSync(); });
  // 닉네임을 서버(profiles.display_name)에서 가져와 로컬 캐시 갱신 — 다른 기기에서 바꾼 닉네임도
  // 반영되도록 세션 복원 때도 매번 호출(에러는 조용히 무시 — 로컬 캐시가 폴백이라 치명적이지 않음).
  async function fetchProfile() {
    if (!SB || !user) return;
    try {
      const { data, error } = await SB.from("profiles").select("display_name").eq("id", user.id).maybeSingle();
      if (!error) saveNicknameLocal((data && data.display_name) || "");
    } catch (e) {}
  }
  if (SB) {
    SB.auth.getSession().then(({ data }) => { user = data.session ? data.session.user : null; notify(); fetchProfile(); maybeRestoreFromServer(); });
    SB.auth.onAuthStateChange((event, session) => {
      const prevId = user && user.id;
      user = session ? session.user : null;
      notify();
      if (event === "SIGNED_IN" && user && user.id !== prevId) { syncOnLogin(); fetchProfile(); }
    });
  }
  return {
    getUser: () => user,
    onChange(cb) { listeners.add(cb); return () => listeners.delete(cb); },
    signInWithGoogle() {
      if (!SB) return;
      SB.auth.signInWithOAuth({ provider: "google", options: { redirectTo: location.origin + location.pathname } });
    },
    // 로그아웃 — 이 기기의 학습 데이터를 전부 지운다(2026-07-20). 예전엔 마커만 지워서 공용
    // 기기에서 다른 계정으로 로그인하면 이전 사용자의 학습 기록·회화 내용이 새 계정 서버로
    // 통째로 업로드되는 혼입 사고가 가능했음. 지우기 전에 마지막 업로드를 시도해(베스트에포트)
    // 서버에 최신 상태를 남긴다 — 호출부(설정 화면)는 확인 다이얼로그를 먼저 띄울 것.
    async signOut() {
      try { await autoSync(); } catch (e) {}
      localStorage.removeItem(SYNCED_UID_KEY);
      try { localStorage.removeItem(SYNC_STAMP_KEY); } catch (e) {}
      saveNicknameLocal("");
      SYNC_KEYS.forEach(k => { try { localStorage.removeItem(k); } catch (e) {} });
      try { if (SB) await SB.auth.signOut(); } catch (e) {}
      location.reload(); // 메모리에 로드된 이전 사용자 state까지 확실히 비움
    },
    // 닉네임 저장 — profiles 행은 handle_new_user 트리거가 가입 시점에 이미 만들어두므로 update만 하면 됨.
    async updateNickname(name) {
      if (!SB || !user) return { ok: false, error: "로그인 필요" };
      try {
        const { error } = await SB.from("profiles").update({ display_name: name }).eq("id", user.id);
        if (error) throw error;
        saveNicknameLocal(name);
        notify();
        return { ok: true };
      } catch (e) { return { ok: false, error: e.message }; }
    },
    async syncNow() {
      if (!SB || !user) return { ok: false, error: "로그인 필요" };
      try {
        // 서버(다른 기기)가 이 기기의 마지막 동기화 이후에 갱신됐으면, 이 기기의 묵은 스냅샷으로
        // 서버를 덮지 않고 서버 것을 내려받는다(2026-07-20 — 한 달 방치한 기기의 "지금 동기화"가
        // 다른 기기의 최신 진도를 통째로 롤백시키던 문제). 호출부는 downloaded:true면 새로고침할 것.
        const row = await serverRow();
        if (serverIsNewer(row)) {
          applySyncState(row.data || {});
          try { localStorage.setItem(SYNC_STAMP_KEY, row.updated_at); } catch (e) {}
          return { ok: true, downloaded: true };
        }
        await upload();
        return { ok: true };
      } catch (e) { return { ok: false, error: e.message }; }
    },
    // 계정 삭제 — auth.users 행 삭제(cascade로 profiles·learning_state도 함께)는 service_role
    // 권한이 필요해 클라이언트에서 직접 못 함. api/delete-account.js가 세션 토큰을 재검증한 뒤
    // 서버에서만 수행(2026-07-20). 성공하면 이 기기의 학습 데이터도 게스트 상태로 되돌리기 위해
    // 로그아웃 처리까지 여기서 끝냄 — 호출부는 성공 시 새로고침만 하면 됨.
    async deleteAccount() {
      if (!SB || !user) return { ok: false, error: "로그인 필요" };
      try {
        const { data } = await SB.auth.getSession();
        const token = data && data.session && data.session.access_token;
        if (!token) return { ok: false, error: "세션 확인 실패" };
        const r = await fetch(geminiEndpoint("delete-account"), { method: "POST", headers: { ...proxyHeaders(), Authorization: "Bearer " + token } });
        if (!r.ok) { const body = await r.json().catch(() => ({})); return { ok: false, error: body.error || "삭제 실패" }; }
        localStorage.removeItem(SYNCED_UID_KEY);
        await SB.auth.signOut();
        return { ok: true };
      } catch (e) { return { ok: false, error: e.message }; }
    },
  };
})();

/* Worker의 MODEL_FALLBACKS와 같은 원리의 후보 체인 — 404/429/위치거부(400 FAILED_PRECONDITION)면
   다음 모델로 자동 전환. 무료 티어는 현세대 Flash 계열만(Pro는 2026-04부터 유료 전용)이라
   3.5/3 Flash가 맨 앞. Gemma는 오디오 입력 미지원이라 STT 후보에서는 제외. */
const GEMINI_TEXT_MODELS = ["gemini-3.5-flash", "gemini-3-flash", "gemini-3-flash-preview", "gemma-4-26b-a4b-it", "gemini-3-pro-preview", "gemini-2.5-flash-lite", "gemini-2.0-flash"];
const GEMINI_AUDIO_MODELS = ["gemini-3.5-flash", "gemini-3-flash", "gemini-3-flash-preview", "gemini-3-pro-preview", "gemini-2.5-flash-lite", "gemini-2.0-flash"];
async function geminiDirect(contents, generationConfig, models) {
  const key = getGeminiKey();
  const attempts = [];
  let lastDetail = "";
  for (const model of models) {
    /* 키는 ?key= 쿼리가 아니라 x-goog-api-key 헤더로 — 신형 "AQ." 키는 쿼리 방식이면 401로 거부됨 */
    const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-goog-api-key": key },
      body: JSON.stringify({ contents, generationConfig }),
    });
    if (r.ok) {
      const data = await r.json();
      const text = (data.candidates && data.candidates[0] && data.candidates[0].content &&
        (data.candidates[0].content.parts || []).map(p => p.text || "").join("")) || "";
      return text.trim();
    }
    attempts.push(model + "→" + r.status);
    lastDetail = await r.text().catch(() => "");
    const locationBlocked = r.status === 400 && lastDetail.includes("FAILED_PRECONDITION");
    if (r.status !== 404 && r.status !== 429 && !locationBlocked) break;
  }
  throw new Error("gemini error [" + attempts.join(", ") + "] last: " + lastDetail.slice(0, 250));
}
/* 텍스트 프롬프트 공용 진입점 — 키가 있으면 기기에서 직접, 없으면 프록시 경유
   (Vercel 배포 URL이 설정돼 있으면 Vercel, 아니면 Cloudflare). 반환은 항상 응답 텍스트, 실패는 throw. */
async function geminiText(prompt) {
  if (getGeminiKey()) {
    return await geminiDirect([{ parts: [{ text: prompt }] }], { temperature: 0.4, maxOutputTokens: 1024 }, GEMINI_TEXT_MODELS);
  }
  // 30초 타임아웃(2026-07-20) — 모바일 망 전환 등으로 프록시 응답이 스톨하면 브라우저 자체
  // 타임아웃(수십 초~수 분)까지 loadingBot/loadingFb가 유지돼 회화 입력이 통째로 잠겨 보였음.
  // TTS(5초)와 달리 텍스트 생성은 정상 응답도 수 초 걸리므로 넉넉히 30초.
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 30000);
  let r;
  try {
    r = await fetch(geminiEndpoint("gemini"), { method: "POST", headers: proxyHeaders(), body: JSON.stringify({ prompt }), signal: ctrl.signal });
  } catch (e) {
    throw new Error(e && e.name === "AbortError" ? "응답 시간 초과 — 네트워크 확인 후 다시 시도해주세요" : (e && e.message) || "network error");
  } finally { clearTimeout(timer); }
  const data = await r.json().catch(() => null);
  if (!r.ok || !data || !data.text) throw new Error((data && data.error) || ("http " + r.status));
  return (data.text || "").trim();
}

/* onEnd: 발화가 끝나면(정상 종료·에러 모두) 정확히 한 번 호출 — "오늘 대화 통째로 듣기"(순차 재생)가
   다음 문장으로 넘어갈 타이밍을 알아야 해서 2026-07-20 추가. 기존 호출부(onEnd 생략)는 그대로 동작. */
function speakTextWebSpeech(text, lang, rate, onEnd) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = rate;
    const voices = speechSynthesis.getVoices();
    const voice = voices.find(v => v.lang === lang) || voices.find(v => v.lang && v.lang.startsWith("en"));
    if (voice) u.voice = voice;
    if (onEnd) { u.onend = onEnd; u.onerror = onEnd; }
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch (e) { if (onEnd) onEnd(); }
}

/* 앱 전체 공용 TTS — 저장된 속도·악센트 설정을 실제 발화에 반영.
   rateOverride: 카드의 "느리게 듣기"처럼 그 순간만 설정과 무관하게 속도를 강제할 때.
   PROXY_BASE가 설정돼 있으면 Google TTS 프록시를 우선 시도(자연스러운 음성) —
   같은 세션에서 반복 재생하는 문장은 TTS_CACHE(메모리, blob URL)로 재호출 없이 재생.
   실패·타임아웃·미설정 시 항상 브라우저 음성으로 폴백(예외가 사용자에게 보이지 않음). */
const TTS_CACHE = new Map();
let _activeAudio = null; // 프록시 TTS로 재생 중인 Audio — 연타 시 이전 것부터 끊어야 에코가 안 남
let _speakGen = 0; // 요청 세대 토큰 — fetch가 늦게 끝난 이전 호출이 나중에 재생을 가로채는(비동기 역전) 것을 방지
// 현재 재생 중인 speakText 호출이 "끝나길" 기다리는 대기자(순차 재생 기능용, 2026-07-20) — 슬롯 하나뿐인 이유는
// _activeAudio/speechSynthesis 큐가 애초에 한 번에 하나만 재생하는 싱글턴이라 대기자도 항상 최대 1명.
let _pendingSpeakDone = null;
function _resolvePendingSpeak() { if (_pendingSpeakDone) { const fn = _pendingSpeakDone; _pendingSpeakDone = null; fn(); } }

/* 모바일(특히 iOS Safari)은 오디오 자동재생을 "사용자 제스처와 직접 이어진" 호출에만 허용.
   듣기 세션은 3·2·1 카운트다운(setTimeout) 뒤에 문장을 재생하므로 제스처와 끊겨 무음으로
   실패하고, "다시 듣기" 버튼(직접 클릭 → 즉시 재생)만 소리가 나는 문제가 있었음.
   오디오·음성합성 엘리먼트를 한 번 재생해 "언락"해두면 같은 엘리먼트를 재사용하는 이후의
   타이머 기반 재생도 계속 허용됨(표준 모바일 언락 패턴).
   2026-07-16: 이 언락을 "앱 전체 첫 터치(document 전역 pointerdown)"에서 실행했더니, iOS에서
   무음이라도 <audio> 재생·음성합성 호출 자체가 백그라운드에서 재생 중이던 다른 앱(음악 등)의
   오디오 세션을 가로채 정지시키는 부작용이 있었음(홈 화면에서 아무 곳이나 눌러도 발생) —
   실제로 지연 재생이 필요한 진입점(듣기 세션 시작, 회화 대화방 입장)에서만 명시적으로 호출하도록 축소. */
const _sharedAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
function unlockAudio() {
  // 회화 대화방 입장 직후 "음성이 나오려다 끊김"의 원인이었던 레이스 컨디션 수정(2026-07-18):
  // unlockAudio가 무음 클립을 play()한 뒤 .then()에서 pause()하는데, 이 .then()이 비동기라
  // speakText가 그 사이 같은 _sharedAudio의 src를 실제 TTS로 갈아끼우고 재생을 시작해버리면,
  // 뒤늦게 도착한 이 pause()가 "방금 시작된 진짜 음성"을 멈춰버렸음(TTS fetch가 빠를 때만
  // 재현돼서 "나올 때도 있음"으로 보였던 것). src가 그대로(=아직 아무도 안 갈아탔을 때)일 때만
  // pause — 이미 다른 소스로 바뀌었으면 그건 손대지 않는다.
  try {
    const unlockSrc = _sharedAudio.src;
    _sharedAudio.play().then(() => { if (_sharedAudio.src === unlockSrc) _sharedAudio.pause(); }).catch(() => {});
  } catch (e) {}
  try { speechSynthesis.speak(new SpeechSynthesisUtterance("")); } catch (e) {}
}
function stopSpeaking() {
  _speakGen++; // 진행 중인 speakText 호출이 있다면 자기 세대가 낡았음을 감지하고 재생을 포기하게 함
  try { speechSynthesis.cancel(); } catch (e) {}
  if (_activeAudio) { try { _activeAudio.pause(); } catch (e) {} _activeAudio = null; }
  _resolvePendingSpeak(); // speakText의 "재생 끝날 때까지" 대기자가 있으면 여기서 풀어줌(순차 재생 중 정지 버튼 대응)
}
/* 회화 캐릭터별 "기본 속도"(persona.rate, 기본 1 — 의사/카페 직원처럼 원래 말이 빠른 설정만 1.2 등)에
   사용자의 듣기속도 설정(SPEED_PRESETS[prefs.speed].rate)을 곱연산으로 얹는다(2026-07-20 재설계).
   예: 원어민(1.3) 설정에서 원래 빠른 캐릭터(1.2)는 1.3*1.2=1.56으로 더 빠르게 — 캐릭터 간 상대적
   속도차는 유지하면서 학습자가 전체를 느리게/빠르게 보정할 수 있게. (이전엔 persona.rate가 사용자
   설정을 완전히 덮어써서 회화모드에서만 속도 설정이 안 먹혔었고, 그 다음엔 반대로 persona.rate를
   아예 없애 캐릭터 간 속도차가 사라졌었음 — 이번이 최종 방식.) */
function personaSpeakRate(persona) { return (persona.rate || 1) * SPEED_PRESETS[PREFS.get().speed].rate; }

/* 모바일 키보드 제스처 앵커(2026-07-20, 같은 날 재작성) — "단어카드학습 처음 들어가면 키보드가
   바로 안 뜬다"는 지적의 원인: 홈/사전에서 진입하는 경로(startCustomStudy)는 App state(customStudy)
   →Learn의 useEffect→setSession으로 여러 렌더/이펙트를 거쳐 CardSession이 마운트되는데, useEffect는
   클릭 이벤트가 끝난 뒤(페인트 후) 비동기로 실행되므로, 그 안에서 CardSession의 input이 autoFocus로
   focus()를 불러도 iOS는 더 이상 이걸 "사용자 제스처"로 인정하지 않아 키보드를 안 띄운다(학습
   탭에서 직접 시작하는 경로는 setSession을 클릭 핸들러 안에서 동기로 불러 이 문제가 없음).
   해결: 세션을 시작하는 클릭 핸들러 "안에서" 동기로 숨은 입력에 focus()해 키보드를 미리 띄워둔다 —
   iOS는 이미 어딘가에 포커스가 가 있는(키보드가 떠 있는) 상태에서 다른 입력으로 포커스를 "옮기는"
   것은 새 제스처 없이도 허용하므로, 뒤늦게 CardSession의 실제 입력이 마운트되며 focus를 가져가도
   키보드가 계속 떠 있게 된다.
   **1차 구현(React로 상시 마운트한 input)의 부작용 발견(2026-07-20)**: 화면 어디서든 이 앵커
   input이 항상 DOM에 남아있다 보니, 다른 화면(회화 대화방 등)에서 진짜 입력창에 포커스가 갈 때도
   페이지에 포커스 가능한 텍스트 입력이 2개(그 화면의 입력 + 이 앵커) 존재하게 됨 — iOS Safari는
   포커스 가능한 필드가 여러 개면 키보드 위에 이전/다음 이동 화살표가 있는 내비게이션 바를 붙이는데,
   회화 대화방에 "쓸데없는 바"가 보인다는 지적이 이 부작용이었을 가능성이 높음. 앵커를 상시 마운트
   하지 않고, 클릭 시점에 순수 DOM으로 즉석 생성 → focus → 짧은 시간 뒤(또는 실제 입력이 포커스를
   가져가면) 제거하는 방식으로 변경 — 존재 구간이 세션 시작 직후 한순간뿐이라 다른 화면에는 영향이
   없다. */
function primeKeyboardGesture() {
  try {
    const el = document.createElement("input");
    el.className = "kb-anchor";
    el.tabIndex = -1;
    el.setAttribute("aria-hidden", "true");
    document.body.appendChild(el);
    el.focus({ preventScroll: true });
    // 실제 입력이 포커스를 가져가면 곧바로, 못 가져가더라도 최대 2초 후엔 정리(레이스 상관없이 안전).
    const cleanup = () => { try { document.body.removeChild(el); } catch (e) {} };
    el.addEventListener("blur", cleanup, { once: true });
    setTimeout(cleanup, 2000);
  } catch (e) {}
}
// waitEnd:true면 실제 재생이 "끝날 때"(정상 종료·중간에 다른 speakText/stopSpeaking에 의해
// 가로채짐 모두 포함) 반환되는 프로미스를 준다 — "오늘 대화 통째로 듣기"의 순차 재생 전용
// 옵션(2026-07-20). 기존 호출부는 이 옵션 없이 그대로 fire-and-forget으로 쓰면 됨(재생 "시작"
// 시점에 대부분 resolve되던 예전과 동일하게 동작).
async function speakText(text, rateOverride, accentOverride, genderOverride, waitEnd) {
  // 앱이 백그라운드로 나간 뒤 도착한 비동기 응답(회화 봇 대사, 지연 에코 등)이 홈 화면에서
  // 소리를 새로 시작하는 것을 차단 — visibilitychange의 stopSpeaking은 "재생 중이던 것"만
  // 멈출 수 있고, hidden 이후에 "새로 시작"되는 재생은 여기서 막아야 함(2026-07-20).
  if (document.visibilityState === "hidden") return;
  const prefs = PREFS.get();
  const accent = ACCENT_PRESETS[accentOverride] || ACCENT_PRESETS[prefs.accent];
  const rate = rateOverride || SPEED_PRESETS[prefs.speed].rate;
  const gender = genderOverride === "male" ? "male" : "female"; // 회화 페르소나별 성별(2026-07-20) — 미지정(단어카드 등)은 기존처럼 female
  const myGen = ++_speakGen; // 이 호출 이후 speakText/stopSpeaking이 또 불리면 myGen은 낡은 세대가 됨
  // 새로 말하기 전에 이전 재생(프록시 Audio·Web Speech 둘 다) 정지 — 연타 에코 방지
  try { speechSynthesis.cancel(); } catch (e) {}
  if (_activeAudio) { try { _activeAudio.pause(); } catch (e) {} _activeAudio = null; }
  _resolvePendingSpeak(); // 이 호출이 이전 재생을 가로챘으므로, 그 이전 호출이 waitEnd로 기다리고 있었다면 여기서 풀어줌
  if (PROXY_BASE) {
    const cacheKey = accent.lang + "|" + rate + "|" + gender + "|" + text;
    try {
      let url = TTS_CACHE.get(cacheKey);
      if (!url) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 5000);
        const r = await fetch(geminiEndpoint("tts"), {
          method: "POST",
          headers: proxyHeaders(),
          body: JSON.stringify({ text, lang: accent.lang, rate, gender }),
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        if (!r.ok) throw new Error("tts proxy failed");
        const blob = await r.blob();
        url = URL.createObjectURL(blob);
        TTS_CACHE.set(cacheKey, url);
      }
      // fetch(캐시 없을 때)나 blob 변환 사이 더 최근 호출이 있었으면(myGen이 낡음) 재생하지 않고 조용히 포기
      if (myGen !== _speakGen) return;
      _sharedAudio.src = url; // 언락된 하나의 엘리먼트를 재사용 — 새 Audio()는 모바일에서 다시 잠겨있음
      _activeAudio = _sharedAudio;
      await _sharedAudio.play();
      if (waitEnd) {
        await new Promise(resolve => {
          const finish = () => { _sharedAudio.removeEventListener("ended", finish); if (_pendingSpeakDone === finish) _pendingSpeakDone = null; resolve(); };
          _pendingSpeakDone = finish;
          _sharedAudio.addEventListener("ended", finish);
        });
      }
      return;
    } catch (e) { /* 폴백으로 진행 */ }
  }
  if (myGen !== _speakGen) return;
  if (waitEnd) {
    await new Promise(resolve => {
      const finish = () => { if (_pendingSpeakDone === finish) _pendingSpeakDone = null; resolve(); };
      _pendingSpeakDone = finish;
      speakTextWebSpeech(text, accent.lang, rate, finish);
    });
  } else {
    speakTextWebSpeech(text, accent.lang, rate);
  }
}

/* 굴절형 → 표제어 역추적: children→child, others→other, running→run 등.
   사전 표제어는 원형만 있어서 문장 속 활용형이 상세 연결에 실패하던 문제 대응.
   불규칙 변화는 소규모 큐레이션 맵, 나머지는 접미사 규칙 — 후보가 실제 사전에
   있을 때만 채택하므로 오탐(sing→s 같은)은 발생하지 않는다. */
const DICT_IRREGULAR = {
  children: "child", men: "man", women: "woman", people: "person", feet: "foot", teeth: "tooth",
  mice: "mouse", geese: "goose", oxen: "ox", phenomena: "phenomenon",
  went: "go", gone: "go", did: "do", done: "do", had: "have",
  has: "have", was: "be", were: "be", is: "be", are: "be", am: "be", been: "be",
  better: "good", best: "good", worse: "bad", worst: "bad", made: "make", said: "say",
  took: "take", taken: "take", got: "get", came: "come", saw: "see", seen: "see", ran: "run",
  knew: "know", known: "know", thought: "think", bought: "buy", brought: "bring", felt: "feel",
  found: "find", gave: "give", given: "give", left: "leave", met: "meet", paid: "pay",
  sat: "sit", spoke: "speak", spoken: "speak", stood: "stand", told: "tell",
  understood: "understand", wrote: "write", written: "write", heard: "hear", held: "hold",
  kept: "keep", lost: "lose", meant: "mean", sent: "send", spent: "spend", won: "win",
};
function dictLookup(raw) {
  const w = (raw || "").toLowerCase().replace(/[^a-z']/g, "");
  if (!w) return null;
  if (wordOfFlat(w)) return wordOfFlat(w); // 표기 접기 포함 — "carry-on"도 표제어 "carry on"으로(2026-07-19)
  if (DICT_IRREGULAR[w] && wordOf(DICT_IRREGULAR[w])) return wordOf(DICT_IRREGULAR[w]);
  const cands = [];
  if (w.endsWith("ies")) cands.push(w.slice(0, -3) + "y");
  if (w.endsWith("es")) cands.push(w.slice(0, -2));
  if (w.endsWith("s") && !w.endsWith("ss")) cands.push(w.slice(0, -1));
  if (w.endsWith("ves")) cands.push(w.slice(0, -3) + "f", w.slice(0, -3) + "fe"); // knives→knife, wolves→wolf
  if (w.endsWith("ses")) cands.push(w.slice(0, -2) + "is"); // crises→crisis, analyses→analysis
  if (w.endsWith("ing")) {
    cands.push(w.slice(0, -3), w.slice(0, -3) + "e");
    if (w.length > 5 && w[w.length - 4] === w[w.length - 5]) cands.push(w.slice(0, -4)); // running→run
  }
  if (w.endsWith("ied")) cands.push(w.slice(0, -3) + "y");
  if (w.endsWith("ed")) {
    cands.push(w.slice(0, -2), w.slice(0, -1));
    if (w.length > 4 && w[w.length - 3] === w[w.length - 4]) cands.push(w.slice(0, -3)); // stopped→stop
  }
  if (w.endsWith("est")) cands.push(w.slice(0, -3), w.slice(0, -2));
  if (w.endsWith("er")) cands.push(w.slice(0, -2), w.slice(0, -1));
  if (w.endsWith("ly")) cands.push(w.slice(0, -2));
  for (const c of cands) { if (c.length >= 2 && wordOf(c)) return wordOf(c); }
  return null;
}

/* 정답/오답 효과음 — 에셋 없이 Web Audio 사인톤. word=짧은 블립(단어 하나 고정될 때),
   done=띠링 2음 상승(문장 전체 정답), wrong=띠- 2음 하강(오답, 2026-07-20 추가 — 모든 학습에서
   정답/오답 시 공용으로 재생하도록 CardSession·DictationSession·QuizSession에서 호출).
   오디오 컨텍스트는 첫 사용자 입력 후 생성되므로 자동재생 제약 없음. */
let dingCtx = null;
function playDing(kind) {
  try {
    dingCtx = dingCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = dingCtx;
    if (ctx.state === "suspended") ctx.resume();
    const t0 = ctx.currentTime;
    const notes = kind === "done" ? [[880, 0, 0.1], [1318.5, 0.09, 0.28]]
      : kind === "wrong" ? [[392, 0, 0.1], [311.1, 0.09, 0.24]] // 하강 2음(G4→Eb4) — "띠-" 느낌
      : [[1174.7, 0, 0.09]];
    const peak = kind === "done" ? 0.16 : kind === "wrong" ? 0.14 : 0.1;
    notes.forEach(([f, dt, dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0 + dt);
      g.gain.exponentialRampToValueAtTime(peak, t0 + dt + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t0 + dt); o.stop(t0 + dt + dur + 0.03);
    });
  } catch (e) {}
}

/* ===================== SRS 엔진 (Leitner · localStorage) =====================
   학습 단위 키 = 다의어면 `word#senseIndex`, 단일 의미면 `word`.
   box↑ → 다음 복습 간격↑(BOX_INTERVALS). 오답 시 box=1로 리셋. box>=6이면 '완료'에 근접. */
const DAY = 86400000;
const SRS = (() => {

     복습 0" 실사용 리포트): save()가 큰 스토어를 절반 미만으로 갈아치우기 직전에 백업해둔
     en_srs_bak이 있으면 그걸로 복원한다. (서버 복구는 AUTH의 maybeRestoreFromServer가 별도 담당.) */
  try {

  } catch (e) {}

  if (!store) {

    // 첫 실행 데모 시드(앱이 비어 보이지 않게) — 실제 학습하면 덮어써짐. tester 전용(2026-07-20,
    // IS_TESTER=false면 위에서 이미 빈 store로 반환돼 이 블록 자체를 안 탐 — 실사용자는 진짜 빈 상태로 시작).
    // 가상 페르소나: 어휘력 B2+ · 작문력 B1 · 3개월 정도 띄엄띄엄 학습한 사용자(2026-07-16).
    store = {
      "business#0": { box: 6, due: t + 18 * DAY, seen: true },
      "church#0": { box: 6, due: t + 26 * DAY, seen: true },
      "corn#0": { box: 6, due: t + 20 * DAY, seen: true },

      "curse#0": { box: 5, due: t + 15 * DAY, seen: true },

      "knock#0": { box: 3, due: t + 2 * DAY, seen: true },
      "loose#0": { box: 3, due: t + 10 * DAY, seen: true },
      "composition": { box: 3, due: t - 2 * DAY, seen: true },

      "dialog": { box: 3, due: t - 4 * DAY, seen: true },
      "diving": { box: 3, due: t + 7 * DAY, seen: true },

    // 위 항목들은 순전히 "홈 화면이 비어 보이지 않게" 하려는 표시용 더미(스트릭·뱃지·CEFR
    // 배지 등은 여기 box 값을 근거로 계산됨) — 실제로 학습한 적 없는 단어라 진짜 복습
    // 큐(pickSession)에 섞이면 안 됨. demo 플래그로 표시해 isDue에서 걸러낸다
    // (2026-07-16 수정 — 이 플래그가 없어서 가짜 복습 18개가 실제 학습 세션을 계속
    // 차지하는 바람에 "맨날 같은 단어만 나온다" 버그가 있었음).
    // 학습 날짜(at)를 최근 ~90일에 6개씩 클러스터로 흩뿌린다 — "내가 학습한 단어 > 날짜별" 뷰가
    // 며칠에 걸쳐 여러 단어를 학습한 것처럼 자연스럽게 보이도록(2026-07-17).
    const allKeys = Object.keys(store);

    // 카드"가 0으로 비지 않고 홈의 "복습 8"과 맞도록. 나머지는 전부 demo로 표시.
    const reviewKeys = ["knock#0", "loose#0", "composition", "council", "cycle", "curse#0", "director#0", "effort#0"];
    allKeys.forEach(k => { if (reviewKeys.includes(k)) { store[k].due = t - DAY; store[k].at = t - 5 * DAY; } else { store[k].demo = true; } });
  }
  const save = () => {
    try {
      // 빈/축소된 스토어가 기존 학습 기록을 덮어써 영구 파괴하는 경로 차단(2026-07-20) — 저장돼 있던
      // 값이 크고(>5KB) 새 값이 그 절반 미만이면, 덮어쓰기 전에 기존 값을 en_srs_bak으로 보존.
      const next = JSON.stringify(store);
      const cur = localStorage.getItem("en_srs");

    },
    isDue: k => { const s = store[k]; return s && s.seen && !s.demo && s.due <= Date.now(); },
    // 복습 간격 재설계(2026-07-20, 망각곡선 기준):

    //    기록 없음) 바로 box=MAX_BOX(2달 뒤)로 건너뛰어 "준완료" 취급. 반대로 예전에 틀렸거나 힌트를
    //    썼던 적이 있어 이미 box가 있는 상태라면(재학습 중) 그 기억이 아직 완전하지 않다는 뜻이므로

    //    힌트 1개면 3일(box=2), 2개 이상이면 1일(box=1) — 힌트를 많이 쓸수록 더 촘촘하게 재확인.

      if (!ok) s.box = 1;
      else if (hintCount === 0) s.box = s.box === 0 ? MAX_BOX : Math.min(MAX_BOX, s.box + 1);
      else s.box = hintCount >= 2 ? 1 : 2;
      s.seen = true;
      s.due = Date.now() + BOX_INTERVALS[s.box] * DAY;
      s.at = Date.now(); // 마지막 학습 시각 — "내가 학습한 단어 > 날짜별" 그룹핑에 사용
      delete s.demo; // 실제로 학습(채점)됐으니 더 이상 더미가 아님 — 이제부터 진짜 복습 큐에 들어감
      store[k] = s; save();
      if (ok) POINTS.add(10); // 꾸준한 학습으로만 쌓이는 포인트 — 캐릭터 변경 잠금 해제에 사용
      return s;
    },

    // 처음이면 즉시 복습 대상(due=지금)으로 등록해 바로 다음 세션에 나오게 함.
    markForStudy(k) {
      if (store[k]) return false;
      store[k] = { box: 0, seen: true, due: Date.now() };
      save();
      return true;
    },
  };
})();

/* ===================== 오답 노트 (듣기 세션) =====================
   딕테이션에서 첫 시도에 못 맞힌(재시도 끝에 맞혔거나 강제 재학습된) 문장을 모아둔다 —
   SRS 자체는 "복습 주기"만 관리하고 "무엇을 유독 틀렸는지"는 안 남기므로 별도 목록(2026-07-20).
   같은 항목을 여러 번 틀리면 count만 올리고 최근 시각(at)을 갱신 — 목록 정렬에 사용. */
const WRONG_NOTE_KEY = "en_wrong_notes_v1";
function loadWrongNotes() {
  try { return JSON.parse(localStorage.getItem(WRONG_NOTE_KEY) || "[]"); } catch (e) { return []; }
}
function saveWrongNotes(list) { try { localStorage.setItem(WRONG_NOTE_KEY, JSON.stringify(list)); } catch (e) {} }
function addWrongNote(key, source) {
  const list = loadWrongNotes();
  const hit = list.find(n => n.key === key);
  if (hit) { hit.count = (hit.count || 1) + 1; hit.at = Date.now(); }
  else list.unshift({ key, source, at: Date.now(), count: 1 });
  saveWrongNotes(list.slice(0, 200)); // 무한 누적 방지 — 최근 200개만
}
function removeWrongNote(key) { saveWrongNotes(loadWrongNotes().filter(n => n.key !== key)); }

/* ===================== 포인트 엔진 =====================
   캐릭터는 처음 1회는 무료로 선택하고, 이후 변경하려면 학습으로 쌓은 포인트가 필요(소모형).
   포인트는 카드 정답 시에만 적립 — "일정 학습량 유지"를 계량하는 유일한 지표. */
const CHAR_CHANGE_COST = 3000;
const STICKER_COST = 300; // 커스텀 스티커 만들기 실제 비용(2026-07-20 — 이전엔 decoShopItems 더미 진열장 안내 문구 전용이었으나, 이제 CustomStickerMakerView가 실제로 이 값을 소모함). decoShopItems(색상 원형 더미 상점)는 여전히 구매 로직 없는 진열장.
const POINTS = (() => {
  let n = 0;
  try { n = parseInt(localStorage.getItem("en_points") || "0", 10) || 0; } catch (e) {}
  const save = () => { try { localStorage.setItem("en_points", String(n)); } catch (e) {} };
  return {
    get: () => n,
    add(v) { n += v; save(); },
    spend(v) { if (n < v) return false; n -= v; save(); return true; },
  };
})();

/* 활동 로그 — 뱃지·스트릭·홈 루틴·잔디를 하드코딩 더미가 아니라 실제 사용 기록에서 계산하기 위한
   로컬 저장소(2026-07-19 신설, 구 BADGE_PROGRESS/STREAK 더미 대체). 날짜별 학습량(단어카드 개수·
   듣기 문장/세션·회화 세션) + 열람한 어원(affix) 집합. 기기 간 동기화는 백엔드(P1, PLAN 6.6) 몫 —
   지금은 localStorage. 세션 완료·어원 열람 지점에서 아래 add* 를 호출해 누적한다. */
const ACT = (() => {
  const KEY = "en_activity_v1";
  let store;
  try { store = JSON.parse(localStorage.getItem(KEY) || "null"); } catch (e) {}
  if (!store || typeof store !== "object") store = {};
  if (!store.days || typeof store.days !== "object") store.days = {};
  if (!Array.isArray(store.roots)) store.roots = [];
  const save = () => { try { localStorage.setItem(KEY, JSON.stringify(store)); } catch (e) {} };
  const keyOf = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  const todayKey = () => keyOf(new Date());
  const day = (k) => (store.days[k] = store.days[k] || { c: 0, li: 0, ls: 0, t: 0 });
  const active = (d) => !!d && ((d.c || 0) + (d.li || 0) + (d.t || 0)) > 0;
  const hasDay = (k) => active(store.days[k]);
  return {
    todayKey, keyOf,
    today() { return { ...day(todayKey()) }; },
    // 카드/문장 단위 실시간 기록(2026-07-20) — 예전엔 세션이 끝까지 완주돼야만(onSessionExit) 한꺼번에

/* 신규 학습 후보: 전체 표제어가 아니라 "내 레벨 ±1 CEFR 범위"만.
   예전엔 SEED 순서(알파벳순) 그대로 앞에서 잘라 써서 항상 a로 시작하는 같은 단어만
   반복되고, "신규 1만 개 대기" 같은 비현실적 카운트가 표시됐음(2026-07-17 수정).
   levelShift: 기준 레벨을 CEFR 단계로 이동(듣기 속도 프리셋 보정용). */
function freshPool(levelShift = 0) {
  const lv = Math.max(0, Math.min(5, userCefrIdx() + levelShift));
  return allItems().filter(it => {
    if (SRS.get(it.key)) return false;
    if (!canBlank(it)) return false; // 빈칸 못 만드는 항목 제외 — 단어카드는 예문 빈칸만
    if (it.mine) return true; // 내가 등록한 단어는 우선학습 대상 — 레벨 범위 제한과 무관하게 포함(2026-07-20)
    const ci = CEFR_LEVELS.indexOf(it.cefr);
    return ci >= 0 && Math.abs(ci - lv) <= 1;

/* 듣기 세션 레벨 보정 — 속도 프리셋 기본값(일상회화)을 기준으로, 원어민대화는 +2(반스텝,
   band12 기준 = CEFR +1단계), 영어선생님은 -2. 카드 학습에는 적용하지 않음. */
function listenLevelShift() {
  return { teacher: -1, casual: 0, native: 1 }[PREFS.get().speed] || 0;
}
/* 최근 세션들에 낸 항목 키 — 단어카드와 듣기가 연달아 같은 단어를 내지 않게(교차 모드 중복
   방지). 카드·듣기 둘 다 정답 시 SRS를 갱신하므로, 한 모드에서 낸 due는 다음 모드에서 빼도
   복습이 누락되지 않는다. 인메모리라 새로고침하면 초기화(리뷰를 영구히 굶기지 않도록). */
let RECENT_KEYS = [];
const RECENT_CAP = 40;
/* 오늘 세션 아이템 선정: 복습 예정(due) 우선 → 신규(내 레벨 범위에서 무작위) 순, 최대 n개.
   최근에 낸 항목은 뒤로 미뤄 세션끼리 안 겹치게 한다(부족하면 그때만 최근 것으로 채움). */
function pickSession(n = 10, levelShift = 0) {
  const recent = new Set(RECENT_KEYS);
  const due = allItems().filter(it => SRS.isDue(it.key) && canBlank(it));
  const fresh = freshPool(levelShift);
  for (let i = fresh.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fresh[i], fresh[j]] = [fresh[j], fresh[i]];
  }
  // 신규(fresh) 중에서는 내가 등록한 단어를 다른 신규 단어보다 먼저 — 복습 예정(due)은
  // 망각곡선상 더 급하므로 그대로 최우선 유지(2026-07-20, "내가 등록한 단어 우선학습" 요청).
  const freshMine = fresh.filter(it => it.mine);
  const freshOther = fresh.filter(it => !it.mine);
  const pool = due.concat(freshMine, freshOther);
  const picked = pool.filter(it => !recent.has(it.key)).concat(pool.filter(it => recent.has(it.key))).slice(0, n);
  RECENT_KEYS = RECENT_KEYS.concat(picked.map(it => it.key)).slice(-RECENT_CAP);
  return picked;
}

/* 퀴즈 문제 구성: 이미 학습(SRS 기록 있음)한 단어 중에서만 출제 — 카드로 한 번도
   안 본 단어가 나오면 실질적으로 풀 수 없는 문제라 대상에서 제외. 뜻 4지선다·스펠링·
   문장 어순 배열(2026-07-19, PLAN 4.4 "문장 퀴즈")을 고르게 섞음(i%3). 학습한 단어가
   4개 미만이면 문제 구성 불가(null). SRS 복습 간격에는 영향 없는 순수 보조 훈련. */
// 퀴즈 항목(단어 전체 또는 다의어 sense 하나)의 품사 — sense가 있으면 그 sense의 한글 품사,
// 없으면(단의어) 표제어 pos[0](영문 코드)를 POS_KO로 변환. 레벨테스트 4지선다(ltPos)와 같은
// 원칙을 퀴즈에도 적용(2026-07-20, 사용자 요청: 보기 품사 일치 + 유사정답으로 난이도 상향).
function quizItemPos(it) {
  const w = wordOf(it.word);
  if (!w) return null;
  const m = /#(\d+)$/.exec(it.key);
  if (m && w.senses && w.senses[+m[1]]) return w.senses[+m[1]].pos || null;
  return (w.pos && w.pos[0]) ? (POS_KO[w.pos[0]] || w.pos[0]) : null;
}
function buildQuiz(n = 10) {
  const studied = allItems().filter(it => SRS.get(it.key));
  if (studied.length < 4) return null;
  const shuffled = [...studied].sort(() => Math.random() - 0.5).slice(0, n);
  const distractorPool = allItems();
  const buildChoice = it => {
    const myPos = quizItemPos(it);
    // 품사 통일(2026-07-20) — 오답 보기가 정답과 다른 품사면(예: 정답은 동사인데 보기에 명사가 섞임)
    // 뜻을 몰라도 품사만으로 소거가 가능해 너무 쉬워짐. 같은 품사 후보가 3개 미만이면(희귀 품사)
    // 전체 풀로 폴백해 문제 자체가 깨지지 않게 한다.
    const samePos = distractorPool.filter(p => p.key !== it.key && p.ko !== it.ko && (!myPos || quizItemPos(p) === myPos));
    const pool = [...(samePos.length >= 3 ? samePos : distractorPool.filter(p => p.key !== it.key && p.ko !== it.ko))].sort(() => Math.random() - 0.5);
    // 유의어 오답 1개 우선 배치(2026-07-20) — 정답과 실제 뜻이 가까운 단어를 하나 넣어 소거법으로
    // 정답을 맞히는 걸 막는다(레벨테스트 4지선다와 같은 원칙). it.syn(정방향)과 SYN_INDEX(역방향)를 합침.
    const synWords = new Set([...(it.syn || []), ...(SYN_INDEX[it.word.toLowerCase()] || [])].map(s => s.toLowerCase()));

    const synPick = pool.find(p => synWords.has(p.word.toLowerCase()));
    if (synPick) distractors.push(synPick);
    for (const p of pool) {
      if (distractors.length >= 3) break;
      if (p === synPick || p.ko === it.ko) continue;
      if (distractors.some(d => d.ko === p.ko)) continue;

    for (let a = choices.length - 1; a > 0; a--) { const b = Math.floor(Math.random() * (a + 1));[choices[a], choices[b]] = [choices[b], choices[a]]; }
    return { type: "choice", it, choices };
  };
  // 어순 배열: 예문을 토큰(공백 기준)으로 쪼개 섞음 — 3~10단어 문장만 대상(너무 짧으면 자명,
  // 너무 길면 모바일에서 조각이 다 안 보임). 범위 밖이면 그 자리는 4지선다로 대체.
  const buildOrder = it => {
    // 주의: allItems()가 반환하는 item의 it.ex는 이미 단일 예문 객체로 풀려있음(w.ex[0]이
    // itemsFromWords에서 미리 대입됨) — it.ex[0]으로 다시 접근하면 undefined가 되어 항상
    // choice로 폴백하는 조용한 버그가 있었음(2026-07-19, buildQuiz(3) 반복 실행으로 재현·수정).
    const ex = it.ex;

    if (sh.every((x, k) => x.idx === k)) { const tmp = sh[0]; sh[0] = sh[1]; sh[1] = tmp; } // 우연히 원래 순서면 강제로 섞기
    return { type: "order", it, tokens, shuffled: sh, ko: ex.ko };

/* **강조** 마크업을 <b>로 렌더 (WHATS_NEW 등 안내 문구 공용 규칙).
   tier를 주면 <b>에 hl-{tier} 클래스가 붙어 강조색이 하이어라키에 따라 달라짐(기본은 노랑 그대로).
   각 **...** 안에 "pink:"/"yellow:"/"green:"/"blue:" 접두사를 붙이면 그 조각만 개별 색을 지정할
   수 있다(2026-07-20, 레벨테스트 분석 문구용) — 노트 전체를 한 색으로 칠하는 게 아니라 레벨·단어수·
   속도 등 "판정된 값"마다 그 값 자체의 하이어라키를 따로 매겨야 한다는 지적으로 추가. 접두사가 없는
   **조각**은 그대로 note 단위 tier(또는 기본 노랑)를 씀 — 기존 호출부(WHATS_NEW 등)는 그대로 동작. */
function renderBold(text, tier) {
  const parts = (text || "").split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => {
    if (!(p.startsWith("**") && p.endsWith("**"))) return <React.Fragment key={i}>{p}</React.Fragment>;
    let inner = p.slice(2, -2);
    let cls = tier ? "hl-" + tier : undefined;
    const m = /^(pink|yellow|green|blue):([\s\S]*)$/.exec(inner);
    if (m) { cls = "hl-" + m[1]; inner = m[2]; }
    return <b key={i} className={cls}>{inner}</b>;
  });
}

/* 연음(리에종) 지점 — 그 문장 안에서 실제로 자음으로 끝나는 단어 바로 뒤에 모음으로
   시작하는 단어가 오는 자리를 전부 찾는다(예: "with us"·"turn it"). 문장마다 다른,

   예전엔 "모음+모음 글라이드"로 잘못 분류됐음(예: "cycle includes"가 실제로는 L+I 리에종인데
   "y/w 글라이드"로 안내됨 — 2026-07-18, 스크린샷으로 오류 확인). 짧은 예외(진짜 모음음으로 끝나는

   그 문장에서 실제로 일어나는 인접 단어의 음운 현상(리에종·동화·플랩·축약·삼킴·글라이드 등 14종)을

      // "made us fresh cocktails"(fresh=형용사)를 사역구문으로 오인하지 않는다(정규식만으론 불가능).
      // "Let's"(=let us)는 문법적으론 형태가 같지만 독립 관용표현으로 가르치는 게 자연스러워 제외.
      if (!/\blet's\b/i.test(s) && doc.match("(make|makes|made|let|lets|have|has|had) (him|her|me|us|them|it) #Verb").found) found.push("bare-infinitive-causative");
      if (doc.match("(see|sees|saw|watch|watches|watched|hear|hears|heard|feel|feels|felt|notice|notices|noticed|observe|observes|observed) (him|her|me|us|them|it) #Verb").found) found.push("bare-infinitive-perception");
    }
  } catch (e) {}
  // 관계대명사 who/which/that — 의문문(who/which로 시작)과 구별, that은 인지·발화 동사 뒤(명사절)와 구별.

  if (/\bwhich\b/i.test(s) && !isQuestion && !/^which\b/i.test(s)) found.push("relative-pronoun-which");

    const m = s.match(/([a-z]+)\s+that\s+[a-z]+/i);

    }

  }
  // 시제 — 완료·진행 조동사 체인. 과거분사 판정은 -ed/-en 접미사 대신 looksLikeParticiple로
  // (lost/left/found 같은 불규칙형은 접미사 정규식에 안 걸림 — IRREG_REV 기반).
  {
    // 축약형('ve/'s/'d)도 원형처럼 취급 — I've/He's/I'd를 have/has/had로 정규화한 토큰 배열을 훑는다.
    const expandContraction = w => {
      const m = w.match(/^(.*)'(ve|s|d)$/i);
      if (!m) return w;
      return { ve: "have", s: "has", d: "had" }[m[2].toLowerCase()];
    };
    const words = s.replace(/[.,!?;:"]/g, "").split(/\s+/).map(expandContraction);
    // 조동사(auxRe) 뒤 최대 2단어 이내(부사 하나 끼어도 됨, 예: had already left)에 과거분사가 오면 인정.
    const auxParticiple = (auxRe) => words.some((w, i) =>
      auxRe.test(w) && [words[i + 1], words[i + 2]].some(nw => nw && looksLikeParticiple(nw)));

      if (/\bhad\s+been\s+[a-z]+ing\b/i.test(s) || /\bwill\s+have\s+been\s+[a-z]+ing\b/i.test(s)) found.push("perfect-progressive");
    } else if (/\bwill\s+have\s+[a-z]+\b/i.test(s) && auxParticiple(/^have$/i)) {
      found.push("future-perfect");

      found.push("past-perfect");
    } else if (auxParticiple(/^(have|has)$/i)) {
      found.push("present-perfect-basic");
    }
    if (/\b(said|told|asked|replied|explained)\s+(that\s+)?[a-z]+\s+(was|were|had|would|could)\b/i.test(s)) found.push("tense-agreement-reported-speech");
  }

    if (r.notQuestion && isQuestion) return;
    const m = s.match(r.re);
    if (!m) return;
    if (r.notStart && m.index === 0) return; // 문장 맨 앞 매치는 제외(의문문/도치 등과 겹치는 오탐 방지)
    found.push(r.id);
  });
  return Array.from(new Set(found)).filter(id => GRAMMAR_TAGS[id]);
}

/* 레벨테스트(4.3)와 같은 12단계 스케일 — CEFR 6밴드를 각각 base/+ 로 나눔.

const LISTEN_LEVELS = ["A1", "A1+", "A2", "A2+", "B1", "B1+", "B2", "B2+", "C1", "C1+", "C2", "C2+"];

/* 듣기 난이도 — 어휘 CEFR만으로는 "r u all good?"처럼 단어는 전부 쉬운데
   연음·문장 길이 때문에 귀로 듣긴 어려운 문장을 못 잡는다. 그래서 별도로:
   어휘 레벨(0~5) + 연음 지점 수(가중치 1.2) + 8단어를 넘는 만큼(가중치 0.3)을
   합산해 LISTEN_LEVELS(12단계, A1~C2+)로 판정. 다시듣기 패널티(다음 문제
   다운그레이드)도 이 지표 기준 — 어휘가 쉬워도 듣기가 어려우면 실제로는 어려운
   문제이므로. 구간폭 0.75는 경험적 근사치(실제 음성학적 난이도 측정 아님). */
function listeningDifficulty(text) {
  const words = (text || "").replace(/[.,!?;:"']/g, "").trim().split(/\s+/).filter(Boolean);
  const lexIdx = Math.max(0, CEFR_LEVELS.indexOf(sentenceCefrLevel(text)));
  const liaisonCount = liaisonPoints(text).length;
  const score = lexIdx + liaisonCount * 1.2 + Math.max(0, words.length - 8) * 0.3;
  const tier = Math.min(LISTEN_LEVELS.length - 1, Math.max(0, Math.round(score / 0.75)));
  return { tier, label: LISTEN_LEVELS[tier] };
}
/* 듣기 세션 문제 순서 정리(2026-07-20) — pickSession()은 단어 CEFR 밴드로만 고르고 순서는 사실상
   무작위라, 화면에 뜨는 "듣기 난이도"(listeningDifficulty — 어휘와 별개로 연음·문장길이도 반영)가
   A2 다음 C1+ 같은 식으로 들쭉날쭉해 보였다("체계적으로 수정" 요청). 선택 자체(SRS 우선순위·레벨
   범위)는 그대로 두고, 세션에 뽑힌 문항만 난이도 오름차순으로 재정렬 — 쉬운 문장부터 점점
   어려워지는 자연스러운 진행이 되도록.*/
function sortByListenDifficulty(items) {
  return items.map(it => ({ it, tier: listeningDifficulty(it.ex.en).tier }))
    .sort((a, b) => a.tier - b.tier)
    .map(x => x.it);
}

/* ===================== 레벨 테스트 엔진 (4.3) =====================
   UI 비의존 순수 로직. 밴드 표기는 12단계(LISTEN_LEVELS 재사용, 2026-07-13 확정).
   어휘력(Part A)과 문장구사력(Part B)은 끝까지 별도 축 — 합산하지 않는다.

   [다의어 호환 원칙 — 2026-07-14, senses 배치와의 간섭 검토 결론]
   run=달리다(lv1)/운영하다(lv3)/출마하다(lv8)처럼 의미마다 난이도가 다르므로,

   뜻으로 앵커한다. senses가 없으면 flat ko 폴백 — 배치가 42개든 수천 개든 동작 동일.

/* 분포 파라미터 — "대한민국 영어학습자 상위 %"는 실제 전국 표본이 없어 공개 통계 참고
   추정 정규분포를 쓴다(UI에 반드시 "추정치" 라벨). 근거(대략): 국내 대학생 어휘량
   측정 연구(VST 기반)들이 평균 5~6천 워드패밀리, 전체 성인 학습자로 넓히면 하향 —
   평균 4,600/표준편차 2,100로 가정. 구사력은 수능형 프로필(산출<인지)을 반영해
   12밴드 인덱스 기준 평균 3.0(A2+)/표준편차 2.2로 가정. 실사용자 데이터 축적 시 교체. */

/* 표준정규 CDF (Abramowitz-Stegun 근사) */
function normCdf(x) {
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = 0.3989423 * Math.exp(-x * x / 2);
  let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  return x > 0 ? 1 - p : p;
}
/* 상위 % (1~99로 클램프 — 0%/100%는 표본 없는 추정치로서 부정직) */
function ltTopPercent(value, dist) {
  return Math.min(99, Math.max(1, Math.round((1 - normCdf((value - dist.mean) / dist.sd)) * 100)));
}

/* 편집거리(레벤슈타인) — 산출 문항 오타 허용 판정용 */
function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}

/* 가짜 단어(허수 방지) — 실단어와 충돌하지 않는 유사 영단어 형태 */
const LT_FAKES = ["flenidor", "brastle", "morvane", "quastic", "dilturn", "prenity", "stoback", "cravish", "luntish", "vorple", "antrede", "miskun"];

/* 외래어(한국어 뜻이 영단어의 한글 음차일 뿐인 것) 감지 — 레벨테스트에서 제외/우회용.
   예: menu→"메뉴", radio→"라디오"는 한국어 뜻이 곧 영단어 발음이라 문제로서 무의미(사용자 지적).

const HANGUL_LEAD = ["g","kk","n","d","tt","r","m","b","pp","s","ss","","j","jj","ch","k","t","p","h"];

function firstSoundClass(c) { return ({ k: "c", q: "c", f: "p", v: "b", z: "j", x: "s" })[c] || c; }
/* 순우리말인데 음차와 우연히 겹쳐 오검되는 단어(수동 보정) */
const LOAN_FALSE_POS = new Set(["harmful", "bandage"]);
/* 알고리즘이 놓친 명백한 음차(2026-07-20, "elevator" 사례로 발견) — 로마자화 비교는 영어 "철자"와
   실제 발음이 크게 갈리는 단어(묵음/모음 삽입 "elevator→엘리베이터", v→b·f→p 치환 "coffee→커피" 등)

   배경·signal→신호·transitive→타동사의처럼 실제로는 순우리말/한자어 뜻인데 우연히 음절이 겹친 경우)은
   걸러낸 뒤 남은 것만 수동 확정 — isPureLoanword가 알고리즘 판정과 무관하게 항상 음차로 취급한다. */

  "barbecue", "beagle", "bonus", "butter", "capsule", "cassette", "cheese", "cocktail", "concrete",
  "cornet", "cricket", "digital", "documentary", "dollar", "energy", "frying pan", "hip hop",
  "kangaroo", "micrometer", "olympic", "online", "orange", "pancake", "plastic", "program",
  "remote control", "rugby", "skateboard", "sketchbook", "sportsmanship", "sunglasses", "teaspoon",
  "transistor", "trumpet", "yogurt",

/* 뜻 조각 하나가 영단어의 음차인가 */
function isLoanSeg(eng, seg) {

  if (!seg || !/[가-힣]/.test(seg) || /\s/.test(seg)) return false;         // 여러 어절 = 순우리말 구
  if (/하다$|되다$|스럽다$|롭다$|시키다$|거리다$|이다$/.test(seg)) return false; // 용언 파생 = 순우리말
  const r = romanizeHangul(seg), e = (eng || "").toLowerCase().replace(/[^a-z]/g, "");

  if (Math.min(e.length, r.length) / Math.max(e.length, r.length) < 0.6) return false;
  if (lcsLen(e, r) / Math.max(e.length, r.length) < 0.55) return false;

function ltGlossSegs(ko) { return (ko || "").split(/[,;/]/).map(s => s.trim()).filter(Boolean); }

/* 뜻 문자열에서 외래어 음차 조각을 걷어내고 네이티브 뜻만 — 남는 게 없으면 원본 유지 */

/* 다의어 앵커: 뜻을 보여줄 땐 항상 최빈 의미(senses[0]) 기준. 외래어 음차 조각은 제거해 표시(우회). */

/* 대표 품사 — 뜻 4지선다의 오답을 같은 품사로 맞추는 데 사용(품사가 다르면 소거로 너무 쉬움) */

/* 단어 상세(WordSheet)의 품사 태그 표시용 — CEFR-J 원본은 verb/adj/noun/adv 4종 영문 코드 */
const POS_KO = { verb: "동사", adj: "형용사", noun: "명사", adv: "부사" };

/* 밴드별 단어 풀 — 단의어 우선(뜻 제시가 모호하지 않음), 부족하면 다의어(앵커 사용) */

function ltPick(arr, n, usedSet) {
