   GEMINI_DIRECT_KEY가 비어있으면 기존 프록시 경유로 동작(이전과 완전히 동일). */
/* 키를 통짜 문자열로 넣으면 GitHub 시크릿 스캐너가 push를 차단하므로 분할 저장(런타임에 합침).
   이 키는 의도적으로 공개하는 결제 미연결 무료 키 — 위 주석 참고. */
const GEMINI_DIRECT_KEY = ""; // 2026-07-17: 내장 키가 AQ. 계정 버그로 401 고정 — Vercel 프록시(서울 리전 고정, 위치 문제 해결됨)로 완전 전환. 아래 두 줄은 그 시절 기록.
function getGeminiKey() { return GEMINI_DIRECT_KEY.trim(); }

/* Vercel 프록시(리전 서울 고정) — Cloudflare Worker는 실행 위치를 고정할 수 없어 Google 무료
   티어의 위치 검사에 걸리는 문제가 있어(api/gemini.js 상단 주석 참고), Gemini 텍스트·STT 호출만
   Vercel 서버리스 함수(/api/gemini, /api/stt)로 이전. 여기에 Vercel 배포 URL을 채우면 활성화되고,
   비어있으면 기존 Cloudflare 프록시(PROXY_BASE) 경유. TTS는 계속 Cloudflare가 담당(위치 문제 없음). */
const GEMINI_PROXY_BASE = "https://no-english.vercel.app";
function geminiEndpoint(kind) {
  return GEMINI_PROXY_BASE ? GEMINI_PROXY_BASE + "/api/" + kind : PROXY_BASE + "/" + kind;
}

/* Worker의 MODEL_FALLBACKS와 같은 원리의 후보 체인 — 404/429/위치거부(400 FAILED_PRECONDITION)면
   다음 모델로 자동 전환. 무료 티어는 현세대 Flash 계열만(Pro는 2026-04부터 유료 전용)이라
   3.5/3 Flash가 맨 앞. Gemma는 오디오 입력 미지원이라 STT 후보에서는 제외. */
const GEMINI_TEXT_MODELS = ["gemini-3.5-flash", "gemini-3-flash", "gemini-3-flash-preview", "gemma-4-26b-a4b-it", "gemini-3-pro-preview", "gemini-2.5-flash-lite", "gemini-2.0-flash"];
const GEMINI_AUDIO_MODELS = ["gemini-3.5-flash", "gemini-3-flash", "gemini-3-flash-preview", "gemini-3-pro-preview", "gemini-2.5-flash-lite", "gemini-2.0-flash"];
async function geminiDirect(contents, generationConfig, models) {
  const key = getGeminiKey();
  const attempts = [];
  let lastDetail = "";
  for (const model of models) {
    /* 키는 ?key= 쿼리가 아니라 x-goog-api-key 헤더로 — 신형 "AQ." 키는 쿼리 방식이면 401로 거부됨 */
    const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-goog-api-key": key },
      body: JSON.stringify({ contents, generationConfig }),
    });
    if (r.ok) {
      const data = await r.json();
      const text = (data.candidates && data.candidates[0] && data.candidates[0].content &&
        (data.candidates[0].content.parts || []).map(p => p.text || "").join("")) || "";
      return text.trim();
    }
    attempts.push(model + "→" + r.status);
    lastDetail = await r.text().catch(() => "");
    const locationBlocked = r.status === 400 && lastDetail.includes("FAILED_PRECONDITION");
    if (r.status !== 404 && r.status !== 429 && !locationBlocked) break;
  }
  throw new Error("gemini error [" + attempts.join(", ") + "] last: " + lastDetail.slice(0, 250));
}
/* 텍스트 프롬프트 공용 진입점 — 키가 있으면 기기에서 직접, 없으면 프록시 경유
   (Vercel 배포 URL이 설정돼 있으면 Vercel, 아니면 Cloudflare). 반환은 항상 응답 텍스트, 실패는 throw. */
async function geminiText(prompt) {
  if (getGeminiKey()) {
    return await geminiDirect([{ parts: [{ text: prompt }] }], { temperature: 0.4, maxOutputTokens: 1024 }, GEMINI_TEXT_MODELS);
  }
  const r = await fetch(geminiEndpoint("gemini"), { method: "POST", headers: proxyHeaders(), body: JSON.stringify({ prompt }) });
  const data = await r.json().catch(() => null);
  if (!r.ok || !data || !data.text) throw new Error((data && data.error) || ("http " + r.status));
  return (data.text || "").trim();
}

function speakTextWebSpeech(text, lang, rate) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = rate;
    const voices = speechSynthesis.getVoices();
    const voice = voices.find(v => v.lang === lang) || voices.find(v => v.lang && v.lang.startsWith("en"));
    if (voice) u.voice = voice;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch (e) {}
}

/* 앱 전체 공용 TTS — 저장된 속도·악센트 설정을 실제 발화에 반영.
   rateOverride: 카드의 "느리게 듣기"처럼 그 순간만 설정과 무관하게 속도를 강제할 때.
   PROXY_BASE가 설정돼 있으면 Google TTS 프록시를 우선 시도(자연스러운 음성) —
   같은 세션에서 반복 재생하는 문장은 TTS_CACHE(메모리, blob URL)로 재호출 없이 재생.
   실패·타임아웃·미설정 시 항상 브라우저 음성으로 폴백(예외가 사용자에게 보이지 않음). */
const TTS_CACHE = new Map();
let _activeAudio = null; // 프록시 TTS로 재생 중인 Audio — 연타 시 이전 것부터 끊어야 에코가 안 남
let _speakGen = 0; // 요청 세대 토큰 — fetch가 늦게 끝난 이전 호출이 나중에 재생을 가로채는(비동기 역전) 것을 방지

/* 모바일(특히 iOS Safari)은 오디오 자동재생을 "사용자 제스처와 직접 이어진" 호출에만 허용.
   듣기 세션은 3·2·1 카운트다운(setTimeout) 뒤에 문장을 재생하므로 제스처와 끊겨 무음으로
   실패하고, "다시 듣기" 버튼(직접 클릭 → 즉시 재생)만 소리가 나는 문제가 있었음.
   오디오·음성합성 엘리먼트를 한 번 재생해 "언락"해두면 같은 엘리먼트를 재사용하는 이후의
   타이머 기반 재생도 계속 허용됨(표준 모바일 언락 패턴).
   2026-07-16: 이 언락을 "앱 전체 첫 터치(document 전역 pointerdown)"에서 실행했더니, iOS에서
   무음이라도 <audio> 재생·음성합성 호출 자체가 백그라운드에서 재생 중이던 다른 앱(음악 등)의
   오디오 세션을 가로채 정지시키는 부작용이 있었음(홈 화면에서 아무 곳이나 눌러도 발생) —
   실제로 지연 재생이 필요한 진입점(듣기 세션 시작, 회화 대화방 입장)에서만 명시적으로 호출하도록 축소. */
const _sharedAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
function unlockAudio() {
  // 회화 대화방 입장 직후 "음성이 나오려다 끊김"의 원인이었던 레이스 컨디션 수정(2026-07-18):
  // unlockAudio가 무음 클립을 play()한 뒤 .then()에서 pause()하는데, 이 .then()이 비동기라
  // speakText가 그 사이 같은 _sharedAudio의 src를 실제 TTS로 갈아끼우고 재생을 시작해버리면,
  // 뒤늦게 도착한 이 pause()가 "방금 시작된 진짜 음성"을 멈춰버렸음(TTS fetch가 빠를 때만
  // 재현돼서 "나올 때도 있음"으로 보였던 것). src가 그대로(=아직 아무도 안 갈아탔을 때)일 때만
  // pause — 이미 다른 소스로 바뀌었으면 그건 손대지 않는다.
  try {
    const unlockSrc = _sharedAudio.src;
    _sharedAudio.play().then(() => { if (_sharedAudio.src === unlockSrc) _sharedAudio.pause(); }).catch(() => {});
  } catch (e) {}
  try { speechSynthesis.speak(new SpeechSynthesisUtterance("")); } catch (e) {}
}
function stopSpeaking() {
  _speakGen++; // 진행 중인 speakText 호출이 있다면 자기 세대가 낡았음을 감지하고 재생을 포기하게 함
  try { speechSynthesis.cancel(); } catch (e) {}
  if (_activeAudio) { try { _activeAudio.pause(); } catch (e) {} _activeAudio = null; }
}
async function speakText(text, rateOverride, accentOverride) {
  const prefs = PREFS.get();
  const accent = ACCENT_PRESETS[accentOverride] || ACCENT_PRESETS[prefs.accent];
  const rate = rateOverride || SPEED_PRESETS[prefs.speed].rate;
  const myGen = ++_speakGen; // 이 호출 이후 speakText/stopSpeaking이 또 불리면 myGen은 낡은 세대가 됨
  // 새로 말하기 전에 이전 재생(프록시 Audio·Web Speech 둘 다) 정지 — 연타 에코 방지
  try { speechSynthesis.cancel(); } catch (e) {}
  if (_activeAudio) { try { _activeAudio.pause(); } catch (e) {} _activeAudio = null; }
  if (PROXY_BASE) {
    const cacheKey = accent.lang + "|" + rate + "|" + text;
    try {
      let url = TTS_CACHE.get(cacheKey);
      if (!url) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 5000);
        const r = await fetch(geminiEndpoint("tts"), {
          method: "POST",
          headers: proxyHeaders(),
          body: JSON.stringify({ text, lang: accent.lang, rate }),
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        if (!r.ok) throw new Error("tts proxy failed");
        const blob = await r.blob();
        url = URL.createObjectURL(blob);
        TTS_CACHE.set(cacheKey, url);
      }
      // fetch(캐시 없을 때)나 blob 변환 사이 더 최근 호출이 있었으면(myGen이 낡음) 재생하지 않고 조용히 포기
      if (myGen !== _speakGen) return;
      _sharedAudio.src = url; // 언락된 하나의 엘리먼트를 재사용 — 새 Audio()는 모바일에서 다시 잠겨있음
      _activeAudio = _sharedAudio;
      await _sharedAudio.play();
      return;
    } catch (e) { /* 폴백으로 진행 */ }
  }
  if (myGen !== _speakGen) return;
  speakTextWebSpeech(text, accent.lang, rate);
}

/* 굴절형 → 표제어 역추적: children→child, others→other, running→run 등.
   사전 표제어는 원형만 있어서 문장 속 활용형이 상세 연결에 실패하던 문제 대응.
   불규칙 변화는 소규모 큐레이션 맵, 나머지는 접미사 규칙 — 후보가 실제 사전에
   있을 때만 채택하므로 오탐(sing→s 같은)은 발생하지 않는다. */
const DICT_IRREGULAR = {
  children: "child", men: "man", women: "woman", people: "person", feet: "foot", teeth: "tooth",
  mice: "mouse", geese: "goose", oxen: "ox", phenomena: "phenomenon",
  went: "go", gone: "go", did: "do", done: "do", had: "have",
  has: "have", was: "be", were: "be", is: "be", are: "be", am: "be", been: "be",
  better: "good", best: "good", worse: "bad", worst: "bad", made: "make", said: "say",
  took: "take", taken: "take", got: "get", came: "come", saw: "see", seen: "see", ran: "run",
  knew: "know", known: "know", thought: "think", bought: "buy", brought: "bring", felt: "feel",
  found: "find", gave: "give", given: "give", left: "leave", met: "meet", paid: "pay",
  sat: "sit", spoke: "speak", spoken: "speak", stood: "stand", told: "tell",
  understood: "understand", wrote: "write", written: "write", heard: "hear", held: "hold",
  kept: "keep", lost: "lose", meant: "mean", sent: "send", spent: "spend", won: "win",
};
function dictLookup(raw) {
  const w = (raw || "").toLowerCase().replace(/[^a-z']/g, "");
  if (!w) return null;
  if (wordOfFlat(w)) return wordOfFlat(w); // 표기 접기 포함 — "carry-on"도 표제어 "carry on"으로(2026-07-19)
  if (DICT_IRREGULAR[w] && wordOf(DICT_IRREGULAR[w])) return wordOf(DICT_IRREGULAR[w]);
  const cands = [];
  if (w.endsWith("ies")) cands.push(w.slice(0, -3) + "y");
  if (w.endsWith("es")) cands.push(w.slice(0, -2));
  if (w.endsWith("s") && !w.endsWith("ss")) cands.push(w.slice(0, -1));
  if (w.endsWith("ves")) cands.push(w.slice(0, -3) + "f", w.slice(0, -3) + "fe"); // knives→knife, wolves→wolf
  if (w.endsWith("ses")) cands.push(w.slice(0, -2) + "is"); // crises→crisis, analyses→analysis
  if (w.endsWith("ing")) {
    cands.push(w.slice(0, -3), w.slice(0, -3) + "e");
    if (w.length > 5 && w[w.length - 4] === w[w.length - 5]) cands.push(w.slice(0, -4)); // running→run
  }
  if (w.endsWith("ied")) cands.push(w.slice(0, -3) + "y");
  if (w.endsWith("ed")) {
    cands.push(w.slice(0, -2), w.slice(0, -1));
    if (w.length > 4 && w[w.length - 3] === w[w.length - 4]) cands.push(w.slice(0, -3)); // stopped→stop
  }
  if (w.endsWith("est")) cands.push(w.slice(0, -3), w.slice(0, -2));
  if (w.endsWith("er")) cands.push(w.slice(0, -2), w.slice(0, -1));
  if (w.endsWith("ly")) cands.push(w.slice(0, -2));
  for (const c of cands) { if (c.length >= 2 && wordOf(c)) return wordOf(c); }
  return null;
}

/* 정답 효과음 — 에셋 없이 Web Audio 사인톤. word=짧은 블립(단어 하나 고정될 때),
   done=띠링 2음(문장 전체 정답). 오디오 컨텍스트는 첫 사용자 입력 후 생성되므로 자동재생 제약 없음. */
let dingCtx = null;
function playDing(kind) {
  try {
    dingCtx = dingCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = dingCtx;
    if (ctx.state === "suspended") ctx.resume();
    const t0 = ctx.currentTime;
    const notes = kind === "done" ? [[880, 0, 0.1], [1318.5, 0.09, 0.28]] : [[1174.7, 0, 0.09]];
    notes.forEach(([f, dt, dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0 + dt);
      g.gain.exponentialRampToValueAtTime(kind === "done" ? 0.16 : 0.1, t0 + dt + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t0 + dt); o.stop(t0 + dt + dur + 0.03);
    });
  } catch (e) {}
}

      "fighting": { box: 1, due: t + 2 * DAY, seen: true },
      "formerly": { box: 1, due: t + 4 * DAY, seen: true },
      "genius": { box: 1, due: t, seen: true },
      "grip": { box: 1, due: t - 1 * DAY, seen: true },
      "hint": { box: 1, due: t + 2 * DAY, seen: true },
      "identical": { box: 1, due: t + 4 * DAY, seen: true },
      "inanimate": { box: 1, due: t + 4 * DAY, seen: true },
      "chill": { box: 1, due: t + 3 * DAY, seen: true },
      "confinement": { box: 1, due: t + 5 * DAY, seen: true },
      "darkroom": { box: 1, due: t + 3 * DAY, seen: true },
      "dissection": { box: 1, due: t + 2 * DAY, seen: true },
      "enviable": { box: 1, due: t + 5 * DAY, seen: true },
    };
    // 위 항목들은 순전히 "홈 화면이 비어 보이지 않게" 하려는 표시용 더미(스트릭·뱃지·CEFR
    // 배지 등은 여기 box 값을 근거로 계산됨) — 실제로 학습한 적 없는 단어라 진짜 복습
    // 큐(pickSession)에 섞이면 안 됨. demo 플래그로 표시해 isDue에서 걸러낸다
    // (2026-07-16 수정 — 이 플래그가 없어서 가짜 복습 18개가 실제 학습 세션을 계속
    // 차지하는 바람에 "맨날 같은 단어만 나온다" 버그가 있었음).
    // 학습 날짜(at)를 최근 ~90일에 6개씩 클러스터로 흩뿌린다 — "내가 학습한 단어 > 날짜별" 뷰가
    // 며칠에 걸쳐 여러 단어를 학습한 것처럼 자연스럽게 보이도록(2026-07-17).
    const allKeys = Object.keys(store);
    allKeys.forEach((k, i) => { store[k].at = t - (3 + Math.floor(i / 6) * 7 + (i % 3)) * DAY; });
    // 이 중 8개는 "지금 복습 대기"로 남긴다(due를 과거로, demo 미표시) — 대시보드 "지금 복습할
    // 카드"가 0으로 비지 않고 홈의 "복습 8"과 맞도록. 나머지는 전부 demo로 표시.
    const reviewKeys = ["knock#0", "loose#0", "composition", "council", "cycle", "curse#0", "director#0", "effort#0"];
    allKeys.forEach(k => { if (reviewKeys.includes(k)) { store[k].due = t - DAY; store[k].at = t - 5 * DAY; } else { store[k].demo = true; } });
  }
  const save = () => { try { localStorage.setItem("en_srs", JSON.stringify(store)); } catch (e) {} };
  return {
    get: k => store[k],
    status(k) {
      const s = store[k]; if (!s) return null;
      return { status: s.box >= 6 ? "done" : "learning", box: s.box, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) };
    },
    isDue: k => { const s = store[k]; return s && s.seen && !s.demo && s.due <= Date.now(); },
    grade(k, ok) {
      const s = store[k] || { box: 0, seen: false };
      s.box = ok ? Math.min(MAX_BOX, s.box + 1) : 1;
      s.seen = true;
      s.due = Date.now() + BOX_INTERVALS[s.box] * DAY;
      s.at = Date.now(); // 마지막 학습 시각 — "내가 학습한 단어 > 날짜별" 그룹핑에 사용
      delete s.demo; // 실제로 학습(채점)됐으니 더 이상 더미가 아님 — 이제부터 진짜 복습 큐에 들어감
      store[k] = s; save();
      if (ok) POINTS.add(10); // 꾸준한 학습으로만 쌓이는 포인트 — 캐릭터 변경 잠금 해제에 사용
      return s;
    },
    // 다의어 상세의 "+ 이 의미를 학습에 추가" — 이미 학습 중이면 그대로 두고(진행 유지),
    // 처음이면 즉시 복습 대상(due=지금)으로 등록해 바로 다음 세션에 나오게 함.
    markForStudy(k) {
      if (store[k]) return false;
      store[k] = { box: 0, seen: true, due: Date.now() };
      save();
      return true;
    },
  };
})();

/* ===================== 포인트 엔진 =====================
   캐릭터는 처음 1회는 무료로 선택하고, 이후 변경하려면 학습으로 쌓은 포인트가 필요(소모형).
   포인트는 카드 정답 시에만 적립 — "일정 학습량 유지"를 계량하는 유일한 지표. */
const CHAR_CHANGE_COST = 300;
const POINTS = (() => {
  let n = 0;
  try { n = parseInt(localStorage.getItem("en_points") || "0", 10) || 0; } catch (e) {}
  const save = () => { try { localStorage.setItem("en_points", String(n)); } catch (e) {} };
  return {
    get: () => n,
    add(v) { n += v; save(); },
    spend(v) { if (n < v) return false; n -= v; save(); return true; },
  };
})();

/* 활동 로그 — 뱃지·스트릭·홈 루틴·잔디를 하드코딩 더미가 아니라 실제 사용 기록에서 계산하기 위한
   로컬 저장소(2026-07-19 신설, 구 BADGE_PROGRESS/STREAK 더미 대체). 날짜별 학습량(단어카드 개수·
   듣기 문장/세션·회화 세션) + 열람한 어원(affix) 집합. 기기 간 동기화는 백엔드(P1, PLAN 6.6) 몫 —
   지금은 localStorage. 세션 완료·어원 열람 지점에서 아래 add* 를 호출해 누적한다. */
const ACT = (() => {
  const KEY = "en_activity_v1";
  let store;
  try { store = JSON.parse(localStorage.getItem(KEY) || "null"); } catch (e) {}
  if (!store || typeof store !== "object") store = {};
  if (!store.days || typeof store.days !== "object") store.days = {};
  if (!Array.isArray(store.roots)) store.roots = [];
  const save = () => { try { localStorage.setItem(KEY, JSON.stringify(store)); } catch (e) {} };
  const keyOf = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  const todayKey = () => keyOf(new Date());
  const day = (k) => (store.days[k] = store.days[k] || { c: 0, li: 0, ls: 0, t: 0 });
  const active = (d) => !!d && ((d.c || 0) + (d.li || 0) + (d.t || 0)) > 0;
  const hasDay = (k) => active(store.days[k]);
  return {
    todayKey, keyOf,
    today() { return { ...day(todayKey()) }; },
    addCards(n) { day(todayKey()).c += (n || 0); save(); },
    addListen(items) { const d = day(todayKey()); d.li += (items || 0); d.ls += 1; save(); },
    addTalk() { day(todayKey()).t += 1; save(); },
    addRoot(affix) { if (affix && !store.roots.includes(affix)) { store.roots.push(affix); save(); } },
    rootsCount() { return store.roots.length; },
    listenSessions() { return Object.values(store.days).reduce((s, d) => s + (d.ls || 0), 0); },
    talkSessions() { return Object.values(store.days).reduce((s, d) => s + (d.t || 0), 0); },
    hasDay,
    studiedDates() { return Object.keys(store.days).filter(hasDay); },
    /* 오늘(오늘 아직 학습 전이면 어제)부터 거꾸로 연속으로 활동 있는 날 수 = 연속 학습일. */
    streak() {
      const d = new Date();
      if (!hasDay(keyOf(d))) d.setDate(d.getDate() - 1);
      let n = 0;
      while (hasDay(keyOf(d))) { n++; d.setDate(d.getDate() - 1); }
      return n;
    },
  };
})();

/* 단어의 표시 상태: 의미 중 하나라도 학습 중이면 learning, 전부 done이면 done */
function wordStatus(w) {
  const keys = (w.senses && w.senses.length) ? w.senses.map((_, i) => w.word + "#" + i) : [w.word];
  const sts = keys.map(k => SRS.status(k)).filter(Boolean);
  if (!sts.length) return null;
  if (sts.every(s => s.status === "done")) return { status: "done" };
  return sts.find(s => s.status === "learning") || sts[0];
}

/* 학습 아이템(카드 단위) = 의미별 1개. 예문 하나를 문맥으로 사용.
   syn: 그 의미(sense) 하나에 한정된 문맥 치환어 — 없는(백필 전) sense는 표제어 전체
   유의어(w.syn)로 폴백(부정확할 수 있음, 데이터 채워지면 자동으로 정밀해짐). */
function itemsFromWords(list) {
  const items = [];
  list.forEach(w => {
    if (w.senses && w.senses.length) {
      w.senses.forEach((s, i) => { if ((s.ex || []).length) items.push({ key: w.word + "#" + i, word: w.word, ko: s.ko, cue: s.cue, ex: s.ex[0], cefr: s.cefr || w.cefr, syn: s.syn && s.syn.length ? s.syn : (w.syn || []) }); });
    } else if ((w.ex || []).length) {
      items.push({ key: w.word, word: w.word, ko: w.ko, cue: null, ex: w.ex[0], cefr: w.cefr, syn: w.syn || [] });
    }
  });
  return items;
}
/* SEED(수천 단어)를 매번 itemsFromWords로 다시 순회·객체화하는 비용이 실측 약 90ms+(데스크톱 기준,
   저사양 모바일에선 더 큼) — "단어카드 시작" 탭 핸들러 안에서 pickSession()이 이걸 동기로 돌리다 보니
   포커스(키보드 팝업)까지의 시간이 늘어져 "키보드가 바로 안 올라옴" 원인이 됐음(2026-07-18). SEED는
   런타임에 안 바뀌므로 그 부분만 한 번 캐시하고, 사용자가 추가한 EXTRA(적은 수)만 매번 재계산해 합침. */
let _seedItemsCache = null;
function allItems() {
  if (!_seedItemsCache) _seedItemsCache = itemsFromWords(SEED);
  return _seedItemsCache.concat(itemsFromWords(Object.values(EXTRA)));
}

const IRREG_REV = {};
for (const _b in IRREG) for (const _f of IRREG[_b]) { (IRREG_REV[_f] = IRREG_REV[_f] || []).push(_b); }
const POSS = new Set(["my","your","his","her","its","our","their","ones","oneself","myself","yourself","himself","herself","itself","ourselves","themselves"]);
// token을 규칙 역굴절해 나올 수 있는 원형 후보들
function lemmasOf(t) {
  const s = new Set([t]); const add = x => { if (x && x.length >= 2) s.add(x); };
  if (t.endsWith("ies")) { add(t.slice(0, -3) + "y"); add(t.slice(0, -2)); }
  if (t.endsWith("ied")) add(t.slice(0, -3) + "y");
  if (t.endsWith("ier")) add(t.slice(0, -3) + "y");
  if (t.endsWith("iest")) add(t.slice(0, -4) + "y");
  if (t.endsWith("es")) { add(t.slice(0, -2)); add(t.slice(0, -1)); }
  if (t.endsWith("s") && !t.endsWith("ss")) add(t.slice(0, -1));
  if (t.endsWith("ed")) { add(t.slice(0, -2)); add(t.slice(0, -1)); const b = t.slice(0, -2); if (b.length >= 2 && b[b.length - 1] === b[b.length - 2]) add(b.slice(0, -1)); }
  if (t.endsWith("ing")) { add(t.slice(0, -3)); add(t.slice(0, -3) + "e"); const b = t.slice(0, -3); if (b.length >= 2 && b[b.length - 1] === b[b.length - 2]) add(b.slice(0, -1)); }
  if (t.endsWith("er")) { add(t.slice(0, -2)); add(t.slice(0, -1)); const b = t.slice(0, -2); if (b.length >= 2 && b[b.length - 1] === b[b.length - 2]) add(b.slice(0, -1)); }
  if (t.endsWith("est")) { add(t.slice(0, -3)); add(t.slice(0, -2)); const b = t.slice(0, -3); if (b.length >= 2 && b[b.length - 1] === b[b.length - 2]) add(b.slice(0, -1)); }
  (IRREG_REV[t] || []).forEach(add);

}
// token이 base(원형)의 굴절형인가 — 규칙/불규칙/파생접두 어간까지 포괄
function formsMatch(token, base) {
  if (!token || !base) return false;
  if ((base === "ones" || base === "oneself" || base === "one's") && POSS.has(token)) return true;
  if (token === base) return true;
  if (lemmasOf(token).has(base)) return true;
  if ((IRREG[base] || []).includes(token)) return true;
  const b = base, cand = new Set([b + "s", b + "es", b + "ed", b + "ing", b + "er", b + "est", b + "d", b + "r", b + "st"]);
  if (/[^aeiou]y$/.test(b)) { const st = b.slice(0, -1); [st + "ies", st + "ied", st + "ier", st + "iest"].forEach(x => cand.add(x)); }
  if (b.endsWith("e")) { const st = b.slice(0, -1); [st + "ing", st + "ed", st + "es"].forEach(x => cand.add(x)); }
  const last = b[b.length - 1], p = b[b.length - 2];
  if (b.length >= 3 && !"aeiou".includes(last) && "aeiou".includes(p)) { [b + last + "ed", b + last + "ing", b + last + "er", b + last + "est"].forEach(x => cand.add(x)); }
  if (cand.has(token)) return true;
  const stem = base.replace(/e$/, ""); // 예전 어간 접두 휴리스틱 유지(파생 create→creation 등도 포함, 기존 매칭 보존)
  return stem.length >= 3 && token.startsWith(stem);
}

/* 영어 예문에서 타깃 단어를 빈칸으로. 굴절형(saved/delivers/applied/arose/leaves)까지 매칭. 실패 시 null.
   구동사(give up, back up 등)는 첫 단어를 굴절 매칭하고 나머지는 연속 우선, 안 되면 목적어가 껴 있는
   분리형("backed me up")도 최대 2단어 간격까지 허용해 그 구간 전체를 빈칸으로. 하이픈 합성어
   (well-known 등)는 그 조각만 빈칸. */
function makeBlank(en, word) {
  const parts = en.split(/(\s+)/); // 짝수 인덱스=단어, 홀수=공백(원문 보존)
  const clean = t => t.replace(/[^A-Za-z']/g, "").toLowerCase();
  const targets = word.toLowerCase().split(/\s+/).map(w => w.replace(/[^A-Za-z']/g, ""));
  const wordIdx = []; for (let i = 0; i < parts.length; i += 2) wordIdx.push(i);
  for (let wi = 0; wi < wordIdx.length; wi++) {
    const i = wordIdx[wi];
    if (!formsMatch(clean(parts[i]), targets[0])) continue;
    if (targets.length === 1) {
      return { before: parts.slice(0, i).join(""), answer: clean(parts[i]), after: parts.slice(i + 1).join("") };
    }
    // 다단어: 연속 매칭 우선
    let ok = true, endIdx = i;
    for (let k = 1; k < targets.length; k++) { const pi = i + k * 2; if (pi >= parts.length || !formsMatch(clean(parts[pi]), targets[k])) { ok = false; break; } endIdx = pi; }
    if (ok) { const ans = []; for (let k = 0; k < targets.length; k++) ans.push(clean(parts[i + k * 2])); return { before: parts.slice(0, i).join(""), answer: ans.join(" "), after: parts.slice(endIdx + 1).join("") }; }
    // 분리형 구동사: head 뒤에서 남은 target을 순서대로(사이 최대 2단어) 탐색, 구간 전체를 빈칸으로
    let pos = wi, positions = [i], good = true;
    for (let k = 1; k < targets.length; k++) {
      let found = -1;
      for (let j = pos + 1; j < wordIdx.length && j <= pos + 3; j++) { if (formsMatch(clean(parts[wordIdx[j]]), targets[k])) { found = j; break; } }
      if (found < 0) { good = false; break; }
      positions.push(wordIdx[found]); pos = found;
    }
    if (good) {
      const start = positions[0], end = positions[positions.length - 1], spanWords = [];
      for (let p = start; p <= end; p += 2) spanWords.push(clean(parts[p]));
      return { before: parts.slice(0, start).join(""), answer: spanWords.join(" "), after: parts.slice(end + 1).join("") };
    }
  }
  // 폴백: 하이픈 합성어(well-known, three-course 등) 안에 타깃이 한 조각으로 들어있으면 그 조각만 빈칸
  if (targets.length === 1) {
    for (let wi = 0; wi < wordIdx.length; wi++) {
      const i = wordIdx[wi], tok = parts[i];
      if (tok.indexOf("-") < 0) continue;
      const m = tok.match(/^([^A-Za-z]*)(.*?)([^A-Za-z]*)$/), lead = m[1], core = m[2], trail = m[3], segs = core.split("-");
      for (let si = 0; si < segs.length; si++) {
        if (!formsMatch(clean(segs[si]), targets[0])) continue;
        const pre = segs.slice(0, si).join("-"), suf = segs.slice(si + 1).join("-");
        return { before: parts.slice(0, i).join("") + lead + (pre ? pre + "-" : ""), answer: clean(segs[si]), after: (suf ? "-" + suf : "") + trail + parts.slice(i + 1).join("") };
      }
    }
  }
  return null;
}
// 단어카드는 무조건 예문 안 빈칸(cloze)만 — 예문에 타깃 단어가 없어 빈칸을 못 만드는
// 항목(예전 spell 폴백)은 세션 풀에서 제외한다(2026-07-17).
// makeBlank가 정규식 기반이라 항목 하나당은 가벼워도, freshPool()이 매번 SEED 전체(약 1만 항목)를
// 이걸로 훑다 보니 합산 70ms+가 걸려 pickSession() 전체를 블로킹 — "단어카드 시작" 탭 직후 입력창
// focus()가 늦어지는 원인 중 하나였음(2026-07-18). it.ex.en·it.word가 안 바뀌는 한 결과도 안 바뀌는
// 순수 함수라 객체 identity 기준(WeakMap)으로 캐시해도 무효화 걱정이 없음.
const _canBlankCache = new WeakMap();
function canBlank(it) {
  if (!it) return false;
  if (_canBlankCache.has(it)) return _canBlankCache.get(it);
  const r = !!(it.ex && it.ex.en && makeBlank(it.ex.en, it.word));
  _canBlankCache.set(it, r);
  return r;
}

/* 사용자 레벨(레벨테스트 band12, 1~12 반스텝) → CEFR 6단계 인덱스(0=A1 … 5=C2) */
function userCefrIdx() {
  const lt = loadLevelTest();
  const b12 = (lt && lt.lex && lt.lex.band12) || 5;
  return Math.max(0, Math.min(5, Math.ceil(b12 / 2) - 1));
}
/* 신규 학습 후보: 전체 표제어가 아니라 "내 레벨 ±1 CEFR 범위"만.
   예전엔 SEED 순서(알파벳순) 그대로 앞에서 잘라 써서 항상 a로 시작하는 같은 단어만
   반복되고, "신규 1만 개 대기" 같은 비현실적 카운트가 표시됐음(2026-07-17 수정).
   levelShift: 기준 레벨을 CEFR 단계로 이동(듣기 속도 프리셋 보정용). */
function freshPool(levelShift = 0) {
  const lv = Math.max(0, Math.min(5, userCefrIdx() + levelShift));
  return allItems().filter(it => {
    if (SRS.get(it.key)) return false;
    if (!canBlank(it)) return false; // 빈칸 못 만드는 항목 제외 — 단어카드는 예문 빈칸만
    const ci = CEFR_LEVELS.indexOf(it.cefr);
    return ci >= 0 && Math.abs(ci - lv) <= 1;
  });
}
/* 듣기 세션 레벨 보정 — 속도 프리셋 기본값(일상회화)을 기준으로, 원어민대화는 +2(반스텝,
   band12 기준 = CEFR +1단계), 영어선생님은 -2. 카드 학습에는 적용하지 않음. */
function listenLevelShift() {
  return { teacher: -1, casual: 0, native: 1 }[PREFS.get().speed] || 0;
}
/* 최근 세션들에 낸 항목 키 — 단어카드와 듣기가 연달아 같은 단어를 내지 않게(교차 모드 중복
   방지). 카드·듣기 둘 다 정답 시 SRS를 갱신하므로, 한 모드에서 낸 due는 다음 모드에서 빼도
   복습이 누락되지 않는다. 인메모리라 새로고침하면 초기화(리뷰를 영구히 굶기지 않도록). */
let RECENT_KEYS = [];
const RECENT_CAP = 40;
/* 오늘 세션 아이템 선정: 복습 예정(due) 우선 → 신규(내 레벨 범위에서 무작위) 순, 최대 n개.
   최근에 낸 항목은 뒤로 미뤄 세션끼리 안 겹치게 한다(부족하면 그때만 최근 것으로 채움). */
function pickSession(n = 10, levelShift = 0) {
  const recent = new Set(RECENT_KEYS);
  const due = allItems().filter(it => SRS.isDue(it.key) && canBlank(it));
  const fresh = freshPool(levelShift);
  for (let i = fresh.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fresh[i], fresh[j]] = [fresh[j], fresh[i]];
  }
  const pool = due.concat(fresh);
  const picked = pool.filter(it => !recent.has(it.key)).concat(pool.filter(it => recent.has(it.key))).slice(0, n);
  RECENT_KEYS = RECENT_KEYS.concat(picked.map(it => it.key)).slice(-RECENT_CAP);
  return picked;
}

/* 퀴즈 문제 구성: 이미 학습(SRS 기록 있음)한 단어 중에서만 출제 — 카드로 한 번도
   안 본 단어가 나오면 실질적으로 풀 수 없는 문제라 대상에서 제외. 뜻 4지선다와
   스펠링을 절반씩 섞음. 학습한 단어가 4개 미만이면 문제 구성 불가(null). */
function buildQuiz(n = 10) {
  const studied = allItems().filter(it => SRS.get(it.key));
  if (studied.length < 4) return null;
  const shuffled = [...studied].sort(() => Math.random() - 0.5).slice(0, n);
  const distractorPool = allItems();
  return shuffled.map((it, i) => {
    if (i % 2 === 1) return { type: "spell", it };
    const pool = [...distractorPool].sort(() => Math.random() - 0.5);
    const distractors = [];
    for (const p of pool) {
      if (distractors.length >= 3) break;
      if (p.key === it.key || p.ko === it.ko) continue;
      if (distractors.some(d => d.ko === p.ko)) continue;
      distractors.push(p);
    }
    const choices = [it.ko, ...distractors.map(d => d.ko)];
    for (let a = choices.length - 1; a > 0; a--) { const b = Math.floor(Math.random() * (a + 1));[choices[a], choices[b]] = [choices[b], choices[a]]; }
    return { type: "choice", it, choices };
  });
}

/* **강조** 마크업을 <b>로 렌더 (WHATS_NEW 등 안내 문구 공용 규칙).
   tier를 주면 <b>에 hl-{tier} 클래스가 붙어 강조색이 하이어라키에 따라 달라짐(기본은 노랑 그대로). */
function renderBold(text, tier) {
  const parts = (text || "").split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => p.startsWith("**") && p.endsWith("**")
    ? <b key={i} className={tier ? "hl-" + tier : undefined}>{p.slice(2, -2)}</b>
    : <React.Fragment key={i}>{p}</React.Fragment>);
}

/* 연음(리에종) 지점 — 그 문장 안에서 실제로 자음으로 끝나는 단어 바로 뒤에 모음으로
   시작하는 단어가 오는 자리를 전부 찾는다(예: "with us"·"turn it"). 문장마다 다른,
   그 문장의 실제 연음 지점 — 해설 표시(2개 캡)와 듣기 난이도 계산(전체 개수) 둘 다 사용. */
/* 묵음 e 처리 — "cycle"·"include"·"large"처럼 자음+e로 끝나는 단어는 철자상 끝글자가 모음(e)이라
   예전엔 "모음+모음 글라이드"로 잘못 분류됐음(예: "cycle includes"가 실제로는 L+I 리에종인데
   "y/w 글라이드"로 안내됨 — 2026-07-18, 스크린샷으로 오류 확인). 짧은 예외(진짜 모음음으로 끝나는
   be/he/the류)만 빼고, 나머지 자음+e는 그 앞 자음을 실제 끝소리로 취급. */
const VOWEL_E_WORDS = new Set(["be", "he", "she", "we", "me", "the", "see", "free", "three", "tree", "knee", "agree", "coffee", "degree", "guarantee", "movie", "cookie"]);
function endingSound(word) {
  const w = (word || "").toLowerCase().replace(/[^a-z]/g, "");
  if (w.length > 1 && w.endsWith("e") && !VOWEL_E_WORDS.has(w)) {
    const before = w[w.length - 2];
    if ("bcdfghjklmnpqrstvwxyz".includes(before)) return before;
  }
  return w.slice(-1);
}
function liaisonPoints(text) {
  const words = (text || "").replace(/[.,!?;:"']/g, "").trim().split(/\s+/);
  const consonants = "bcdfghjklmnpqrstvwxyz";
  const vowels = "aeiou";
  const pairs = [];
  for (let i = 0; i < words.length - 1; i++) {
    const a = words[i], b = words[i + 1];
    if (a.length < 2) continue;
    const aLast = endingSound(a);
    const bFirst = (b[0] || "").toLowerCase();
    if (consonants.includes(aLast) && vowels.includes(bFirst)) pairs.push([a, b]);
  }
  return pairs;
}
/* 발음 연결 해설 — 예전엔 자음+모음 리에종 한 문구뿐이라 모든 문장이 똑같이 읽혔음(사용자 지적).
   그 문장에서 실제로 일어나는 인접 단어의 음운 현상(리에종·동화·플랩·축약·삼킴·글라이드 등 14종)을
   찾아, 종류별로 여러 문구 변형 중 하나(쌍 해시로 결정 — 같은 문장은 항상 같은 문구)를 골라 붙인다.
   조합상 50가지 이상으로 다양화. 한글 근사 발음은 "이렇게 들려요" 수준으로만(과장·IPA 오류 방지). */
function noteHash(s) { let h = 0; for (const c of s) h = (h * 31 + c.charCodeAt(0)) >>> 0; return h; }
function pickVariant(arr, seed) { return arr[noteHash(seed) % arr.length]; }
/* 두 단어를 실제로 이어 말했을 때 들리는 형태를 그 자리에서 만들어 붙이는 근사치
   (진짜 IPA 변환이 아니라 "한 단어처럼 들려요" 감을 주는 용도) — 예: there's+a → theresa. */
function mergedSound(a, b) { return (a + b).toLowerCase().replace(/[^a-z]/g, ""); }
const CONN_V = "aeiou", CONN_C = "bcdfghjklmnpqrstvwxyz";
function connDetect(aw, bw) {
  const a = aw.toLowerCase().replace(/[^a-z']/g, ""), b = bw.toLowerCase().replace(/[^a-z']/g, "");
  if (a.length < 1 || b.length < 1) return null;
  const abare = a.replace(/'/g, ""), bbare = b.replace(/'/g, "");
  // 묵음 e면 실제 끝소리는 e 앞 자음 — a2(그 앞 글자, 플랩 규칙용)도 한 칸 더 앞으로.
  const silentE = abare.length > 1 && abare.endsWith("e") && !VOWEL_E_WORDS.has(abare) && CONN_C.includes(abare[abare.length - 2]);
  const al = endingSound(abare), a2 = silentE ? abare.slice(-3, -2) : abare.slice(-2, -1), bf = bbare[0];
  const pair = `**${aw} ${bw}**`;
  const merged = mergedSound(a, b); // 예시가 실제 문장의 이 단어쌍과 무관했던 문제 — 항상 이 쌍 기준으로 생성
  const yq = b === "you" || b === "your" || b === "you're";
  // 1) t + you → ch (구개음화)
  if (al === "t" && yq) return pickVariant([
    `${pair}에서 t와 you가 부딪혀 "츄(ch)"로 뭉쳐요 — "${merged}"처럼 들려요.`,
    `${pair}처럼 -t 뒤에 you가 오면 t+y가 합쳐져 "치/츄" 소리가 돼요.`,
    `${pair}는 두 소리가 구개음화돼 "챠/츄"로 이어 들려요.`,
  ], a + b);
  // 2) d + you → j
  if (al === "d" && yq) return pickVariant([
    `${pair}에서 d와 you가 합쳐져 "쥬(j)"가 돼요 — "${merged}"처럼 들려요.`,
    `${pair}처럼 -d 뒤에 you가 오면 "졔/쥬"로 부드럽게 이어져요.`,
  ], a + b);
  // 3) s/z + you → sh/zh
  if ((al === "s" || al === "z") && yq) return pickVariant([
    `${pair}에서 s와 you가 만나 "슈(sh)"로 섞여요 — "${merged}"처럼 들려요.`,
    `${pair}는 s+y가 구개음화돼 "쉬/슈" 소리로 이어져요.`,
  ], a + b);
  // 4) 같은 자음 충돌(중첩) — 한 번만 길게
  if (al === bf && CONN_C.includes(al)) return pickVariant([
    `${pair}는 같은 자음(${al})이 겹쳐, 두 번 발음하지 않고 한 번만 길게 이어 붙여요.`,
    `${pair}처럼 끝소리와 첫소리가 같으면 사이가 사라져 한 덩어리로 들려요 — "${merged}"처럼 끊김 없이.`,
    `${pair}에서 겹치는 ${al} 소리는 하나로 합쳐져, 두 단어 경계가 안 느껴져요.`,
  ], a + b);
  // 5) 모음 사이 t/d → 플랩(부드러운 ㄹ/ㄷ)
  if ((al === "t" || al === "d") && CONN_V.includes(bf) && CONN_V.includes(a2)) return pickVariant([
    `${pair}에서 모음 사이 t/d는 부드러운 ㄹ/ㄷ(플랩)으로 바뀌어요 — "${merged}"처럼 들려요.`,
    `${pair}처럼 t/d가 모음 사이에 끼면 미국식에선 굴리는 ㄹ로 약해져요.`,
    `${pair}는 t가 또렷한 ㅌ가 아니라 살짝 굴리는 ㄹ/ㄷ로 들려요.`,
  ], a + b);
  // 6) h 탈락(기능어 he/him/her/his/have/has/had)
  if (CONN_C.includes(al) && ["he", "him", "his", "her", "has", "have", "had"].includes(b)) return pickVariant([
    `${pair}에서 h는 약하게 사라지고 앞 단어에 붙어요 — "${merged}"처럼 들려요.`,
    `${pair}처럼 강세 없는 h-단어는 h가 거의 안 들리고 앞소리에 이어져요.`,
  ], a + b);
  // 7) and → n (기능어 축약)
  if (b === "and" || a === "and") return pickVariant([
    `${pair}의 and는 강세가 없어 d가 떨어지고 "은/ㄴ(n)"으로 줄어요 — "${merged}"처럼 들려요.`,
    `${pair}에서 and는 빠르게 말하면 "ㄴ"만 남아 앞뒤에 붙어요.`,
  ], a + b);
  // 8) to 약화
  if (b === "to" && CONN_C.includes(al)) return pickVariant([
    `${pair}의 to는 약하게 "터/투"로 줄어 앞 단어에 붙어 "${merged}"처럼 들려요.`,
    `${pair}처럼 강세 없는 to는 모음이 흐려져 "러/더"처럼 이어지기도 해요.`,
  ], a + b);
  // 9) of 약화
  if (b === "of" || a === "of") return pickVariant([
    `${pair}의 of는 f가 약해져 "어(v)"로 줄고 앞뒤가 붙어 "${merged}"처럼 들려요.`,
    `${pair}처럼 강세 없는 of는 f 소리가 흐려져 앞뒤 단어에 묻혀요.`,
  ], a + b);

  if ((al === "n" || al === "t" || al === "d") && /^th/.test(b)) return pickVariant([
    `${pair}에서 앞 끝소리가 다음 th에 스며들어 부드럽게 이어져요 — "${merged}"처럼 들려요.`,
    `${pair}처럼 -n/-t/-d 뒤에 th가 오면 혀 위치가 붙어 한 번에 넘어가요.`,
  ], a + b);

      const wrongPool = posPool.length >= 8 ? posPool : basePool;
      const wrongs = ltPick(wrongPool, 3, new Set([w.word]));
      const choices = wrongs.map(x => ltAnchor(x).ko);
      const answerIdx = Math.floor(Math.random() * (choices.length + 1));
      choices.splice(answerIdx, 0, myKo);
      cur = { kind: "meaning", word: w.word, choices, _answerIdx: answerIdx, _w: w, idx: seq, total: totalN };
      return;
    }
    seq++;
    if (realDone >= LT_REAL_N && fakeDone >= LT_FAKE_N) { cur = null; return; }
    if (realDone > 0 && realDone % LT_PRODUCE_EVERY === 0 && produceDone < Math.floor(realDone / LT_PRODUCE_EVERY)) {
      // 산출은 "아는 단어를 입으로 낼 수 있는가"(수동→능동, PLAN 4.12-1) 측정이므로
      // 계단식 현재 밴드(대개 실력 바로 위 = 모르는 단어)가 아니라 마지막으로 맞힌 밴드에서 출제
      const w = ltPick(ltBandPool(lastOkBand), 1, used)[0];
      if (w) {
        const a = ltAnchor(w);
        cur = { kind: "produce", ko: a.ko, cue: a.cue, len: w.word.length, _w: w, idx: seq, total: totalN };
        return;
      }
    }
    const useFake = fakeDone < LT_FAKE_N && (fakeSlots.has(realDone + fakeDone + 1) || realDone >= LT_REAL_N);
    if (useFake) {
      const fw = LT_FAKES[Math.floor(Math.random() * LT_FAKES.length)] ;
      cur = { kind: "know", word: fw, _fake: true, idx: seq, total: totalN };
      return;
    }
    const w = ltPick(ltBandPool(band), 1, used)[0];
    cur = w ? { kind: "know", word: w.word, _fake: false, _w: w, idx: seq, total: totalN } : null;
  }
  nextItem();

  return {
    current: () => cur,
    progress: () => ({ done: Math.min(seq, totalN), total: totalN }),
    canUndo: () => history.length > 0,
    undo() { if (history.length) restore(history.pop()); },
    answerKnow(knows) {
      if (!cur || cur.kind !== "know") return;
      snapshot();
      if (cur._fake) { fakeDone++; if (knows) fakeYes++; nextItem(); return; }
      if (!knows) { gradeReal(false); nextItem(); return; }
      pendingMeaning = cur._w; nextItem(); pendingMeaning = null;
    },
    answerMeaning(i) {
      if (!cur || cur.kind !== "meaning") return;
      snapshot();
      gradeReal(i === cur._answerIdx);
      nextItem();
    },
    answerProduce(text) {
      if (!cur || cur.kind !== "produce") return;
      snapshot();
      // 정확히 맞으면 만점, 오타(편집거리 1, 4글자 이상 단어만) 거의 만점, 유의어면 부분점수 —
      // 완전 정답이 아니어도 "말할 수 있는 단어"가 무조건 0으로 깔리지 않도록.
      const answer = (text || "").trim().toLowerCase();
      const target = cur._w.word.toLowerCase();
      const syns = (cur._w.syn || []).map(s => s.toLowerCase());
      let score = 0;
      if (answer) {
        // flatWord 비교 병행 — "carry-on"↔"carry on"↔"carryon" 같은 표기 차이는 만점,
        // 유의어도 언더스코어 표기("clog_up")와 사용자 입력("clog up")을 접어서 비교(2026-07-19)
        if (answer === target || flatWord(answer) === flatWord(target)) score = 1;
        else if (target.length >= 4 && editDistance(answer, target) <= 1) score = 0.85;
        else if (syns.some(s => s === answer || flatWord(s) === flatWord(answer))) score = 0.7;
      }
      const ok = score >= 1;
      produceLog.push({ ok, score });
      produceDone++;
      nextItem();
    },
    /* 종료 후 결과: 12밴드·추정 어휘량(인지/산출)·상위%(추정) */
    result() {
      const fa = fakeDone ? fakeYes / fakeDone : 0;
      // 능력치 = 궤적 후반(수렴 구간) 평균 → 6밴드 실수 → 12밴드
      const tail = trail.slice(-10);
      const band6f = tail.length ? tail.reduce((a, b) => a + b, 0) / tail.length : 0;
      const band12 = Math.max(0, Math.min(11, Math.round(band6f * 2)));
      // 밴드별 커버리지(방문 밴드는 실측+허수 보정, 미방문은 외삽) × 밴드 단어 수
      const counts = {};
      SEED.forEach(w => { counts[w.cefr] = (counts[w.cefr] || 0) + 1; });
      const visited = Object.keys(bandStat).map(Number);
      const lo = Math.min(...visited), hi = Math.max(...visited);
      let vocab = 0;
      CEFR_LEVELS.forEach((lv, b) => {
        let c;
        if (bandStat[b]) c = bandStat[b].ok / bandStat[b].n;
        else if (b < lo) c = 0.95;
        else if (b > hi) c = 0.05;
        else c = 0.5;
        c = fa >= 1 ? 0 : Math.max(0, (c - fa) / (1 - fa)); // 가짜단어 오인지율만큼 하향 보정(전부 오인지면 0)
        vocab += c * (counts[lv] || 0);
      });
      vocab = Math.round(vocab / 10) * 10;
      const produceRate = produceLog.length ? produceLog.reduce((s, p) => s + p.score, 0) / produceLog.length : 0;
      return {
        band12, band: LISTEN_LEVELS[band12],
        vocab, activeVocab: Math.round(vocab * produceRate / 10) * 10,
        pct: ltTopPercent(vocab, LT_DIST.vocab),
        falseAlarm: fa, produceRate,
      };
    },
  };
}

/* ---- Part B. 문장구사력 — v1은 어순 배열 스피드만(부분 측정) ----
   따라 말하기(EI)·순간영작은 STT/LLM 프록시(미구현) 필요 → 프록시 도입 후 확장.
   출제도 Part A처럼 적응형: A2에서 시작해 오탭 1개 이하로 완성하면 한 단계 위 문장,
   아니면 한 단계 아래 문장(고정 [A2,B1,B1,B2,B2] 순서였던 것을 2026-07-14 개정 —
   "맞으면 더 어려운 문제"가 체감되도록). 총 5문항. 채점: 밴드 궤적 + 단어당 속도 보정.

   UI 계약: const b = createLevelTestB();
   b.current() → null(종료) 또는 {band6, en, ko, words, shuffled}
   b.answer({ok, errors, seconds}) → 채점 기록 + 다음 문항으로(밴드 조정)
   b.progress() → {done, total} / b.report() → 결과 */
/* 칩 셔플 — 정답 어순 그대로 나오면(자명) 다시 섞는다. answer를 주면 답 조각의
   상대 순서가 정답과 같은 경우도 재셔플(허수가 섞여 있어도 답만 순서대로면 너무 쉬움). */
function ltShuffleChips(arr, answer) {
  const a = arr.slice();
  let guard = 0;
  do {
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  } while (answer && a.filter(x => answer.includes(x)).join(" ") === answer.join(" ") && guard++ < 8);
  return a;
}
/* 허수 칩 — 정답 조각 외에 헷갈리는 오답(시제 변형·조동사·관사·전치사)을 최대 3개.
   tapChip이 nextWord와 문자열로 비교하므로 허수는 절대 채택되지 않고 오탭(shake)만 유발. */
function ltDistractors(words) {
  const present = new Set(words.map(w => w.toLowerCase()));
  const out = [], outLower = new Set();
  const add = s => { const l = (s || "").toLowerCase(); if (!s || present.has(l) || outLower.has(l)) return; out.push(s); outLower.add(l); };
  // 1) 시제/굴절 변형 — 문장 속 굴절형에서 원형을 뽑아 "틀린 시제" 함정으로(played→play, making→make).
  //    e-탈락(landscaped→landscape) 등 애매한 경우는 후보를 여럿 만들고 실제 사전에 있는 형태만 채택(오탈자 방지).
  for (const w of words) {
    const cw = w.replace(/[^A-Za-z]/g, "");
    if (cw.length < 4 || /^[A-Z]/.test(w)) continue; // 문장 첫 단어·고유명사는 제외
    let cand = [];
    if (/ing$/.test(cw)) cand = [cw.slice(0, -3), cw.slice(0, -3) + "e"];
    else if (/ied$/.test(cw)) cand = [cw.slice(0, -3) + "y"];
    else if (/ies$/.test(cw)) cand = [cw.slice(0, -3) + "y"];
    else if (/ed$/.test(cw)) cand = [cw.slice(0, -2), cw.slice(0, -1)];
    else if (/es$/.test(cw)) cand = [cw.slice(0, -2), cw.slice(0, -1)];
    else if (/s$/.test(cw) && !/ss$/.test(cw) && !/us$/.test(cw)) cand = [cw.slice(0, -1)];
    const v = cand.find(c => c && c.length >= 3 && !present.has(c.toLowerCase()) && wordOf(c.toLowerCase()));
    if (v) { add(v); break; }
  }
  // 2) 관사·조동사·전치사 허수 — 문장에 없는 기능어 중 무작위로 채움
  const FUNCS = ["the", "a", "an", "to", "of", "in", "for", "did", "does", "will", "would", "have", "has", "was", "were", "is", "are", "not", "been", "be"];
  for (const f of ltShuffleChips(FUNCS)) { if (out.length >= 3) break; add(f); }
  return out.slice(0, 3);
}

const LT_B_N = 5;
function createLevelTestB() {
  const used = new Set();
  let band = 1; // A2 시작
  const logs = [];
  let cur = null;

  function makeItem(w, b) {
    const en = w.ex[0].en;
    const words = en.replace(/[.!?]$/, "").split(/\s+/);
    // 허수(distractor) 칩 — 정답 조각만 있으면 어순만 맞추면 돼 너무 쉬움. 시제·조동사·관사 등
    // 헷갈리는 오답 칩을 섞어 난이도를 올린다(사용자 지적). 탭하면 오탭(shake)으로만 처리되고
    // 답에는 들어가지 않음(tapChip이 nextWord와 문자열 비교 → 허수는 절대 일치 안 함).
    const shuffled = ltShuffleChips(words.concat(ltDistractors(words)), words);
    return { band6: b, en, ko: w.ex[0].ko, words, shuffled };
  }
  function pickSentence() {
    // 현재 밴드 우선, 풀이 비면 인접 밴드로 폴백
    for (const b of [band, band - 1, band + 1, band - 2, band + 2]) {
      if (b < 0 || b >= CEFR_LEVELS.length) continue;
      const pool = SEED.filter(w => w.cefr === CEFR_LEVELS[b] && w.ex && w.ex[0] && !used.has(w.word))
        .filter(w => { const n = w.ex[0].en.trim().split(/\s+/).length; return n >= 6 && n <= 9; });
      if (pool.length) {
        const w = pool[Math.floor(Math.random() * pool.length)];
        used.add(w.word);
        return makeItem(w, b);
      }
    }
    return null;
  }
  cur = pickSentence();

  return {
    current: () => cur,
    progress: () => ({ done: logs.length, total: LT_B_N }),
    answer(log) { // {ok, errors, seconds}
      if (!cur) return;
      logs.push({ band6: cur.band6, ok: !!log.ok, errors: log.errors || 0, seconds: log.seconds || 0, nWords: cur.words.length });
      // 적응: 오탭 1개 이하로 완성 → 한 단계 위, 아니면 한 단계 아래
      band = Math.max(0, Math.min(CEFR_LEVELS.length - 1, band + (log.ok && (log.errors || 0) <= 1 ? 1 : -1)));
      cur = logs.length >= LT_B_N ? null : pickSentence();
    },
    report() {
      const okLogs = logs.filter(l => l.ok && l.errors <= 1);
      let band6f;
      if (!okLogs.length) band6f = 0.5;
      else band6f = okLogs.reduce((a, l) => a + l.band6, 0) / okLogs.length;
      const spw = logs.length ? logs.reduce((a, l) => a + l.seconds / Math.max(1, l.nWords), 0) / logs.length : 3;
      if (spw <= 0.9) band6f += 0.5; else if (spw >= 2.2) band6f -= 0.5; // 자동화 속도 보정
      const band12 = Math.max(0, Math.min(11, Math.round(band6f * 2)));
      return { band12, band: LISTEN_LEVELS[band12], pct: ltTopPercent(band12, LT_DIST.flu), partial: true, spw };
    },
  };
}

/* 결과 저장 — 홈/통계에서 읽어 쓸 수 있게 localStorage 보존 */
const LT_KEY = "en_leveltest_v1";
function saveLevelTest(res) { try { localStorage.setItem(LT_KEY, JSON.stringify(Object.assign({ at: Date.now() }, res))); } catch (e) {} }
function loadLevelTest() {
  try {
    const saved = JSON.parse(localStorage.getItem(LT_KEY) || "null");
    if (saved) return saved;
  } catch (e) {}
  // 첫 실행 데모 시드(SRS와 동일한 패턴) — 실제로 레벨 테스트를 보면 saveLevelTest가 덮어씀.
  // 가상 페르소나: 어휘력 B2+ · 작문력 B1 · 3개월 정도 띄엄띄엄 학습한 사용자(2026-07-16).
  return {
    at: Date.now() - 6 * DAY,
    lex: { band12: 7, band: "B2+", vocab: 7200, activeVocab: 4300, pct: 15, falseAlarm: 0.05, produceRate: 0.6 },
    flu: { band12: 4, band: "B1", pct: 45, partial: true, spw: 1.6 },
  };
}

/* 연속학습일 → 상태색(뱃지 티어와는 별개, 이 점 전용 의미) — 연두=잘하고있음 · 노랑=보통 ·
   핑크=위험(스트릭이 아직 짧아 끊기기 쉬움) · 파랑=매우좋음. 상단 바 점 색상에 씀. */
function streakHl(streak) {
  if (streak < 3) return "pink";
  if (streak < 7) return "yellow";
  if (streak < 30) return "green";
  return "blue";
}
/* 임계값 배열에서 count가 넘긴 최고 티어 인덱스(-1=미획득) — 뱃지 진행값 계산 공용. */
function tierFromCount(count, tiers) {
  let t = -1;
  for (let i = 0; i < tiers.length; i++) if (count >= tiers[i]) t = i;
  return t;
}
/* 실측 지표 — SRS 기록 기준. 학습한 단어 수(사전 탭 "내가 학습한 단어"와 동일 정의) /
   복습 끝(box 최고단계)까지 간 단어 수. 새 단어를 공부할수록, 복습을 마칠수록 그대로 올라간다. */
function srsLearnedCount() { return allWords().filter(w => wordStatus(w)).length; }
function srsMasteredCount() { return allWords().filter(w => { const s = wordStatus(w); return s && s.status === "done"; }).length; }
/* 실측 지표 — 레벨 테스트 어휘(lex) 결과의 CEFR 밴드("B2+"→"B2")를 레벨 업 뱃지 티어로 매핑.
   C2는 뱃지 최고 티어(C1칸)가 이미 최상급 취급이라 마지막 티어로 클램프. */
function levelBadgeTier() {
  const lt = loadLevelTest();
  if (!lt || !lt.lex) return -1;
  const tiers = BADGE_CATS.find(c => c.k === "level").tiers; // ["A1","A2","B1","B2","C1"]
  const base = lt.lex.band.replace("+", "");
  const idx = tiers.indexOf(base);
  return idx >= 0 ? idx : (base === "C2" ? tiers.length - 1 : -1);
}
/* 카테고리별 진행값 — tier=현재 획득한 최고 티어 인덱스(-1=미획득), dates=각 획득 티어의 달성일.
   words/review/level은 실제 SRS·레벨테스트 기록에서 매번 새로 계산(실시간 반영). 나머지는 아직
   추적 로그가 없어 더미 값 유지(위 주석 TODO 참고) — 가상 페르소나: 어휘력 B2+ · 작문력 B1 ·
   3개월 정도(2026-04 중순~) 띄엄띄엄 학습한 사용자(2026-07-16)의 초기 이력으로 채워둠. */
function computeBadgeProgress() {
  const tiersOf = k => BADGE_CATS.find(c => c.k === k).tiers;
  // 실측 지표(2026-07-19, 구 더미 대체) — 전부 로컬 실기록에서 계산:
  //   streak=연속 학습일(ACT), words/review=SRS, listen/talk=세션 수(ACT), roots=열람 어원(ACT), level=레벨테스트.
  //   friend(친구 초대)만 서버(P2 소셜) 의존이라 아직 미획득 고정. sos(자립 회화)는 방 안 SOS 사용 추적이
  //   아직 없어 보류(미획득) — SOS-in-room 기능 생기면 ACT에 카운터 추가.
  // dates는 과거 티어 달성일 실기록이 없으므로 비움(BadgeDetail에서 있을 때만 표시).
  return {
    streak: { tier: tierFromCount(ACT.streak(), tiersOf("streak")), dates: [] },
    words: { tier: tierFromCount(srsLearnedCount(), tiersOf("words")), dates: [] },
    listen: { tier: tierFromCount(ACT.listenSessions(), tiersOf("listen")), dates: [] },
    talk: { tier: tierFromCount(ACT.talkSessions(), tiersOf("talk")), dates: [] },
    level: { tier: levelBadgeTier(), dates: [] },
    roots: { tier: tierFromCount(ACT.rootsCount(), tiersOf("roots")), dates: [] },
    review: { tier: tierFromCount(srsMasteredCount(), tiersOf("review")), dates: [] },
    friend: { tier: -1, dates: [] },
    sos: { tier: -1, dates: [] },
  };
}
/* 메달 중앙 표기 — 큰 임계값은 축약(5000→5K, 1500→1.5K), 레벨은 문자열 그대로. */
function medalLabel(v) {
  if (typeof v === "string") return v;
  if (v >= 1000) return (v % 1000 === 0 ? v / 1000 : (v / 1000).toFixed(1)) + "K";
  return String(v);
}
/* 카테고리 총 획득 개수 / 홈 트랙에 노출할 대표 티어(최고 획득분, 없으면 첫 티어 미리보기).
   progress는 컴포넌트에서 한 번 계산한 computeBadgeProgress() 결과를 받는다(중복 계산 방지). */
function catEarnedCount(k, progress) { return progress[k].tier + 1; }
function catDisplayTier(k, progress) { const p = progress[k]; return p.tier >= 0 ? p.tier : 0; }

/* 보관함 티어 스트립 — 끊김 없이 계속 도는 벨트(2026-07-17). 티어가 5개뿐이라 화면을 거의
   채워 스크롤 여지가 거의 없던 것을, 같은 목록을 3벌 복제해 가운데 벌에서 시작하고, 스크롤이
   양끝 벌로 넘어가면 소리 없이 한 벌 폭만큼 되돌려 무한 루프처럼 보이게 한다. 탭은 그대로 동작. */
function MedalBelt({ cat, progress, onSelect }) {
  const ref = useRef(null);
  const tiers = cat.tiers;
  const loop = [...tiers, ...tiers, ...tiers];
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    // 홈(scrollLeft=0)에선 좌측 여백(패딩) 그대로 보이고, 스와이프해서 한 벌을 넘어가면
    // 소리 없이 한 벌 폭만큼 되돌려 패딩 없이 계속 도는 벨트처럼 보이게 한다.
    const per = tiers.length;
    const cells = el.querySelectorAll(".medal-cell");
    const oneW = () => (cells[per] ? cells[per].offsetLeft - cells[0].offsetLeft : el.scrollWidth / 3);
    el.scrollLeft = 0; // 홈: 좌측 여백 있는 원래 상태
    const onScroll = () => {
      const w = oneW();
      if (w > 0 && el.scrollLeft > w * 2) el.scrollLeft -= w;
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => el.removeEventListener("scroll", onScroll);
  }, [cat.k]);
  return (
    <div className="medal-strip belt" ref={ref}>
      {loop.map((tv, i) => {
        const idx = i % tiers.length;
        return (
          <div key={i} className="medal-cell">
            <BadgeMedal cat={cat} tierIdx={idx} earned={idx <= progress.tier} onClick={() => onSelect(idx)} />
            <span className="mth">{medalLabel(tv)}{cat.unit}</span>
          </div>
        );
      })}
    </div>
  );
}

/* 벨트 무한 루프 훅 — MedalBelt와 동일 로직 재사용. 홈(scrollLeft=0)은 좌측 여백,
   한 벌 넘어가면 소리 없이 되돌려 패딩 없이 계속 도는 벨트. */
function useBeltLoop(ref, perLen, dep) {
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const cells = el.querySelectorAll(".medal-cell");
    const oneW = () => (cells[perLen] ? cells[perLen].offsetLeft - cells[0].offsetLeft : el.scrollWidth / 3);
    el.scrollLeft = 0;
    const onScroll = () => {
      const w = oneW();
      if (w > 0 && el.scrollLeft > w * 2) el.scrollLeft -= w;
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => el.removeEventListener("scroll", onScroll);
  }, [dep]);
}

/* 대표 뱃지 요약 벨트 — 카테고리마다 현재(최고 획득) 티어 메달 하나씩 한 줄로. 벨트처럼 스와이프. */
function CatSummaryBelt({ progress, onSelect }) {
  const ref = useRef(null);
  const cats = BADGE_CATS;
  const loop = [...cats, ...cats, ...cats];
  useBeltLoop(ref, cats.length, "summary");
  return (
    <div className="medal-strip belt" ref={ref}>
      {loop.map((c, i) => {
        const ti = catDisplayTier(c.k, progress);
        return (
          <div key={i} className="medal-cell">
            <BadgeMedal cat={c} tierIdx={ti} earned={progress[c.k].tier >= 0} onClick={() => onSelect(c.k, ti)} />
            <span className="mth">{c.title}</span>
          </div>
        );
      })}
    </div>
  );
}

/* 전체보기 — 아래에서 올라오는 시트 모달, 전체 카테고리×티어 벨트. */
function BadgeCollectionSheet({ progress, onSelect, onClose }) {

/* 뱃지 상세 — 카드는 고정, 동전(메달)만 뒤집기(탭 또는 밀기, 빠르게 밀면 관성으로 빙그르르).
   앞면=메달, 뒷면=블랙 원+획득일. 아래 랭크 스트립을 탭해 다른 티어 열람. sel={catKey,tierIdx}. */
function BadgeDetail({ sel, onClose }) {
  const cat = BADGE_CATS.find(c => c.k === sel.catKey);
  const prog = computeBadgeProgress()[sel.catKey];
  const [tierIdx, setTierIdx] = useState(sel.tierIdx);
  const [baseRot, setBaseRot] = useState(0); // 누적 회전(짝수*180=앞, 홀수*180=뒤)
  const [live, setLive] = useState(0);        // 드래그 중 추가 각도
  const [anim, setAnim] = useState(false);    // 손 뗀 뒤 정착 애니메이션
  const [spinning, setSpinning] = useState(false); // 빠르게 스와이프 후 관성 스핀 중(탭하면 멈춤)
  const drag = useRef(null);
  const spin = useRef({ angle: 0, vel: 0, raf: null });

  const earned = tierIdx <= prog.tier;
  const tier = BADGE_TIERS[tierIdx];
  const val = cat.tiers[tierIdx];

  useEffect(() => () => { if (spin.current.raf) cancelAnimationFrame(spin.current.raf); }, []);

  const tickSpin = () => {
    const s = spin.current;
    s.angle += s.vel * 16;
    s.vel *= 0.94; // 마찰 강화 — 예전 0.985는 너무 오래 빠르게 돌아 뒷면 글씨가 안 읽혔음(2026-07-17)
    setBaseRot(s.angle);
    if (Math.abs(s.vel) < 0.04) { stopSpin(s.angle); return; }
    s.raf = requestAnimationFrame(tickSpin);
  };
  const stopSpin = angleOverride => {
    if (spin.current.raf) cancelAnimationFrame(spin.current.raf);
    spin.current.raf = null;
    setSpinning(false);
    const angle = angleOverride != null ? angleOverride : spin.current.angle;
    setAnim(true);
    setBaseRot(Math.round(angle / 180) * 180);
  };
  const pickTier = i => { setTierIdx(i); setAnim(true); setBaseRot(Math.round(baseRot / 360) * 360); }; // 티어 바꾸면 앞면으로

  const onDown = e => {
    // 관성으로 도는 중에 터치하면 딱 정지(플립 없이) — 사용자가 "돌다가 한 번 터치하면 정지" 요청
    if (spinning) { stopSpin(); drag.current = null; return; }
    drag.current = { x: e.clientX, t: Date.now(), moved: false }; setAnim(false); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
  };
  const onMove = e => { if (drag.current) { const dx = e.clientX - drag.current.x; if (Math.abs(dx) > 4) drag.current.moved = true; setLive(dx * 0.7); } };
  const onUp = e => {
    if (!drag.current) return;
    const dx = e.clientX - drag.current.x;
    const wasTap = !drag.current.moved;
    const v = dx / Math.max(1, Date.now() - drag.current.t); // px/ms
    const dir = dx > 0 ? 1 : -1;
    drag.current = null;
    if (wasTap) { setAnim(true); setLive(0); setBaseRot(baseRot + 180); return; } // 탭 = 뒤집기
    if (Math.abs(v) > 0.55) {
      // 스핀 속도 하향(예전 *40, 캡 26은 잔상만 남고 뒷면이 안 읽힘) — 천천히 돌며 앞뒤가 보이게
      spin.current = { angle: baseRot + live, vel: dir * Math.min(Math.abs(v) * 16, 8), raf: null };
      setLive(0); setAnim(false); setSpinning(true);
      spin.current.raf = requestAnimationFrame(tickSpin);
    } else if (Math.abs(dx) > 40) {
      setAnim(true); setLive(0); setBaseRot(baseRot + dir * 180);
    } else {
      setAnim(true); setLive(0); setBaseRot(baseRot);
    }
  };

  return ReactDOM.createPortal(
    <div className="dlg-backdrop" onClick={onClose}>
      <div className="bd-card" onClick={e => { e.stopPropagation(); if (spinning) stopSpin(); }}>
        <div className="bd-title">{cat.title}</div>
        <div className="bd-coin-wrap">
          <div className="bd-coin"
            style={{ transform: `rotateY(${baseRot + live}deg)`, transition: anim ? "transform .55s cubic-bezier(.2,.7,.2,1)" : "none", touchAction: "pan-y" }}
            onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}>
            <div className="bd-coin-front"><BadgeMedal cat={cat} tierIdx={tierIdx} earned={earned} lg /></div>
            <div className="bd-coin-back">

        <div className="bd-desc">{earned ? cat.desc(val) : "조건: " + cat.desc(val)}</div>
        <div className="bd-hint">뱃지를 탭하거나 밀어서 뒤집기</div>

  const stage = streakStage(STREAK);       // 1~4
  const speed = { "--bob": (0.64 - stage * 0.06) + "s", "--road": (0.8 - stage * 0.09) + "s" };

  const goals = PREFS.get(); // 설정 > 일일 목표(단어·듣기·회화) — 기본 20/20/10
  // 오늘의 루틴 진행 = 오늘 실제 학습량(ACT.today) 대 목표. state: 목표달성=done · 진행중=active · 미시작=todo.
  const td = ACT.today(); // { c:단어카드, li:듣기문장, ls:듣기세션, t:회화세션 }
  const rState = (cur, goal) => (cur >= goal ? "done" : cur > 0 ? "active" : "todo");
  const rSub = (cur, goal, unit) => (cur >= goal ? "오늘 목표 달성" : `${cur} / ${goal}${unit}`);
  // direct: 탭 메뉴를 거치지 않고 바로 그 학습을 시작(단어카드·듣기는 세션 즉시 시작, 회화는 페르소나 선택 화면)
  const routine = [
    { n: 1, title: `단어카드 ${goals.goalWords}개`, sub: rSub(td.c, goals.goalWords, "개"), state: rState(td.c, goals.goalWords), tab: "learn", direct: true, start: onStartCards },
    { n: 2, title: `듣기 ${goals.goalListen}문장`, sub: rSub(td.li, goals.goalListen, "문장"), state: rState(td.li, goals.goalListen), tab: "learn", direct: true, start: onStartListen },
    { n: 3, title: "회화 1세션", sub: td.t >= 1 ? "오늘 목표 달성" : "오늘 1세션 목표", state: rState(td.t, 1), tab: "talk" },
  ];
  // 주(열)마다 실제 달력 월을 계산해 형광펜 색을 배정 — 오른쪽 끝(16번째 열)이 이번 주, 왼쪽으로 갈수록 과거.
  const weekHues = useMemo(() => {
    const today = new Date();
    const monthOf = w => {
      const d = new Date(today);
      d.setDate(d.getDate() - (16 - w) * 7);
      return d.getMonth();
    };
    const hues = [];
    const seen = [];
    for (let w = 0; w < 17; w++) {
      const m = monthOf(w);
      let idx = seen.indexOf(m);
      if (idx === -1) { seen.push(m); idx = seen.length - 1; }
      hues.push({ month: m, hue: GRASS_HUES[idx % GRASS_HUES.length] });
    }
    return hues;
  }, []);
  // 월 라벨 구간 — 연속으로 같은 달인 열들을 하나로 묶어 "MARCH" 같은 영문 라벨로 위에 표시.
  const monthSpans = useMemo(() => {
    const spans = [];
    weekHues.forEach(({ month }) => {
      const last = spans[spans.length - 1];
      if (last && last.month === month) last.span++;
      else spans.push({ month, span: 1 });
    });
    // 17주 창이 달 경계에 걸치면 5번째 달 라벨이 살짝 낄 수 있어 최대 4개월로 캡
    // (2026-07-18, 피그마 시안도 4개월 라벨만) — 가장 왼쪽(가장 작게 걸친) 달을 다음 달에 합침.
    while (spans.length > 4) { spans[1].span += spans[0].span; spans.shift(); }
    return spans;
  }, [weekHues]);
  const grass = useMemo(() => {
    /* 데모 시드(가상 페르소나: 3개월 띄엄띄엄 학습) — 예전 수식 패턴((i*7+3)%11)은 줄무늬처럼
       규칙적으로 보여서, "학습 연속 구간 + 빈 날"이 섞인 현실적인 패턴으로 교체(2026-07-17).
       고정 시드 PRNG라 리렌더/재방문에도 모양이 안 바뀜. 시작 4주 전은 거의 빈칸(가입 전).
       색은 잉크 1색 대신 그 주가 속한 달의 형광펜 색(weekHues)을 쓰고, 옅음/보통/진함은 그 색의
       light/base/dark 톤으로 표현(2026-07-18, 피그마 디자인 반영 — 형광펜 시스템 그대로 재사용). */
    let s = 20260716; // 고정 시드
    const rnd = () => { s = (s * 1103515245 + 12345) % 2147483648; return s / 2147483648; };
    const cells = [];
    let studying = false; // 연속 학습 구간 상태 머신
    for (let i = 0; i < 17 * 5; i++) {
      const week = i % 17; // 그리드가 행 우선(17열×5행)이라 열(=주)은 i%17
      const tokens = GRASS_TOKENS[weekHues[week].hue];
      if (week < 4) { cells.push(rnd() < 0.06 ? tokens.light : ""); continue; } // 학습 시작 전(왼쪽 4주)
      if (studying) { if (rnd() < 0.25) studying = false; } // 평균 4일 연속 후 휴식
      else if (rnd() < 0.45) studying = true; // 휴식은 평균 2일쯤
      if (!studying) { cells.push(""); continue; }
      const r = rnd();
      cells.push(r < 0.25 ? tokens.dark : r < 0.6 ? tokens.base : tokens.light); // 강도는 중간이 가장 흔하게
    }
    cells[cells.length - 1] = GRASS_TOKENS[weekHues[16].hue].base; // 오늘(마지막 칸)은 학습한 날로
    return cells;
  }, [weekHues]);
  const badgeProgress = computeBadgeProgress();

            <div className={"stat tier-" + pctHl}><div className="v"><span className={"hl hl-" + pctHl} style={{ transform: "rotate(-1deg)" }}>상위 {lex.pct}%</span></div><div className="l">백분위</div></div>
