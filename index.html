/* ============================================================================
   NoEnglish — 디자인 토큰 (라이트 온리 · 레트로 노트 두들 톤)
   폰트: LINE Seed KR (SIL OFL 1.1, img/fonts/LICENSE.txt) — Regular/Bold 2웨이트만 자체 호스팅.
============================================================================ */
@font-face{
  font-family:"LINE Seed KR";
  font-weight:400;
  font-style:normal;
  font-display:swap;
  src:url("img/fonts/LINESeedKR-Regular.woff2?v=0.35.34") format("woff2"),
      url("img/fonts/LINESeedKR-Regular.woff?v=0.35.34") format("woff");}
@font-face{
  font-family:"LINE Seed KR";
  font-weight:700;
  font-style:normal;
  font-display:swap;
  src:url("img/fonts/LINESeedKR-Bold.woff2?v=0.35.34") format("woff2"),
      url("img/fonts/LINESeedKR-Bold.woff?v=0.35.34") format("woff");}
:root{
  --bg:#FFFAF1;            /* 옅은 노트 베이지(2026-07-15 2차 로테이션 — 이전 카드색을 배경으로) */
  --surface:#FFFDF8;       /* 배경보다 밝은 크림 (카드/시트) — 한 톤 더 밝게 */
  --surface-container:#FBF4E3;      /* 톤 위계 1단 (M3 tonal elevation) */
  --surface-container-high:#F1E7CE; /* 톤 위계 2단 */
  --ink:#211C15;           /* 노트 잉크 블랙 (웜톤) — 텍스트 + 블랙 버튼 */
  --ink-2:#4A4234;
  --muted:#8C8270;
  --line:#E6DCC3;
  --fill:#FAF4E7;          /* 박스강조 크림 — 이전 배경색을 재활용 */
  --accent:#211C15;        /* 포인트 = 잉크 블랙(블랙 버튼 컨셉) */
  --accent-deep:#4A3A20;   /* 흰 배경 위 텍스트 강조 (웜 브라운) */
  --accent-soft:#EDE1C2;   /* 옅은 배경 */
  /* 웜그레이 하이어라키(2026-07-16 재구성) — 새 톤을 3개 더 만드는 대신 이미 있는 배경/텍스트
     톤(--line, --muted)을 밝은쪽·진한쪽 끝으로 재사용하고 그 사이를 잇는 중간톤 하나(--warmgray)만
     신설. --accent-soft(골드톤)와 짝을 이루는 "강조하되 안 노란" 옵션. mid를 보유 포인트 배경·
     듣기속도 활성값에 공용으로 써서 두 곳이 같은 진하기로 보이게 통일.
     2026-07-17: #B9AF99가 면(설정 카드 등)에 깔기엔 너무 어둡다는 지적으로 1/3 밝게(#CFC7B5). */
  --warmgray:#CFC7B5;
  --on-accent:#FFFBF1;
  --good:#2F8F5B;
  --good-container:#E3F1E7;
  --danger:#D9483C;
  --danger-container:#F9E1DD;
  --hi-green:#D8ED77;      /* 형광펜 — 연두 */
  --hi-pink:#FFB4D4;       /* 형광펜 — 핑크 */
  --hi-yellow:#FFDD5C;     /* 형광펜 — 옐로우 */
  --hi-blue:#93D3FF;       /* 형광펜 — 블루 */
  /* 형광펜 5단 톤 스케일(가장연한→가장진한). base(위 4개)는 하이라이터 마커·큰 강조 텍스트용,
     xlight+xdark 조합은 뱃지/태그처럼 "연한 배경 + 진한 텍스트"가 필요한 곳에 사용. */
  --hi-green-xlight:#F6FBE1;  --hi-green-light:#E7F4AB;  --hi-green-dark:#92AD17;  --hi-green-xdark:#45520B;
  --hi-yellow-xlight:#FFF8DB; --hi-yellow-light:#FFEA9A; --hi-yellow-dark:#FFCC00; --hi-yellow-xdark:#5A4700;
  --hi-pink-xlight:#FFEEF6;   --hi-pink-light:#FFD1E4;   --hi-pink-dark:#EF0066;   --hi-pink-xdark:#710030;
  --hi-blue-xlight:#E7F5FF;   --hi-blue-light:#BCE4FF;   --hi-blue-dark:#0083DD;   --hi-blue-xdark:#003E69;
  --hi-orange-xlight:#FFF0DD; --hi-orange-light:#FFDCAF; --hi-orange-dark:#D97A00; --hi-orange-xdark:#6B3800;
  --hi-orange:#FFB459;        /* 형광펜 — 오렌지(탭바 보관함 활성색 + 뱃지 마스터 티어). xlight/xdark는 다른 4색과 같은 밝기 위계로 파생(2026-07-17). */
  --card-border:rgba(158,124,58,.4); /* 카드류 소프트 보더(outline-variant) — 얇아진 두께(0.5px) 보완 위해 더 진한 베이지로. 인터랙션 요소는 var(--ink) 풀보더(outline) 사용 */
  --radius:0;
  --shadow:0 1px 2px rgba(33,28,21,.05), 0 8px 24px rgba(33,28,21,.06);
  --shadow-sheet:0 -8px 40px rgba(33,28,21,.18);
  font-family:"LINE Seed KR",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--ink);}
#root{height:100%;}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);max-width:520px;margin:0 auto;position:relative;}
.topbar{padding:calc(env(safe-area-inset-top) + 12px) 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:20px;font-weight:800;letter-spacing:-0.4px;}
.brand b{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--card-border);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;box-shadow:var(--shadow);}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--hi-green);}
.pill .dot.hl-green{background:var(--hi-green);}
.pill .dot.hl-yellow{background:var(--hi-yellow);}
.pill .dot.hl-pink{background:var(--hi-pink);}
.pill .dot.hl-blue{background:var(--hi-blue);}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--line);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}


/* 홈 상단 게이미피케이션 지수 스트립 — 항목별로 다른 색, 같은 요소(캐릭터)에 속한 칩은 그 캐릭터의
   악센트 색을 그대로 씀(캐릭터가 곧 색 그룹). 형광펜 5단 톤의 light+xdark 조합 재사용. */
.gami-row{position:absolute;z-index:4;top:14px;left:14px;right:14px;display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.gami-row::-webkit-scrollbar{display:none;}
.gami-chip{flex:none;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;padding:8px 13px;border-radius:999px;white-space:nowrap;}
.gami-chip.green{background:var(--hi-green-light);color:var(--hi-green-xdark);}
.gami-chip.pink{background:var(--hi-pink-light);color:var(--hi-pink-xdark);}
.gami-chip.yellow{background:var(--hi-yellow-light);color:var(--hi-yellow-xdark);}
.gami-chip.blue{background:var(--hi-blue-light);color:var(--hi-blue-xdark);}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
/* --kb = 소프트 키보드가 가리는 높이(App의 visualViewport 리스너가 갱신) —
   키보드가 열리면 하단 컨트롤(힌트·확인 버튼)이 키보드 위로 올라오도록 바닥 패딩 확장 */
.content{padding:8px 20px calc(28px + var(--kb, 0px));display:flex;flex-direction:column;gap:14px;}
/* 탭바가 없는 몰입 화면(회화 대화방·작문·발음클리닉·카드/듣기 세션·퀴즈·레벨테스트)에서 키보드도 없을 때
   하단 여백이 28px로는 홈 인디케이터에 너무 붙어 보인다는 지적 — 40px로(2026-07-18). 키보드가 뜨면
   기존처럼 28px+키보드높이가 40을 넘으므로 자연히 그쪽으로 전환됨. `.scroll.notab`는 App이
   immersive||ltOpen일 때 붙여주는 클래스. */
.scroll.notab .content{padding-bottom:max(40px, calc(28px + var(--kb, 0px)));}

/* 섹션 라벨 */
.sec{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-0.2px;margin:6px 2px 0;}
.sec .more{float:right;font-size:12px;color:var(--muted);font-weight:600;}

/* 카드 공통 */
.card{background-color:var(--surface);border:0.5px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.card.tap{transition:transform .12s ease;}
.card.tap:active{transform:scale(.985);}

/* 공용 버튼/화살표 (기존엔 인라인 스타일로만 존재하던 클래스를 정식 규칙으로 승격) */
.btn{background:var(--accent);color:var(--on-accent);font-weight:700;padding:12px 20px;border-radius:0;}
.arrow{color:var(--muted);}

/* 캐릭터 히어로 */
.hero{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 16px 18px;text-align:center;}
.mascot{width:112px;height:112px;border-radius:0;background:linear-gradient(160deg,var(--surface),var(--fill));border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);line-height:1.5;}
.sign{display:inline-block;background:var(--ink);color:var(--on-accent);font-weight:800;font-size:13px;letter-spacing:.5px;padding:6px 12px;border-radius:0;transform:rotate(-3deg);}

/* 노트 줄공책 배경 — 가로선(파란톤 반복) + 좌측 여백 세로 두줄(빨간톤). 캐릭터가 뛰어다니는 무대(.stage)와
   캐릭터 미선택 카드에 공용 사용. 컴포넌트 자체 background 위에 겹쳐 그림(배경색은 그대로 유지). */
.ruled-paper{
  background-image:
    repeating-linear-gradient(to bottom, transparent 0 26px, rgba(90,138,189,.4) 26px 27px),
    linear-gradient(to right, transparent 0 24px, rgba(214,74,64,.55) 24px 25px, transparent 25px 27px, rgba(214,74,64,.55) 27px 28px, transparent 28px 100%);
  background-repeat: repeat, no-repeat;
}

/* 캐릭터 스테이지: 가운데 캐릭터(앞) + 뒤로 뱃지 가로 스크롤 트랙(스와이프해서 봄) */
.stage{position:relative;height:240px;background-color:var(--surface);border-radius:var(--radius);border:1.5px solid var(--ink);box-shadow:var(--shadow);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.badge-track{position:absolute;left:0;right:0;top:44%;transform:translateY(-50%);display:flex;gap:14px;align-items:center;overflow-x:auto;padding:0 42%;scrollbar-width:none;z-index:1;-webkit-overflow-scrolling:touch;}
.badge-track::-webkit-scrollbar{display:none;}
/* ===== 원형 랭크 메달 (애플워치/피크민 참고) ===== */
.medal{flex:none;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .12s;box-shadow:0 2px 7px rgba(33,28,21,.2);}
.medal:active{transform:scale(.93);}
.medal-face{width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1;}
.medal .mv{font-size:15px;font-weight:800;letter-spacing:-0.6px;font-variant-numeric:tabular-nums;}
/* 티어 톤 — 앱이 이미 문서화한 성취 위계(streakHl: 핑크<노랑<초록<파랑)에 랭크를 그대로 매핑하고
   최상위(마스터)만 오렌지 포인트로 얹음(2026-07-17 재정렬). 예전엔 초록<노랑<핑크<파랑이라 "위험"
   의미의 핑크가 중간에 껴서 위계감이 없었음 — 레벨업 뱃지 색이 안 맞는다는 지적의 근본 원인.
   그라디언트 없이 플랫: 링=형광펜 solid, 이너 페이스=xlight, 텍스트=xdark.
   cls 키(bt-*)는 CSS 색 클래스라 그대로 두고 매핑 색만 교체(t1↔t3 스왑). */
.medal.bt-bronze{background:var(--hi-pink);}
.medal.bt-silver{background:var(--hi-yellow);}
.medal.bt-gold{background:var(--hi-green);}
.medal.bt-plat{background:var(--hi-blue);}
.medal.bt-master{background:var(--hi-orange);}
.medal.bt-bronze .medal-face{background:var(--hi-pink-xlight);color:var(--hi-pink-xdark);}
.medal.bt-silver .medal-face{background:var(--hi-yellow-xlight);color:var(--hi-yellow-xdark);}
.medal.bt-gold .medal-face{background:var(--hi-green-xlight);color:var(--hi-green-xdark);}
.medal.bt-plat .medal-face{background:var(--hi-blue-xlight);color:var(--hi-blue-xdark);}
.medal.bt-master .medal-face{background:var(--hi-orange-xlight);color:var(--hi-orange-xdark);}
/* 상세 팝업 확대용 큰 메달(scale 대신 실측 사이즈 — scale은 레이아웃 박스를 안 넓혀서 타이틀과
   겹쳐 보이는 문제가 있었음). 팝업 동전 앞면에 이 사이즈로 렌더. */
.medal.lg{width:132px;height:132px;box-shadow:0 6px 18px rgba(33,28,21,.22);}
.medal.lg .medal-face{width:104px;height:104px;}
.medal.lg .mv{font-size:32px;letter-spacing:-1px;}
/* 미획득 = 플랫 톤다운(그림자 없이 흐린 베이지 링+면). 획득 메달과 채도로만 구분. */
.medal.locked{background:var(--line);box-shadow:none;}
.medal.locked .medal-face{background:var(--fill);box-shadow:none;color:var(--muted);}
.medal.locked .mv{opacity:.5;}
.medal.sm{width:40px;height:40px;box-shadow:0 1px 4px rgba(33,28,21,.18);}
.medal.sm.locked{box-shadow:none;}
.medal.sm .medal-face{width:31px;height:31px;}
.medal.sm .mv{font-size:10px;letter-spacing:-0.5px;}
/* 보관함: 카테고리별 행(헤더 + 가로 스와이프 티어 스트립) */
.sec-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.btn-viewall{flex:none;font-size:12px;font-weight:700;color:var(--ink);background:var(--surface);border:1px solid var(--ink);border-radius:999px;padding:5px 13px;}
.badge-rows{display:flex;flex-direction:column;gap:16px;}
.badge-row-t{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:7px;display:flex;align-items:baseline;gap:6px;}
.badge-row-t .rc{font-size:11px;font-weight:700;color:var(--muted);}
/* 벨트: 좌우 패딩 없이 edge-to-edge(2026-07-17). scroll-snap proximity로 밀었을 때 부드럽게
   가장 가까운 메달에 살짝 정착(반동감). 세로 패딩은 그림자·눌림 여백으로 유지. */
.medal-strip{display:flex;gap:12px;overflow-x:auto;margin:0 -20px;padding:4px 20px 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.medal-strip::-webkit-scrollbar{display:none;}
.medal-cell{flex:none;display:flex;flex-direction:column;align-items:center;gap:5px;width:64px;}
.medal-cell .mth{font-size:10px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;}
/* 상세 팝업 — 카드는 고정·정지, 동전(메달)만 뒤집힘(2026-07-17 재설계. 예전엔 카드 전체가 3D로
   뒤집혀서 "팝업이 돈다"는 지적. 이제 카드는 그대로 있고 그 안의 원형 동전만 플립). */
.bd-card{width:100%;max-width:320px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:0 24px 64px rgba(33,28,21,.3);padding:34px 26px 26px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.bd-title{font-size:20px;font-weight:800;letter-spacing:-0.3px;}
.bd-coin-wrap{margin:28px 0 6px;perspective:900px;width:132px;height:132px;flex:none;}
.bd-coin{position:relative;width:100%;height:100%;transform-style:preserve-3d;cursor:pointer;}
.bd-coin-front,.bd-coin-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;}
.bd-coin-front .medal{pointer-events:none;}
/* 뒷면 = 블랙 원 + 획득일 */
.bd-coin-back{transform:rotateY(180deg);background:var(--ink);color:var(--on-accent);box-shadow:0 6px 18px rgba(33,28,21,.28);gap:3px;}
.bd-back-date{font-size:19px;font-weight:800;letter-spacing:-0.3px;font-variant-numeric:tabular-nums;}
.bd-back-sub{font-size:11px;font-weight:700;color:var(--line);}
.bd-tier{font-size:15px;font-weight:800;margin-top:14px;}
.bd-hint{font-size:11px;color:var(--muted);margin-top:12px;}
.bd-desc{font-size:13px;color:var(--ink-2);line-height:1.55;margin-top:10px;}
.bd-ranks{display:flex;gap:9px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
.bd-rank{display:flex;flex-direction:column;align-items:center;gap:4px;}
.bd-rank .mth{font-size:10px;font-weight:700;color:var(--muted);}
.bd-rank.cur .mth{color:var(--ink);font-weight:800;}
.vault-sec{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
.vault-sec:first-child{margin-top:0;}
/* 성장 기록 — 통계는 포스트잇(.stat.tier-*), 주간 막대는 잔디 크림톤 위계(g1~g3) */
.growth-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.growth-tiles .stat{padding:13px 4px;}
.growth-tiles .stat .v{font-size:21px;}
.growth-tiles .stat .l{font-size:10px;}
.growth-card{background:var(--surface);border:0.5px solid var(--card-border);box-shadow:var(--shadow);padding:14px 14px 10px;display:flex;flex-direction:column;gap:12px;}
.growth-head{display:flex;align-items:baseline;justify-content:space-between;font-size:13px;font-weight:800;color:var(--ink);}
.growth-head .gsub{font-size:11px;font-weight:700;color:var(--muted);}
.growth-bars{display:flex;align-items:flex-end;gap:6px;height:96px;}
.gbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;}
.gbar-track{flex:1;width:100%;display:flex;align-items:flex-end;}
.gbar{width:100%;min-height:3px;border-radius:0;background-color:var(--fill);transition:height .3s ease;}
.gbar.g1{background-color:var(--ink);opacity:.22;}
.gbar.g2{background-color:var(--ink);opacity:.4;}
.gbar.g3{background-color:var(--ink);opacity:.6;}
.gbar-lbl{font-size:9px;font-weight:700;color:var(--muted);}
.growth-pts{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--ink-2);}
.growth-pts b{color:var(--accent-deep);font-variant-numeric:tabular-nums;}
/* 내가 학습한 단어: 날짜별/상태별 세그먼트 토글 + 날짜 그룹 헤더 */
.seg{display:flex;gap:6px;margin-bottom:8px;}
.seg-b{font-size:12px;font-weight:700;color:var(--ink-2);background:var(--surface);border:1px solid var(--card-border);border-radius:999px;padding:6px 14px;}
.seg-b.on{background:var(--ink);color:var(--on-accent);border-color:var(--ink);}
.date-group{margin-bottom:14px;}
.date-head{font-size:13px;font-weight:800;color:var(--ink);margin:0 2px 6px;display:flex;align-items:baseline;gap:6px;}
.date-head .dn{font-size:11px;font-weight:700;color:var(--muted);}
.vault-link{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:0;box-shadow:var(--shadow);padding:14px 16px;}
.vault-link .n{margin-left:auto;font-size:13px;color:var(--muted);font-weight:600;}
.hero-char{position:relative;z-index:2;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:9px;}
.char-face{width:156px;height:156px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);text-align:center;line-height:1.4;font-weight:600;}
/* CHAR_ART_READY=false일 때 쓰는 최소 플레이스홀더(색상 스와치) */
.char-swatch-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.char-swatch{width:56px;height:56px;border-radius:0;border:0;}
.char-swatch.hi-green{background:var(--hi-green);}
.char-swatch.hi-pink{background:var(--hi-pink);}
.char-swatch.hi-yellow{background:var(--hi-yellow);}
.char-swatch.hi-blue{background:var(--hi-blue);}
.char-swatch-lbl{font-size:12px;font-weight:700;color:var(--muted);}
/* 캐릭터2/3/4 썸네일 — 52px .cf 박스를 꽉 채우는 솔리드 컬러 타일(2026-07-18, 예전엔 28px 칩이
   .cf의 --fill 배경 안에 떠 있어 "액자"처럼 보인다는 지적 — 꽉 채워서 액자 느낌 제거). */
.char-swatch-sm{width:100%;height:100%;border-radius:0;border:0;}
/* 달리는 씬(placeholder). 실제 캐릭터는 Lottie/Rive/스프라이트로 이 슬롯 교체 */
.hero-char.run .char-face{animation:runbob var(--bob,.5s) ease-in-out infinite alternate;}
@keyframes runbob{from{transform:translateY(1px) rotate(-1.5deg);}to{transform:translateY(-7px) rotate(1.5deg);}}
/* 손그림 러프닝 점선 타일(SVG data URI, --ink 하드코딩 — data URI 안에서는 CSS 변수 사용 불가) 반복.
   캐릭터 윤곽선과 같은 원리(잡음 준 점을 직선으로 연결)로 거친 느낌 통일 */
.road{position:absolute;left:0;right:0;bottom:16px;height:10px;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='44'%20height='10'%20viewBox='0%200%2044%2010'%3E%3Cpath%20d='M1.0,4.6%20L4.4,6.3%20L7.8,5.0%20L11.2,4.8%20L14.6,3.8%20L18.0,5.7'%20stroke='%23211C15'%20stroke-width='2.4'%20fill='none'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:repeat-x;
  animation:roadmove var(--road,.6s) linear infinite;}
@keyframes roadmove{from{background-position:0 0;}to{background-position:-44px 0;}}
.mlines{position:absolute;z-index:1;left:calc(50% - 96px);top:46%;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
/* 직선 막대 대신 손그림 러프닝 스트로크(SVG data URI)를 각 막대 크기에 맞춰 늘려 채움 */
.mlines i{height:6px;background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='24'%20height='6'%20viewBox='0%200%2024%206'%3E%3Cpath%20d='M1.0,4.7%20L5.4,3.1%20L9.8,3.2%20L14.2,2.9%20L18.6,1.9%20L23.0,1.3'%20stroke='%23211C15'%20stroke-width='2.2'%20fill='none'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-size:100% 100%;animation:whoosh var(--bob,.5s) linear infinite;}
.mlines i:nth-child(1){width:28px;}
.mlines i:nth-child(2){width:18px;animation-delay:.16s;}
.mlines i:nth-child(3){width:24px;animation-delay:.32s;}
@keyframes whoosh{0%{opacity:0;transform:translateX(10px);}40%{opacity:.55;}100%{opacity:0;transform:translateX(-16px);}}
/* 교통표지판(위젯 콘셉트 프리뷰) — 연속일에 따라 표지가 바뀜 */
.signpost{position:absolute;z-index:3;top:14px;left:14px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.sign-speed{width:46px;height:46px;border-radius:50%;background:var(--surface);border:5px solid var(--danger);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--ink);box-shadow:var(--shadow);font-variant-numeric:tabular-nums;}
.sign-warn{width:46px;height:41px;background:var(--hi-yellow);clip-path:polygon(50% 4%,96% 92%,4% 92%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-weight:800;font-size:17px;color:var(--ink);box-shadow:var(--shadow);}
.sign-lbl{font-size:10px;font-weight:700;color:var(--muted);}
@media (prefers-reduced-motion: reduce){.hero-char.run .char-face,.road,.mlines i{animation:none!important;}}
.char-picker{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:2px;}
.char-opt{font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);box-shadow:var(--shadow);}
.char-opt.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent);}

/* ===== 홈 히어로 씬 (2026-07-17 신설, 구 stage/badge-track/road/mlines 대체) =====
   노트(줄공책) 위에서 고양이(Lottie)가 걷고, 그 위에 스티커(꾹 눌러 드래그 이동)가 떠 있음.
   350×220 비율 고정, overflow:hidden으로 마스크(스티커가 밖으로 최대 50px 나가도 안 보임). */
/* 배경색·외곽선은 피그마(node 3:3185) 실측대로 — 노트 배경은 hero_example_2.svg의 note_BG
   fill(#faf3e5)과 동일 톤, 외곽선은 --ink 굵은 테두리가 아니라 카드류와 같은 옅은 --card-border
   1px(+그림자)로(2026-07-18, 예전엔 진한 잉크 테두리로 잘못 넣었었음). */
/* z-index:0을 명시해 새 스태킹 컨텍스트를 만듦 — 안 그러면 내부의 .hero-cat{z-index:100}이
   이 박스 밖(예: document.body에 포탈되는 모달의 backdrop, z-index:50)까지 뚫고 올라와 보이는
   버그가 있었음(2026-07-18, "모달 눌렀을 때 고양이가 그 위로 올라옴" 리포트로 발견 — position:relative
   만으로는 스태킹 컨텍스트가 안 생겨서 자식 z-index가 이 박스 범위를 벗어나 전역과 경쟁했음). */
.hero-scene{position:relative;z-index:0;width:100%;aspect-ratio:350/220;background-color:#FAF3E5;
  border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
  touch-action:pan-y;}
/* 편집하기 알약 — 우측하단, 검정 필+크림 텍스트(피그마 실측: fill #211C15, text #FFFBF1). */
.hero-edit-btn{position:absolute;right:10px;bottom:10px;z-index:10;display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px 7px 11px;border-radius:999px;background:var(--ink);color:var(--on-accent);
  font-size:13px;font-weight:600;box-shadow:var(--shadow);border:none;cursor:pointer;}
/* 땅: 하단 밴드에서 좌우로 무한 스크롤(전진 착각). 두 벌 타일을 translateX로 흘려 이음매 없음. */
.hero-ground{position:absolute;left:0;right:0;top:84.09%;height:13.64%;overflow:hidden;pointer-events:none;z-index:1;}
.hero-ground-track{position:absolute;left:0;top:0;bottom:0;width:200%;
  background-image:url("img/hero/ground.png?v=0.35.34");background-repeat:repeat-x;background-size:50% 100%;
  animation:heroGround var(--groundDur,7s) linear infinite;}
@keyframes heroGround{from{transform:translateX(0);}to{transform:translateX(-50%);}}
/* 고양이 Lottie 슬롯 — hero_example_2의 character 위치/크기 실측 매핑(offset 91.6,69.8 / 168×140).
   z-index는 스티커의 동적 z(최대 10+개수)보다 항상 높게 고정 — "캐릭터는 항상 최상위" 요구사항
   (2026-07-18). */
.hero-cat{position:absolute;left:26.17%;top:31.73%;width:48%;height:63.64%;z-index:100;pointer-events:none;}
.hero-cat > svg, .hero-cat > div{width:100%!important;height:100%!important;display:block;}
/* 스티커: 중심 좌표(%)에 translate(-50%,-50%). 기본은 살짝 부유 + 소프트 그림자(이미지에 베이크).
   z-index는 고정값이 아니라 JS에서 order 배열 기준으로 인라인 style에 매김(집으면 맨 앞으로) —
   전에는 전부 z-index:3 고정이라 스티커를 옮기면 뒤에 그려지는(배열상 나중) 다른 스티커에 깔려서
   그 자리를 다시 눌러도 엉뚱한 스티커가 반응하는 버그가 있었음(2026-07-18 수정). */
.hero-sticker{position:absolute;transform:translate(-50%,-50%);
  user-select:none;-webkit-user-select:none;touch-action:none;cursor:grab;
  will-change:transform;}
.hero-sticker img, .hero-sticker > svg, .hero-sticker > div{width:100%;height:auto;display:block;pointer-events:none;}
/* 뱃지 스티커 — .medal은 원래 64px 고정 픽셀이라, 스티커 폭(%)에 맞춰 채우도록 이 컨테이너
   안에서만 100%/78%로 재정의(.medal-face 비율은 원래 50/64 그대로 유지). */
/* 노트에 놓인 뱃지 스티커는 이미지 스티커들처럼 손그림 잉크 외곽선이 없어서 밋밋해 보여 2px
   잉크 스트로크를 둘러줌(2026-07-18) — border 대신 box-shadow로(레이아웃에 영향 안 주고 원형
   .medal 모양을 그대로 따라감). */
.hero-badge-sticker{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
  border-radius:50%;box-shadow:0 0 0 2px var(--ink);}
.hero-badge-sticker .medal{width:100%;height:100%;}
.hero-badge-sticker .medal-face{width:78%;height:78%;}
/* 롱프레스로 선택된 스티커의 삭제 X / 리사이즈 배지 — 각각 모서리에 살짝 밖으로.
   주의: 위 ".hero-sticker > div{pointer-events:none}" 규칙(specificity 0,1,1)이 이 배지들도
   자식 div라서 같이 먹여버려 클릭이 그대로 통과되고, 크기 규칙(width:100%;height:auto)까지
   먹여서 22px짜리 원이 스티커 폭 전체로 늘어난 타원이 돼버리는 버그가 있었음(2026-07-18, 스크린샷
   으로 실제 확인). 반드시 같거나 더 높은 특이도(".hero-sticker > .클래스", 0,2,0)로 재정의해서
   pointer-events와 width/height를 둘 다 되돌릴 것 — 하나만 고치면 다른 하나가 남아서 또 깨짐.
   display:block도 같은 규칙이 먹여서 아이콘 중앙정렬(flex)이 깨지고 좌상단에 붙는 버그가 있었음
   (2026-07-18, getBoundingClientRect로 확인) — display:flex도 반드시 같이 재선언할 것. */
.hero-sticker > .hero-sticker-del, .hero-sticker > .hero-sticker-resize{
  pointer-events:auto;width:22px;height:22px;display:flex;}
/* 위치: 선택 시 점선 아웃라인이 outline-offset:4px만큼 스티커 바깥으로 나가 있으므로, 배지도
   그 점선의 모서리에 중심이 오도록 -4px(아웃라인 오프셋) - 11px(배지 반지름) = -15px로 맞춤
   (2026-07-18, 예전엔 -9px라서 점선 모서리와 안 맞고 붕 떠 보였음). */
.hero-sticker-del{position:absolute;top:-15px;right:-15px;border-radius:50%;
  background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(33,28,21,.3);z-index:2;touch-action:none;cursor:pointer;}
.hero-sticker-resize{position:absolute;bottom:-15px;right:-15px;border-radius:50%;
  background:var(--hi-blue-dark);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(33,28,21,.3);z-index:2;touch-action:none;cursor:nwse-resize;}
.hero-sticker-resize .icon{transform:rotate(45deg);}
.hero-sticker.selected{outline:2px dashed rgba(33,28,21,.35);outline-offset:4px;}

/* ===== '내 노트 꾸미기' 모달 (2026-07-18 신설) — 편집하기 진입, 메뉴 3버튼 + 서브화면 =====
   구성 화면이 길어지므로 한 시트에 다 펼치지 않고 메뉴→서브화면(뒤로가기)로 나눔. */
.deco-menu-btn{display:flex;align-items:center;gap:13px;width:100%;background:var(--surface);
  border:0.5px solid var(--card-border);box-shadow:var(--shadow);padding:16px;text-align:left;}
.deco-menu-btn .ico{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--on-accent);
  display:flex;align-items:center;justify-content:center;flex:none;}
.deco-menu-btn .body{flex:1;min-width:0;}
.deco-menu-btn .t{font-size:15px;font-weight:700;}
.deco-menu-btn .s{font-size:12px;color:var(--muted);margin-top:2px;}
/* 노트꾸미기 시트만 60%로 고정(뒤 히어로가 계속 보이게) — 서브화면마다 내용 길이가 달라도
   같은 위치, 내부 스크롤(.sheet-body는 이미 overflow-y:auto+flex:1이라 높이만 고정하면 됨). */
.sheet.deco-sheet{height:60vh;height:60dvh;max-height:60vh;max-height:60dvh;}
/* 초기화하기 — 메뉴 제일 아래, 텍스트 한 줄만, 웜그레이 하이어라키 3단(밝은 --line/중간 --warmgray/
   진한 --muted) 중 가장 진한 --muted로 — 삭제 색(danger)까지는 아니고 은근하게. */
.deco-reset-btn{width:100%;text-align:center;padding:12px 0 4px;font-size:13px;font-weight:600;
  color:var(--muted);}
.deco-mini-hero{width:100%;aspect-ratio:350/220;border-radius:0;overflow:hidden;position:relative;
  border:1px solid var(--card-border);box-shadow:var(--shadow);pointer-events:none;background-color:#FAF3E5;}
.deco-mini-hero .hero-cat{pointer-events:none;}
/* 스티커/뱃지 꾸미기 공용 카드(2026-07-18 재정리 — 보유 스티커·구매가능·획득뱃지 전부 같은
   .deco-owned-cell 카드 레이아웃으로 통일). 배치됨(placed) 표시는 초록 대신 검정 실선(--ink)으로
   — 초록은 이 앱에서 "좋음/정답" 의미로 이미 쓰여서 여기선 그냥 중립적으로 검정을 씀. */
.deco-owned-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.deco-owned-cell{display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--surface);
  border:0.5px solid var(--card-border);box-shadow:var(--shadow);padding:10px 6px;cursor:pointer;}
.deco-owned-cell img, .deco-owned-cell .lot{width:100%;aspect-ratio:1/1;object-fit:contain;}
.deco-owned-cell .medal{margin:6px 0;}
.deco-owned-cell .lbl{font-size:10px;color:var(--muted);font-weight:600;}
.deco-owned-cell.placed{outline:1.5px solid var(--ink);outline-offset:-1.5px;}
/* 구매가능 스티커도 같은 카드 안에 — 원은 카드를 꽉 채우지 않고 절반 크기로(2026-07-18, 예전엔
   카드 없이 원이 화면을 가득 채워 다른 카드류와 안 어울렸음). */
.deco-shop-dot{width:50%;aspect-ratio:1/1;border-radius:50%;box-shadow:var(--shadow);}
.deco-shop-price{font-size:11px;font-weight:700;color:var(--ink-2);background:var(--fill);
  border-radius:999px;padding:3px 9px;}
.deco-lightbox{position:fixed;inset:0;z-index:80;background:rgba(33,28,21,.55);display:flex;
  align-items:center;justify-content:center;padding:40px;}
.deco-lightbox img, .deco-lightbox .lot{width:min(70vw,320px);height:min(70vw,320px);object-fit:contain;
  filter:drop-shadow(0 12px 30px rgba(0,0,0,.35));}
/* 뱃지 꾸미기: 1행 4개, 스티커 카드와 같은 레이아웃(.deco-owned-cell 재사용) */
.deco-badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
/* 뱃지 확대 라이트박스 — 보관함 BadgeDetail의 .bd-coin 3D flip과 같은 원리(다른 이름공간으로 새로
   선언 — 사이즈가 여기 전용이라 기존 .bd-coin과 섞으면 안 됨). 스와이프하면 뒤집혀 이름이 나옴. */
.deco-badge-coin-wrap{perspective:900px;width:min(60vw,220px);height:min(60vw,220px);touch-action:pan-y;}
.deco-badge-coin{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.2,.8,.2,1);}
.deco-badge-coin.flip{transform:rotateY(180deg);}
.deco-badge-coin-front, .deco-badge-coin-back{position:absolute;inset:0;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.deco-badge-coin-front .medal{width:100%;height:100%;}
.deco-badge-coin-front .medal-face{width:78%;height:78%;}
.deco-badge-coin-back{transform:rotateY(180deg);background:var(--ink);color:var(--on-accent);
  box-shadow:0 6px 18px rgba(33,28,21,.28);font-size:15px;font-weight:800;text-align:center;padding:0 16px;}
.hero-sticker.floaty{animation:heroFloat var(--floatDur,3s) ease-in-out infinite;}
@keyframes heroFloat{0%,100%{transform:translate(-50%,-50%) translateY(0) rotate(0deg);}
  50%{transform:translate(-50%,-50%) translateY(-2.5px) rotate(var(--floatRot,1.5deg));}}
.hero-sticker.dragging{cursor:grabbing;z-index:20;animation:none;
  filter:drop-shadow(0 6px 10px rgba(33,28,21,.28));}
@media (prefers-reduced-motion: reduce){.hero-ground-track,.hero-sticker.floaty{animation:none!important;}}

/* 뱃지 팝업 */
.dlg-backdrop{position:fixed;inset:0;background:rgba(33,28,21,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:32px;animation:fade .15s ease;}
.dlg{background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;padding:28px 24px 22px;text-align:center;max-width:300px;width:100%;box-shadow:0 24px 64px rgba(33,28,21,.3);animation:pop .22s cubic-bezier(.2,.9,.3,1.2);}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.dlg-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;}
.dlg-sub{font-size:14px;color:var(--accent-deep);font-weight:800;margin-top:4px;}
.dlg-sub.locked{color:var(--muted);}
.dlg-date{font-size:13px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums;}
.dlg button{margin-top:20px;background:var(--accent);color:var(--on-accent);font-weight:700;font-size:14px;padding:12px;border-radius:0;width:100%;}

/* 레벨 3칸 */
.level-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
/* 포스트잇 느낌 — 형광색 라이트톤 정사각(카드보다 각짐), 안의 숫자/글자는 .hl 형광펜(진한 톤)로 대비 */
.stat{border-radius:0;box-shadow:var(--shadow);padding:14px 8px;text-align:center;background:var(--surface);border:1px solid var(--ink);}
.stat.tier-green{background:var(--hi-green-light);border-color:transparent;}
.stat.tier-yellow{background:var(--hi-yellow-light);border-color:transparent;}
.stat.tier-pink{background:var(--hi-pink-light);border-color:transparent;}
.stat.tier-blue{background:var(--hi-blue-light);border-color:transparent;}
.stat .v{display:inline-block;font-size:22px;font-weight:800;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;}
.stat .v.accent{color:var(--accent-deep);}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}

/* 형광펜 강조 — 텍스트 하단 ~60%만 색 박스, 좌우로 살짝 삐져나옴. 손그림 느낌으로 살짝 기울임 */
.hl{background-repeat:no-repeat;background-size:100% 58%;background-position:0 66%;padding:0 7px;margin:0 -7px;border-radius:0;display:inline-block;}
.hl-green{background-image:linear-gradient(var(--hi-green),var(--hi-green));}
.hl-pink{background-image:linear-gradient(var(--hi-pink),var(--hi-pink));}
.hl-yellow{background-image:linear-gradient(var(--hi-yellow),var(--hi-yellow));}
.hl-blue{background-image:linear-gradient(var(--hi-blue),var(--hi-blue));}

/* 하이어라키 뱃지 — 연한 배경 + 가장진한 텍스트(.tag/.badge 등 이미 배경 있는 요소용) */
.tier-green{background:var(--hi-green-light);color:var(--hi-green-xdark);}
.tier-yellow{background:var(--hi-yellow-light);color:var(--hi-yellow-xdark);}
.tier-pink{background:var(--hi-pink-light);color:var(--hi-pink-xdark);}
.tier-blue{background:var(--hi-blue-light);color:var(--hi-blue-xdark);}

/* 루틴 스텝 */
.step{display:flex;align-items:center;gap:13px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:14px 16px;}
.step.active{border:1.5px solid var(--ink);}
.step-ico{width:38px;height:38px;border-radius:0;background:var(--bg);border:0.5px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--ink-2);flex:none;}
/* 홈 "오늘의 루틴"·학습 메뉴(단어카드/듣기세션/레벨테스트) 왼쪽 아이콘 슬롯만 원형으로(테스트 전용) */
.step-ico.round{border-radius:50%;}
.step-ico.round.black{background:var(--ink);color:var(--on-accent);border-color:var(--ink);}
.step.done .step-ico{background:var(--ink);border-color:var(--ink);color:var(--on-accent);}
.step-body{flex:1;min-width:0;}
.step-title{font-size:15px;font-weight:700;}
.step-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.step-cta{font-size:13px;font-weight:700;color:var(--accent-deep);flex:none;}
.step .check{color:var(--good);font-weight:800;}

/* 잔디 — 섹션 타이틀만 "학습 캘린더"로(2026-07-16), 시각화(히트맵 스트립) 자체는 유지.
   2026-07-18: 잉크 1색+불투명도 3단 대신, 달마다 형광펜 색이 바뀌고(피그마 디자인 반영) 옅음/보통/
   진함은 그 색의 light/base/dark 토큰으로 표현 — 색은 grass 배열에서 인라인 style로 직접 지정(JS,
   달마다 동적으로 정해지는 색이라 고정 클래스로 못 씀). */
.grass-months{display:flex;gap:3px;margin-bottom:4px;}
.grass-months span{font-size:8px;font-weight:800;letter-spacing:.02em;color:var(--muted);text-align:left;}
.grass{display:grid;grid-template-columns:repeat(17,1fr);gap:3px;}
.grass i{aspect-ratio:1;border-radius:0;background-color:var(--fill);display:block;}

/* 사전 검색 */
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--ink);border-radius:0;padding:11px 14px;box-shadow:var(--shadow);}
.search input{flex:1;border:none;outline:none;font-size:15px;background:none;color:var(--ink);}
.search input::placeholder{color:var(--muted);}
.search .mag{color:var(--muted);display:flex;align-items:center;}
.icon{display:inline-block;vertical-align:middle;fill:currentColor;flex:none;}

.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);}
.chip.on{background:var(--ink);color:var(--on-accent);border-color:var(--ink);}

/* 사전 허브 목록 헤더 */
.listhead{display:flex;align-items:center;gap:4px;margin:2px 0 0;}
.listhead .back{color:var(--muted);display:flex;padding:4px 8px 4px 0;}
.listhead b{font-size:17px;letter-spacing:-0.3px;}
.listhead .cnt{font-size:13px;color:var(--muted);font-weight:600;margin-left:2px;}

.addbar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);border-radius:0;padding:12px 14px;}
.addbar .t{font-size:13px;color:var(--ink-2);}
.addbar .t b{color:var(--accent-deep);}
.addbar button{background:var(--accent);color:var(--on-accent);font-weight:700;font-size:13px;padding:8px 14px;border-radius:0;}

/* 단어 리스트 행 */
.wlist{display:flex;flex-direction:column;gap:8px;}
.wrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:13px 15px;transition:transform .1s;}
.wrow:active{transform:scale(.99);}
.wrow .w{font-size:16px;font-weight:700;}
.wrow .k{font-size:13px;color:var(--muted);margin-top:1px;}
.wrow .meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;}
.wrow .meta-line{display:flex;gap:4px;align-items:center;justify-content:flex-end;}
/* 뱃지 — CEFR 레벨(.tag.lv)만 형광펜 느낌(라운드 없는 납작한 색칠 조각)으로 구분, 나머지는 알약형
   통일(2026-07-14). 레벨은 컬러위계(연두<옐로우<핑크<블루)를 그대로 반영.
   예전엔 .tag.lv(specificity 0,2,0)가 .tier-*(0,1,0)를 눌러 위계색이 안 먹었음 → .tag.tier-*를 .tag.lv 뒤에 정의해 복구. */
.tag{font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;background:var(--fill);color:var(--ink-2);letter-spacing:.2px;}
.tag.lv{border-radius:0;background:var(--hi-yellow);color:var(--hi-yellow-xdark);}
.tag.tier-green{background:var(--hi-green);color:var(--hi-green-xdark);}
.tag.tier-yellow{background:var(--hi-yellow);color:var(--hi-yellow-xdark);}
.tag.tier-pink{background:var(--hi-pink);color:var(--hi-pink-xdark);}
.tag.tier-blue{background:var(--hi-blue);color:var(--hi-blue-xdark);}
.tag.done{background:var(--hi-green-light);color:var(--hi-green-xdark);}
/* 복습 임박도 — 잉크 위계(잔디와 같은 원리): 임박할수록 진한 잉크, 여유 있을수록 옅음 */
/* 복습뱃지 위계 — 가장 진한 단계(t0)도 미드 크림톤(--warmgray)까지만(2026-07-17, 50% 잉크도
   너무 진하다는 지적으로 재완화). 아래로는 잉크 알파를 옅게 깔아 단계감만 유지. */
.tag.due-t0{background:var(--warmgray);color:var(--ink);}
.tag.due-t1{background:rgba(33,28,21,.16);color:var(--ink);}
.tag.due-t2{background:rgba(33,28,21,.09);color:var(--ink-2);}
.tag.due-t3{background:rgba(33,28,21,.04);color:var(--ink-2);}
.tag.mine{background:var(--hi-blue-light);color:var(--hi-blue-xdark);}
.tag.sensecount{background:var(--hi-pink-light);color:var(--hi-pink-xdark);}

/* 카테고리 선택: 레벨 카드 그리드 · 어근 행 목록 */
.lv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.lv-card{border-radius:0;box-shadow:var(--shadow);padding:16px 8px 14px;text-align:center;transition:transform .1s;background:var(--surface);border:0.5px solid var(--card-border);}
.lv-card.tier-green{background:var(--hi-green-light);border-color:transparent;}
.lv-card.tier-yellow{background:var(--hi-yellow-light);border-color:transparent;}
.lv-card.tier-pink{background:var(--hi-pink-light);border-color:transparent;}
.lv-card.tier-blue{background:var(--hi-blue-light);border-color:transparent;}
.lv-card:active{transform:scale(.96);}
.lv-card .lv{font-size:21px;font-weight:800;color:var(--accent-deep);letter-spacing:-0.3px;}
.lv-card .nm{font-size:12px;font-weight:700;color:var(--ink-2);margin-top:2px;}
.lv-card .n{font-size:11px;color:var(--muted);margin-top:1px;font-weight:600;font-variant-numeric:tabular-nums;}
.rootrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:13px 15px;transition:transform .1s;}
.rootrow:active{transform:scale(.99);}
.rootrow .ax{font-size:16px;font-weight:800;color:var(--accent-deep);min-width:62px;}
.rootrow .gl{flex:1;font-size:13px;color:var(--ink-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rootrow .n{font-size:12px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;flex:none;}
.more-btn{display:block;width:100%;text-align:center;background:var(--fill);color:var(--ink-2);font-weight:700;font-size:13px;padding:12px;border-radius:0;}

/* 사전 목록 다중선택(담기) 체크 · 내 단어장(커스텀 리스트) UI */
.wchk{width:22px;height:22px;border-radius:999px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;}
.wchk.on{background:var(--accent);border-color:var(--accent);}
.wl-newrow{display:flex;gap:8px;}
.wl-newrow input{flex:1;border:1px solid var(--line);border-radius:0;padding:11px 14px;font-size:14px;background:var(--surface);outline:none;color:var(--ink);}
.wl-newrow input::placeholder{color:var(--muted);}
.wl-newrow button{background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:0 16px;border-radius:0;white-space:nowrap;flex:none;}
.wl-actions{display:flex;gap:8px;}
.wl-actions button{flex:1;padding:11px 6px;border-radius:0;font-weight:700;font-size:12px;white-space:nowrap;}
.wl-actions .primary{flex:1.5;}
.wl-actions .primary{background:var(--accent);color:#fff;}
.wl-actions .ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink-2);box-shadow:var(--shadow);}
.wl-remove{margin-left:auto;flex:none;color:var(--muted);display:flex;padding:6px;}

/* 준비중 */
.soon{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:64px 24px;text-align:center;color:var(--muted);}
.soon .big{font-size:16px;font-weight:700;color:var(--ink-2);}
.soon .mascot{width:88px;height:88px;font-size:11px;}

/* 하단 탭바 (홈 중앙) — 화면 실제 하단에 고정. 키보드가 뜨면(레이아웃 뷰포트 기준 고정이라)
   키보드 뒤로 가려지고, 키보드가 내려가면 다시 보인다. 그만큼 학습카드 쪽 공간이 넉넉해짐.
   아래 마진 제거 + 상단 패딩 축소로 높이 낮춤(2026-07-14). */
.tabbar{display:flex;align-items:flex-end;justify-content:space-around;background:var(--ink);border-top:none;padding:6px 8px calc(env(safe-area-inset-bottom));position:relative;z-index:5;overflow:visible;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--on-accent);font-size:11px;font-weight:600;padding:1px 0;overflow:visible;}
.tab .ti{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
/* 탭별로 다른 형광펜색 — 홈도 다른 탭과 같은 레벨(더 이상 튀어나오는 원형 FAB 아님) */
.tab.tab-learn.on{color:var(--hi-green);}
.tab.tab-dict.on{color:var(--hi-yellow);}
.tab.tab-home.on{color:var(--hi-pink);}
.tab.tab-talk.on{color:var(--hi-blue);}
.tab.tab-box.on{color:var(--hi-orange);}

/* 바텀시트 (단어 상세) */
.sheet-backdrop{position:fixed;inset:0;background:rgba(33,28,21,.32);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .18s ease;}
.sheet{width:100%;max-width:520px;background:var(--surface);border:0.5px solid var(--card-border);border-bottom:none;border-radius:0;box-shadow:var(--shadow-sheet);max-height:88vh;max-height:88dvh;display:flex;flex-direction:column;animation:slideup .24s cubic-bezier(.2,.8,.2,1);}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grab{width:38px;height:4px;background:var(--line);border-radius:0;margin:10px auto 2px;flex:none;}
.sheet-head{display:flex;align-items:center;gap:10px;padding:6px 18px 10px;flex:none;}
/* 타이틀(<b>)과 아이콘 버튼(뒤로·닫기)이 미묘하게 세로 정렬이 안 맞던 문제(2026-07-18) — 원인은
   커스텀 폰트(LINE Seed KR Extra Bold)의 기본 line-height가 아이콘 SVG 박스 높이와 안 맞아서
   flex align-items:center로 박스는 가운데 맞아도 눈에 보이는 글자 자체는 살짝 아래로 처짐.
   line-height:1 + 아이콘 버튼을 자체 flex 중앙정렬로 바꿔 눈으로 보이는 중심을 맞춤. */
.sheet-head b{line-height:1;}
.sheet-head .back{font-size:20px;color:var(--muted);padding:2px 6px;margin-left:-6px;
  display:inline-flex;align-items:center;justify-content:center;}
.sheet-head .sp{flex:1;}
.sheet-head .fav{font-size:13px;font-weight:600;color:var(--muted);}
.favstar{color:var(--muted);display:flex;padding:2px 4px;}
.favstar.on{color:var(--accent);}
.favstar:active{transform:scale(.9);}
/* flex:1+min-height:0 필수 — 없으면 내용이 길어질 때(다의어 등) 이 영역이 축소되지 않고
   시트 전체가 화면 밖으로 밀려 상단 헤더(닫기 버튼)까지 넘어간다(flex item min-height:auto 버그). */
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px 28px;display:flex;flex-direction:column;gap:16px;flex:1;min-height:0;}
.wd-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.wd-word{font-size:28px;font-weight:800;letter-spacing:-0.5px;}
.wd-ipa{font-size:14px;color:var(--muted);}
.wd-play{margin-left:auto;background:var(--fill);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--ink-2);}
.wd-pos{font-size:13px;color:var(--ink-2);line-height:1.6;}
.wd-en{font-size:13px;color:var(--muted);line-height:1.55;}
.wd-lookup{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px;}
.wd-lookup.err{color:var(--danger);}
.wd-retry{background:var(--ink);color:var(--on-accent);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;}
.wd-sec-t{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.2px;}
.wd-chips{display:flex;flex-wrap:wrap;gap:7px;}
.lchip{font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--fill);color:var(--ink);border:1px solid transparent;}
.lchip.link{background:var(--surface);border-color:var(--line);}
.lchip.link:active{background:var(--accent-soft);}
.lchip.affix{background:var(--ink);color:var(--on-accent);}
.lchip .g{color:var(--muted);font-weight:500;font-size:11px;margin-left:4px;}
.wd-ex{background:var(--surface-container);border-radius:0;padding:13px 15px;}
.wd-ex .en{font-size:14px;font-weight:600;line-height:1.5;}
.wd-ex .en em{font-style:normal;color:var(--accent-deep);}
.wd-ex .ko{font-size:12px;color:var(--muted);margin-top:5px;}
.wd-ex + .wd-ex{margin-top:8px;}
.ex-word{color:var(--accent-deep);text-decoration:underline;text-decoration-color:var(--accent-soft);text-underline-offset:2px;}

/* 다의어: 의미(sense) 카드 리스트 */
.sense{background:var(--bg);border:1px solid var(--line);border-radius:0;padding:13px 15px;transition:border-color .12s;}
.sense + .sense{margin-top:8px;}
.sense.open{background:var(--surface);border:1.5px solid var(--accent);box-shadow:var(--shadow);}
.s-head{display:flex;align-items:flex-start;gap:8px;}
.s-cue{font-size:12px;color:var(--muted);}
.s-ko{font-size:16px;font-weight:800;margin-top:1px;letter-spacing:-0.2px;}
.s-meta{margin-left:auto;display:flex;gap:4px;flex:none;align-items:center;}
.s-en{font-size:13px;color:var(--ink-2);font-style:italic;line-height:1.5;margin-top:9px;}
.sense .wd-ex{margin-top:9px;background:var(--fill);}
.s-add{display:block;width:100%;margin-top:10px;text-align:center;background:var(--accent-soft);color:var(--accent-deep);font-weight:700;font-size:13px;padding:9px;border-radius:0;}
.s-add.added{background:var(--fill);color:var(--muted);}
.s-more{display:block;width:100%;margin-top:6px;text-align:center;background:var(--fill);color:var(--ink-2);font-weight:700;font-size:13px;padding:11px;border-radius:0;}

.ext{display:flex;flex-wrap:wrap;gap:7px;}
.ext a{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:6px 12px;text-decoration:none;}
.empty-note{font-size:12px;color:var(--muted);}

/* 학습 카드 세션. min-height(고정 height 아님)라 공간이 부족하면(키보드 등) 자연스럽게
   더 자라나고 .scroll(overflow-y:auto)이 스크롤을 맡는다 — 문제(qcard)는 맨 위라 항상
   스크롤 없이 바로 보이고, 부족분은 힌트·확인 버튼 쪽이 스크롤 대상이 된다. */
.study{display:flex;flex-direction:column;gap:14px;min-height:100%;}
.study-top{display:flex;align-items:center;gap:12px;}
.study-top .x{color:var(--muted);display:flex;padding:2px;}
.study-bar{flex:1;height:8px;background:var(--fill);border-radius:999px;overflow:hidden;}
.study-bar i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .3s ease;}
.study-n{font-size:13px;font-weight:700;color:var(--ink-2);font-variant-numeric:tabular-nums;flex:none;}
.qcard{background:var(--surface);border:0.5px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px;display:flex;flex-direction:column;gap:14px;}
.qlvrow{display:flex;align-items:center;margin-bottom:-6px;}
.qlvrow .tag.lv{margin-left:auto;}
.qsofthint{font-size:12px;font-weight:700;color:var(--hi-blue-dark);}
.qlen-hint{font-size:12px;font-weight:700;color:var(--hi-pink-dark);}
.qhint-labels{display:flex;align-items:center;gap:8px;}
.qaudio{display:flex;align-items:center;gap:6px;}
.qaudio button{display:flex;align-items:center;gap:3px;color:var(--muted);background:var(--fill);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;}
.study-top .favstar{margin-left:4px;}
.qcue{font-size:12px;color:var(--muted);}
.qko{font-size:17px;font-weight:800;letter-spacing:-0.3px;line-height:1.4;}
.qdiv{height:1px;background:var(--line);margin:2px 0;}
.qen{font-size:17px;font-weight:600;line-height:1.65;}
.qen .blank{display:inline-block;min-width:74px;border-bottom:2.5px solid var(--accent);vertical-align:baseline;height:1.1em;margin:0 2px;}
.qen .fill{color:var(--accent-deep);font-weight:800;border-bottom:2.5px solid var(--accent);padding:0 2px;}
.qen .fill.bad{color:var(--danger);border-color:var(--danger);text-decoration:line-through;text-decoration-color:color-mix(in srgb, var(--danger) 47%, transparent);}
.qhint{font-size:12px;color:var(--muted);}
.qnudge{font-size:12px;color:var(--accent-deep);background:var(--accent-soft);border-radius:0;padding:8px 10px;line-height:1.4;}
/* 입력창 = 문장 속 빈칸. 회색 솔리드 + 살짝 라운드, 문장 글자 크기 그대로, 네이티브 캐럿이 깜빡임 */
.qbox{border:none;border-radius:0;background:var(--fill);font:inherit;font-weight:800;font-size:inherit;line-height:inherit;color:var(--accent-deep);text-align:center;padding:2px 16px;outline:none;vertical-align:baseline;caret-color:var(--accent);min-width:64px;}
.qbox:focus{background:var(--accent-soft);} /* 포커스 링 없이 톤만 반 단계(옅은 골드) — 예전 #E5D9B8은 너무 진했음(2026-07-17). 포커스 표시는 깜빡이는 캐럿이 담당 */
/* 글자수 힌트: 칸을 나누지 않고, 박스 하나의 길이만 정답 글자 수에 맞춰 늘어남(2026-07-18,
   예전엔 글자마다 칸을 나눠 위치별 정오까지 표시했는데 요청으로 단일 박스로 단순화) —
   실제 글자 수는 qlen-hint 라벨(분홍색)로 별도 표시. */
.qbox-view.lenbox{min-width:0;}
@keyframes caretblink{50%{opacity:0;}}
@media (prefers-reduced-motion: reduce){.cell.cur::after{animation:none;}}
.cell-catch{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0;font-size:16px;}
/* 지속 입력: 표시(셀/박스/정답)는 프리젠테이션, 실제 키 입력은 이 보이지 않는 input이 받음.
   카드 내내 언마운트 안 돼 정답 후에도 포커스 유지(키보드 안 내려감). */
.ans-wrap{position:relative;display:inline-flex;align-items:center;vertical-align:middle;}
.ans-catch{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0;font-size:16px;background:transparent;-webkit-appearance:none;caret-color:transparent;}
.qbox-view{display:inline-flex;align-items:center;justify-content:center;min-width:64px;min-height:34px;background:var(--accent-soft);border-radius:0;font-weight:800;font-size:inherit;color:var(--accent-deep);padding:2px 16px;}
.qcaret{display:inline-block;width:2px;height:17px;background:var(--accent);margin-left:1px;animation:caretblink 1.06s steps(1) infinite;}
@media (prefers-reduced-motion: reduce){.qcaret{animation:none;}}
/* 하단 액션바 — 키보드 위에 붙어 항상 눌리게 */
.qbottom{margin-top:auto;position:sticky;bottom:max(40px, var(--kb, 0px));background:var(--bg);padding-top:8px;}
/* 힌트 버튼 */
.qhintrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.qhint-lbl{font-size:12px;font-weight:700;color:var(--muted);}
/* 힌트 버튼 — 예전엔 배경(--fill)이 카드와 거의 같아 버튼인지 안 보였음 → 잉크 스트로크로 또렷하게(2026-07-17). */
.qhint-btn{font-size:13px;font-weight:700;color:var(--ink);background:var(--surface);border:1px solid var(--ink);border-radius:999px;padding:8px 14px;}
.qhint-btn.on{background:var(--accent);color:var(--on-accent);}
.qhint-btn.play{display:inline-flex;align-items:center;gap:5px;}

/* 딕테이션(듣기 세션): 단어 수만큼 빈칸 — qbox를 좁게 재사용해 나란히 줄바꿈.
   빈칸 폭은 항상 정답 글자 수 기준 고정(입력 중에도 안 늘어남) — 왼쪽부터 채워지고
   남은 자리가 자연히 빈칸처럼 보임(자모 단위로 나누지 않음). 학습 형식이라 완전히
   맞혀야 다음으로 넘어가므로, 오답 시 칸별 정오만 색으로 표시(정답 문자는 안 보여줌). */
/* 듣기 카드: 듣기난이도/예문/예문뜻 사이 간격이 너무 컸음 → 카드 gap을 절반으로(사용자 지적) */
.qcard.dict-card{gap:7px;position:relative;}
.dict-countdown-overlay{position:fixed;inset:0;background:rgba(33,28,21,.1);display:flex;align-items:center;justify-content:center;z-index:55;transition:opacity .3s ease;}
.dict-countdown-overlay.out{opacity:0;pointer-events:none;}
/* 듣기 난이도 뱃지 — 어휘 CEFR과는 별개 지표(연음·문장길이 반영), 기존 상태 색 재사용 */
.dict-difficulty{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
/* 난이도 옆 다시듣기(사운드) 버튼 */
.dict-replay{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:999px;background:var(--ink);color:var(--on-accent);flex:none;}
.dict-replay:active{transform:scale(.92);background:var(--ink-2);color:var(--on-accent);}
/* 예문 뜻 — 예전엔 작은 회색(.qcue)이라 잘 안 보였음 → 크게·볼드로 강조(사용자 요청) */
.dict-meaning{font-size:16px;font-weight:800;line-height:1.5;letter-spacing:-0.2px;color:var(--ink);}
.tag.dl1{background:var(--hi-green-light);color:var(--hi-green-xdark);}
.tag.dl2{background:var(--hi-yellow-light);color:var(--hi-yellow-xdark);}
.tag.dl3{background:var(--hi-pink-light);color:var(--hi-pink-xdark);}
.dict-words{display:flex;flex-wrap:wrap;gap:11px 7px;font-size:17px;font-weight:600;line-height:1.65;}
.dict-word{display:inline-flex;flex-direction:column;align-items:center;gap:4px;}
.dict-word-row{display:inline-flex;align-items:baseline;}
.dict-box{min-width:30px;text-align:left;}
.dict-box.ok{background:var(--good-container);color:var(--good);}
.dict-box.wrong{background:var(--danger-container);color:var(--danger);}
/* 맞게 타이핑한 순간 입력창이 사라지고 텍스트로 고정 — 살짝 튀는 팝 모션 */
.dict-fixed{font-weight:800;color:var(--accent-deep);animation:dictfix .18s ease;}
@keyframes dictfix{from{transform:scale(1.18);opacity:.4;}to{transform:scale(1);opacity:1;}}
@media (prefers-reduced-motion: reduce){.dict-fixed{animation:none;}}
/* 단어길이 보기: 정답 글자 수만큼 작은 네모 칸(추측 아님, 정확한 길이) — 단어 아래 표시 */
.len-row{display:flex;gap:3px;}
.len-row i{width:9px;height:9px;border-radius:0;background:var(--accent-soft);}

/* 듣기 세션 시작 전 3·2·1 카운트다운 원 */
.countdown-circle{width:48px;height:48px;border-radius:50%;background:var(--ink);color:#FFFBF1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;animation:countpulse .7s ease;}
@keyframes countpulse{from{transform:scale(1.3);opacity:0;}to{transform:scale(1);opacity:1;}}
@media (prefers-reduced-motion: reduce){.countdown-circle{animation:none;}}
.dict-result{font-size:17px;font-weight:600;line-height:1.08;display:flex;flex-wrap:wrap;gap:6px 7px;align-items:baseline;}
.dict-rword{color:inherit;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:3px;}
.dict-rword:disabled{cursor:default;color:var(--muted);text-decoration:none;}
/* 정답 화면의 발음 해설(연음·축약) — 보조 정보라 낮은 위계로 */
.dict-notes{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
.dict-note{font-size:12px;font-weight:500;color:var(--ink-2);background:var(--surface-container);border-radius:0;padding:9px 11px;line-height:1.5;}
.dict-note b{color:var(--accent-deep);font-weight:800;}
.dict-relearn-note{font-size:12px;font-weight:700;color:var(--hi-yellow-xdark);background:var(--hi-yellow-light);border-radius:0;padding:9px 11px;}
.qsub{background:var(--accent);color:var(--on-accent);font-weight:700;font-size:15px;padding:14px 20px;border-radius:0;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.qres{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;}
.qres.ok{color:var(--good);}
.qres.no{color:var(--danger);}
.qres .due{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600;background:var(--fill);padding:5px 10px;border-radius:999px;}
.qsyn{display:flex;flex-direction:column;gap:6px;}
.qsyn-lbl{font-size:12px;font-weight:700;color:var(--muted);}
.qsyn-chips{display:flex;gap:6px;flex-wrap:wrap;}
.qsyn-chip{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:5px 10px;}
.qsyn-chip.link{color:var(--accent-deep);}
/* 퀴즈: 4지선다 뜻 맞추기 */
.qchoices{display:flex;flex-direction:column;gap:8px;}
.qchoice{width:100%;text-align:left;padding:13px 15px;border-radius:0;background:var(--fill);font-size:15px;font-weight:700;color:var(--ink-2);border:1.5px solid transparent;}
.qchoice.correct{background:var(--accent-soft);color:var(--accent-deep);border-color:var(--accent);}
.qchoice.wrong{background:#fbe9e9;color:#d64545;border-color:#d64545;}
/* 듣기 세션(딕테이션) */
/* 입력칸은 다른 인풋(.search 등)과 동일한 밝은 서피스+보더 문법 — 노란 크림(--fill) 면 + 골드
   포커스는 "입력하는 곳"으로 안 읽힌다는 지적으로 교체(2026-07-17). */
.qdictate{width:100%;border:0.5px solid var(--card-border);border-radius:0;background:var(--surface);font:inherit;font-weight:600;font-size:16px;line-height:1.5;color:var(--ink);padding:12px 14px;outline:none;resize:none;}
.qdictate:focus{border-color:var(--ink);}
.qdictate::placeholder{color:var(--muted);}
.qdictate-result{font-size:16px;line-height:1.7;}
.dw-ok{color:var(--ink);}
.dw-bad{color:#d64545;text-decoration:underline;text-decoration-color:#d6454577;}
.qactions{margin-top:auto;display:flex;gap:8px;}
.qactions button{flex:1;padding:14px;border-radius:0;font-weight:700;font-size:15px;}
.qactions .ghost{background:var(--surface);border:1.5px solid var(--ink);color:var(--ink);}
.qactions .primary{background:var(--accent);color:var(--on-accent);}
.finish{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding:40px 20px;}
.finish .big{font-size:40px;font-weight:800;color:var(--accent-deep);font-variant-numeric:tabular-nums;}
.finish .msg{font-size:15px;font-weight:700;}

/* ---------- 발음 클리닉 ---------- */
.sub-head{display:flex;align-items:center;gap:8px;}
.sub-head .back{font-size:24px;color:var(--muted);padding:0 6px 0 0;line-height:1;}
.pron-prog{font-size:13px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;}
.pron-card{background:var(--surface);border:0.5px solid var(--card-border);box-shadow:var(--shadow);padding:18px 16px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.pron-en{font-size:20px;font-weight:800;line-height:1.4;color:var(--ink);}
.pron-ko{font-size:14px;color:var(--muted);}
.pron-play{margin-top:4px;display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--on-accent);font-weight:700;font-size:13px;padding:9px 14px;border-radius:999px;}
.pron-actions{margin-top:18px;display:flex;flex-direction:column;gap:10px;align-items:center;}
/* 마이크 버튼 — 아이콘+글자 한 줄, 얇게 */
.pron-mic{width:100%;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:var(--on-accent);font-weight:800;font-size:15px;padding:13px;border-radius:0;}
.pron-mic.on{background:var(--danger);}
.pron-mic:disabled{opacity:.6;}
.pron-result{margin-top:18px;display:flex;flex-direction:column;gap:16px;}
.pron-score{display:flex;flex-direction:column;align-items:center;gap:6px;}
.pron-score .pv{font-size:52px;font-weight:800;line-height:1.15;font-variant-numeric:tabular-nums;color:var(--ink);}
.pron-score .pl{font-size:12px;font-weight:700;color:var(--muted);}
.pron-words{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.pron-w{font-size:15px;font-weight:700;padding:5px 10px;border-radius:999px;}
.pron-w.ok{background:var(--hi-green-light);color:var(--hi-green-xdark);} /* 맞게 발음 = 연두 */
.pron-w.no{background:var(--warmgray);color:var(--ink);} /* 부정확 = 진한 웜그레이(더 잘 보이게) */
.pron-tip{font-size:13px;color:var(--ink-2);text-align:center;line-height:1.5;}

/* ---------- 회화 탭 — 대화방 목록 + 채팅 ---------- */
.step.soon{opacity:.5;}
.talk-room{display:flex;align-items:center;gap:13px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:8px;}
.talk-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:none;}
.talk-avatar-sm{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex:none;}
.talk-avatar.hi-green, .talk-avatar-sm.hi-green{background:var(--hi-green);color:var(--hi-green-xdark);}
.talk-avatar.hi-yellow, .talk-avatar-sm.hi-yellow{background:var(--hi-yellow);color:var(--hi-yellow-xdark);}
.talk-avatar.hi-pink, .talk-avatar-sm.hi-pink{background:var(--hi-pink);color:var(--hi-pink-xdark);}
.talk-avatar.hi-blue, .talk-avatar-sm.hi-blue{background:var(--hi-blue);color:var(--hi-blue-xdark);}
.talk-avatar.hi-orange, .talk-avatar-sm.hi-orange{background:var(--hi-orange);color:var(--ink);}
.talk-room-body{flex:1;min-width:0;}
.talk-room-name{font-size:14px;font-weight:800;}
.talk-room-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

.talk-head{display:flex;align-items:center;gap:10px;padding:4px 2px 10px;}
.talk-head-name{font-weight:800;font-size:16px;}
.talk-head-trait{font-size:12px;color:var(--muted);}
.talk-end-btn{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:7px 12px;flex:none;}
.talk-toggles{display:flex;gap:8px;margin-bottom:10px;}
.talk-toggle{font-size:12px;font-weight:700;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:6px 12px;}
.talk-toggle.on{background:var(--ink);color:var(--on-accent);}

/* 대화방 = 채팅창 느낌(2026-07-16) — 말풍선이 그 안에서만 오가는 스크롤 영역.
   흰 카드+검정 테두리로 페이지와 분리했던 이전 버전이 "흰색 네모"처럼 튀어 보인다는 지적으로,
   페이지 배경(--bg)과 같은 밝은 크림으로 통일하고 별도 테두리도 제거(2026-07-16). */
.talk-msgs{display:flex;flex-direction:column;gap:10px;padding:12px 4px;background:var(--bg);
  flex:1;min-height:0;overflow-y:auto;}
.talk-msg-row{display:flex;align-items:flex-end;gap:8px;min-width:0;}
/* 봇 행: 아바타를 말풍선(위쪽)에 붙이려고 상단 정렬 — 예전엔 flex-end라 아바타가 뜻·하트 아래로
   내려가 "말풍선 아래에 떨어져" 보였음(2026-07-17 수정). */
.talk-msg-row.bot{justify-content:flex-start;align-items:flex-start;}
.talk-msg-row.user{justify-content:flex-end;}
/* min-width:0 필수 — flex item 기본값(min-width:auto)이 내용의 자연폭을 하한으로 잡아버려서,
   긴 영어 문장이 말풍선 안에서 안 줄바꿈되고 max-width:78%를 무시한 채 오른쪽으로 삐져나가
   화면 전체에 가로스크롤이 생기는 버그가 있었음(2026-07-18, "대화창에 가로스크롤 생김" 리포트). */
.talk-msg{display:flex;flex-direction:column;max-width:78%;min-width:0;gap:3px;}
.talk-msg.bot{align-items:flex-start;}
.talk-msg.user{align-items:flex-end;}
.talk-bubble{padding:10px 13px;font-size:14px;line-height:1.5;font-weight:600;display:flex;align-items:center;gap:8px;position:relative;min-width:0;overflow-wrap:break-word;word-break:break-word;}
.talk-msg.bot .talk-bubble{background:var(--fill);color:var(--ink);}
.talk-msg.user .talk-bubble{background:var(--ink);color:var(--on-accent);}
/* 말풍선 꼬리 — 봇은 왼쪽 아래(아바타 쪽), 유저는 오른쪽 아래. 피드백(.talk-fb) 카드에는
   꼬리가 없어서 "대화"와 "어드바이스"가 형태로 구분된다(2026-07-17). */
.talk-msg.bot .talk-bubble::after{content:"";position:absolute;left:-7px;bottom:8px;width:0;height:0;
  border-top:10px solid transparent;border-bottom:10px solid transparent;border-right:9px solid var(--fill);}
.talk-msg.user .talk-bubble::after{content:"";position:absolute;right:-12px;bottom:8px;width:0;height:0;
  border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:14px solid var(--ink);}
.talk-play{color:inherit;opacity:.7;flex:none;}
.talk-msg-ko{font-size:11px;color:var(--muted);padding:0 3px;}
.talk-msg-actions{display:flex;align-items:center;gap:4px;}
.talk-msg-fav{color:var(--muted);padding:0 3px;}
.talk-msg-fav.on{color:var(--hi-pink-dark);}
.talk-msg-del{color:var(--muted);padding:0 3px;}
/* 날짜 알약(2026-07-18) — 좌우로 선이 뻗어나가는 구분선 가운데 알약, 탭하면 그 날짜 메시지 전체를 접고 폄. */
.talk-daypill-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
.talk-daypill-row::before, .talk-daypill-row::after{content:"";flex:1;height:1px;background:var(--card-border);}
.talk-daypill{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--muted);
  background:var(--fill);border-radius:999px;padding:4px 10px;white-space:nowrap;flex:none;}

.talk-fb{border:0.5px solid var(--card-border);background:var(--line);padding:11px 13px;font-size:12px;line-height:1.6;color:var(--ink-2);max-width:100%;}
.talk-fb.ok{border-color:var(--good);}
.talk-fb .t{font-weight:800;margin-bottom:3px;color:var(--ink);}
.talk-fb button{margin-top:8px;background:var(--ink);color:var(--on-accent);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;}

/* 대화가 짧을 때 메시지 영역과 입력창 사이에 큰 빈 여백이 생기던 버그(2026-07-18, "왜 패딩 있음?"
   리포트) — 원인은 .talk-msgs의 높이를 `calc(100dvh - 330px)` 매직넘버로 잡아뒀던 것. 실제 화면
   구성(상단바+헤더+토글+입력창 높이)이 그 330px 추정과 안 맞으면 어긋난 만큼 빈 공간이 그대로
   보였음. min-height:100%도 부모(.content)가 auto-height라 사실상 무효였음(퍼센트 높이는 부모가
   definite height일 때만 계산됨 — 이 앱의 실제 definite-height 조상은 `.scroll`뿐).
   고친 법: `.talk-room-screen`(=.content 그 자체, 부모가 .scroll이라 definite height 상속 가능)에
   height:100%를 줘서 진짜 높이를 확보하고, 아래 .talk-msgs를 flex:1로 바꿔 그 안에서 남는 공간을
   전부 채우게 함(매직넘버 제거, 화면 크기 달라져도 항상 입력창 바로 위까지 자연스럽게 채워짐). */
.talk-room-screen{height:100%;display:flex;flex-direction:column;padding-left:7px;padding-right:7px;position:relative;}
/* 위 padding-bottom을 여기서 별도 선언 — ".scroll.notab .content{padding-bottom:max(40px,...)}"가
   클래스 3개(.scroll·.notab·.content, 특이도 0,3,0)라 ".talk-room-screen" 단독(0,1,0)은 물론
   ".content.talk-room-screen"(0,2,0)로 올려도 여전히 못 이겨서 실제 여백이 40px로 깎여있었음
   (2026-07-18 발견 — flex:1이 그 잘못된 40px 기준으로 채워져서 .talk-msgs가 입력창 밑까지 침범,
   오히려 마이너스 간격이 남는 걸 실측으로 확인). 클래스 3개(.scroll .content.talk-room-screen)로
   맞춰서 뒤에서 확실히 덮어씀. */
.scroll .content.talk-room-screen{padding-bottom:calc(100px + var(--kb, 0px));}
/* 2026-07-18: sticky는 바깥 .scroll이 페이지 전체를 스크롤할 때 위치가 흔들려서(스크롤 컨테이너가
   .talk-msgs인지 .scroll인지 모호) absolute로 교체 — 컨테이닝 블록은 position:relative인 .app(최대
   520px 중앙 정렬)이라 자연히 그 폭에 맞음. 회화 대화방은 이제 항상 몰입 화면(탭바 숨김)이라
   bottom이 곧 화면 맨 아래 기준. 키보드 없을 때는 40px 고정(홈 인디케이터·둥근 모서리 R값 대응,
   2026-07-18) — 있을 때는 키보드 위 10px(kb가 40px보다 커지는 순간부터 kb+10이 40을 넘어서므로
   max()로 자연히 전환됨). */
.talk-input-row{display:flex;gap:8px;position:absolute;left:0;right:0;bottom:max(40px, calc(var(--kb, 0px) + 10px));
  background:var(--bg);padding:8px 7px 2px;z-index:2;}
.talk-input-row input{flex:1;min-width:0;border:0.5px solid var(--card-border);background:var(--surface);border-radius:0;padding:11px 13px;font:inherit;font-size:14px;outline:none;}
.talk-input-row input:disabled{opacity:.5;}
.talk-input-row button{background:var(--ink);color:var(--on-accent);border-radius:999px;padding:0 18px;font-weight:700;font-size:13px;flex:none;}
.talk-input-row button:disabled{opacity:.4;}
.talk-voice-toggle{background:var(--fill) !important;color:var(--ink) !important;border-radius:50% !important;width:42px;height:42px;padding:0 !important;display:flex;align-items:center;justify-content:center;}
.talk-voice-btn{flex:1;min-width:0;background:var(--fill);color:var(--ink);border:0.5px solid var(--card-border);border-radius:0;padding:11px 13px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.talk-voice-btn.listening{background:var(--danger-container);color:var(--danger);border-color:var(--danger);}
.talk-voice-btn:disabled{opacity:.4;}

.talk-summary-item{border:0.5px solid var(--card-border);background:var(--surface);padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.6;}
.finish .sub{font-size:13px;color:var(--muted);}
.finish .mascot{width:96px;height:96px;margin-bottom:6px;}

/* 학습 탭 허브 */
.learnmenu .step.soon{opacity:.5;}

/* 레벨 테스트 */
/* 문항 카드 — know↔meaning 전환 시 크기·폰트가 흔들리지 않게 고정(min-height + 동일 타이포) */
.lt-qcard{align-items:center;text-align:center;justify-content:center;min-height:150px;}
.lt-word{font-size:24px;font-weight:800;letter-spacing:-0.3px;}
.lt-choices{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.lt-choice{padding:14px;border-radius:0;font-weight:700;font-size:15px;background:var(--surface);border:0.5px solid var(--card-border);color:var(--ink);box-shadow:var(--shadow);text-align:center;}
.lt-choice:active{background:var(--fill);}
.lt-band{display:inline-flex;align-items:center;font-size:14px;font-weight:800;padding:6px 14px;border-radius:999px;background:var(--accent-deep);color:var(--on-accent);}
/* 결과 레벨 밴드 — 컬러위계 반영(연두<옐로우<핑크<블루). .lt-band(0,1,0)를 이기려 (0,2,0)로 정의 */
.lt-band.tier-green{background:var(--hi-green);color:var(--hi-green-xdark);}
.lt-band.tier-yellow{background:var(--hi-yellow);color:var(--hi-yellow-xdark);}
.lt-band.tier-pink{background:var(--hi-pink);color:var(--hi-pink-xdark);}
.lt-band.tier-blue{background:var(--hi-blue);color:var(--hi-blue-xdark);}
.lt-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;}
/* 한국어 예시(Part B) — 예전엔 .qcue(12px 회색)라 너무 작았음. 문제문이므로 크게·볼드 */
.lt-ko{font-size:18px;font-weight:800;text-align:center;line-height:1.45;letter-spacing:-0.2px;margin:4px 0;color:var(--ink);}
/* 답 칸 — 조립한 답이 쌓이는 곳. 내용이 없거나 늘어나도 크기가 흔들리지 않게 높이 고정 */
.lt-answer{min-height:66px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;text-align:center;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:12px 14px;font-size:17px;font-weight:700;line-height:1.5;letter-spacing:.2px;}
.lt-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;}
@keyframes lt-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
.lt-chips .lchip.wrong{animation:lt-shake .35s ease;background:var(--danger-container);color:var(--danger);border-color:var(--danger);}
/* 탭한 칩은 자리를 유지한 채 흐려지기만 — 남은 칩이 당겨지면 다음 탭이 빗나간다 */
.lt-chips .lchip.picked{opacity:.22;pointer-events:none;}
.lt-note{font-size:12px;color:var(--ink-2);background:var(--fill);border-radius:0;padding:10px 12px;line-height:1.5;}
/* 분석 문장 속 핵심부만 형광펜으로 짚어줌(단순 볼드가 아니라 실제 마커 배경) */
.lt-note b{background:var(--hi-yellow-light);color:var(--ink);font-weight:800;padding:1px 3px;border-radius:0;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
.lt-note b.hl-green{background:var(--hi-green-light);}
.lt-note b.hl-pink{background:var(--hi-pink-light);}
.lt-note b.hl-blue{background:var(--hi-blue-light);}
/* 어휘력/문장구사력 결과 칩(단어 수·상위%)도 밴드 컬러위계를 연하게 반영 */
.chip.tier-green{background:var(--hi-green-light);color:var(--hi-green-xdark);border-color:transparent;}
.chip.tier-yellow{background:var(--hi-yellow-light);color:var(--hi-yellow-xdark);border-color:transparent;}
.chip.tier-pink{background:var(--hi-pink-light);color:var(--hi-pink-xdark);border-color:transparent;}
.chip.tier-blue{background:var(--hi-blue-light);color:var(--hi-blue-xdark);border-color:transparent;}

/* 설정 화면 (캐릭터 변경 등) — WordSheet와 동일한 바텀시트 패턴 재사용 */
.charrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--card-border);border-radius:0;box-shadow:var(--shadow);padding:12px 14px;}
.charrow .cf{width:52px;height:52px;border-radius:0;background:var(--fill);display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;font-size:9px;color:var(--muted);text-align:center;line-height:1.2;}
/* 고양이유령 썸네일 외곽선 = 옅은 베이지(--line, 솔리드) — 진한 잉크 테두리는 너무 튀어서
   완화(2026-07-18). 캐릭터2/3/4(색상 스와치)는 위 .char-swatch-sm에서 무테로 유지. */
.charrow .cf img{box-sizing:border-box;border:1.5px solid var(--line);}
.charrow .body{flex:1;min-width:0;}
.charrow .name{font-size:14px;font-weight:700;}
.charrow .cta{flex:none;font-size:12px;font-weight:700;padding:9px 12px;border-radius:0;text-align:center;white-space:nowrap;}
.charrow .cta.use{background:var(--accent-soft);color:var(--accent-deep);}
.charrow .cta.free{background:var(--accent);color:var(--on-accent);}
.charrow .cta.buy{background:var(--ink);color:var(--on-accent);}
.charrow .cta.locked{background:var(--fill);color:var(--muted);}
.ptbox{display:flex;align-items:center;justify-content:space-between;background:var(--warmgray);border-radius:0;padding:14px 16px;}
.ptbox .v{font-size:20px;font-weight:800;color:var(--ink-2);font-variant-numeric:tabular-nums;}
.ptbox .l{font-size:12px;color:var(--ink-2);}

/* 설정 — 일일 목표 스테퍼 · 듣기 속도 프리셋 */
.goalrow{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:0;box-shadow:var(--shadow);padding:11px 15px;margin-bottom:8px;}
.goal-lbl{font-size:14px;font-weight:700;flex:1;}
.goal-step{width:30px;height:30px;border-radius:999px;background:var(--fill);color:var(--ink-2);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;flex:none;}
.goal-v{font-size:14px;font-weight:800;color:var(--accent-deep);min-width:44px;text-align:center;font-variant-numeric:tabular-nums;flex:none;}
.prefrow{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border-radius:0;box-shadow:var(--shadow);padding:12px 15px;text-align:left;}
.prefrow.on{background:var(--warmgray);}
.pf-name{font-size:14px;font-weight:700;}
.prefrow.on .pf-name{color:var(--accent-deep);}
.pf-sub{font-size:12px;color:var(--muted);}
.cefrinfo{background:var(--surface);border-radius:0;box-shadow:var(--shadow);padding:12px 15px;}
.cefrinfo-row{display:flex;align-items:center;gap:10px;padding:4px 0;}
.cefrinfo-nm{font-size:13px;color:var(--ink-2);}
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

const APP_VERSION = "v0.35.34";const APP_BUILD = "2026-07-18"; // APP_VERSION을 바꿀 때 <head>의 ?v= 캐시 무효화 태그도 같이 갱신할 것

/* Leitner 박스별 다음 복습 간격(일) — JP 앱과 동일 */
const BOX_INTERVALS = [0, 1, 2, 4, 8, 16, 32];
const MAX_BOX = BOX_INTERVALS.length - 1; // 최고 박스 인덱스(6) — 정답 시 box 상한

/* Material Symbols (filled) 아이콘 — 공식 SVG 패스 인라인(Apache 2.0).
   외부 폰트/네트워크 의존 없이 오프라인·아티팩트에서도 동일하게 렌더. */

const SEED = (typeof window !== "undefined" && window.SEED) ? window.SEED : [];
const byWord = Object.fromEntries(SEED.map(w => [w.word, w]));

/* 사용자가 직접 추가한 단어(내 단어장) — localStorage 보존. */
let EXTRA = (() => { try { return JSON.parse(localStorage.getItem("en_mywords") || "{}"); } catch (e) { return {}; } })();
function saveExtra() { _byFlat = null; try { localStorage.setItem("en_mywords", JSON.stringify(EXTRA)); } catch (e) {} }
function wordOf(w) { return byWord[w] || EXTRA[w]; }
/* 표기 접기 폴백 조회 — "carry-on"·"carryon"으로도 표제어 "carry on"을 찾는다(2026-07-19).
   wordOf는 정확 키 조회 그대로 두고(EXTRA 키·중복 등록 가드 등 기존 의미 보존), 구분 기호
   차이만 흡수하고 싶은 자리(dictLookup, 회화 단어 탭)에서 이걸 쓴다. 인덱스는 첫 사용 때 만들고
   내 단어 추가/삭제(saveExtra) 시 무효화. */
let _byFlat = null;
function wordOfFlat(w) {
  const direct = wordOf(w);
  if (direct) return direct;
  if (!_byFlat) {
    _byFlat = {};
    allWords().forEach(x => { const k = flatWord(x.word); if (k && !_byFlat[k]) _byFlat[k] = x; });
  }
  return _byFlat[flatWord(w)] || null;
}
function allWords() { return SEED.concat(Object.values(EXTRA)); }

/* 수동 추가 단어 자동 조회 — 폴백 체인: Free Dictionary(무료 공개 API, 영영 정의·IPA·품사) →
   Gemini 프록시(한국어 뜻·예문 생성, Free Dictionary가 준 영어 정의가 있으면 그걸 번역 기준으로 사용).
   WordSheet가 lookupStatus:"pending"인 내 단어를 열 때 호출 — 결과를 EXTRA에 그대로 병합. */
const _lookupInFlight = new Set();
async function autoLookupWord(key) {
  if (_lookupInFlight.has(key)) return;
  _lookupInFlight.add(key);
  let ipa = "", pos = [], enDef = "", fallbackEx = "";
  try {
    const r = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(key));
    if (r.ok) {
      const data = await r.json();
      const entry = Array.isArray(data) ? data[0] : null;
      if (entry) {
        const ph = (entry.phonetics || []).find(p => p.text) || {};
        ipa = (ph.text || "").replace(/^\/|\/$/g, "");
        const posSet = new Set();
        (entry.meanings || []).forEach(m => {
          if (m.partOfSpeech) posSet.add(m.partOfSpeech);
          const d0 = m.definitions && m.definitions[0];
          if (!enDef && d0) { enDef = d0.definition || ""; fallbackEx = d0.example || ""; }
        });
        pos = Array.from(posSet);
      }
    }
  } catch (e) { /* Free Dictionary 실패해도 Gemini만으로 계속 진행 */ }

  let ko = "", cefr = "", exEn = fallbackEx, exKo = "";
  try {
    const prompt = "영어 단어 \"" + key + "\"" +
      (enDef ? "(영어 정의: " + enDef + ")" : "") + (fallbackEx ? "(참고 예문: " + fallbackEx + ")" : "") +
      "에 대해 한국어 학습자용 정보를 아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON 객체 하나만 출력하세요.\n" +
      '{"ko":"간결한 한국어 뜻(품사 표시 없이)","cefr":"A1~C2 중 난이도 추정 한 값","ex_en":"자연스러운 영어 예문 한 문장","ex_ko":"그 예문의 자연스러운 한국어 번역"}';
    const resText = await geminiText(prompt);
    if (resText) {
      const cleaned = resText.replace(/^```json\s*|^```\s*|```\s*$/g, "").trim();
      const parsed = JSON.parse(cleaned);
      ko = (parsed.ko || "").trim();
      cefr = (parsed.cefr || "").trim();
      exEn = (parsed.ex_en || exEn || "").trim();
      exKo = (parsed.ex_ko || "").trim();
    }
  } catch (e) { /* 파싱 실패 — 아래에서 ko 비어있으면 에러 처리 */ }

  _lookupInFlight.delete(key);
  const cur = EXTRA[key];
  if (!cur) return; // 조회 도중 삭제됐으면 무시
  if (!ko) {
    cur.lookupStatus = "error";
  } else {
    cur.ko = ko;
    cur.en = enDef || cur.en;
    cur.ipa = ipa || cur.ipa;
    if (pos.length) cur.pos = pos;
    cur.cefr = /^(A1|A2|B1|B2|C1|C2)$/.test(cefr) ? cefr : "B1";
    if (exEn) cur.ex = [{ en: exEn, ko: exKo }];
    cur.lookupStatus = "done";
  }
  saveExtra();
}

/* 즐겨찾기 — localStorage 보존(EXTRA·SRS와 동일 패턴). 첫 실행에만 데모 시드. */
let FAVS = (() => {
  try {
    const raw = localStorage.getItem("en_favs");
    if (raw === null) return new Set(["alert", "idiomatic"]);
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(["alert", "idiomatic"]); }
})();
function saveFavs() { try { localStorage.setItem("en_favs", JSON.stringify([...FAVS])); } catch (e) {} }
function toggleFav(word) { if (FAVS.has(word)) FAVS.delete(word); else FAVS.add(word); saveFavs(); }

/* 내 단어장(커스텀 리스트) — localStorage 보존. { id, name, words:[word,...] } 배열.
   전체 표제어 중 고른 단어를 이름 붙인 리스트로 묶어서 그 리스트만 따로 학습할 수 있게 함. */
let WORDLISTS = (() => { try { return JSON.parse(localStorage.getItem("en_wordlists") || "[]"); } catch (e) { return []; } })();
function saveWordlists() { try { localStorage.setItem("en_wordlists", JSON.stringify(WORDLISTS)); } catch (e) {} }
function createWordlist(name) {
  const list = { id: "wl_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), name: name.trim(), words: [] };
  WORDLISTS.push(list); saveWordlists();
  return list;
}
function addToWordlist(id, words) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list) return;
  words.forEach(w => { if (!list.words.includes(w)) list.words.push(w); });
  saveWordlists();
}
function removeFromWordlist(id, word) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list) return;
  list.words = list.words.filter(w => w !== word);
  saveWordlists();
}
function renameWordlist(id, name) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list || !name.trim()) return;
  list.name = name.trim(); saveWordlists();
}
function deleteWordlist(id) {
  WORDLISTS = WORDLISTS.filter(l => l.id !== id);
  saveWordlists();
}

/* ===================== 학습 환경설정 (일일 목표 · 듣기 속도/악센트) — localStorage =====================
   속도는 SpeechSynthesisUtterance.rate로 실제 반영됨. 악센트는 lang 코드 + 가능하면 그 lang의 브라우저
   음성을 매칭(en-US/en-GB/en-AU) — 단, "뉴욕/캘리포니아/텍사스" 같은 도시 단위 악센트는 브라우저 TTS는
   물론 상용 TTS(Google/Azure 등)에도 그 단위로 구분된 음성이 없어 구현 불가. 국가 단위까지만 지원. */
const SPEED_PRESETS = {
  teacher: { label: "영어선생님", sub: "수능 듣기평가 수준", rate: 0.82 },
  casual: { label: "일상회화", sub: "연음 강조", rate: 1.0 },
  native: { label: "원어민대화", sub: "원어민 수준의 빠른 말", rate: 1.3 },
};
const ACCENT_PRESETS = {
  us: { label: "미국", lang: "en-US" },
  gb: { label: "영국", lang: "en-GB" },
  au: { label: "호주", lang: "en-AU" },
};
const PREFS = (() => {
  let p;
  try { p = JSON.parse(localStorage.getItem("en_prefs") || "null"); } catch (e) {}
  if (!p || typeof p !== "object") p = {};
  if (!SPEED_PRESETS[p.speed]) p.speed = "casual";
  if (!ACCENT_PRESETS[p.accent]) p.accent = "us";
  p.goalWords = Number.isFinite(p.goalWords) ? p.goalWords : 20;
  p.goalListen = Number.isFinite(p.goalListen) ? p.goalListen : 20;
  p.goalTalk = Number.isFinite(p.goalTalk) ? p.goalTalk : 10;
  const save = () => { try { localStorage.setItem("en_prefs", JSON.stringify(p)); } catch (e) {} };
  save();
  return { get: () => p, set(patch) { Object.assign(p, patch); save(); } };
})();

/* ---------- Gemini 직접 호출 (기기 → Google, 프록시 미경유) ----------
   Google 무료 티어는 "호출이 날아온 IP의 위치"로 지원 여부를 판정하는데, Worker 프록시를

   그래서 무료 키를 앱에 내장해 모든 사용자가 자기 기기에서 직접 호출한다.
