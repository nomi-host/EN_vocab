              </div>
            )}
          </div>
        ) : (
          <div className="qactions">
            <button className="ghost" onMouseDown={e => e.preventDefault()} onClick={() => onOpenWord(it.word)}>단어 정보</button>
            <button className="primary" onMouseDown={e => e.preventDefault()} onClick={next}>{idx + 1 >= hintUsedNextLen ? "학습 완료" : "다음 문제"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* 학습 완료 요약 */
function Finish({ total, correct, onExit, title, sub, label }) {
  return (
    <div className="content"><div className="finish">
      <div className="char-face mascot">잘했어요!</div>
      <div className="big">{correct} / {total}</div>
      <div className="msg">{title || label || "오늘 단어카드 완료"}</div>
      <div className="sub">{sub || "복습 시점은 정답률에 맞춰 자동 조정됐어요."}</div>
      <div className="qactions" style={{ width: "100%", marginTop: 18 }}><button className="primary" onClick={onExit}>돌아가기</button></div>
    </div></div>
  );
}

/* ---------- 퀴즈 세션 ---------- */
/* 이미 학습한 단어 대상 뜻 4지선다 + 스펠링(발음 듣고 타이핑)을 절반씩 섞어 출제.
   단어카드(SRS 복습 간격 조정)와 달리 보조 훈련이라 정답/오답이 SRS 박스에 영향을 주지 않음. */
function QuizSession({ questions, onExit }) {
  const [idx, setIdx] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [picked, setPicked] = useState(null); // 4지선다에서 고른 인덱스
  const [val, setVal] = useState("");         // 스펠링 입력값
  const [picks, setPicks] = useState([]);     // 어순 배열 — 탭한 순서대로 쌓인 shuffled 인덱스
  const [lifted, setLifted] = useState(null); // 어순 배열: 위치 이동을 위해 "집어든" placed 칸의 인덱스(2026-07-20)
  const [res, setRes] = useState(null);       // null | {ok}

  const q = questions[idx];
  const it = q.it;
  const speak = speakText;

  useEffect(() => () => stopSpeaking(), []); // 세션 나갈 때(언마운트) 재생 중인 음성 정지

  useEffect(() => {
    if (q.type === "spell") speak(it.word);
    // eslint-disable-next-line
  }, [idx]);

  const gradeChoice = (choice, ci) => {
    if (res) return;
    const ok = choice === it.ko;
    setPicked(ci);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok });
    playDing(ok ? "done" : "wrong"); // 정답/오답 효과음(2026-07-20) — 퀴즈에도 카드/듣기와 동일하게 적용
  };

  const submitSpell = () => {
    if (res) return;
    const v = val.trim();
    if (!v) return;
    // flatWord 비교 병행 — "carry-on"을 "carry on"으로 쳐도 정답(2026-07-19)
    const ok = v.toLowerCase() === it.word.toLowerCase() || flatWord(v) === flatWord(it.word);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok });
    playDing(ok ? "done" : "wrong");
  };

  // 어순 배열 — 조각을 다 놓아도(2026-07-20 변경) 바로 채점하지 않고 "확인"을 눌러야 채점한다.
  // 예전엔 마지막 조각을 놓는 순간 자동 채점돼서, 다 놓은 뒤 순서를 바로잡을 틈이 없었음(사용자
  // 지적: "하다가 위치 이동할 수 있도록") — 이제 다 놓인 뒤에도 확인 전까지는 계속 자리를 바꿀 수 있다.
  const pickOrderChip = si => {
    if (res) return;
    setLifted(null); // pool에서 새로 고르면 자리 이동 선택 상태는 취소(2026-07-20)
    setPicks(p => [...p, si]);
  };
  const submitOrder = () => {
    if (res || picks.length !== q.tokens.length) return;
    const ok = picks.every((p, i) => q.shuffled[p].idx === i);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok });
    playDing(ok ? "done" : "wrong");
  };
  // 이미 놓은 조각 탭(2026-07-20 재설계) — 처음 탭하면 "집어들고"(lifted), 그 상태에서 다른 놓인
  // 조각을 탭하면 두 자리를 맞바꿔 위치를 이동시킨다(사용자 요청: 하다가 위치 이동 가능하게) — 조각을
  // 다 놓아 "확인" 버튼이 뜬 뒤에도 확인을 누르기 전까지는 계속 이 방식으로 자리를 바꿀 수 있다.
  // 집어든 조각을 다시 탭하면(같은 자리) 기존처럼 pool로 되돌린다 — 제거 기능은 그대로 유지.
  const tapPlacedChip = i => {
    if (res) return;
    if (lifted === null) { setLifted(i); return; }
    if (lifted === i) { setLifted(null); setPicks(p => p.filter((_, k) => k !== i)); return; }
    setPicks(p => { const np = p.slice(); const tmp = np[lifted]; np[lifted] = np[i]; np[i] = tmp; return np; });
    setLifted(null);
  };

  const next = () => {
    if (idx + 1 >= questions.length) { onExit(true, correct, questions.length); return; }
    setIdx(idx + 1); setPicked(null); setVal(""); setPicks([]); setRes(null); setLifted(null);
  };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={() => onExit(false, correct)} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: ((idx + (res ? 1 : 0)) / questions.length * 100) + "%" }} /></div>
        <span className="study-n">{idx + 1} / {questions.length}</span>
      </div>

      <div className="qcard">
        <div className="qlvrow">
          {q.type === "spell" && (
            <span className="qaudio">
              <button onClick={() => speak(it.word)} aria-label="다시 듣기"><Icon name="replay" size={16} /></button>
            </span>
          )}
          {q.type === "order" && (
            <span className="qaudio">
              <button onClick={() => speak(it.ex.en)} aria-label="문장 듣기"><Icon name="replay" size={16} /></button>
            </span>
          )}
          <span className="tag lv">{it.cefr}</span>
        </div>
        {q.type === "order" ? (
          <React.Fragment>
            <span className="qhint">아래 조각을 순서대로 탭해 문장을 완성하세요. 놓은 조각을 탭하면 다른 자리와 맞바꿀 수 있어요.</span>
            <div className="qko" style={{ textAlign: "center" }}>{q.ko}</div>
            <div className="qdiv" />
            <div className="qorder-built">
              {picks.length === 0 && <span className="ph">여기에 순서대로 쌓여요</span>}
              {picks.map((si, i) => (
                <button key={i} className={"qorder-chip placed" + (lifted === i ? " lifted" : "")} disabled={!!res} onClick={() => tapPlacedChip(i)}>{q.shuffled[si].t}</button>
              ))}
            </div>
            <div className="qorder-pool">
              {q.shuffled.map((tok, si) => !picks.includes(si) && (
                <button key={si} className="qorder-chip" disabled={!!res} onClick={() => pickOrderChip(si)}>{tok.t}</button>
              ))}
            </div>
          </React.Fragment>
        ) : q.type === "choice" ? (
          <React.Fragment>
            <span className="qhint">다음 <b>영어 단어</b>의 뜻을 고르세요.</span>
            <div className="qko" style={{ textAlign: "center" }}>{it.word}</div>
            <div className="qdiv" />
            <div className="qchoices">
              {q.choices.map((c, ci) => {
                const cls = "qchoice" + (res ? (c === it.ko ? " correct" : (picked === ci ? " wrong" : "")) : "");
                return <button key={ci} className={cls} disabled={!!res} onClick={() => gradeChoice(c, ci)}>{c}</button>;
              })}
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <span className="qhint">발음을 듣고 <b>영어 단어</b>를 입력하세요.</span>
            {it.cue && <div className="qcue">{it.cue}</div>}
            <div className="qko">{it.ko}</div>
            <div className="qdiv" />
            <div className="qen" style={{ textAlign: "center" }}>
              {res
                ? <span className={"fill" + (res.ok ? "" : " bad")}>{res.ok ? it.word : val.trim() || "—"}</span>
                : <input className="qbox" autoFocus type="search" value={val} onChange={e => setVal(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && submitSpell()}
                    size={Math.max(8, val.length + 1)}
                    lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
                    name="vocab-spell" id="vocab-spell" data-lpignore="true" aria-label="정답 입력" />}
            </div>
          </React.Fragment>
        )}
        {res && (
          <div className={"qres " + (res.ok ? "ok" : "no")}>
            {res.ok ? <Icon name="check" size={18} /> : <Icon name="close" size={18} />}
            {res.ok
              ? "정답!"
              : q.type === "order"
                ? <span>정답: <b>{q.tokens.join(" ")}</b></span>
                : <span>정답: <b>{it.word}</b> — {it.ko}</span>}
          </div>
        )}
      </div>

      {q.type === "spell" && !res && (
        <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={submitSpell}>확인</button>
      )}
      {q.type === "order" && !res && picks.length === q.tokens.length && (
        <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={submitOrder}>확인</button>
      )}
      {res && (
        <div className="qactions">
          <button className="primary" onClick={next}>{idx + 1 >= questions.length ? "결과 보기" : "다음 문제"}</button>
        </div>
      )}
    </div>
  );
}

/* ---------- 듣기 세션 (딕테이션) ----------
   학습카드와 같은 "학습 형식"(퀴즈 형식 아님) — 이 문장을 완전히 맞혀야 다음 문장으로
   넘어간다. 오답이면 어느 칸이 틀렸는지만 표시(정답은 안 보여줌)하고 같은 문장을 다시
   시도. 완전히 맞히면 그때 해석·연음 해설이 열리고 다음 문장으로 진행.
   출제 소스는 학습카드와 동일한 pickSession(due→fresh)이라 정답 시 그 단어의 SRS도 같이 오른다. */
/* 단어 앞뒤의 구두점만 떼어낸다. "others." → pre:"", core:"others", post:"."
   "10-dollar" → pre:"", core:"10-dollar", post:"" (하이픈은 core 안에 그대로 — wordToTokens가 마저 쪼갬). */
function splitOuterPunct(w) {
  let i = 0, j = w.length;
  while (i < j && !/[A-Za-z0-9]/.test(w[i])) i++;
  while (j > i && !/[A-Za-z0-9]/.test(w[j - 1])) j--;
  return { pre: w.slice(0, i), core: w.slice(i, j), post: w.slice(j) };
}
function splitWordToken(w) { return splitOuterPunct(w); }

/* 흔한 축약 어미 → 원형. 어퍼스트로피 뒤가 이 중 하나면 축약형(s)과 원형(is) 둘 다 정답 처리. */
const CONTRACTION_ALTS = { s: "is", re: "are", ve: "have", ll: "will", d: "would", m: "am" };

/* 단어 안에 하이픈·어퍼스트로피 같은 기호가 있으면 사용자가 그 기호를 직접 치지 않아도 되도록
   알파벳/숫자 조각별로 칸을 나누고 기호는 자동으로 붙여 보여준다.
   "10-dollar" → "10" | "dollar" (하이픈 자동 표시). "we're" → "we" | "re"(정답: re 또는 are).
   앞 조각을 맞혀야 다음 조각이 열린다(joinPrev). 기호 없는 보통 단어는 기존대로 한 칸. */
function wordToTokens(w) {
  const { pre, core, post } = splitOuterPunct(w);
  const parts = core.split(/([^A-Za-z0-9]+)/).filter(x => x !== "");
  if (parts.length <= 1) return [{ pre, core, post }];
  const tokens = [];
  for (let k = 0; k < parts.length; k += 2) {
    const chunk = parts[k];
    const isFirst = k === 0;
    const isLast = k + 2 >= parts.length;
    const joinSym = isFirst ? "" : parts[k - 1];
    const altCore = joinSym === "'" ? CONTRACTION_ALTS[chunk.toLowerCase()] : undefined;
    tokens.push({
      pre: isFirst ? pre : "",
      core: chunk,
      post: isLast ? post : "",
      altCore,
      joinPrev: !isFirst,
      joinSym,
    });
  }
  return tokens;
}

function DictationSession({ items: initialItems, onExit, onOpenWord }) {
  const [queue, setQueue] = useState(() => initialItems.slice()); // 로컬 사본 — 재생 패널티로 다음 문제를 바꾸거나(교체) 재학습 문제를 뒤에 붙일 수 있어야 함
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [locked, setLocked] = useState([]);   // 단어별 고정 여부 — 맞게 타이핑하는 즉시 true(입력창 → 고정 텍스트)
  const [wrongMask, setWrongMask] = useState(null); // null | boolean[] — 방금 확인에서 어느 칸이 틀렸는지(정답은 공개 안 함)
  const [hadWrongAttempt, setHadWrongAttempt] = useState(false);
  const [res, setRes] = useState(null); // null | { dueIn, forcedRelearn? } — 완전히 맞았을 때만(또는 강제 재학습) 세팅
  const [correct, setCorrect] = useState(0); // 첫 시도에 맞힌 문장 수
  const [replayCount, setReplayCount] = useState(0);
  const [lenHint, setLenHint] = useState(false); // 단어길이 보기
  const [firstHint, setFirstHint] = useState(false); // 앞글자 보기
  // 세션 시작 전 3·2·1 카운트다운 — 카드가 뒤에 이미 보이는 채로 살짝 딤 오버레이만 얹고,
  // 끝나면 오버레이가 페이드아웃(카드 자체는 계속 그 자리에 있었음). 첫 문제에서만 1회.
  const [countdown, setCountdown] = useState(3);
  const [countdownVisible, setCountdownVisible] = useState(true);

  const it = queue[idx];
  // "going to"처럼 구어체 결합 축약형(gonna)이 있는 두 단어는 첫 칸에 comboAlt를 달아둔다 —
  // 거기에 "gonna"를 치면 이 칸과 다음 칸("to")이 한 번에 정답 처리된다(따로 쳐도 물론 정답).
  const COMBO_ALTS = [[/^going$/i, /^to$/i, "gonna"]];
  const tokens = useMemo(() => {
    if (!it) return [];
    const t = it.ex.en.trim().split(/\s+/).flatMap(wordToTokens);
    for (let i = 0; i < t.length - 1; i++) {
      if (t[i].joinPrev || t[i + 1].joinPrev) continue;
      const hit = COMBO_ALTS.find(([ra, rb]) => ra.test(t[i].core) && rb.test(t[i + 1].core));
      if (hit) t[i] = { ...t[i], comboAlt: hit[2], comboNext: i + 1 };
    }
    return t;
  }, [it]);
  const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9']/g, "");
  const inputRefs = React.useRef([]);
  // 문제 전환이 너무 갑작스럽다는 지적(2026-07-20, 카드와 동일) — 리마운트 없이 idx가 바뀔 때마다
  // CSS 애니메이션만 재시작.
  const qcardRef = React.useRef(null);
  useEffect(() => {
    const el = qcardRef.current;
    if (!el) return;
    el.classList.remove("qcard-anim");
    void el.offsetWidth;
    el.classList.add("qcard-anim");
  }, [idx]);

  // 정답 후 "한 번 더 들려주기" 에코 타이머 — ref로 들고 있다가 언마운트/다음 문제에서 반드시 해제(2026-07-20).
  // 예전엔 setTimeout을 버려둬서, 정답 띠링 직후 0.7초 안에 세션을 나가면 다른 화면에서 문장이
  // 재생되고, "다음"을 빨리 누르면 이전 문장 에코가 다음 문제 자동재생을 가로채는 버그가 있었음.
  const echoTimerRef = React.useRef(null);
  const clearEchoTimer = () => { if (echoTimerRef.current) { clearTimeout(echoTimerRef.current); echoTimerRef.current = null; } };
  useEffect(() => () => { clearEchoTimer(); stopSpeaking(); }, []); // 세션 나갈 때(언마운트) 재생 중인 문장·예약된 에코 정지

  useEffect(() => {
    setAnswers(new Array(tokens.length).fill("")); setLocked(new Array(tokens.length).fill(false)); inputRefs.current = [];
    setReplayCount(0); setWrongMask(null); setHadWrongAttempt(false); setLenHint(false); setFirstHint(false); // 힌트류는 문제마다 초기화
  }, [idx, tokens.length]);
  // 세션 첫 문제에서만 3·2·1 카운트다운 — 끝나야 아래 자동재생 효과가 진행됨(idx===0에서만 대기)
  useEffect(() => {
    if (countdown > 0) {
      const t = setTimeout(() => setCountdown(c => c - 1), 700);
      return () => clearTimeout(t);
    }
    const t2 = setTimeout(() => setCountdownVisible(false), 320); // 페이드아웃 끝난 뒤 오버레이 제거
    return () => clearTimeout(t2);
  }, [countdown]);
  useEffect(() => {
    if (!it) return;
    clearEchoTimer(); // 문제가 바뀌면 이전 문제의 에코 예약을 무효화 — 다음 문제 자동재생을 가로채지 않게
    if (idx === 0 && countdown > 0) return; // 첫 문제는 카운트다운 끝난 뒤에 재생
    const t = setTimeout(() => speakSentence(it.ex.en), 300);
    return () => clearTimeout(t);
  }, [idx, countdown]);

  const speakSentence = text => { speakText(text); }; // 앱 공용 speakText로 통일(프록시 TTS + 연타 에코 방지 공유)

  const focusInput = i => { const el = inputRefs.current[i]; if (el) el.focus(); };

  // 어퍼스트로피·하이픈으로 이어진 칸(예: don' t)은 앞 칸을 맞히기 전까지 disabled인데,
  // onTypeWord 안에서 앞 칸을 잠그자마자 동기로 다음 칸에 focus()를 걸면 그 시점 DOM엔 아직
  // 재렌더 전이라 다음 칸이 여전히 disabled 상태라 focus()가 조용히 씹힌다 — 그 사이 아무 입력도
  // 포커스를 못 받은 채 앞 칸이 언마운트되면서 키보드가 내려가던 버그(2026-07-20). locked가 실제로
  // 반영된 뒤(재렌더 완료 후) 다시 한 번 포커스를 보정하는 효과를 별도로 둬서, 보통 단어 전환은
  // onTypeWord의 즉시 focus()가 처리하고 이 결합 칸 케이스는 이 효과가 안전망 역할을 한다.
  const prevLockedRef = React.useRef(null);
  useEffect(() => {
    if (res) return;
    const prev = prevLockedRef.current;
    prevLockedRef.current = locked;
    if (!prev || prev.length !== locked.length) return; // 문제 전환/초기화는 autoFocus가 처리하므로 스킵
    if (!locked.some((v, i) => v && !prev[i])) return; // 방금 새로 잠긴 칸이 없으면(=락 변화 아님) 스킵
    const k = locked.findIndex(v => !v);
    if (k >= 0) focusInput(k);
  }, [locked]);

  /* 다시 듣기 패널티: 매 재생마다 다음 문제를 한 단계 쉬운 문장으로 교체.
     난이도는 어휘 CEFR이 아니라 듣기 난이도(listeningDifficulty — 연음·문장길이 포함)로
     판단(어휘가 쉬워도 연음 때문에 듣기가 어려우면 그 문장은 실제로 어려운 문제이므로).
     3번째 재생이면 그 자리에서 이 문제를 오답 처리하고 세션 끝에 다시 배치(재학습). */
  const downgradeNext = () => {
    setQueue(q => {
      if (idx + 1 >= q.length) return q;
      const curTier = listeningDifficulty(it.ex.en).tier;
      if (curTier <= 0) return q;
      const used = new Set(q.map(x => x.key));
      const pool = allItems().filter(x => !used.has(x.key) && listeningDifficulty(x.ex.en).tier < curTier);
      if (!pool.length) return q;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      const nq = q.slice();
      nq[idx + 1] = pick;
      return nq;
    });
  };
  const forceRelearn = () => {
    SRS.grade(it.key, false);
    ACT.addListenSentence(); // 홈 "오늘의 루틴"·학습 캘린더 실시간 반영(2026-07-20)
    addWrongNote(it.key, "listen"); // 오답 노트(2026-07-20) — 3번째 힌트/재생까지 못 맞힌 문장
    setQueue(q => q.concat([it]));
    setWrongMask(null);
    setRes({ dueIn: null, forcedRelearn: true });
    playDing("wrong"); // 오답 띠-(2026-07-20) — 3번째 힌트까지 써도 못 맞혀 강제 재학습되는 시점
  };
  // 힌트 패널티(다시 듣기·앞글자 보기 공용): 3번째 사용이면 강제 재학습, 그 전엔 다음 문제 다운그레이드
  const applyHintPenalty = () => {
    setReplayCount(c => {
      const nc = c + 1;
      if (nc >= 3) forceRelearn(); else downgradeNext();
      return nc;
    });
  };
  const replay = () => {
    speakSentence(it.ex.en);
    if (res) return; // 완료 화면에서는 그냥 다시 들려주기만(패널티 없음)
    applyHintPenalty();
  };
  // 앞글자 보기: 켜는 순간 아직 안 맞은 칸에 정답 첫 글자를 채워주고, 다시 듣기와 같은 패널티 적용
  const toggleFirstHint = () => {
    setFirstHint(v => {
      const nv = !v;
      if (nv) {
        setAnswers(a => a.map((val, i) => (!locked[i] && !val ? tokens[i].core[0] : val)));
        applyHintPenalty();
      }
      return nv;
    });
  };

  /* 문장 완성(모든 단어 고정) — 확인 버튼 없이 자동으로 정답 처리 + 띠링 */
  const complete = wasClean => {
    if (res) return;
    // wasClean=false면 오답 확정(hintCount는 안 씀). wasClean=true면 다시 듣기·앞글자 보기 사용
    // 횟수(replayCount, 0~2 — 3회째는 forceRelearn으로 별도 처리)를 힌트 개수로 그대로 넘김(2026-07-20).
    const s = SRS.grade(it.key, wasClean, replayCount);
    ACT.addListenSentence(); // 홈 "오늘의 루틴"·학습 캘린더 실시간 반영(2026-07-20)
    if (wasClean) { setCorrect(c => c + 1); removeWrongNote(it.key); } // 이번엔 깨끗하게 맞혔으니 오답 노트에서 빠짐(2026-07-20)
    else addWrongNote(it.key, "listen"); // 재시도 끝에 맞혔어도(오답 채점) 오답 노트엔 남김
    setWrongMask(null);
    setRes({ dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) });
    playDing("done");
    // 정답 띠링 후, 방금 맞힌 문장을 한 번 더 들려줘 귀에 각인시킨다(사용자 요청)
    clearEchoTimer();
    echoTimerRef.current = setTimeout(() => { echoTimerRef.current = null; speakSentence(it.ex.en); }, 700);
  };

  /* 타이핑 중 단어가 정답과 일치하는 순간 그 자리에서 고정(입력창 → 텍스트) + 블립,
     다음 미고정 칸으로 포커스 이동. 마지막 단어까지 고정되면 자동 완료. */
  const onTypeWord = (i, v) => {
    const t = tokens[i];
    if (locked[i]) { setAnswers(a => { const n = a.slice(); n[i] = v; return n; }); return; }
    const nv = norm(v);
    // "gonna" 등 결합 축약형: 이 칸 + 다음 칸("to")을 한 번에 정답 처리
    if (t.comboAlt && nv === norm(t.comboAlt)) {
      const nextI = t.comboNext;
      setAnswers(a => { const n = a.slice(); n[i] = v; n[nextI] = tokens[nextI].core; return n; });
      const nl = locked.slice(); nl[i] = true; nl[nextI] = true;
      setLocked(nl);
      if (nl.every(Boolean)) { complete(!hadWrongAttempt); return; }
      playDing("word");
      for (let j = 1; j <= tokens.length; j++) {
        const k = (nextI + j) % tokens.length;
        if (!nl[k]) { focusInput(k); break; }
      }
      return;
    }
    setAnswers(a => { const n = a.slice(); n[i] = v; return n; });
    if (nv !== norm(t.core) && (!t.altCore || nv !== norm(t.altCore))) return;
    const nl = locked.slice(); nl[i] = true;
    setLocked(nl);
    if (nl.every(Boolean)) { complete(!hadWrongAttempt); return; }
    playDing("word");
    for (let j = 1; j <= tokens.length; j++) {
      const k = (i + j) % tokens.length;
      if (!nl[k]) { focusInput(k); break; }
    }
  };

  /* 확인 버튼 = 막혔을 때 어느 칸이 틀렸는지만 보여주는 용도(오답 사용 기록).
     완성 자체는 위 자동 고정으로만 일어난다. */
  const check = () => {
    if (res) return;
    if (!answers.some(a => (a || "").trim())) return;
    setWrongMask(locked.map(l => !l)); // 고정 안 된 칸 = 아직 틀린 칸
    setHadWrongAttempt(true);
  };
  const next = () => {
    if (idx + 1 >= queue.length) { onExit(true, correct, queue.length); return; }
    setIdx(i => i + 1); setRes(null);
  };

  if (!it) {
    return (
      <div className="content"><div className="finish">
        <div className="msg">들을 문장이 없어요</div>
        <div className="sub">새 단어를 학습하거나 내일 다시 복습해요.</div>
        <div className="qactions" style={{ width: "100%", marginTop: 16 }}><button className="primary" onClick={() => onExit(false, 0, 0)}>돌아가기</button></div>
      </div></div>
    );
  }

  const notes = res ? findLiaisonNotes(it.ex.en) : [];
  const diff = listeningDifficulty(it.ex.en);

  // 토큰 하나(칸)의 입력/고정 UI 렌더 — 일반 단어도, "there's"의 there/'s 두 칸도 동일하게 씀.
  // 래핑 span 없이 조각만 반환 — 호출부에서 하나의 .dict-word-row로 가로로 묶는다(there's가 세로로 안 쌓이도록).
  const renderSlot = i => {
    const t = tokens[i];
    const waiting = t.joinPrev && !locked[i - 1]; // 다음 조각은 앞 조각을 맞히기 전엔 비활성 + 연결기호 숨김
    return (
      <React.Fragment key={i}>
        {waiting ? "" : (t.joinPrev ? t.joinSym : t.pre)}
        {locked[i] ? (
          <span className="dict-fixed">{t.core}</span>
        ) : (
          <input ref={el => { inputRefs.current[i] = el; }}
            className={"qbox dict-box" + (wrongMask && wrongMask[i] ? " wrong" : "")}
            type="search"
            value={answers[i] || ""} autoFocus={i === 0}
            disabled={waiting}
            size={Math.max(2, t.core.length, (t.altCore || "").length, (t.comboAlt || "").length)}
            onChange={e => onTypeWord(i, e.target.value.replace(/\s/g, ""))}
            onKeyDown={e => {
              if (e.key === " " || e.key === "Enter") {
                e.preventDefault();
                let moved = false;
                for (let j = i + 1; j < tokens.length; j++) { if (!locked[j]) { focusInput(j); moved = true; break; } }
                if (!moved) check();
              } else if (e.key === "Backspace" && !answers[i] && i > 0) {
                for (let j = i - 1; j >= 0; j--) { if (!locked[j]) { focusInput(j); break; } }
              }
            }}
            lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
            name={"vocab-dict-" + i} id={"vocab-dict-" + i} data-lpignore="true"
            aria-label={"단어 " + (i + 1)} />
        )}
        {t.post}
      </React.Fragment>
    );
  };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={() => onExit(false, correct, queue.length)} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: ((idx + (res ? 1 : 0)) / queue.length * 100) + "%" }} /></div>
        <span className="study-n">{idx + 1} / {queue.length}</span>
      </div>

      <div className="qcard dict-card" ref={qcardRef}>
        {countdownVisible && (
          <div className={"dict-countdown-overlay" + (countdown <= 0 ? " out" : "")}>
            <div className="countdown-circle" key={countdown}>{countdown > 0 ? countdown : ""}</div>
          </div>
        )}
        <div className="dict-difficulty">
          <span className={"tag dl" + (diff.tier < 4 ? 1 : diff.tier < 8 ? 2 : 3)}>듣기 난이도 · {diff.label}</span>
          <button className="dict-replay" onClick={replay} aria-label="다시 듣기"><Icon name="volume_up" size={16} /></button>
        </div>
        {!res ? (
          <React.Fragment>
            <div className="dict-words">
              {tokens.map((t, i) => {
                if (t.joinPrev) return null; // 이전 .dict-word 그룹 안에서 이미 렌더됨
                const groupIdxs = [i]; // there's/10-dollar처럼 기호로 이어진 조각들을 한 단어로 묶기(2개 이상도 지원)
                let k = i + 1;
                while (tokens[k] && tokens[k].joinPrev) { groupIdxs.push(k); k++; }
                return (
                  <span key={i} className="dict-word">
                    <span className="dict-word-row">
                      {groupIdxs.map(gi => renderSlot(gi))}
                    </span>
                    {lenHint && !locked[i] && (
                      <div className="len-row">
                        {t.core.split("").map((_, kk) => <i key={kk} />)}
                      </div>
                    )}
                  </span>
                );
              })}
            </div>
            {wrongMask && (
              <div className="qres no" style={{ marginTop: 10 }}>
                <Icon name="close" size={18} /> 빨간 칸이 아직 달라요 — 맞게 고치면 자동으로 고정돼요
              </div>
            )}
          </React.Fragment>
        ) : (
          <div className="dict-result">
            {tokens.map((t, i) => {
              if (t.joinPrev) return null; // there's/10-dollar의 이어진 조각은 앞 칸과 한 덩어리로 같이 렌더
              const groupIdxs = [i];
              let k = i + 1;
              while (tokens[k] && tokens[k].joinPrev) { groupIdxs.push(k); k++; }
              return (
                <span key={i} className="dict-word-row">
                  {groupIdxs.map(gi => {
                    const g = tokens[gi];
                    // 굴절형도 표제어로 역추적해 연결(Children→child, others→other)
                    const hit = g.core && dictLookup(g.core);
                    return (
                      <React.Fragment key={gi}>
                        {g.joinPrev ? g.joinSym : g.pre}
                        <button type="button" className="dict-rword" disabled={!hit} onClick={() => hit && onOpenWord(hit.word)}>
                          {g.core}
                        </button>
                        {g.post}
                      </React.Fragment>
                    );
                  })}
                </span>
              );
            })}
          </div>
        )}

        {res && <div className="dict-meaning">{it.ex.ko}</div>}
        {res && res.forcedRelearn && (
          <div className="dict-relearn-note">힌트를 3번 사용해서 이 문제는 세션 뒤쪽에서 다시 나와요.</div>
        )}
        {res && notes.length > 0 && (
          <div className="dict-notes">
            {notes.map((n, i) => <div key={i} className="dict-note">{renderBold(n)}</div>)}
          </div>
        )}
        {res && !res.forcedRelearn && (
          <div className="qres ok">
            <Icon name="check" size={18} /> 정답!
            <span className="due">{res.dueIn === 0 ? "곧 복습" : res.dueIn + "일 뒤 복습"}</span>
          </div>
        )}
      </div>

      {!res ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: "auto" }}>
          <div className="qhintrow">
            <span className="qhint-lbl">힌트</span>
            <button className={"qhint-btn" + (firstHint ? " on" : "")} onClick={toggleFirstHint}>앞글자 보기</button>
            <button className={"qhint-btn" + (lenHint ? " on" : "")} onClick={() => setLenHint(v => !v)}>단어길이 보기</button>
          </div>
          {replayCount > 0 && (
            <div className="qhint">
              힌트 {replayCount}회 사용 — 다음 문제 난이도가 낮아져요{replayCount >= 2 ? " · 한 번 더 쓰면 이 문제를 다시 학습해요" : ""}
            </div>
          )}
          <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={check}>확인</button>
        </div>
      ) : (
        <div className="qactions">
          <button className="primary" onClick={next}>{idx + 1 >= queue.length ? "학습 완료" : "다음 문장"}</button>
        </div>
      )}
    </div>
  );
}

/* ---------- 레벨 테스트 UI ----------
   엔진(createLevelTestA/B, saveLevelTest 등)은 위쪽 "레벨 테스트 엔진 (4.3)" 섹션 그대로 사용.
   여기서는 그 엔진이 내놓는 문항을 그리고, 사용자의 응답을 엔진에 그대로 돌려주기만 한다. */

/* Part A(어휘) — know → (알아요면) meaning → produce가 섞여 나온다. 엔진은 React state가 아니라
   내부 클로저 변수로 진행되므로, answer* 호출 뒤 tick을 올려 강제로 다시 그린다. */
function LevelTestPartA({ onExit, onDone }) {
  const engineRef = React.useRef(null);
  if (!engineRef.current) engineRef.current = createLevelTestA();
  const t = engineRef.current;
  const [, setTick] = useState(0);
  const bump = () => setTick(x => x + 1);
  const cur = t.current();
  const progress = t.progress();

  const [val, setVal] = useState("");
  useEffect(() => { setVal(""); }, [cur]);
  useEffect(() => { if (!cur) onDone(t.result()); }, [cur]);
  if (!cur) return null;

  const submitProduce = () => { t.answerProduce(val); bump(); };
  const undoBack = () => { if (t.canUndo()) { t.undo(); bump(); } };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={onExit} aria-label="종료"><Icon name="close" size={22} /></button>
        <button className="x" onClick={undoBack} disabled={!t.canUndo()} style={{ opacity: t.canUndo() ? 1 : 0.3 }} aria-label="한 단계 뒤로"><Icon name="chevron_left" size={24} /></button>
        <div className="study-bar"><i style={{ width: (progress.done / progress.total * 100) + "%" }} /></div>
        <span className="study-n">{progress.done} / {progress.total}</span>
      </div>

      {cur.kind === "know" && (
        <React.Fragment>
          {/* know↔meaning 전환 시 카드 크기·폰트가 흔들리지 않게 동일 구조(.lt-qcard/.lt-word) 고정 */}
          <div className="qcard lt-qcard">
            <div className="qcue">이 단어를 아세요?</div>
            <div className="lt-word">{cur.word}</div>
          </div>
          <div className="qactions">
            <button className="ghost" onClick={() => { t.answerKnow(false); bump(); }}>모름</button>
            <button className="primary" onClick={() => { t.answerKnow(true); bump(); }}>뜻 압니다</button>
          </div>
        </React.Fragment>
      )}

      {cur.kind === "meaning" && (
        <React.Fragment>
          <div className="qcard lt-qcard">
            <div className="qcue">뜻을 골라 주세요</div>
            <div className="lt-word">{cur.word}</div>
          </div>
          <div className="lt-choices">
            {cur.choices.map((c, i) => (
              <button key={i} className="lt-choice" onClick={() => { t.answerMeaning(i); bump(); }}>{c}</button>
            ))}
          </div>
        </React.Fragment>
      )}

      {cur.kind === "produce" && (
        <React.Fragment>
          <div className="qcard lt-qcard">
            {cur.cue && <div className="qcue">{cur.cue}</div>}
            <div className="qko">{cur.ko}</div>
            <div className="qdiv" style={{ alignSelf: "stretch" }} />
            <div className="qen" style={{ textAlign: "center" }}>
              <input className="qbox" autoFocus type="search" value={val}
                onChange={e => setVal(e.target.value)}
                onKeyDown={e => e.key === "Enter" && submitProduce()}
                size={Math.max(8, val.length + 1)}
                lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
                name="vocab-lt-produce" id="vocab-lt-produce" data-lpignore="true"
                aria-label="영단어 입력" />
            </div>
            <div className="qhint">{cur.len}글자</div>
          </div>
          <div className="qactions">
            <button className="ghost" onClick={() => { t.answerProduce(""); bump(); }}>모름</button>
            <button className="primary" onClick={submitProduce}>확인</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* Part A 완료 → Part B 진행 여부를 묻는 중간 안내 */
function LevelTestInterim({ onSkip, onContinue }) {
  return (
    <div className="content"><div className="finish">
      <div className="msg">Part A 완료</div>
      <div className="sub">이어서 문장구사력(어순 배열 5문장)을 측정할까요?</div>
      <div className="qactions" style={{ width: "100%", marginTop: 18 }}>
        <button className="ghost" onClick={onSkip}>건너뛰기</button>
        <button className="primary" onClick={onContinue}>이어서 측정</button>
      </div>
    </div></div>
  );
}

/* Part B(문장구사력) — 어순 배열. 셔플된 칩을 정답 순서대로 탭하면 위 답 영역에 쌓인다.
   순서가 아닌 칩을 탭하면 잠깐 빨갛게 흔들리고 errors만 오르고 답에는 안 들어간다.
   탭한 칩은 자리를 유지한 채 흐려지기만 함(남은 칩이 당겨지면 오탭 유발) + 실행취소 버튼.
   출제는 적응형(엔진) — 오탭 1개 이하로 완성하면 다음 문장은 한 단계 위 밴드. */
function LevelTestPartB({ onExit, onDone }) {
  const engineRef = React.useRef(null);
  if (!engineRef.current) engineRef.current = createLevelTestB();
  const b = engineRef.current;
  const [, setTick] = useState(0);
  const bump = () => setTick(x => x + 1);

  const cur = b.current();
  const progress = b.progress();
  const [picked, setPicked] = useState([]);     // shuffled 배열 내 인덱스(선택 순서)
  const [errors, setErrors] = useState(0);
  const startRef = React.useRef(Date.now());
  const [wrongPos, setWrongPos] = useState(null); // 흔들림 표시 중인 칩 위치

  useEffect(() => { setPicked([]); setErrors(0); startRef.current = Date.now(); }, [cur]);
  useEffect(() => { if (!cur) onDone(b.report()); }, [cur]);
  if (!cur) return null;

  const pickedSet = new Set(picked);
  const nextWord = cur.words[picked.length];

  const tapChip = pos => {
    if (pickedSet.has(pos)) return;
    if (cur.shuffled[pos] !== nextWord) {
      setErrors(e => e + 1);
      setWrongPos(pos);
      setTimeout(() => setWrongPos(null), 350);
      return;
    }
    const np = picked.concat(pos);
    if (np.length >= cur.words.length) {
      const seconds = (Date.now() - startRef.current) / 1000;
      b.answer({ ok: true, errors, seconds });
      bump();
    } else {
      setPicked(np);
    }
  };
  const undoPick = () => { if (picked.length) setPicked(picked.slice(0, -1)); };

  return (
    <div className="content study" data-answer={cur.words.join(" ")}>
      <div className="study-top">
        <button className="x" onClick={onExit} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: (progress.done / progress.total * 100) + "%" }} /></div>
        <span className="study-n">{progress.done + 1} / {progress.total}</span>
      </div>

      <div className="lt-ko">{cur.ko}</div>
      <div className="lt-answer">{picked.map(p => cur.shuffled[p]).join(" ")}</div>
      <div className="lt-chips">
        {cur.shuffled.map((w, pos) => (
          <button key={pos}
            className={"lchip link" + (wrongPos === pos ? " wrong" : "") + (pickedSet.has(pos) ? " picked" : "")}
            disabled={pickedSet.has(pos)}
            onClick={() => tapChip(pos)}>{w}</button>
        ))}
      </div>
      <div className="qhintrow" style={{ justifyContent: "flex-end" }}>
        <button className="qhint-btn" onClick={undoPick} disabled={!picked.length} style={{ opacity: picked.length ? 1 : 0.4 }}>실행취소</button>
      </div>
    </div>
  );
}

/* 결과 분포 곡선(2026-07-20 재설계, 같은 날 재조정) — 예전엔 얇은 윤곽선 하나만 그리고 그 위에
   "초급/평균/고급" 라벨과 "나" 마커를 같이 얹어서 겹쳐 보이던 문제를 영역 채색 + 상/하 분리 배치로
   해결했는데, 그 1차 버전은 통계적으로 정확한 ±1시그마 경계(하위/상위 16%)를 그대로 써서 가운데
   "평균"(옐로우) 구간이 전체 폭의 68%를 차지해 버렸고, 3색(핑크/옐로우/초록)만 써서 cefrHl의 4단계
   하이어라키 중 최상급(블루)이 이 차트에는 아예 없었음(사용자 지적: "옐로우만 너무 많이 보이고
   블루는 아예 안 보여"). **통계적 정확도보다 가독성을 우선**해 pct 경계를 70/40/15로 의도적으로
   재배치(각 영역이 30%/30%/25%/15%로 고르게 보이도록 시각 보정) + cefrHl과 완전히 같은 4단계
   (핑크=초급<옐로우=평균<초록=고급<블루=최상급)로 확장. 곡선(pct)만 인자로 받는 순수 렌더 함수라
   과거에 저장된 결과(loadLevelTest())를 다시 열어도 이 최신 배색으로 자동 반영됨(재측정 불필요). */
const LT_X0 = 4, LT_X1 = 256, LT_MEAN = 130, LT_SIGMA = 42, LT_BASE = 80, LT_AMP = 58;
function ltCurveY(x) {
  const t = Math.exp(-Math.pow(x - LT_MEAN, 2) / (2 * LT_SIGMA * LT_SIGMA));
  return LT_BASE - LT_AMP * t;
}
// pct(상위 %) → x좌표 — pct가 낮을수록(고급일수록) 오른쪽. 극단 백분위에서 마커·칩이 viewBox
// 밖으로 잘리지 않게 클램프.
function ltPctX(pct) { return Math.max(16, Math.min(244, LT_X0 + (1 - pct / 100) * (LT_X1 - LT_X0))); }
/* 백분위 → 4단계 하이어라키 색(cefrHl과 동일 순서·의미) — 분포 곡선의 영역 색뿐 아니라, 분석 텍스트에서
   "상위 P%"에 근거해 값을 색칠할 때도 이 경계를 그대로 공유(레벨테스트 결과 화면 전체가 같은 기준). */
function ltPctHl(pct) { return pct >= 70 ? "pink" : pct >= 40 ? "yellow" : pct >= 15 ? "green" : "blue"; }
function ltAreaPath(xa, xb) {
  const steps = 20;
  let d = `M${xa.toFixed(1)},${LT_BASE}`;
  for (let i = 0; i <= steps; i++) {
    const x = xa + (xb - xa) * (i / steps);
    d += ` L${x.toFixed(1)},${ltCurveY(x).toFixed(1)}`;
  }
  return d + ` L${xb.toFixed(1)},${LT_BASE} Z`;
}
function ltOutlinePath() {
  const steps = 40;
  let d = "";
  for (let i = 0; i <= steps; i++) {
    const x = LT_X0 + (LT_X1 - LT_X0) * (i / steps);
    d += (i === 0 ? "M" : " L") + `${x.toFixed(1)},${ltCurveY(x).toFixed(1)}`;
  }
  return d;
}
function LtDistCurve({ pct }) {
  const x = ltPctX(pct);
  const y = ltCurveY(x);
  const b1 = ltPctX(70), b2 = ltPctX(40), b3 = ltPctX(15); // 4영역 경계(통계적 시그마가 아니라 가독성 위주로 재배치, 위 주석 참고)
  const bounds = [b1, b2, b3];
  // "나" 칩은 곡선 위쪽 8~58 구간에 고정해 아래 축 라벨(y=92)과는 항상 떨어지게 함
  const pinY = Math.max(8, Math.min(58, y - 16));
  return (
    <div className="qcard" style={{ padding: "10px 8px 6px" }}>
      <svg width="100%" height="92" viewBox="0 0 260 92">
        <path d={ltAreaPath(LT_X0, b1)} fill="var(--hi-pink-light)" />
        <path d={ltAreaPath(b1, b2)} fill="var(--hi-yellow-light)" />
        <path d={ltAreaPath(b2, b3)} fill="var(--hi-green-light)" />
        <path d={ltAreaPath(b3, LT_X1)} fill="var(--hi-blue-light)" />
        <line x1={LT_X0} y1={LT_BASE} x2={LT_X1} y2={LT_BASE} stroke="var(--card-border)" strokeWidth="1" />
        {bounds.map((b, i) => (
          <line key={i} x1={b} y1={ltCurveY(b)} x2={b} y2={LT_BASE} stroke="var(--ink-2)" strokeWidth="1" strokeDasharray="2,2" opacity=".5" />
        ))}
        <path d={ltOutlinePath()} fill="none" stroke="var(--ink)" strokeWidth="1.6" />
        <text x={(LT_X0 + b1) / 2} y={LT_BASE + 12} fontSize="9.5" fontWeight="800" fill="var(--hi-pink-dark)" textAnchor="middle">초급</text>
        <text x={(b1 + b2) / 2} y={LT_BASE + 12} fontSize="9.5" fontWeight="800" fill="var(--hi-yellow-dark)" textAnchor="middle">평균</text>
        <text x={(b2 + b3) / 2} y={LT_BASE + 12} fontSize="9.5" fontWeight="800" fill="var(--hi-green-dark)" textAnchor="middle">고급</text>
        <text x={(b3 + LT_X1) / 2} y={LT_BASE + 12} fontSize="9.5" fontWeight="800" fill="var(--hi-blue-dark)" textAnchor="middle">최상급</text>
        <line x1={x} y1={pinY + 9} x2={x} y2={y} stroke="var(--ink)" strokeWidth="1.6" strokeDasharray="2,2" />
        <circle cx={x} cy={y} r="3.6" fill="var(--ink)" stroke="var(--bg)" strokeWidth="1.3" />
        <g transform={`translate(${x},${pinY})`}>
          <rect x="-13" y="-8" width="26" height="16" rx="8" fill="var(--ink)" />
          <text x="0" y="0.5" fontSize="10" fontWeight="800" fill="var(--on-accent)" textAnchor="middle" dominantBaseline="middle">나</text>
        </g>
      </svg>
    </div>
  );
}

/* 결과 화면 — 어휘력(Part A)·문장구사력(Part B)을 분리된 두 축으로 표시.
   진입 시 saveLevelTest를 1회만 호출(홈/통계에서 나중에 읽어 씀). */
/* 결과 레벨 밴드 → 컬러위계 색(cefrHl 규칙 공유). 12단계 라벨("B1+","C2+")은 base 글자로 매핑 */
function ltBandHl(label) { return cefrHl((label || "").replace("+", "")); }

/* 결과 분석 — "어휘 C1, 문장 B1 — 산출 연습" 한 줄보다 우리 앱 기능에 근거한 구체적 진단으로.
   ① 어휘↔문장 격차 방향/크기 ② 수동/능동(활성 어휘 비율) ③ 어순 자동화 속도(spw)를
   각각 짚고, 실제로 켤 수 있는 루틴(단어카드 빈칸·듣기 딕테이션·어순 배열·어원 타고타고)을 지목. */
/* 능동/수동 어휘 비율 → 4단계 하이어라키(ltPctHl과 같은 배색 순서: 핑크<옐로우<초록<블루) —
   낮을수록(산출이 약할수록) 나쁜 값이라 핑크 쪽. */
function ltRatioHl(r) { return r < 0.3 ? "pink" : r < 0.5 ? "yellow" : r < 0.75 ? "green" : "blue"; }
/* 어순 배열 단어당 초(spw) → 4단계 하이어라키 — 느릴수록(클수록) 나쁜 값이라 ltPctHl과 부등호 방향이 반대. */
function ltSpwHl(spw) { return spw >= 2.2 ? "pink" : spw >= 1.5 ? "yellow" : spw >= 1.0 ? "green" : "blue"; }
/* 노트 전체를 한 색으로 칠하던 방식 폐기(2026-07-20) — "박스별로 색을 다르게 칠하라는 게 아니라,
   레벨·단어수·속도 등 값 하나하나가 자기 판정 레벨에 맞는 하이어라키 색을 가져야 한다"는 지적.
   이제 **텍스트** 안에 renderBold가 읽는 "pink:"/"yellow:"/"green:"/"blue:" 접두사를 값마다 직접
   박아서, 같은 문장 안에서도 B2는 ltBandHl(B2)색, 7,200개는 ltPctHl(그 개수의 백분위)색처럼 각자
   독립적으로 칠해지게 함. 설명 문구(예: "듣기 세션")처럼 판정값이 아닌 bold는 접두사 없이 그대로
   둬 기본(중립 노랑) 강조만 받는다. */
function ltAnalysis(A, B) {
  const out = [];
  const activeRatio = A.vocab ? A.activeVocab / A.vocab : 0;
  const aBandHl = ltBandHl(A.band), aPctHl = ltPctHl(A.pct);
  if (B) {
    const d = A.band12 - B.band12;
    const bBandHl = ltBandHl(B.band);
    if (d >= 2) out.push(`읽으면 아는 단어 수준(**${aBandHl}:${A.band}**)에 비해 문장으로 조립하는 힘(**${bBandHl}:${B.band}**)이 ${d >= 4 ? "크게 " : ""}뒤처져요. "알지만 말이 안 나오는" 전형적 프로필이에요. **듣기 세션(딕테이션)**으로 문장 리듬을 익히고, **레벨 테스트의 어순 배열**과 **단어카드 빈칸 채우기**로 산출을 끌어올리세요.`);
    else if (d <= -2) out.push(`문장 구성력(**${bBandHl}:${B.band}**)은 좋은데 어휘량(**${aBandHl}:${A.band}**)이 못 받쳐줘요. **단어카드 신규 학습**을 하루 목표까지 채우고, 사전 상세의 **어원·유의어 타고타고**로 어휘 폭을 넓히면 표현이 훨씬 풍부해져요.`);
    else out.push(`어휘(**${aBandHl}:${A.band}**)와 문장 구사(**${bBandHl}:${B.band}**)가 균형을 이뤄요. 지금 루틴(**단어카드 + 듣기 세션**)을 유지하며 난이도를 한 단계씩 올려보세요.`);
  } else {
    out.push(`문장구사력은 아직 측정하지 않았어요. **레벨 테스트의 어순 배열**을 한 번 해보면 어휘와 산출력의 격차를 볼 수 있어요.`);
  }
  if (A.vocab >= 100) {
    const ratioHl = ltRatioHl(activeRatio);
    out.push(`아는 단어 약 **${aPctHl}:${A.vocab.toLocaleString()}개** 중 실제로 말할 수 있는 건 약 **${ratioHl}:${A.activeVocab.toLocaleString()}개(${Math.round(activeRatio * 100)}%)**${activeRatio < 0.5 ? "뿐이에요 — 인지는 되지만 산출이 약한 상태. **단어카드의 빈칸(산출) 채우기**와 **듣기 딕테이션**이 능동 어휘 전환에 가장 효과적이에요." : "를 실제로 쓸 수 있어요 — 수동/능동 균형이 좋은 편이에요."}`);
  }
  if (B && typeof B.spw === "number" && B.spw > 0) {
    const spwHl = ltSpwHl(B.spw);
    // 중간 속도(1.0~2.2초)는 딱히 짚을 게 없어 노트를 안 냄(예전과 동일 — 극단(빠름/느림)일 때만).
    if (B.spw >= 2.2) out.push(`어순을 맞추는 데 단어당 **${spwHl}:${B.spw.toFixed(1)}초**가 걸렸어요 — 문장을 "번역하듯" 조립하는 단계예요. **듣기 세션**을 매일 반복하면 통째로 떠올리는 속도가 붙어요.`);
    else if (B.spw <= 1.0) out.push(`어순 배열이 단어당 **${spwHl}:${B.spw.toFixed(1)}초**로 빨라요 — 문장 구조가 거의 자동화돼 있어요.`);
  }
  return out;
}

function LevelTestResult({ resultA, resultB, onExit, onRetry, viewOnly }) {
  const savedRef = React.useRef(false);
  useEffect(() => {
    if (viewOnly) return; // 홈 통계 카드에서 "저장된 결과 보기"로 열 때는 재저장(at 갱신) 안 함
    if (savedRef.current) return;
    savedRef.current = true;
    saveLevelTest({ lex: resultA, flu: resultB || null });
  }, []);

  const analysis = ltAnalysis(resultA, resultB);
  // 닉네임 설정 시 "OO님의 레벨테스트 실력"으로 — 게스트/미설정이면 그냥 넘어감(2026-07-20).
  const nick = nicknameLabel();

  return (
    <div className="content">
      {nick && <div className="sec" style={{ marginBottom: -6 }}>{nick}의 레벨테스트 실력</div>}
      <div className="lt-note">{renderBold("아래 분포는 **공개 통계 참고 추정치**입니다. 실제 전국 표본이 아니라 동기부여용 근사값이에요.")}</div>

      <div className="sec">어휘력</div>
      <div className="lt-row">
        <span className={"lt-band tier-" + ltBandHl(resultA.band)}>{resultA.band}</span>
        <span className={"chip tier-" + ltBandHl(resultA.band)}>{resultA.vocab.toLocaleString()} 단어</span>
        <span className={"chip tier-" + ltBandHl(resultA.band)}>상위 {resultA.pct}% (추정)</span>
      </div>
      <div style={{ textAlign: "center", fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>
        말할 수 있는 단어 약 {resultA.activeVocab.toLocaleString()}개
      </div>
      <LtDistCurve pct={resultA.pct} />

      <div className="sec">문장구사력</div>
      {resultB ? (
        <React.Fragment>
          <div className="lt-row">
            <span className={"lt-band tier-" + ltBandHl(resultB.band)}>{resultB.band}</span>
            <span className={"chip tier-" + ltBandHl(resultB.band)}>상위 {resultB.pct}% (추정)</span>
          </div>
          <LtDistCurve pct={resultB.pct} />
          <div className="lt-note">{renderBold("**어순 배열만으로 부분 측정**한 값이에요")}</div>
        </React.Fragment>
      ) : (
        <div className="lt-note">측정 안 함 — 나중에 다시 할 수 있어요</div>
      )}

      <div className="sec">분석</div>
      {analysis.map((text, i) => <div key={i} className="lt-note">{renderBold(text)}</div>)}

      <div className="qactions" style={{ marginTop: 4 }}>
        <button className="ghost" onClick={onRetry}>다시 측정</button>
        <button className="primary" onClick={onExit}>완료</button>
      </div>
    </div>
  );
}

/* Part A → (중간 안내) → Part B(선택) → 결과, 4단계를 오가는 오케스트레이터 */
function LevelTest({ onExit }) {
  const [phase, setPhase] = useState("a"); // "a" | "interim" | "b" | "result"
  const [resultA, setResultA] = useState(null);
  const [resultB, setResultB] = useState(null);

  if (phase === "a") {
    return <LevelTestPartA onExit={onExit} onDone={r => { setResultA(r); setPhase("interim"); }} />;
  }
  if (phase === "interim") {
    return <LevelTestInterim
      onSkip={() => { setResultB(null); setPhase("result"); }}
      onContinue={() => setPhase("b")} />;
  }
  if (phase === "b") {
    return <LevelTestPartB onExit={onExit} onDone={r => { setResultB(r); setPhase("result"); }} />;
  }
  return <LevelTestResult resultA={resultA} resultB={resultB} onExit={onExit}
    onRetry={() => { setResultA(null); setResultB(null); setPhase("a"); }} />;
}

/* 오답 노트(듣기 세션) — DictationSession에서 첫 시도에 못 맞힌 문장이 addWrongNote로 쌓인다.
   목록에서 다시 듣거나, 통째로 "이 문장들로 복습하기"를 눌러 그 항목들만으로 듣기 세션을 시작할 수 있다.
   깨끗하게(재시도 없이) 맞히면 removeWrongNote가 자동으로 빼줌(DictationSession.complete 참고) — 여기선
   수동 제거 버튼만 추가로 제공(2026-07-20). */

        <div className="talk-head-name">오답 노트</div>
      </div>
      {items.length === 0 ? (
        <div className="empty-note">아직 틀린 문장이 없어요. 듣기 세션에서 틀리면 여기 모여요.</div>
      ) : (
        <>
          <button className="qsub" style={{ marginBottom: 14 }} onClick={() => onStudy(items)}>이 문장들로 복습하기 ({items.length}개)</button>
          {items.map(it => (

function Learn({ onOpenWord, onStartLevelTest, customStudy, customMode, onConsumeCustomStudy, setImmersive }) {
  const [session, setSession] = useState(null); // null | items | "done"
  const [mode, setMode] = useState("card");      // "card" | "listen" — session이 어느 세션인지
  const [summary, setSummary] = useState(null);
  const [quiz, setQuiz] = useState(null); // null | questions[] | "done"
  const [quizSummary, setQuizSummary] = useState(null);
  const [wrongView, setWrongView] = useState(false); // 오답 노트 목록 화면(2026-07-20)
  // 카드/듣기 세션이나 퀴즈 중엔 몰입 화면이라 탭바를 숨김(2026-07-18) — 메뉴로 돌아오면(session/quiz null) 자동 복원.
  useEffect(() => {
    if (!setImmersive) return;
    setImmersive(session !== null || quiz !== null);
    return () => setImmersive(false);
  }, [session, quiz]); // eslint-disable-line
  const dueCount = allItems().filter(it => SRS.isDue(it.key)).length;
  /* 신규는 전체 표제어(1만+)가 아니라 내 레벨 ±1 범위 대기 수 — 그중 오늘 목표(goalWords)만큼만 안내 */
  const freshCount = freshPool().length;
  const newGoal = Math.min(PREFS.get().goalWords, freshCount);
  const studiedCount = allItems().filter(it => SRS.get(it.key)).length;

  // 사전(내 단어장)/홈에서 '이 리스트로 학습'을 눌러 넘어온 경우 곧바로 그 목록으로 세션 시작
  // (customMode로 카드/듣기 중 어느 세션을 열지 지정 — 홈 "듣기 N문장"이 학습 탭 메뉴만 보여주던 버그 수정)
  useEffect(() => {
    if (customStudy && customStudy.length) {
      setMode(customMode || "card");
      setSession(customStudy);
      onConsumeCustomStudy();
    }
    // eslint-disable-next-line
  }, [customStudy]);

  if (session === "done" && summary) {
    return <Finish total={summary.total} correct={summary.correct}
      label={mode === "listen" ? "오늘 듣기 세션 완료" : undefined}
      onExit={() => { setSession(null); setSummary(null); }} />;
  }
  const onSessionExit = (done, correct, total) => {
    if (done) {
      const n = total || session.length;
      // 카드 수(c)·듣기 문장 수(li)는 이미 CardSession/DictationSession이 문항마다 실시간으로
      // 기록해뒀으므로(2026-07-20) 여기서 또 더하면 중복 집계 — 듣기는 "세션을 완주했다"는
      // 뱃지용 카운트(ls)만 별도로 채운다. 카드는 세션 단위 카운트 자체가 없어 여기서 할 일이 없음.
      if (mode === "listen") ACT.addListenSessionDone();
      setSummary({ total: n, correct }); setSession("done");
    }
    else setSession(null);
  };
  if (session && mode === "listen") return <DictationSession items={session} onExit={onSessionExit} onOpenWord={onOpenWord} />;
  if (session) return <CardSession items={session} onOpenWord={onOpenWord} onExit={onSessionExit} />;
  if (wrongView) return <WrongNotesView onExit={() => setWrongView(false)} onOpenWord={onOpenWord}
    onStudy={items => { setWrongView(false); setMode("listen"); setSession(items); }} />;
  if (quiz === "done" && quizSummary) {
    return <Finish total={quizSummary.total} correct={quizSummary.correct}
      title="퀴즈 완료" sub="정답 여부는 SRS 복습 일정에는 영향을 주지 않아요."
      onExit={() => { setQuiz(null); setQuizSummary(null); }} />;
  }
  if (quiz) {
    return <QuizSession questions={quiz}
      onExit={(done, correct, total) => {
        if (done) { setQuizSummary({ total: total ?? quiz.length, correct }); setQuiz("done"); }
        else setQuiz(null);
      }} />;
  }

  const startCard = () => { const items = pickSession(10); if (items.length) { setMode("card"); setSession(items); } };
  const startListen = () => { unlockAudio(); const items = sortByListenDifficulty(pickSession(10, listenLevelShift())); if (items.length) { setMode("listen"); setSession(items); } };
  const startQuiz = () => {
    const qs = buildQuiz(10);
    if (qs) setQuiz(qs);
  };

  const wrongCount = loadWrongNotes().length;
  const MENU = [
    { k: "card", icon: "school", title: "단어카드", sub: `복습 ${dueCount} · 오늘 신규 목표 ${newGoal}개`, on: true, start: startCard },
    { k: "listen", icon: "volume_up", title: "듣기 세션 (딕테이션)", sub: "듣고 그대로 타이핑", on: true, start: startListen },
    { k: "quiz", icon: "grid_view", title: "퀴즈", sub: studiedCount >= 4 ? "뜻 4지선다 · 스펠링 · 어순 배열" : "먼저 단어카드로 학습해 보세요", on: studiedCount >= 4, start: startQuiz }, // 2026-07-19 문장 퀴즈(어순 배열) 추가로 복원(2026-07-15 숨김 해제)
    { k: "wrong", icon: "replay", title: "오답 노트", sub: wrongCount ? `듣기에서 틀렸던 문장 ${wrongCount}개` : "아직 틀린 문장이 없어요", on: wrongCount > 0, start: () => setWrongView(true) }, // 2026-07-20
    { k: "level", icon: "add", title: "레벨 테스트", sub: "어휘 + 문장구사력", on: true, start: onStartLevelTest },
  ];

  const dueHl = dueCardHl(dueCount);
  return (
    <div className="content learnmenu">
      <div className={"stat" + (dueHl !== "cream" ? " tier-" + dueHl : "")} style={{ padding: "18px 8px", marginBottom: 2, cursor: "pointer" }} onClick={startCard}>
        <div className="v"><span className={"hl hl-" + dueHl} style={{ fontSize: 30 }}>{dueCount}</span></div>
        <div className="l">지금 복습할 카드</div>
      </div>
      {MENU.filter(m => !m.hidden).map(m => (
        <div key={m.k} className={"step" + (m.on ? "" : " soon")} onClick={() => m.on && m.start()}>
          <div className="step-ico round black"><Icon name={m.icon} size={20} /></div>
          <div className="step-body">
            <div className="step-title">{m.title}</div>
            <div className="step-sub">{m.sub}</div>
          </div>
          {m.on ? <div className="step-cta">시작</div> : <span className="arrow">›</span>}
        </div>
      ))}
    </div>
  );
}

function Settings({ charK, onChangeChar, onClose, onStartLevelTest, onOpenGuide }) {
  const [pts, setPts] = useState(POINTS.get());
  const [prefs, setPrefsState] = useState(PREFS.get());
  const first = charK === null;
  const lastLt = loadLevelTest();

  const [authUser, setAuthUser] = useState(() => AUTH.getUser());
  const [syncMsg, setSyncMsg] = useState("");
  const [legalView, setLegalView] = useState(null); // null | "privacy" | "terms"
  // 닉네임(2026-07-20) — AUTH.onChange는 로그인/로그아웃뿐 아니라 updateNickname 성공 시에도
  // notify()되므로, 같은 구독으로 nickname state도 같이 새로고침(loadNickname은 로컬 캐시 읽기라 가벼움).
  const [nickname, setNickname] = useState(loadNickname);
  const [editingNick, setEditingNick] = useState(false);
  const [nickDraft, setNickDraft] = useState("");
  const [nickErr, setNickErr] = useState(null);
  const [savingNick, setSavingNick] = useState(false);
  useEffect(() => AUTH.onChange(u => { setAuthUser(u); setNickname(loadNickname()); }), []);
  const startEditNick = () => { setNickDraft(nickname); setNickErr(null); setEditingNick(true); };
  const saveNick = async () => {
    const v = nickDraft.trim();
    if (!v || savingNick) return;
    setSavingNick(true); setNickErr(null);
    const r = await AUTH.updateNickname(v);
    setSavingNick(false);
    if (r.ok) { setNickname(v); setEditingNick(false); }
    else setNickErr(r.error || "저장 실패");
  };
  const doSyncNow = async () => {
    setSyncMsg("동기화 중…");
    const r = await AUTH.syncNow();
    if (r.ok && r.downloaded) {
      // 다른 기기가 올린 더 최신 데이터를 내려받은 경우 — 메모리 state에 반영하려면 새로고침 필요
      setSyncMsg("다른 기기의 최신 데이터를 가져왔어요");
      setTimeout(() => location.reload(), 800);
      return;
    }
    setSyncMsg(r.ok ? "방금 동기화됐어요" : "동기화 실패: " + (r.error || "알 수 없는 오류"));
  };
  const [deleting, setDeleting] = useState(false);
  const doDeleteAccount = async () => {
    if (deleting) return;
    if (!confirm("계정을 삭제하면 서버에 저장된 학습 기록이 전부 지워지고 되돌릴 수 없어요. 정말 삭제할까요?")) return;
    setDeleting(true);
    setSyncMsg("계정 삭제 중…");
    const r = await AUTH.deleteAccount();
    if (r.ok) { location.reload(); return; } // 로그아웃까지 끝난 상태 — 새로고침하면 게스트로 시작
    setDeleting(false);
    setSyncMsg("삭제 실패: " + (r.error || "알 수 없는 오류"));
  };

  const [bugMsg, setBugMsg] = useState("");
  const [bugSending, setBugSending] = useState(false);
  const [bugSent, setBugSent] = useState(false);
  const submitBug = async () => {
    if (!SB || !bugMsg.trim() || bugSending) return;
    setBugSending(true);
    try {
      await SB.from("bug_reports").insert({
        message: bugMsg.trim(), page: "settings", app_version: APP_VERSION,
        user_id: authUser ? authUser.id : null,
      });
      setBugSent(true); setBugMsg("");
    } catch (e) { setSyncMsg(""); } finally { setBugSending(false); }
  };

  useEffect(() => () => stopSpeaking(), []); // 설정 닫힐 때(언마운트) 미리듣기 음성 정지

  const handlePick = k => {
    if (k === charK) return;
    if (first) { onChangeChar(k); return; } // 처음 1회는 무료
    if (POINTS.spend(CHAR_CHANGE_COST)) { setPts(POINTS.get()); onChangeChar(k); }
  };

  const setGoal = (key, v) => {
    const n = Math.max(0, Math.min(999, v));
    PREFS.set({ [key]: n });
    setPrefsState({ ...PREFS.get() });
  };
  const setPref = (key, v) => {

/* ===================== 홈 화면 설치 유도 (JP_vocab_pcm 이식, 2026-07-20) =====================
   PWA로 설치(홈 화면 추가)하면 앱처럼 빠르게 열리고, iOS Safari의 "미설치 사이트 localStorage
   7일 후 삭제" 정책에서도 자유로워짐(설치=standalone이면 이 정책 미적용) — 미설치 사용자에게 안내. */
const INSTALL_DISMISS_KEY = "en_install_dismiss_v1";
function isStandalone() {
  try {
    return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
      window.navigator.standalone === true;
  } catch (e) { return false; }
}
function isIOSDevice() {
  try { return /iphone|ipad|ipod/i.test(navigator.userAgent || ""); } catch (e) { return false; }
}
function InstallBanner() {
  const [show, setShow] = useState(false);
  const [iosHelp, setIosHelp] = useState(false);
  const deferred = useRef(null);
  useEffect(() => {
    if (isStandalone()) return;
    try { if (localStorage.getItem(INSTALL_DISMISS_KEY)) return; } catch (e) {}
    const onBip = e => { e.preventDefault(); deferred.current = e; setShow(true); };
    window.addEventListener("beforeinstallprompt", onBip);
    if (isIOSDevice()) setShow(true); // iOS는 beforeinstallprompt 미지원 → 수동 안내
    return () => window.removeEventListener("beforeinstallprompt", onBip);
  }, []);
  const dismiss = () => { setShow(false); try { localStorage.setItem(INSTALL_DISMISS_KEY, "1"); } catch (e) {} };
  const doInstall = async () => {
    const d = deferred.current;
    if (d) {
      d.prompt();
      try { await d.userChoice; } catch (e) {}
      deferred.current = null; setShow(false);
    } else {
      setIosHelp(v => !v);
    }
  };
  if (!show) return null;
  return (
    <div className="install-banner">
      <div className="install-row">
        <img className="install-svg" src={"img/home-screen.svg?v=" + APP_VERSION} alt="" />
        <div className="install-text">
          <b>홈 화면에 추가하세요</b>
          <span>설치하면 학습 기록이 안전하게 보관되고, 앱처럼 빠르게 열려요.</span>
        </div>
        <div className="install-btns">
          <button className="install-later" onClick={dismiss}>나중에</button>
          <button className="install-do" onClick={doInstall}>설치</button>
        </div>
      </div>
      {iosHelp && (
        <div className="install-help">
          {isIOSDevice()
            ? <span>Safari 메뉴의 <b>공유 버튼</b>(네모에 ↑ 화살표)을 누른 뒤 <b>"홈 화면에 추가"</b>를 선택하세요.</span>
            : <span>브라우저 메뉴(⋮)에서 <b>"홈 화면에 추가"</b> 또는 <b>"앱 설치"</b>를 선택하세요.</span>}
        </div>
      )}
    </div>
  );
}

/* ===================== 온보딩 · 첫 사용자 가이드 · 업데이트 안내 (JP_vocab_pcm 이식, 2026-07-20) =====================
   PCM은 온보딩에서 JLPT 레벨을 직접 고르지만, 이 앱은 이미 별도의 레벨 테스트(4.3)가 있으므로
   온보딩은 "환영 화면 1장 + 시작하기"로 단순화 — 레벨 테스트는 홈의 안내 카드(이미 구현됨)에서
   원하는 시점에 받도록 유도한다(둘 다 강제 안 하는 게 진입장벽을 낮춘다는 PLAN 4.3 원칙과 일치). */
const ONBOARD_KEY = "en_onboard_v1";
function loadOnboard() {
  try {
    const saved = JSON.parse(localStorage.getItem(ONBOARD_KEY) || "null");
    if (saved) return saved;
    // 마이그레이션: 이 온보딩 기능이 생기기 전부터 이미 써온 사용자(en_srs에 실제 채점 기록이 있음
    // — SRS.grade()가 처음 호출될 때만 저장되므로 이게 있다는 건 최소 한 번 이상 학습했다는 뜻)는
    // "신규"가 아니므로 환영 화면을 다시 보여주지 않고 곧바로 온보딩 완료로 간주(2026-07-20).
    if (localStorage.getItem("en_srs") !== null) { const o = { done: true }; saveOnboard(o); return o; }
    return null;
  } catch (e) { return null; }
}
function saveOnboard(o) { try { localStorage.setItem(ONBOARD_KEY, JSON.stringify(o || {})); } catch (e) {} }
/* iOS Safari는 position:fixed 전체화면 오버레이(온보딩의 잉크색 배경)가 사라진 뒤에도
   그 자리(특히 상단 노치/상태바 인접 영역)의 합성(compositing) 레이어가 옛 색으로 남는
   경우가 있다(JP_vocab_pcm에서 먼저 발견·해결한 문제, 2026-07-20 이 앱에도 동일 이식).
   전체 새로고침(location.reload) 없이 아래 3가지를 함께 수행해 잔상을 지운다:
   1) 스크롤 1px 넛지 — iOS Safari가 fixed 레이어의 합성을 다시 계산하게 만드는,
      이 종류 버그에 가장 효과적이라고 알려진 방법.
   2) opacity 미세 토글 — 새 합성 레이어를 강제로 다시 만들게 함.
   3) documentElement display 토글 — 레이아웃 자체도 강제로 리플로우. */
function forceRepaint() {
  try {
    // html/body가 overflow:hidden이라 스크롤 가능한 범위가 원래 0이었다 — 그래서
    // 아래 스크롤 넛지가 지금까지 실제로는 아무 것도 안 움직이는(no-op) 상태였을 수 있다.
    // 1px짜리 스페이서를 잠깐 붙여 진짜 스크롤 여지를 만든 뒤 넛지하고 원상복구한다.
    const html = document.documentElement, body = document.body;
    const prevHtmlOverflow = html.style.overflow, prevBodyOverflow = body.style.overflow;
    const spacer = document.createElement("div");
    spacer.style.cssText = "width:1px;height:1px;";
    body.appendChild(spacer);
    html.style.overflow = "auto"; body.style.overflow = "auto";
    const x = window.scrollX, y = window.scrollY;
    window.scrollTo(x, y + 1);
    window.scrollTo(x, y);
    html.style.overflow = prevHtmlOverflow; body.style.overflow = prevBodyOverflow;
    spacer.remove();
    const el = document.documentElement;
    const prevOpacity = el.style.opacity;
    el.style.opacity = "0.99999";
    requestAnimationFrame(() => { el.style.opacity = prevOpacity; });
    const prevDisplay = el.style.display;
    el.style.display = "none";
    void el.offsetHeight; // 강제 리플로우
    el.style.display = prevDisplay;
  } catch (e) {}
}

  const [settingsOpen, setSettingsOpen] = useState(false);
  const [ltOpen, setLtOpen] = useState(false); // 레벨 테스트 — 학습 탭 메뉴와 설정 두 곳에서 진입하므로 앱 레벨에서 관리
  const [ltResultOpen, setLtResultOpen] = useState(false); // 홈의 레벨/어휘량/백분위 카드 → 저장된 결과 분석표 보기(2026-07-18, 예전엔 이 카드를 눌러도 사전 탭으로 넘어가버렸음)
  // 2026-07-18: 홈 히어로가 캐릭터 선택 여부와 무관하게 항상 고양이유령을 보여주도록 바뀌면서
  // (구 "캐릭터 미선택" 플레이스홀더 폐기), charK를 null로 방치할 이유가 없어져 기본값을 char1로
  // 변경 — "캐릭터 바꾸기" 화면에서도 고양이유령이 처음부터 "사용 중"으로 뜨는 게 자연스러움.
  const [charK, setCharKState] = useState(() => {
    try { return localStorage.getItem("en_char") || "char1"; } catch (e) { return "char1"; }
  });
  const changeChar = k => { setCharKState(k); try { localStorage.setItem("en_char", k); } catch (e) {} };
  const [customStudy, setCustomStudy] = useState(null); // 사전 > 내 단어장에서 '이 리스트로 학습' 요청
  const [customMode, setCustomMode] = useState("card"); // customStudy 진입 시 카드/듣기 중 어느 세션으로 열지
  const startCustomStudy = (items, mode = "card") => {
    if (mode === "card") primeKeyboardGesture(); // 카드 세션은 진입 즉시 입력을 받으므로 미리 키보드 프라이밍(듣기 세션은 오디오라 불필요)
    setCustomStudy(items); setCustomMode(mode); setTab("learn");
  };
  const [dictViewJump, setDictViewJump] = useState(null); // 보관함 > 즐겨찾기/내 단어장 → 사전의 해당 뷰로 바로 진입
  const openDictView = v => { setDictViewJump(v); setTab("dict"); };
  const startLevelTest = () => { setSettingsOpen(false); setLtOpen(true); };

  const openWord = w => setStack([w]);
  const pushWord = w => setStack(s => [...s, w]);
  // 단어 상세(예문 발음 듣기 등)에서 재생 중이던 음성이 뒤로가기/닫기 후에도 안 끊기던
  // 문제(2026-07-20) — 시트를 벗어나는 모든 경로(popWord·closeSheet)에서 정지.
  const popWord = () => { stopSpeaking(); setStack(s => (s.length > 1 ? s.slice(0, -1) : s)); };
  const closeSheet = () => { stopSpeaking(); setStack(null); };

  // allItems()의 SEED 캐시 + canBlank()의 항목별 캐시를 앱 마운트 직후(첫 페인트 뒤, 사용자가
  // 아직 아무것도 탭하기 전) 미리 데워둠 — 이 캐시들이 비어있는 상태로 "단어카드 시작"을 탭하면
  // pickSession()이 그 안에서 처음으로 채우느라 동기 블로킹이 생겨 뒤이은 입력창 focus()가
  // 늦어짐(2026-07-18). freshPool(0)이 내부에서 canBlank를 SEED 전체에 대해 한 번씩 호출하므로
  // 이거 한 번으로 두 캐시가 다 데워짐(부작용 없는 순수 조회라 RECENT_KEYS 등 상태는 안 건드림).
  useEffect(() => { freshPool(0); }, []);

  useEffect(() => {
    if (!stack) return;
    const onKey = e => { if (e.key === "Escape") closeSheet(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [stack]);

  /* 소프트 키보드가 하단 컨트롤(힌트·확인 버튼)을 가리지 않도록:
     visualViewport로 키보드가 가리는 높이를 재서 --kb CSS 변수로 내려줌(.content 바닥 패딩이 그만큼 늘어남).
     iOS는 키보드가 오버레이 방식이라 layout viewport(100dvh)가 안 줄어드는 것에 대한 대응. */
  useEffect(() => {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => {
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty("--kb", Math.round(kb) + "px");
    };
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    update();
    return () => { vv.removeEventListener("resize", update); vv.removeEventListener("scroll", update); };
  }, []);

  /* 새 버전 배포 감지: 앱을 열 때(최초 로드)와 백그라운드에서 돌아올 때(PWA를 껐다 켤 때 포함)
     version.json을 캐시 없이 확인해서 APP_VERSION과 다르면 배너 없이 바로 강제 새로고침.
     location.reload()는 캐시에서 그대로 서빙될 수 있어(특히 iOS 홈화면 standalone 앱)
     ?_=타임스탬프로 URL을 바꿔 강제 새 요청한다. 세션당(sessionStorage) 자동 새로고침은 값과
     무관하게 최대 1회로 제한 — 두 세션이 겹쳐 커밋하는 동안 version.json과 APP_VERSION이
     일시적으로 계속 어긋나거나(배포 레이스 컨디션) CDN 엣지 캐시가 값을 왔다갔다 서빙해도,
     "버전 문자열별 1회"였던 예전 가드는 값이 계속 바뀌면 매번 새 키로 인식해 무한 새로고침
     루프가 될 수 있었음(2026-07-20, 실제 사용자 PWA에서 재부팅해도 계속 깜빡이는 증상으로 발견 —
     세션당 고정 키 1개로 바꿔 근본적으로 봉쇄). */
  /* 2026-07-20 보강: 학습 세션(카드/듣기/퀴즈/회화 대화방 등 immersive 화면)이나 레벨테스트
     도중에는 강제 새로고침을 유예 — 문제 풀다 카톡 확인하고 돌아온 순간(visible 복귀) 마침 새 버전이
     배포돼 있으면 세션 상태·레벨테스트 전체 답안·회화 입력 초안이 통째로 날아가던 버그.
     (5분 폴링을 제거한 이유가 정확히 이 유실 방지였는데 visible 복귀 경로가 같은 유실을 일으켰음.)
     세션이 끝나는 순간(immersive/ltOpen이 false로 복귀) 유예해뒀던 체크를 즉시 재실행한다. */
  const verBusyRef = React.useRef(false);
  const verPendingRef = React.useRef(false);
  const verCheckRef = React.useRef(null);
  useEffect(() => {
    verBusyRef.current = immersive || ltOpen;
    if (!verBusyRef.current && verPendingRef.current) {
      verPendingRef.current = false;
      if (verCheckRef.current) verCheckRef.current();
    }
  }, [immersive, ltOpen]);
  useEffect(() => {
    const RELOAD_GUARD_KEY = "en_version_reload_attempted";
    const check = () => {
      if (verBusyRef.current) { verPendingRef.current = true; return; } // 학습 세션 중 — 세션 끝나면 재실행
      // OAuth 콜백 처리 중(#access_token=... 해시가 아직 붙어있음)이면 강제 이동 금지(2026-07-20) —
      // supabase-js가 해시를 읽어 세션을 저장하기 전에 URL을 바꿔버리면 로그인이 통째로 증발한다.
      if (window.location.hash && window.location.hash.indexOf("access_token") >= 0) return;
      if (sessionStorage.getItem(RELOAD_GUARD_KEY)) return;
      fetch("version.json?t=" + Date.now(), { cache: "no-store" })
        .then(r => (r.ok ? r.json() : null))
        .then(data => {
          if (!data || !data.v || data.v === APP_VERSION) return;
          if (verBusyRef.current) { verPendingRef.current = true; return; } // fetch 사이 세션에 들어갔으면 유예
          if (window.location.hash && window.location.hash.indexOf("access_token") >= 0) return;
          if (sessionStorage.getItem(RELOAD_GUARD_KEY)) return;
          sessionStorage.setItem(RELOAD_GUARD_KEY, "1");
          window.location.href = window.location.pathname + "?_=" + Date.now();
        })
        .catch(() => {});
    };
    verCheckRef.current = check;
    check();
    const onVis = () => { if (document.visibilityState === "visible") check(); };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, []);

  /* 창을 닫거나 백그라운드로 보내도 재생 중이던 음성이 계속 나오던 문제 —
     탭이 숨겨지거나(다른 앱 전환·화면 끄기) 페이지가 떠날 때 강제로 정지. */
  useEffect(() => {
    const onHide = () => { if (document.visibilityState === "hidden") stopSpeaking(); };
    document.addEventListener("visibilitychange", onHide);
    window.addEventListener("pagehide", stopSpeaking);
    return () => { document.removeEventListener("visibilitychange", onHide); window.removeEventListener("pagehide", stopSpeaking); };
  }, []);

  // 온보딩 미완료(최초 실행) — 스플래시는 그대로 위에 겹쳐 재생하고, 끝나면 그 아래 온보딩이 드러남.
  if (!onboard || !onboard.done) {
    return (
      <div className="app">
        <OnboardingView onDone={() => { const o = { done: true }; saveOnboard(o); setOnboard(o); }} />
        {showSplash && <SplashScreen onDone={() => setShowSplash(false)} />}
      </div>
    );
  }

  const homeStreak = ACT.streak(); // 상단바 "연속 N일" 실데이터(2026-07-19, 구 하드코딩 4 대체). tab 전환마다 App 리렌더로 갱신.
  const dailyTalk = todaysTalkPick(); // 오늘의 랜덤 말걸기 대상(2026-07-20) — 탭바 알림 점에 사용
  return (
    <div className="app">
      <div className="topbar">
        <div className="brand" role="button" tabIndex={0} onClick={() => { stopSpeaking(); setLtOpen(false); setSettingsOpen(false); closeSheet(); setTab("home"); setTabResetKey(k => ({ ...k, home: k.home + 1 })); }} style={{ cursor: "pointer" }}><img src={"img/logo.svg?v=" + APP_VERSION} alt="NoEnglish" style={{ width: "120px", height: "auto", display: "block" }} /></div>
        <div className="topbar-right">
          <span className="pill"><span className={"dot hl-" + streakHl(homeStreak)} />연속 {homeStreak}일</span>
          <button className="avatar-btn" aria-label="설정" onClick={() => setSettingsOpen(true)}><Icon name="settings" size={19} /></button>
        </div>
      </div>

      <InstallBanner />

      {/* scrolllock(2026-07-20): 회화 대화방은 자체 높이(100%)+내부 스크롤(.talk-msgs)로 완결된
          레이아웃이라 바깥 .scroll이 스크롤될 일이 없는데도, 입력창 포커스 시 iOS가 "포커스된
          입력을 보이게 하려고" 가장 가까운 스크롤 가능 조상(.scroll)을 제멋대로 스크롤시켜 상단
          (.talk-head·토글)이 밀려 올라가 보이는 문제가 있었음(사용자 지적) — 회화방이 열려있을 때만
          (tab==="talk"&&immersive, 방 목록·SOS 화면은 제외) .scroll 자체를 overflow:hidden으로 막아
          iOS가 스크롤할 대상 자체를 없앰. 다른 몰입 화면(카드 세션 등)은 긴 콘텐츠가 실제로 .scroll을
          넘길 수 있어 그대로 둠. */}
      <div className={"scroll" + (immersive || ltOpen || ltResultOpen ? " notab" : "") + (tab === "talk" && immersive ? " scrolllock" : "")}>
        {ltOpen ? (
          <LevelTest onExit={() => setLtOpen(false)} />
        ) : ltResultOpen && loadLevelTest() ? (
          <LevelTestResult resultA={loadLevelTest().lex} resultB={loadLevelTest().flu} viewOnly
            onExit={() => setLtResultOpen(false)}
            onRetry={() => { setLtResultOpen(false); startLevelTest(); }} />
        ) : (
          <React.Fragment>
            {tab === "home" && <Home key={"home-" + tabResetKey.home} onGoTab={setTab} charK={charK} onChangeChar={changeChar} onOpenSettings={() => setSettingsOpen(true)} onOpenLtResult={() => setLtResultOpen(true)} onStartLevelTest={startLevelTest} onStartCards={() => startCustomStudy(pickSession(10))} onStartListen={() => { unlockAudio(); startCustomStudy(sortByListenDifficulty(pickSession(10, listenLevelShift())), "listen"); }} />}
            {tab === "dict" && <Dict key={"dict-" + tabResetKey.dict} onOpen={openWord} onStudyList={startCustomStudy} viewJump={dictViewJump} onConsumeViewJump={() => setDictViewJump(null)} />}
            {tab === "learn" && <Learn key={"learn-" + tabResetKey.learn} onOpenWord={openWord} onStartLevelTest={startLevelTest} customStudy={customStudy} customMode={customMode} onConsumeCustomStudy={() => setCustomStudy(null)} setImmersive={setImmersive} />}
            {tab === "talk" && <Talk key={"talk-" + tabResetKey.talk} onOpenWord={openWord} setImmersive={setImmersive} />}
            {tab === "box" && <Vault key={"box-" + tabResetKey.box} onGoTab={setTab} onOpenDict={openDictView} />}
          </React.Fragment>
        )}
      </div>

      {settingsOpen && <Settings charK={charK} onChangeChar={changeChar} onClose={() => setSettingsOpen(false)} onStartLevelTest={startLevelTest} onOpenGuide={() => { setSettingsOpen(false); setShowGuide(true); }} />}

      {!(immersive || ltOpen || ltResultOpen) && <div className="tabbar">
        {TABS.map(t => (
          <button key={t.k}
                  className={"tab tab-" + t.k + (tab === t.k ? " on" : "")}
                  onClick={() => {
                    // 레벨테스트/설정/단어상세 시트처럼 탭 위를 덮고 있던 화면을 전부 닫고,
                    // 그 탭을 리마운트해서 항상 메인 화면으로 — 이미 그 탭이어도(재탭) 동작해야 하므로 매번 리셋(2026-07-18).
                    // 예문 등 재생 중이던 음성이 탭을 넘어가도 안 끊기던 버그(2026-07-20) — 탭 이동은
                    // 항상 화면이 통째로 바뀌므로 여기서 무조건 정지.
                    stopSpeaking();
                    setLtOpen(false); setLtResultOpen(false); setSettingsOpen(false); closeSheet();
                    setTab(t.k);
                    setTabResetKey(k => ({ ...k, [t.k]: k[t.k] + 1 }));
                  }}>
            {/* 레벨테스트 중에도 탭 이동이 되도록 ltOpen을 닫음 — 안 닫으면 tab 상태만 바뀌고
                화면은 테스트가 계속 덮고 있어 "탭 터치가 안 먹는" 것처럼 보였음(2026-07-17) */}
            <span className="ti">
              <Icon name={t.icon} size={26} />
              {t.k === "talk" && dailyTalk && !dailyTalk.seen && <span className="tab-n-dot" />}
            </span>
            {t.label}
          </button>
        ))}
      </div>}

      {stack && <WordSheet stack={stack} onPush={pushWord} onPop={popWord} onClose={closeSheet} />}
      {showSplash && <SplashScreen onDone={() => setShowSplash(false)} />}
      {showGuide && <FirstRunGuide firstTime={!loadGuideSeen()} onClose={() => setShowGuide(false)} />}
      {!showGuide && showWhatsNew && whatsNewVer && isWhatsNewTester && (
        <WhatsNewModal ver={whatsNewVer} notes={WHATS_NEW[whatsNewVer]}
          onClose={() => { saveWhatsNewSeen(APP_VERSION); setShowWhatsNew(false); }} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
