/* ---------- 단어카드 세션 ---------- */
/* 카드 위쪽에 얹는 "약한 힌트" — 단어를 직접 알려주지 않고 품사+사용 결만 옅게 귀띔.
   품사(단어별로 다름)와 CEFR(사용빈도/격식 근사)를 조합해 단어마다 문구가 달라지게(2026-07-17). */
function CardSession({ items, onExit, onOpenWord }) {
  const [queue, setQueue] = useState(items);
  const [idx, setIdx] = useState(0);
  const [val, setVal] = useState("");
  const [res, setRes] = useState(null); // null | {ok, answer, dueIn}
  const [correct, setCorrect] = useState(0);
  const [hintLen, setHintLen] = useState(false);   // 글자수 힌트
  const [hintFirst, setHintFirst] = useState(false); // 첫 글자 힌트
  const [hintMean, setHintMean] = useState(false);   // 뜻 열기 힌트(cloze 전용)
  const [hintUsed, setHintUsed] = useState(false);   // 이 카드에서 힌트를 썼는지 — 쓰면 이번 세션에 한 번 더 출제
  const [nudgeWord, setNudgeWord] = useState(null);  // 유의어를 입력했을 때 안내 문구에 쓸 단어
  const [retried, setRetried] = useState(false);     // 근접 오답 1회 재시도를 이미 줬는지
  const [retryMsg, setRetryMsg] = useState(false);   // 재시도 안내 문구 노출
  const [, bumpFav] = useState(0); // 카드 즐겨찾기(하트) 토글 리렌더용

  const it = queue[idx];
  const blank = useMemo(() => it ? makeBlank(it.ex.en, it.word) : null, [it]);
  const mode = blank ? "cloze" : "spell";
  const expected = blank ? blank.answer : it && it.word.toLowerCase();
  // 이 카드(문맥) 하나에 한정된 유의어 — 사전 상세의 표제어 전체 유의어와는 다름(itemsFromWords 참고)
  const synonyms = useMemo(() => (it && it.syn) || [], [it]);
  // 뜻 열기 힌트 문구: 품사(한글) + 단어 뜻. 예: "명사 · 의회, 협의회"
  const meanText = useMemo(() => {
    if (!it) return "";
    const mw = wordOf(it.word);
    const posKo = (mw && mw.pos) ? mw.pos.map(p => POS_KO[p] || p).filter(Boolean).join("·") : "";
    return (posKo ? posKo + " · " : "") + (it.ko || "");
  }, [it]);

  useEffect(() => () => stopSpeaking(), []); // 세션 나갈 때(언마운트) 재생 중인 음성 정지

  const speak = speakText;

  // 정답 판정: 빈칸의 정답 또는 원형 단어와 일치해야 정답. 유의어는 정답으로 인정하지 않음(문장에 안 맞을 수 있어서) —
  // 대신 유의어를 입력하면 아래 useEffect에서 안내 문구를 보여주고 힌트를 열어줌(패널티 없음).
  // 하이픈·공백·아포스트로피는 flatWord로 접어서 비교 — "carry-on"을 "carry on"/"carryon"으로
  // 써도, "don't"를 "dont"로 써도 정답(2026-07-19, 표기 구분 기호 때문에 오답 처리되던 버그 수정).
  const isAnswer = raw => {
    const v = raw.trim().toLowerCase();
    if (!v) return false;
    if (v === expected || v === it.word.toLowerCase()) return true;
    const f = flatWord(v);
    return !!f && (f === flatWord(expected) || f === flatWord(it.word));
  };

  // 정답 앞부분과 일치하는 글자 수(근접 오답 판정용)
  const correctPrefixLen = v => {
    let n = 0;
    for (let i = 0; i < v.length && i < expected.length; i++) { if (v[i].toLowerCase() === expected[i]) n++; else break; }
    return n;
  };
  const submit = raw => {
    if (res) return;
    const v = (raw !== undefined ? raw : val).trim();
    if (!v) return;
    const ok = isAnswer(v);
    // 근접 오답(맞은 글자가 좀 있는데 완전히는 틀림) — 첫 오답이면 오답 확정 대신 맞은 글자만
    // 남기고 한 번 더 기회를 준다(맞으면 정답, 또 틀리면 오답). 힌트 쓴 것으로 쳐서 재출제됨.
    if (!ok && !retried && expected) {
      const keep = correctPrefixLen(v);
      if (keep >= 1 && keep < expected.length) {
        setRetried(true); setHintUsed(true); setHintLen(true);
        setVal(expected.slice(0, keep));
        setRetryMsg(true); setNudgeWord(null);
        return; // 채점하지 않음
      }
    }
    const s = SRS.grade(it.key, ok);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok, answer: expected, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) });
    speak(it.ex.en);
  };

  // 입력이 정답과 일치하면 '확인'을 누르지 않아도 채점되지만, 마지막 글자를 치자마자
  // 키보드가 바로 사라지면 너무 갑작스러워서 짧게 텀을 두고(완성된 답을 한 박자 보여준 뒤) 채점
  const submitTimer = React.useRef(null);
  const clearSubmitTimer = () => { if (submitTimer.current) { clearTimeout(submitTimer.current); submitTimer.current = null; } };
  useEffect(() => clearSubmitTimer, []);
  const handleChange = raw => {
    setVal(raw);
    if (retryMsg) setRetryMsg(false); // 다시 입력 시작하면 재시도 안내 문구 감춤
    clearSubmitTimer();
    if (isAnswer(raw)) submitTimer.current = setTimeout(() => submit(raw), 380);
  };

  // 유의어를 입력했을 때: 오답 처리하지 않고 안내 문구를 띄우고 힌트 두 개를 열어 정답을 유도.
  // 힌트 버튼을 직접 누른 게 아니므로 hintUsed(재출제 패널티)는 건드리지 않음.
  // 공백/언더스코어 차이를 무시하고 비교 — 데이터엔 "on_time"인데 사용자는 "on time"으로 치므로
  // 정규화 안 하면 유의어 인식이 안 돼 그냥 오답 처리됐었음(2026-07-17 수정).
  const normSyn = s => s.trim().toLowerCase().replace(/[_\s]+/g, " ");
  useEffect(() => {
    if (res || !it || !expected) return;
    const v = normSyn(val);
    if (!v) return;
    // 지금 입력이 정답의 앞부분이면 유의어 안내를 띄우지 않는다 — "back up"의 정답 "backed me up"을
    // 치는 도중 "back"까지 입력된 순간 유의어 "back"과 일치해버려, 안내가 뜨면서 입력을 첫 글자로
    // 리셋해 정답 입력을 중간에 빼앗던 버그(2026-07-19 재현·수정). 정답을 향해 가는 입력이 우선.
    const fv = flatWord(val);
    if (fv && (flatWord(expected).startsWith(fv) || flatWord(it.word).startsWith(fv))) return;
    const hit = synonyms.find(s => normSyn(s) === v);
    if (hit) {
      setNudgeWord(hit.replace(/_/g, " "));
      setHintFirst(true);
      setHintLen(true);
      setVal(expected[0]);
    }
    // eslint-disable-next-line
  }, [val]);

  const hintUsedNextLen = hintUsed ? queue.length + 1 : queue.length; // 힌트 사용 시 재출제로 늘어날 총 문항 수(다음 버튼 표기용)
  const next = () => {
    clearSubmitTimer();
    let q = queue;
    if (hintUsed) q = queue.concat([it]); // 힌트를 쓴 단어는 이번 세션에 한 번 더 출제
    if (idx + 1 >= q.length) { onExit(true, correct, q.length); return; }
    if (q !== queue) setQueue(q);
    setIdx(idx + 1); setVal(""); setRes(null); setHintLen(false); setHintFirst(false); setHintMean(false); setHintUsed(false); setNudgeWord(null); setRetried(false); setRetryMsg(false);
    focusHidden(); // 다음 카드로 넘어가는 탭 제스처 안에서 즉시 포커스 유지 → 키보드가 안 내려감
  };

  const hiddenRef = React.useRef(null);
  const focusHidden = () => { if (hiddenRef.current) hiddenRef.current.focus(); };
  // 새 카드로 바뀌면(입력 상태) 포커스를 유지 — 지속 입력이라 키보드가 계속 떠 있게 한다.
  useEffect(() => { if (!res) focusHidden(); }, [idx]);

  // 뜻 열기 힌트: 품사+뜻을 드러냄. 다른 힌트와 마찬가지로 쓰면 이번 세션에 한 번 더 출제.
  const toggleMean = () => { setHintMean(v => { const nv = !v; if (nv) setHintUsed(true); return nv; }); };

  // 첫 글자 힌트: 빈칸 앞(첫 칸)에 정답 첫 글자를 미리 채워 줌
  const toggleFirst = () => {
    setHintFirst(v => {
      const nv = !v;
      if (nv) { setHintUsed(true); if (expected && val === "") setVal(expected[0]); }
      else if (val === (expected ? expected[0] : "")) setVal("");
      return nv;
    });
  };

  // 글자수 힌트: 켜는 순간 지금까지 입력한 것 중 정답과 일치하는 앞부분만 남기고 나머지는 버림
  const toggleLen = () => {
    setHintLen(v => {
      const nv = !v;
      if (nv) {
        setHintUsed(true);
        if (expected) {
          let kept = "";
          for (let i = 0; i < val.length && i < expected.length; i++) {
            if (val[i].toLowerCase() === expected[i]) kept += val[i]; else break;
          }
          setVal(kept);
        }
      }
      return nv;
    });
  };

  // 정답 표시(프리젠테이션 전용). 실제 입력은 아래 answerArea의 보이지 않는 input이 받는다.
  // - 채점 후(res): 정답/오답을 fill로 표시.
  // - 글자수 힌트: 칸을 나누지 않고 박스 하나 길이만 정답 글자 수(ch 단위)에 맞춰 늘림.
  // - 기본: 지금까지 입력한 글자 + 깜빡이는 캐럿을 박스로.
  const answerDisplay = () => {
    if (res) return <span className={"fill" + (res.ok ? "" : " bad")}>{res.ok ? res.answer : (val.trim() || "—")}</span>;
    if (hintLen && expected) {
      return (
        <span className="qbox qbox-view lenbox" style={{ width: "calc(" + expected.length + "ch + 32px)" }}>
          {val || "​"}<i className="qcaret" />
        </span>
      );
    }
    return <span className="qbox qbox-view">{val || "​"}<i className="qcaret" /></span>;
  };

  // 카드 내내 언마운트되지 않는 단일 입력 — 채점 후에도(readOnly 아님) 포커스를 유지해
  // 모바일 키보드가 안 내려가고, 다음 문제로 넘어가도 이어서 바로 타이핑할 수 있다(2026-07-17).
  // 화면에 안 보이고(opacity 0) 표시는 answerDisplay가 담당, 이 input은 키 입력만 받는다.
  const answerArea = () => (
    <span className="ans-wrap" onMouseDown={e => { e.preventDefault(); focusHidden(); }}>
      {answerDisplay()}
      <input ref={hiddenRef} className="ans-catch" value={res ? "" : val}
        onChange={e => {
          if (res) { e.target.value = ""; return; } // 채점 후엔 입력 무시(키보드는 유지)
          let raw = e.target.value.replace(/[^A-Za-z0-9]/g, ""); // 숫자 허용 — 내 단어장에 mp3 같은 단어를 등록할 수 있음
          let out = raw;
          if (expected) {
            // 정답의 구분 기호(공백·하이픈·아포스트로피)는 해당 위치에서 자동 삽입 — 사용자는 글자만
            // 치면 된다. 예전엔 글자수 힌트를 켰을 때만, 그것도 공백만 자동 삽입해서, "backed me up"
            // 같은 여러 단어 정답은 힌트 없이는 입력 자체가 불가능했고(스페이스가 필터에서 그냥
            // 사라짐) "ad-lib" 같은 하이픈 표제어는 힌트를 켜도 못 맞혔음(2026-07-19 재현·수정).
            // 단, 자동 삽입은 입력 글자가 정답과 일치하는 동안만 — 무조건 끼워넣으면 유의어("support")
            // 같은 다른 입력도 "suppor t"처럼 깨져서 유의어 안내가 안 먹었음(같은 날 재수정).
            out = "";
            let j = 0, aligned = true;
            while (j < raw.length && aligned && out.length < expected.length) {
              const ec = expected[out.length];
              if (!/[a-z0-9]/.test(ec)) { out += ec; continue; }
              out += raw[j++];
              if (out[out.length - 1].toLowerCase() !== ec) aligned = false;
            }
            out += raw.slice(j); // 정답에서 벗어난 뒤(또는 초과분)는 구분 기호 없이 그대로
          }
          e.target.value = out; // DOM 값 강제 동기화 — 필터로 값이 안 바뀔 때 iOS 컨트롤드 입력이 얼어 지울 수 없던 버그 방지
          handleChange(out);
        }}
        onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); res ? next() : submit(); } }}
        autoFocus inputMode="text" lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
        aria-label="빈칸 입력" />
    </span>
  );

  if (!it) {
    return (
      <div className="content"><div className="finish">
        <div className="msg">복습할 카드가 없어요</div>
        <div className="sub">새 단어를 학습하거나 내일 다시 복습해요.</div>
        <div className="qactions" style={{ width: "100%", marginTop: 16 }}><button className="primary" onClick={() => onExit(false, 0)}>돌아가기</button></div>
      </div></div>
    );
  }

  const renderEn = () => {
    if (mode === "spell") {
      return (
        <React.Fragment>
          <span className="qhint">위 뜻에 해당하는 <b>영어 단어</b>를 입력하세요.</span>
          <div className="qen" style={{ textAlign: "center", marginTop: 4 }}>
            {answerArea()}
          </div>
        </React.Fragment>
      );
    }
    return (
      <div className="qen">
        {blank.before}
        {answerArea()}
        {blank.after}
      </div>
    );
  };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={() => onExit(false, correct)} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: ((idx + (res ? 1 : 0)) / queue.length * 100) + "%" }} /></div>
        <span className="study-n">{idx + 1} / {queue.length}</span>
        <button className={"favstar" + (FAVS.has(it.word) ? " on" : "")} onClick={() => { toggleFav(it.word); bumpFav(v => v + 1); }} aria-label="카드 즐겨찾기">
          <Icon name="favorite" size={20} />
        </button>
      </div>

      <div className="qcard">
        <div className="qlvrow">
          {res ? (
            <span className="qaudio">
              <button onClick={() => speak(it.ex.en)} aria-label="다시 듣기"><Icon name="replay" size={16} /></button>
              <button onClick={() => speak(it.ex.en, 0.7)} aria-label="느리게 듣기">0.7x</button>
            </span>
          ) : (
            <span className="qhint-labels">
              {hintMean && mode === "cloze" && <span className="qsofthint">{meanText}</span>}
              {hintLen && expected && <span className="qlen-hint">{flatWord(expected).length}글자{/\s/.test(expected) ? ` · ${expected.split(/\s+/).length}단어` : ""}</span>}
            </span>
          )}
          <span className="tag lv">{it.cefr}</span>
        </div>
        {mode === "cloze" ? (
          <React.Fragment>
            {/* 빈칸 문제: 위에는 '문장의 한국어 뜻'을 제시(단어 뜻을 직접 주면 답을 알려주는 셈) */}
            <div className="qko">{it.ex.ko}</div>
            <div className="qdiv" />
            {renderEn()}
            {!res && nudgeWord && <div className="qnudge">'{nudgeWord}'도 맞아요! 그런데 같은 뜻으로 <b>'{expected[0]}'</b>로 시작하는 단어도 있어요. 힌트를 참고해 맞혀 보세요.</div>}
            {!res && retryMsg && <div className="qnudge">거의 맞았어요! 맞은 글자만 남겼어요. 이어서 마저 입력해 보세요.</div>}
            {res && <div className="qcue" style={{ marginTop: 2 }}><b>{it.word}</b> — {it.ko}</div>}
          </React.Fragment>
        ) : (
          <React.Fragment>
            {/* 스펠링 문제: 예문에 타깃 단어가 없어 빈칸을 못 만드는 경우 — 단어 뜻을 보고 영단어 입력 */}
            {it.cue && <div className="qcue">{it.cue}</div>}
            <div className="qko">{it.ko}</div>
            <div className="qdiv" />
            {renderEn()}
            {!res && nudgeWord && <div className="qnudge">'{nudgeWord}'도 맞아요! 그런데 같은 뜻으로 <b>'{expected[0]}'</b>로 시작하는 단어도 있어요. 힌트를 참고해 맞혀 보세요.</div>}
            {!res && retryMsg && <div className="qnudge">거의 맞았어요! 맞은 글자만 남겼어요. 이어서 마저 입력해 보세요.</div>}
          </React.Fragment>
        )}
        {res && (
          <div className={"qres " + (res.ok ? "ok" : "no")}>
            {res.ok ? <Icon name="check" size={18} /> : <Icon name="close" size={18} />}
            {res.ok ? "정답!" : <span>정답: <b>{res.answer}</b></span>}
            <span className="due">{res.dueIn === 0 ? "곧 복습" : res.dueIn + "일 뒤 복습"}</span>
          </div>
        )}
        {res && synonyms.length > 0 && (
          <div className="qsyn">
            <div className="qsyn-lbl">아래 단어들도 대신 사용할 수 있어요</div>
            <div className="qsyn-chips">
              {synonyms.map(s => (
                wordOf(s)
                  ? <button key={s} className="qsyn-chip link" onClick={() => onOpenWord(s)}>{s.replace(/_/g, " ")}</button>
                  : <span key={s} className="qsyn-chip">{s.replace(/_/g, " ")}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 하단 액션바는 키보드가 떠 있어도 그 위에 붙어(sticky bottom:--kb) 항상 눌리게 한다 */}
      <div className="qbottom">
        {!res ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div className="qhintrow">
              <span className="qhint-lbl">힌트</span>
              {mode === "cloze" && <button className={"qhint-btn" + (hintMean ? " on" : "")} onMouseDown={e => e.preventDefault()} onClick={toggleMean}>뜻</button>}
              <button className={"qhint-btn" + (hintLen ? " on" : "")} onMouseDown={e => e.preventDefault()} onClick={toggleLen}>글자수</button>
              <button className={"qhint-btn" + (hintFirst ? " on" : "")} onMouseDown={e => e.preventDefault()} onClick={toggleFirst}>첫 글자</button>
            </div>
            <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={() => submit()}>확인</button>
          </div>
        ) : (
          <div className="qactions">
            <button className="ghost" onMouseDown={e => e.preventDefault()} onClick={() => onOpenWord(it.word)}>단어 정보</button>
            <button className="primary" onMouseDown={e => e.preventDefault()} onClick={next}>{idx + 1 >= hintUsedNextLen ? "학습 완료" : "다음 문제"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* 학습 완료 요약 */
function Finish({ total, correct, onExit, title, sub, label }) {
  return (
    <div className="content"><div className="finish">
      <div className="char-face mascot">잘했어요!</div>
      <div className="big">{correct} / {total}</div>
      <div className="msg">{title || label || "오늘 단어카드 완료"}</div>
      <div className="sub">{sub || "복습 시점은 정답률에 맞춰 자동 조정됐어요."}</div>
      <div className="qactions" style={{ width: "100%", marginTop: 18 }}><button className="primary" onClick={onExit}>돌아가기</button></div>
    </div></div>
  );
}

/* ---------- 퀴즈 세션 ---------- */
/* 이미 학습한 단어 대상 뜻 4지선다 + 스펠링(발음 듣고 타이핑)을 절반씩 섞어 출제.
   단어카드(SRS 복습 간격 조정)와 달리 보조 훈련이라 정답/오답이 SRS 박스에 영향을 주지 않음. */
function QuizSession({ questions, onExit }) {
  const [idx, setIdx] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [picked, setPicked] = useState(null); // 4지선다에서 고른 인덱스
  const [val, setVal] = useState("");         // 스펠링 입력값
  const [res, setRes] = useState(null);       // null | {ok}

  const q = questions[idx];
  const it = q.it;
  const speak = speakText;

  useEffect(() => () => stopSpeaking(), []); // 세션 나갈 때(언마운트) 재생 중인 음성 정지

  useEffect(() => {
    if (q.type === "spell") speak(it.word);
    // eslint-disable-next-line
  }, [idx]);

  const gradeChoice = (choice, ci) => {
    if (res) return;
    const ok = choice === it.ko;
    setPicked(ci);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok });
  };

  const submitSpell = () => {
    if (res) return;
    const v = val.trim();
    if (!v) return;
    // flatWord 비교 병행 — "carry-on"을 "carry on"으로 쳐도 정답(2026-07-19)
    const ok = v.toLowerCase() === it.word.toLowerCase() || flatWord(v) === flatWord(it.word);
    if (ok) setCorrect(c => c + 1);
    setRes({ ok });
  };

  const next = () => {
    if (idx + 1 >= questions.length) { onExit(true, correct, questions.length); return; }
    setIdx(idx + 1); setPicked(null); setVal(""); setRes(null);
  };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={() => onExit(false, correct)} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: ((idx + (res ? 1 : 0)) / questions.length * 100) + "%" }} /></div>
        <span className="study-n">{idx + 1} / {questions.length}</span>
      </div>

      <div className="qcard">
        <div className="qlvrow">
          {q.type === "spell" && (
            <span className="qaudio">
              <button onClick={() => speak(it.word)} aria-label="다시 듣기"><Icon name="replay" size={16} /></button>
            </span>
          )}
          <span className="tag lv">{it.cefr}</span>
        </div>
        {q.type === "choice" ? (
          <React.Fragment>
            <span className="qhint">다음 <b>영어 단어</b>의 뜻을 고르세요.</span>
            <div className="qko" style={{ textAlign: "center" }}>{it.word}</div>
            <div className="qdiv" />
            <div className="qchoices">
              {q.choices.map((c, ci) => {
                const cls = "qchoice" + (res ? (c === it.ko ? " correct" : (picked === ci ? " wrong" : "")) : "");
                return <button key={ci} className={cls} disabled={!!res} onClick={() => gradeChoice(c, ci)}>{c}</button>;
              })}
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <span className="qhint">발음을 듣고 <b>영어 단어</b>를 입력하세요.</span>
            {it.cue && <div className="qcue">{it.cue}</div>}
            <div className="qko">{it.ko}</div>
            <div className="qdiv" />
            <div className="qen" style={{ textAlign: "center" }}>
              {res
                ? <span className={"fill" + (res.ok ? "" : " bad")}>{res.ok ? it.word : val.trim() || "—"}</span>
                : <input className="qbox" autoFocus value={val} onChange={e => setVal(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && submitSpell()}
                    size={Math.max(8, val.length + 1)}
                    lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false} aria-label="정답 입력" />}
            </div>
          </React.Fragment>
        )}
        {res && (
          <div className={"qres " + (res.ok ? "ok" : "no")}>
            {res.ok ? <Icon name="check" size={18} /> : <Icon name="close" size={18} />}
            {res.ok ? "정답!" : <span>정답: <b>{it.word}</b> — {it.ko}</span>}
          </div>
        )}
      </div>

      {q.type === "spell" && !res && (
        <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={submitSpell}>확인</button>
      )}
      {res && (
        <div className="qactions">
          <button className="primary" onClick={next}>{idx + 1 >= questions.length ? "결과 보기" : "다음 문제"}</button>
        </div>
      )}
    </div>
  );
}

/* ---------- 듣기 세션 (딕테이션) ----------
   학습카드와 같은 "학습 형식"(퀴즈 형식 아님) — 이 문장을 완전히 맞혀야 다음 문장으로
   넘어간다. 오답이면 어느 칸이 틀렸는지만 표시(정답은 안 보여줌)하고 같은 문장을 다시
   시도. 완전히 맞히면 그때 해석·연음 해설이 열리고 다음 문장으로 진행.
   출제 소스는 학습카드와 동일한 pickSession(due→fresh)이라 정답 시 그 단어의 SRS도 같이 오른다. */
/* 단어 앞뒤의 구두점만 떼어낸다. "others." → pre:"", core:"others", post:"."
   "10-dollar" → pre:"", core:"10-dollar", post:"" (하이픈은 core 안에 그대로 — wordToTokens가 마저 쪼갬). */
function splitOuterPunct(w) {
  let i = 0, j = w.length;
  while (i < j && !/[A-Za-z0-9]/.test(w[i])) i++;
  while (j > i && !/[A-Za-z0-9]/.test(w[j - 1])) j--;
  return { pre: w.slice(0, i), core: w.slice(i, j), post: w.slice(j) };
}
function splitWordToken(w) { return splitOuterPunct(w); }

/* 흔한 축약 어미 → 원형. 어퍼스트로피 뒤가 이 중 하나면 축약형(s)과 원형(is) 둘 다 정답 처리. */
const CONTRACTION_ALTS = { s: "is", re: "are", ve: "have", ll: "will", d: "would", m: "am" };

/* 단어 안에 하이픈·어퍼스트로피 같은 기호가 있으면 사용자가 그 기호를 직접 치지 않아도 되도록
   알파벳/숫자 조각별로 칸을 나누고 기호는 자동으로 붙여 보여준다.
   "10-dollar" → "10" | "dollar" (하이픈 자동 표시). "we're" → "we" | "re"(정답: re 또는 are).
   앞 조각을 맞혀야 다음 조각이 열린다(joinPrev). 기호 없는 보통 단어는 기존대로 한 칸. */
function wordToTokens(w) {
  const { pre, core, post } = splitOuterPunct(w);
  const parts = core.split(/([^A-Za-z0-9]+)/).filter(x => x !== "");
  if (parts.length <= 1) return [{ pre, core, post }];
  const tokens = [];
  for (let k = 0; k < parts.length; k += 2) {
    const chunk = parts[k];
    const isFirst = k === 0;
    const isLast = k + 2 >= parts.length;
    const joinSym = isFirst ? "" : parts[k - 1];
    const altCore = joinSym === "'" ? CONTRACTION_ALTS[chunk.toLowerCase()] : undefined;
    tokens.push({
      pre: isFirst ? pre : "",
      core: chunk,
      post: isLast ? post : "",
      altCore,
      joinPrev: !isFirst,
      joinSym,
    });
  }
  return tokens;
}

function DictationSession({ items: initialItems, onExit, onOpenWord }) {
  const [queue, setQueue] = useState(() => initialItems.slice()); // 로컬 사본 — 재생 패널티로 다음 문제를 바꾸거나(교체) 재학습 문제를 뒤에 붙일 수 있어야 함
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [locked, setLocked] = useState([]);   // 단어별 고정 여부 — 맞게 타이핑하는 즉시 true(입력창 → 고정 텍스트)
  const [wrongMask, setWrongMask] = useState(null); // null | boolean[] — 방금 확인에서 어느 칸이 틀렸는지(정답은 공개 안 함)
  const [hadWrongAttempt, setHadWrongAttempt] = useState(false);
  const [res, setRes] = useState(null); // null | { dueIn, forcedRelearn? } — 완전히 맞았을 때만(또는 강제 재학습) 세팅
  const [correct, setCorrect] = useState(0); // 첫 시도에 맞힌 문장 수
  const [replayCount, setReplayCount] = useState(0);
  const [lenHint, setLenHint] = useState(false); // 단어길이 보기
  const [firstHint, setFirstHint] = useState(false); // 앞글자 보기
  // 세션 시작 전 3·2·1 카운트다운 — 카드가 뒤에 이미 보이는 채로 살짝 딤 오버레이만 얹고,
  // 끝나면 오버레이가 페이드아웃(카드 자체는 계속 그 자리에 있었음). 첫 문제에서만 1회.
  const [countdown, setCountdown] = useState(3);
  const [countdownVisible, setCountdownVisible] = useState(true);

  const it = queue[idx];
  // "going to"처럼 구어체 결합 축약형(gonna)이 있는 두 단어는 첫 칸에 comboAlt를 달아둔다 —
  // 거기에 "gonna"를 치면 이 칸과 다음 칸("to")이 한 번에 정답 처리된다(따로 쳐도 물론 정답).
  const COMBO_ALTS = [[/^going$/i, /^to$/i, "gonna"]];
  const tokens = useMemo(() => {
    if (!it) return [];
    const t = it.ex.en.trim().split(/\s+/).flatMap(wordToTokens);
    for (let i = 0; i < t.length - 1; i++) {
      if (t[i].joinPrev || t[i + 1].joinPrev) continue;
      const hit = COMBO_ALTS.find(([ra, rb]) => ra.test(t[i].core) && rb.test(t[i + 1].core));
      if (hit) t[i] = { ...t[i], comboAlt: hit[2], comboNext: i + 1 };
    }
    return t;
  }, [it]);
  const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9']/g, "");
  const inputRefs = React.useRef([]);

  useEffect(() => () => stopSpeaking(), []); // 세션 나갈 때(언마운트) 재생 중인 문장 정지

  useEffect(() => {
    setAnswers(new Array(tokens.length).fill("")); setLocked(new Array(tokens.length).fill(false)); inputRefs.current = [];
    setReplayCount(0); setWrongMask(null); setHadWrongAttempt(false); setLenHint(false); setFirstHint(false); // 힌트류는 문제마다 초기화
  }, [idx, tokens.length]);
  // 세션 첫 문제에서만 3·2·1 카운트다운 — 끝나야 아래 자동재생 효과가 진행됨(idx===0에서만 대기)
  useEffect(() => {
    if (countdown > 0) {
      const t = setTimeout(() => setCountdown(c => c - 1), 700);
      return () => clearTimeout(t);
    }
    const t2 = setTimeout(() => setCountdownVisible(false), 320); // 페이드아웃 끝난 뒤 오버레이 제거
    return () => clearTimeout(t2);
  }, [countdown]);
  useEffect(() => {
    if (!it) return;
    if (idx === 0 && countdown > 0) return; // 첫 문제는 카운트다운 끝난 뒤에 재생
    const t = setTimeout(() => speakSentence(it.ex.en), 300);
    return () => clearTimeout(t);
  }, [idx, countdown]);

  const speakSentence = text => { speakText(text); }; // 앱 공용 speakText로 통일(프록시 TTS + 연타 에코 방지 공유)

  const focusInput = i => { const el = inputRefs.current[i]; if (el) el.focus(); };

  /* 다시 듣기 패널티: 매 재생마다 다음 문제를 한 단계 쉬운 문장으로 교체.
     난이도는 어휘 CEFR이 아니라 듣기 난이도(listeningDifficulty — 연음·문장길이 포함)로
     판단(어휘가 쉬워도 연음 때문에 듣기가 어려우면 그 문장은 실제로 어려운 문제이므로).
     3번째 재생이면 그 자리에서 이 문제를 오답 처리하고 세션 끝에 다시 배치(재학습). */
  const downgradeNext = () => {
    setQueue(q => {
      if (idx + 1 >= q.length) return q;
      const curTier = listeningDifficulty(it.ex.en).tier;
      if (curTier <= 0) return q;
      const used = new Set(q.map(x => x.key));
      const pool = allItems().filter(x => !used.has(x.key) && listeningDifficulty(x.ex.en).tier < curTier);
      if (!pool.length) return q;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      const nq = q.slice();
      nq[idx + 1] = pick;
      return nq;
    });
  };
  const forceRelearn = () => {
    SRS.grade(it.key, false);
    setQueue(q => q.concat([it]));
    setWrongMask(null);
    setRes({ dueIn: null, forcedRelearn: true });
  };
  // 힌트 패널티(다시 듣기·앞글자 보기 공용): 3번째 사용이면 강제 재학습, 그 전엔 다음 문제 다운그레이드
  const applyHintPenalty = () => {
    setReplayCount(c => {
      const nc = c + 1;
      if (nc >= 3) forceRelearn(); else downgradeNext();
      return nc;
    });
  };
  const replay = () => {
    speakSentence(it.ex.en);
    if (res) return; // 완료 화면에서는 그냥 다시 들려주기만(패널티 없음)
    applyHintPenalty();
  };
  // 앞글자 보기: 켜는 순간 아직 안 맞은 칸에 정답 첫 글자를 채워주고, 다시 듣기와 같은 패널티 적용
  const toggleFirstHint = () => {
    setFirstHint(v => {
      const nv = !v;
      if (nv) {
        setAnswers(a => a.map((val, i) => (!locked[i] && !val ? tokens[i].core[0] : val)));
        applyHintPenalty();
      }
      return nv;
    });
  };

  /* 문장 완성(모든 단어 고정) — 확인 버튼 없이 자동으로 정답 처리 + 띠링 */
  const complete = wasClean => {
    if (res) return;
    const s = SRS.grade(it.key, wasClean);
    if (wasClean) setCorrect(c => c + 1);
    setWrongMask(null);
    setRes({ dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) });
    playDing("done");
    // 정답 띠링 후, 방금 맞힌 문장을 한 번 더 들려줘 귀에 각인시킨다(사용자 요청)
    setTimeout(() => speakSentence(it.ex.en), 700);
  };

  /* 타이핑 중 단어가 정답과 일치하는 순간 그 자리에서 고정(입력창 → 텍스트) + 블립,
     다음 미고정 칸으로 포커스 이동. 마지막 단어까지 고정되면 자동 완료. */
  const onTypeWord = (i, v) => {
    const t = tokens[i];
    if (locked[i]) { setAnswers(a => { const n = a.slice(); n[i] = v; return n; }); return; }
    const nv = norm(v);
    // "gonna" 등 결합 축약형: 이 칸 + 다음 칸("to")을 한 번에 정답 처리
    if (t.comboAlt && nv === norm(t.comboAlt)) {
      const nextI = t.comboNext;
      setAnswers(a => { const n = a.slice(); n[i] = v; n[nextI] = tokens[nextI].core; return n; });
      const nl = locked.slice(); nl[i] = true; nl[nextI] = true;
      setLocked(nl);
      if (nl.every(Boolean)) { complete(!hadWrongAttempt); return; }
      playDing("word");
      for (let j = 1; j <= tokens.length; j++) {
        const k = (nextI + j) % tokens.length;
        if (!nl[k]) { focusInput(k); break; }
      }
      return;
    }
    setAnswers(a => { const n = a.slice(); n[i] = v; return n; });
    if (nv !== norm(t.core) && (!t.altCore || nv !== norm(t.altCore))) return;
    const nl = locked.slice(); nl[i] = true;
    setLocked(nl);
    if (nl.every(Boolean)) { complete(!hadWrongAttempt); return; }
    playDing("word");
    for (let j = 1; j <= tokens.length; j++) {
      const k = (i + j) % tokens.length;
      if (!nl[k]) { focusInput(k); break; }
    }
  };

  /* 확인 버튼 = 막혔을 때 어느 칸이 틀렸는지만 보여주는 용도(오답 사용 기록).
     완성 자체는 위 자동 고정으로만 일어난다. */
  const check = () => {
    if (res) return;
    if (!answers.some(a => (a || "").trim())) return;
    setWrongMask(locked.map(l => !l)); // 고정 안 된 칸 = 아직 틀린 칸
    setHadWrongAttempt(true);
  };
  const next = () => {
    if (idx + 1 >= queue.length) { onExit(true, correct, queue.length); return; }
    setIdx(i => i + 1); setRes(null);
  };

  if (!it) {
    return (
      <div className="content"><div className="finish">
        <div className="msg">들을 문장이 없어요</div>
        <div className="sub">새 단어를 학습하거나 내일 다시 복습해요.</div>
        <div className="qactions" style={{ width: "100%", marginTop: 16 }}><button className="primary" onClick={() => onExit(false, 0, 0)}>돌아가기</button></div>
      </div></div>
    );
  }

  const notes = res ? findLiaisonNotes(it.ex.en) : [];
  const diff = listeningDifficulty(it.ex.en);

  // 토큰 하나(칸)의 입력/고정 UI 렌더 — 일반 단어도, "there's"의 there/'s 두 칸도 동일하게 씀.
  // 래핑 span 없이 조각만 반환 — 호출부에서 하나의 .dict-word-row로 가로로 묶는다(there's가 세로로 안 쌓이도록).
  const renderSlot = i => {
    const t = tokens[i];
    const waiting = t.joinPrev && !locked[i - 1]; // 다음 조각은 앞 조각을 맞히기 전엔 비활성 + 연결기호 숨김
    return (
      <React.Fragment key={i}>
        {waiting ? "" : (t.joinPrev ? t.joinSym : t.pre)}
        {locked[i] ? (
          <span className="dict-fixed">{t.core}</span>
        ) : (
          <input ref={el => { inputRefs.current[i] = el; }}
            className={"qbox dict-box" + (wrongMask && wrongMask[i] ? " wrong" : "")}
            value={answers[i] || ""} autoFocus={i === 0}
            disabled={waiting}
            size={Math.max(2, t.core.length, (t.altCore || "").length, (t.comboAlt || "").length)}
            onChange={e => onTypeWord(i, e.target.value.replace(/\s/g, ""))}
            onKeyDown={e => {
              if (e.key === " " || e.key === "Enter") {
                e.preventDefault();
                let moved = false;
                for (let j = i + 1; j < tokens.length; j++) { if (!locked[j]) { focusInput(j); moved = true; break; } }
                if (!moved) check();
              } else if (e.key === "Backspace" && !answers[i] && i > 0) {
                for (let j = i - 1; j >= 0; j--) { if (!locked[j]) { focusInput(j); break; } }
              }
            }}
            lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
            aria-label={"단어 " + (i + 1)} />
        )}
        {t.post}
      </React.Fragment>
    );
  };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={() => onExit(false, correct, queue.length)} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: ((idx + (res ? 1 : 0)) / queue.length * 100) + "%" }} /></div>
        <span className="study-n">{idx + 1} / {queue.length}</span>
      </div>

      <div className="qcard dict-card">
        {countdownVisible && (
          <div className={"dict-countdown-overlay" + (countdown <= 0 ? " out" : "")}>
            <div className="countdown-circle" key={countdown}>{countdown > 0 ? countdown : ""}</div>
          </div>
        )}
        <div className="dict-difficulty">
          <span className={"tag dl" + (diff.tier < 4 ? 1 : diff.tier < 8 ? 2 : 3)}>듣기 난이도 · {diff.label}</span>
          <button className="dict-replay" onClick={replay} aria-label="다시 듣기"><Icon name="volume_up" size={16} /></button>
        </div>
        {!res ? (
          <React.Fragment>
            <div className="dict-words">
              {tokens.map((t, i) => {
                if (t.joinPrev) return null; // 이전 .dict-word 그룹 안에서 이미 렌더됨
                const groupIdxs = [i]; // there's/10-dollar처럼 기호로 이어진 조각들을 한 단어로 묶기(2개 이상도 지원)
                let k = i + 1;
                while (tokens[k] && tokens[k].joinPrev) { groupIdxs.push(k); k++; }
                return (
                  <span key={i} className="dict-word">
                    <span className="dict-word-row">
                      {groupIdxs.map(gi => renderSlot(gi))}
                    </span>
                    {lenHint && !locked[i] && (
                      <div className="len-row">
                        {t.core.split("").map((_, kk) => <i key={kk} />)}
                      </div>
                    )}
                  </span>
                );
              })}
            </div>
            {wrongMask && (
              <div className="qres no" style={{ marginTop: 10 }}>
                <Icon name="close" size={18} /> 빨간 칸이 아직 달라요 — 맞게 고치면 자동으로 고정돼요
              </div>
            )}
          </React.Fragment>
        ) : (
          <div className="dict-result">
            {tokens.map((t, i) => {
              if (t.joinPrev) return null; // there's/10-dollar의 이어진 조각은 앞 칸과 한 덩어리로 같이 렌더
              const groupIdxs = [i];
              let k = i + 1;
              while (tokens[k] && tokens[k].joinPrev) { groupIdxs.push(k); k++; }
              return (
                <span key={i} className="dict-word-row">
                  {groupIdxs.map(gi => {
                    const g = tokens[gi];
                    // 굴절형도 표제어로 역추적해 연결(Children→child, others→other)
                    const hit = g.core && dictLookup(g.core);
                    return (
                      <React.Fragment key={gi}>
                        {g.joinPrev ? g.joinSym : g.pre}
                        <button type="button" className="dict-rword" disabled={!hit} onClick={() => hit && onOpenWord(hit.word)}>
                          {g.core}
                        </button>
                        {g.post}
                      </React.Fragment>
                    );
                  })}
                </span>
              );
            })}
          </div>
        )}

        {res && <div className="dict-meaning">{it.ex.ko}</div>}
        {res && res.forcedRelearn && (
          <div className="dict-relearn-note">힌트를 3번 사용해서 이 문제는 세션 뒤쪽에서 다시 나와요.</div>
        )}
        {res && notes.length > 0 && (
          <div className="dict-notes">
            {notes.map((n, i) => <div key={i} className="dict-note">{renderBold(n)}</div>)}
          </div>
        )}
        {res && !res.forcedRelearn && (
          <div className="qres ok">
            <Icon name="check" size={18} /> 정답!
            <span className="due">{res.dueIn === 0 ? "곧 복습" : res.dueIn + "일 뒤 복습"}</span>
          </div>
        )}
      </div>

      {!res ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: "auto" }}>
          <div className="qhintrow">
            <span className="qhint-lbl">힌트</span>
            <button className={"qhint-btn" + (firstHint ? " on" : "")} onClick={toggleFirstHint}>앞글자 보기</button>
            <button className={"qhint-btn" + (lenHint ? " on" : "")} onClick={() => setLenHint(v => !v)}>단어길이 보기</button>
          </div>
          {replayCount > 0 && (
            <div className="qhint">
              힌트 {replayCount}회 사용 — 다음 문제 난이도가 낮아져요{replayCount >= 2 ? " · 한 번 더 쓰면 이 문제를 다시 학습해요" : ""}
            </div>
          )}
          <button className="qsub" onMouseDown={e => e.preventDefault()} onClick={check}>확인</button>
        </div>
      ) : (
        <div className="qactions">
          <button className="primary" onClick={next}>{idx + 1 >= queue.length ? "학습 완료" : "다음 문장"}</button>
        </div>
      )}
    </div>
  );
}

/* ---------- 레벨 테스트 UI ----------
   엔진(createLevelTestA/B, saveLevelTest 등)은 위쪽 "레벨 테스트 엔진 (4.3)" 섹션 그대로 사용.
   여기서는 그 엔진이 내놓는 문항을 그리고, 사용자의 응답을 엔진에 그대로 돌려주기만 한다. */

/* Part A(어휘) — know → (알아요면) meaning → produce가 섞여 나온다. 엔진은 React state가 아니라
   내부 클로저 변수로 진행되므로, answer* 호출 뒤 tick을 올려 강제로 다시 그린다. */
function LevelTestPartA({ onExit, onDone }) {
  const engineRef = React.useRef(null);
  if (!engineRef.current) engineRef.current = createLevelTestA();
  const t = engineRef.current;
  const [, setTick] = useState(0);
  const bump = () => setTick(x => x + 1);
  const cur = t.current();
  const progress = t.progress();

  const [val, setVal] = useState("");
  useEffect(() => { setVal(""); }, [cur]);
  useEffect(() => { if (!cur) onDone(t.result()); }, [cur]);
  if (!cur) return null;

  const submitProduce = () => { t.answerProduce(val); bump(); };
  const undoBack = () => { if (t.canUndo()) { t.undo(); bump(); } };

  return (
    <div className="content study">
      <div className="study-top">
        <button className="x" onClick={onExit} aria-label="종료"><Icon name="close" size={22} /></button>
        <button className="x" onClick={undoBack} disabled={!t.canUndo()} style={{ opacity: t.canUndo() ? 1 : 0.3 }} aria-label="한 단계 뒤로"><Icon name="chevron_left" size={24} /></button>
        <div className="study-bar"><i style={{ width: (progress.done / progress.total * 100) + "%" }} /></div>
        <span className="study-n">{progress.done} / {progress.total}</span>
      </div>

      {cur.kind === "know" && (
        <React.Fragment>
          {/* know↔meaning 전환 시 카드 크기·폰트가 흔들리지 않게 동일 구조(.lt-qcard/.lt-word) 고정 */}
          <div className="qcard lt-qcard">
            <div className="qcue">이 단어를 아세요?</div>
            <div className="lt-word">{cur.word}</div>
          </div>
          <div className="qactions">
            <button className="ghost" onClick={() => { t.answerKnow(false); bump(); }}>모름</button>
            <button className="primary" onClick={() => { t.answerKnow(true); bump(); }}>뜻 압니다</button>
          </div>
        </React.Fragment>
      )}

      {cur.kind === "meaning" && (
        <React.Fragment>
          <div className="qcard lt-qcard">
            <div className="qcue">뜻을 골라 주세요</div>
            <div className="lt-word">{cur.word}</div>
          </div>
          <div className="lt-choices">
            {cur.choices.map((c, i) => (
              <button key={i} className="lt-choice" onClick={() => { t.answerMeaning(i); bump(); }}>{c}</button>
            ))}
          </div>
        </React.Fragment>
      )}

      {cur.kind === "produce" && (
        <React.Fragment>
          <div className="qcard lt-qcard">
            {cur.cue && <div className="qcue">{cur.cue}</div>}
            <div className="qko">{cur.ko}</div>
            <div className="qdiv" style={{ alignSelf: "stretch" }} />
            <div className="qen" style={{ textAlign: "center" }}>
              <input className="qbox" autoFocus value={val}
                onChange={e => setVal(e.target.value)}
                onKeyDown={e => e.key === "Enter" && submitProduce()}
                size={Math.max(8, val.length + 1)}
                lang="en" autoCapitalize="none" autoComplete="off" autoCorrect="off" spellCheck={false}
                aria-label="영단어 입력" />
            </div>
            <div className="qhint">{cur.len}글자</div>
          </div>
          <div className="qactions">
            <button className="ghost" onClick={() => { t.answerProduce(""); bump(); }}>모름</button>
            <button className="primary" onClick={submitProduce}>확인</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* Part A 완료 → Part B 진행 여부를 묻는 중간 안내 */
function LevelTestInterim({ onSkip, onContinue }) {
  return (
    <div className="content"><div className="finish">
      <div className="msg">Part A 완료</div>
      <div className="sub">이어서 문장구사력(어순 배열 5문장)을 측정할까요?</div>
      <div className="qactions" style={{ width: "100%", marginTop: 18 }}>
        <button className="ghost" onClick={onSkip}>건너뛰기</button>
        <button className="primary" onClick={onContinue}>이어서 측정</button>
      </div>
    </div></div>
  );
}

/* Part B(문장구사력) — 어순 배열. 셔플된 칩을 정답 순서대로 탭하면 위 답 영역에 쌓인다.
   순서가 아닌 칩을 탭하면 잠깐 빨갛게 흔들리고 errors만 오르고 답에는 안 들어간다.
   탭한 칩은 자리를 유지한 채 흐려지기만 함(남은 칩이 당겨지면 오탭 유발) + 실행취소 버튼.
   출제는 적응형(엔진) — 오탭 1개 이하로 완성하면 다음 문장은 한 단계 위 밴드. */
function LevelTestPartB({ onExit, onDone }) {
  const engineRef = React.useRef(null);
  if (!engineRef.current) engineRef.current = createLevelTestB();
  const b = engineRef.current;
  const [, setTick] = useState(0);
  const bump = () => setTick(x => x + 1);

  const cur = b.current();
  const progress = b.progress();
  const [picked, setPicked] = useState([]);     // shuffled 배열 내 인덱스(선택 순서)
  const [errors, setErrors] = useState(0);
  const startRef = React.useRef(Date.now());
  const [wrongPos, setWrongPos] = useState(null); // 흔들림 표시 중인 칩 위치

  useEffect(() => { setPicked([]); setErrors(0); startRef.current = Date.now(); }, [cur]);
  useEffect(() => { if (!cur) onDone(b.report()); }, [cur]);
  if (!cur) return null;

  const pickedSet = new Set(picked);
  const nextWord = cur.words[picked.length];

  const tapChip = pos => {
    if (pickedSet.has(pos)) return;
    if (cur.shuffled[pos] !== nextWord) {
      setErrors(e => e + 1);
      setWrongPos(pos);
      setTimeout(() => setWrongPos(null), 350);
      return;
    }
    const np = picked.concat(pos);
    if (np.length >= cur.words.length) {
      const seconds = (Date.now() - startRef.current) / 1000;
      b.answer({ ok: true, errors, seconds });
      bump();
    } else {
      setPicked(np);
    }
  };
  const undoPick = () => { if (picked.length) setPicked(picked.slice(0, -1)); };

  return (
    <div className="content study" data-answer={cur.words.join(" ")}>
      <div className="study-top">
        <button className="x" onClick={onExit} aria-label="종료"><Icon name="close" size={22} /></button>
        <div className="study-bar"><i style={{ width: (progress.done / progress.total * 100) + "%" }} /></div>
        <span className="study-n">{progress.done + 1} / {progress.total}</span>
      </div>

      <div className="lt-ko">{cur.ko}</div>
      <div className="lt-answer">{picked.map(p => cur.shuffled[p]).join(" ")}</div>
      <div className="lt-chips">
        {cur.shuffled.map((w, pos) => (
          <button key={pos}
            className={"lchip link" + (wrongPos === pos ? " wrong" : "") + (pickedSet.has(pos) ? " picked" : "")}
            disabled={pickedSet.has(pos)}
            onClick={() => tapChip(pos)}>{w}</button>
        ))}
      </div>
      <div className="qhintrow" style={{ justifyContent: "flex-end" }}>
        <button className="qhint-btn" onClick={undoPick} disabled={!picked.length} style={{ opacity: picked.length ? 1 : 0.4 }}>실행취소</button>
      </div>
    </div>
  );
}

/* 결과 분포 곡선 — 실제 정규분포를 그리지 않고, SVG 베지어 곡선
   (M4,62 C60,62 80,8 130,8 C180,8 200,62 256,62) 위에 마커를 얹는 시각적 근사.
   마커 x = 좌측여백(4) + (1 - pct/100) * 곡선폭(252) — pct(상위%)가 낮을수록(고급일수록) 오른쪽. */
function ltCurveY(x) {
  const t = Math.exp(-Math.pow(x - 130, 2) / (2 * 55 * 55));
  return 62 - 54 * t;
}
function LtDistCurve({ pct }) {
  // 극단 백분위(1%·99%)에서 마커·"나" 라벨이 viewBox 밖으로 잘리지 않게 클램프
  const x = Math.max(12, Math.min(248, 4 + (1 - pct / 100) * 252));
  const y = ltCurveY(x);
  // 초급/평균/고급 라벨을 곡선 바로 위에 얹기(가운데 쏠리게) — 평균은 꼭대기 바로 위, 초급/고급은 그보다 살짝 아래로 곡선을 따라감
  const lblX = { 초급: 82, 평균: 130, 고급: 178 };
  return (
    <div className="qcard" style={{ padding: "10px 8px 4px" }}>
      <svg width="100%" height="70" viewBox="0 0 260 70">
        <path d="M4,62 C60,62 80,8 130,8 C180,8 200,62 256,62" fill="none" stroke="var(--accent)" strokeWidth="2" />
        <line x1={x} y1="18" x2={x} y2="64" stroke="var(--ink)" strokeWidth="2" strokeDasharray="3,3" />
        <circle cx={x} cy={y} r="4" fill="var(--ink)" />
        <text x={x} y="11" fontSize="9" fontWeight="800" fill="var(--ink)" textAnchor="middle">나</text>
        {Object.entries(lblX).map(([label, lx]) => (
          <text key={label} x={lx} y={Math.max(9, ltCurveY(lx) - 10)} fontSize="9" fontWeight="700" fill="var(--muted)" textAnchor="middle">{label}</text>
        ))}
      </svg>
    </div>
  );
}

/* 결과 화면 — 어휘력(Part A)·문장구사력(Part B)을 분리된 두 축으로 표시.
   진입 시 saveLevelTest를 1회만 호출(홈/통계에서 나중에 읽어 씀). */
/* 결과 레벨 밴드 → 컬러위계 색(cefrHl 규칙 공유). 12단계 라벨("B1+","C2+")은 base 글자로 매핑 */
function ltBandHl(label) { return cefrHl((label || "").replace("+", "")); }

/* 결과 분석 — "어휘 C1, 문장 B1 — 산출 연습" 한 줄보다 우리 앱 기능에 근거한 구체적 진단으로.
   ① 어휘↔문장 격차 방향/크기 ② 수동/능동(활성 어휘 비율) ③ 어순 자동화 속도(spw)를
   각각 짚고, 실제로 켤 수 있는 루틴(단어카드 빈칸·듣기 딕테이션·어순 배열·어원 타고타고)을 지목. */
/* 노트마다 tier를 붙여 강조색이 하이어라키에 따라 달라지게 함(전부 노란색이던 문제) —
   green=좋은 결과, pink=보완이 필요한 약점, yellow=중립 정보. */
function ltAnalysis(A, B) {
  const out = [];
  const activeRatio = A.vocab ? A.activeVocab / A.vocab : 0;
  if (B) {
    const d = A.band12 - B.band12;
    if (d >= 2) out.push({ tier: "pink", text: `읽으면 아는 단어 수준(**${A.band}**)에 비해 문장으로 조립하는 힘(**${B.band}**)이 ${d >= 4 ? "크게 " : ""}뒤처져요. "알지만 말이 안 나오는" 전형적 프로필이에요. **듣기 세션(딕테이션)**으로 문장 리듬을 익히고, **레벨 테스트의 어순 배열**과 **단어카드 빈칸 채우기**로 산출을 끌어올리세요.` });
    else if (d <= -2) out.push({ tier: "blue", text: `문장 구성력(**${B.band}**)은 좋은데 어휘량(**${A.band}**)이 못 받쳐줘요. **단어카드 신규 학습**을 하루 목표까지 채우고, 사전 상세의 **어원·유의어 타고타고**로 어휘 폭을 넓히면 표현이 훨씬 풍부해져요.` });
    else out.push({ tier: "green", text: `어휘(**${A.band}**)와 문장 구사(**${B.band}**)가 균형을 이뤄요. 지금 루틴(**단어카드 + 듣기 세션**)을 유지하며 난이도를 한 단계씩 올려보세요.` });
  } else {
    out.push({ tier: "yellow", text: `문장구사력은 아직 측정하지 않았어요. **레벨 테스트의 어순 배열**을 한 번 해보면 어휘와 산출력의 격차를 볼 수 있어요.` });
  }
  if (A.vocab >= 100) {
    if (activeRatio < 0.5) out.push({ tier: "pink", text: `아는 단어 약 **${A.vocab.toLocaleString()}개** 중 실제로 말할 수 있는 건 약 **${A.activeVocab.toLocaleString()}개**(${Math.round(activeRatio * 100)}%)뿐이에요 — 인지는 되지만 산출이 약한 상태. **단어카드의 빈칸(산출) 채우기**와 **듣기 딕테이션**이 능동 어휘 전환에 가장 효과적이에요.` });
    else out.push({ tier: "green", text: `아는 단어 **${A.vocab.toLocaleString()}개** 중 **${A.activeVocab.toLocaleString()}개**(${Math.round(activeRatio * 100)}%)를 실제로 쓸 수 있어요 — 수동/능동 균형이 좋은 편이에요.` });
  }
  if (B && typeof B.spw === "number" && B.spw > 0) {
    if (B.spw >= 2.2) out.push({ tier: "pink", text: `어순을 맞추는 데 단어당 **${B.spw.toFixed(1)}초**가 걸렸어요 — 문장을 "번역하듯" 조립하는 단계예요. **듣기 세션**을 매일 반복하면 통째로 떠올리는 속도가 붙어요.` });
    else if (B.spw <= 1.0) out.push({ tier: "green", text: `어순 배열이 단어당 **${B.spw.toFixed(1)}초**로 빨라요 — 문장 구조가 거의 자동화돼 있어요.` });
  }
  return out;
}

function LevelTestResult({ resultA, resultB, onExit, onRetry, viewOnly }) {
  const savedRef = React.useRef(false);
  useEffect(() => {
    if (viewOnly) return; // 홈 통계 카드에서 "저장된 결과 보기"로 열 때는 재저장(at 갱신) 안 함
    if (savedRef.current) return;
    savedRef.current = true;
    saveLevelTest({ lex: resultA, flu: resultB || null });
  }, []);

  const analysis = ltAnalysis(resultA, resultB);

  return (
    <div className="content">
      <div className="lt-note">{renderBold("아래 분포는 **공개 통계 참고 추정치**입니다. 실제 전국 표본이 아니라 동기부여용 근사값이에요.")}</div>

      <div className="sec">어휘력</div>
      <div className="lt-row">
        <span className={"lt-band tier-" + ltBandHl(resultA.band)}>{resultA.band}</span>
        <span className={"chip tier-" + ltBandHl(resultA.band)}>{resultA.vocab.toLocaleString()} 단어</span>
        <span className={"chip tier-" + ltBandHl(resultA.band)}>상위 {resultA.pct}% (추정)</span>
      </div>
      <div style={{ textAlign: "center", fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>
        말할 수 있는 단어 약 {resultA.activeVocab.toLocaleString()}개
      </div>
      <LtDistCurve pct={resultA.pct} />

      <div className="sec">문장구사력</div>
      {resultB ? (
        <React.Fragment>
          <div className="lt-row">
            <span className={"lt-band tier-" + ltBandHl(resultB.band)}>{resultB.band}</span>
            <span className={"chip tier-" + ltBandHl(resultB.band)}>상위 {resultB.pct}% (추정)</span>
          </div>
          <LtDistCurve pct={resultB.pct} />
          <div className="lt-note">{renderBold("**어순 배열만으로 부분 측정**한 값이에요")}</div>
        </React.Fragment>
      ) : (
        <div className="lt-note">측정 안 함 — 나중에 다시 할 수 있어요</div>
      )}

      <div className="sec">분석</div>
      {analysis.map((n, i) => <div key={i} className="lt-note">{renderBold(n.text, n.tier)}</div>)}

      <div className="qactions" style={{ marginTop: 4 }}>
        <button className="ghost" onClick={onRetry}>다시 측정</button>
        <button className="primary" onClick={onExit}>완료</button>
      </div>
    </div>
  );
}

/* Part A → (중간 안내) → Part B(선택) → 결과, 4단계를 오가는 오케스트레이터 */
function LevelTest({ onExit }) {
  const [phase, setPhase] = useState("a"); // "a" | "interim" | "b" | "result"
  const [resultA, setResultA] = useState(null);
  const [resultB, setResultB] = useState(null);

  if (phase === "a") {
    return <LevelTestPartA onExit={onExit} onDone={r => { setResultA(r); setPhase("interim"); }} />;
  }
  if (phase === "interim") {
    return <LevelTestInterim
      onSkip={() => { setResultB(null); setPhase("result"); }}
      onContinue={() => setPhase("b")} />;
  }
  if (phase === "b") {
    return <LevelTestPartB onExit={onExit} onDone={r => { setResultB(r); setPhase("result"); }} />;
  }
  return <LevelTestResult resultA={resultA} resultB={resultB} onExit={onExit}
    onRetry={() => { setResultA(null); setResultB(null); setPhase("a"); }} />;
}

/* ---------- 학습 탭 ---------- */
function Learn({ onOpenWord, onStartLevelTest, customStudy, customMode, onConsumeCustomStudy, setImmersive }) {
  const [session, setSession] = useState(null); // null | items | "done"
  const [mode, setMode] = useState("card");      // "card" | "listen" — session이 어느 세션인지
  const [summary, setSummary] = useState(null);
  const [quiz, setQuiz] = useState(null); // null | questions[] | "done"
  const [quizSummary, setQuizSummary] = useState(null);
  // 카드/듣기 세션이나 퀴즈 중엔 몰입 화면이라 탭바를 숨김(2026-07-18) — 메뉴로 돌아오면(session/quiz null) 자동 복원.
  useEffect(() => {
    if (!setImmersive) return;
    setImmersive(session !== null || quiz !== null);
    return () => setImmersive(false);
  }, [session, quiz]); // eslint-disable-line
  const dueCount = allItems().filter(it => SRS.isDue(it.key)).length;
  /* 신규는 전체 표제어(1만+)가 아니라 내 레벨 ±1 범위 대기 수 — 그중 오늘 목표(goalWords)만큼만 안내 */
  const freshCount = freshPool().length;
  const newGoal = Math.min(PREFS.get().goalWords, freshCount);
  const studiedCount = allItems().filter(it => SRS.get(it.key)).length;

  // 사전(내 단어장)/홈에서 '이 리스트로 학습'을 눌러 넘어온 경우 곧바로 그 목록으로 세션 시작
  // (customMode로 카드/듣기 중 어느 세션을 열지 지정 — 홈 "듣기 N문장"이 학습 탭 메뉴만 보여주던 버그 수정)
  useEffect(() => {
    if (customStudy && customStudy.length) {
      setMode(customMode || "card");
      setSession(customStudy);
      onConsumeCustomStudy();
    }
    // eslint-disable-next-line
  }, [customStudy]);

  if (session === "done" && summary) {
    return <Finish total={summary.total} correct={summary.correct}
      label={mode === "listen" ? "오늘 듣기 세션 완료" : undefined}
      onExit={() => { setSession(null); setSummary(null); }} />;
  }
  const onSessionExit = (done, correct, total) => {
    if (done) {
      const n = total || session.length;
      if (mode === "listen") ACT.addListen(n); else ACT.addCards(n); // 활동 로그(뱃지·스트릭·루틴 실데이터)
      setSummary({ total: n, correct }); setSession("done");
    }
    else setSession(null);
  };
  if (session && mode === "listen") return <DictationSession items={session} onExit={onSessionExit} onOpenWord={onOpenWord} />;
  if (session) return <CardSession items={session} onOpenWord={onOpenWord} onExit={onSessionExit} />;
  if (quiz === "done" && quizSummary) {
    return <Finish total={quizSummary.total} correct={quizSummary.correct}
      title="퀴즈 완료" sub="정답 여부는 SRS 복습 일정에는 영향을 주지 않아요."
      onExit={() => { setQuiz(null); setQuizSummary(null); }} />;
  }
  if (quiz) {
    return <QuizSession questions={quiz}
      onExit={(done, correct, total) => {
        if (done) { setQuizSummary({ total: total ?? quiz.length, correct }); setQuiz("done"); }
        else setQuiz(null);
      }} />;
  }

  const startCard = () => { const items = pickSession(10); if (items.length) { setMode("card"); setSession(items); } };
  const startListen = () => { unlockAudio(); const items = pickSession(10, listenLevelShift()); if (items.length) { setMode("listen"); setSession(items); } };
  const startQuiz = () => {
    const qs = buildQuiz(10);
    if (qs) setQuiz(qs);
  };

  const MENU = [
    { k: "card", icon: "school", title: "단어카드", sub: `복습 ${dueCount} · 오늘 신규 목표 ${newGoal}개`, on: true, start: startCard },
    { k: "listen", icon: "volume_up", title: "듣기 세션 (딕테이션)", sub: "듣고 그대로 타이핑", on: true, start: startListen },
    { k: "quiz", icon: "grid_view", title: "퀴즈", sub: studiedCount >= 4 ? "뜻 4지선다 · 스펠링" : "먼저 단어카드로 학습해 보세요", on: studiedCount >= 4, start: startQuiz, hidden: true }, // 2026-07-15 메뉴에서만 숨김(코드는 보존 — hidden 지우면 복원)
    { k: "level", icon: "add", title: "레벨 테스트", sub: "어휘 + 문장구사력", on: true, start: onStartLevelTest },
  ];

  return (
    <div className="content learnmenu">
      <div className="stat" style={{ padding: "18px 8px", marginBottom: 2 }}>
        <div className="v accent">{dueCount}</div>
        <div className="l">지금 복습할 카드</div>
      </div>
      {MENU.filter(m => !m.hidden).map(m => (
        <div key={m.k} className={"step" + (m.on ? "" : " soon")} onClick={() => m.on && m.start()}>
          <div className="step-ico round black"><Icon name={m.icon} size={20} /></div>
          <div className="step-body">
            <div className="step-title">{m.title}</div>
            <div className="step-sub">{m.sub}</div>
          </div>
          {m.on ? <div className="step-cta">시작</div> : <span className="arrow">›</span>}
        </div>
      ))}
    </div>
  );
}

/* ---------- 설정 (캐릭터 변경 · 일일 목표 · 듣기 속도/악센트) ---------- */
function Settings({ charK, onChangeChar, onClose, onStartLevelTest }) {
  const [pts, setPts] = useState(POINTS.get());
  const [prefs, setPrefsState] = useState(PREFS.get());
  const first = charK === null;
  const lastLt = loadLevelTest();

  useEffect(() => () => stopSpeaking(), []); // 설정 닫힐 때(언마운트) 미리듣기 음성 정지

  const handlePick = k => {
    if (k === charK) return;
    if (first) { onChangeChar(k); return; } // 처음 1회는 무료
    if (POINTS.spend(CHAR_CHANGE_COST)) { setPts(POINTS.get()); onChangeChar(k); }
  };

  const setGoal = (key, v) => {
    const n = Math.max(0, Math.min(999, v));
    PREFS.set({ [key]: n });
    setPrefsState({ ...PREFS.get() });
  };
  const setPref = (key, v) => {
    PREFS.set({ [key]: v });
    setPrefsState({ ...PREFS.get() });
    speakText("This is a sample sentence."); // 바꾼 속도·악센트를 바로 들어볼 수 있도록
  };

  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          <b style={{ fontSize: 16, fontWeight: 800 }}>설정</b>
          <span className="sp" />
          <button className="back" onClick={onClose} aria-label="닫기"><Icon name="close" size={20} /></button>
        </div>
        <div className="sheet-body">
          <div className="ptbox">
            <div>
              <div className="l">보유 포인트</div>
              <div className="v">{pts}P</div>
            </div>
            <div className="l" style={{ textAlign: "right", maxWidth: 160 }}>단어카드 정답마다 10P 적립 · 캐릭터 변경에 {CHAR_CHANGE_COST}P 필요</div>
          </div>

          <div>
            <div className="wd-sec-t">레벨 테스트</div>
            <div className="step" onClick={onStartLevelTest}>
              <div className="step-ico"><Icon name="school" size={20} /></div>
              <div className="step-body">
                <div className="step-title">레벨 테스트 {lastLt ? "다시하기" : "하러 가기"}</div>
                <div className="step-sub">
                  {lastLt && lastLt.lex
                    ? `지난 결과: 어휘 ${lastLt.lex.band} · 상위 ${lastLt.lex.pct}% (추정)`
                    : "어휘력 + 문장구사력 측정"}
                </div>
              </div>
              <div className="step-cta">시작</div>
            </div>
          </div>

          <div>
            <div className="wd-sec-t">캐릭터 {first ? "선택 (첫 선택 무료)" : "변경"}</div>
            <div className="wlist">
              {CHARACTERS.map(c => {
                const isCur = c.k === charK;
                const affordable = pts >= CHAR_CHANGE_COST;
                return (
                  <div key={c.k} className="charrow">
                    <div className="cf">
                      {c.thumb
                        ? <img src={c.thumb} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                        : <div className={"char-swatch char-swatch-sm hi-" + c.accent} />}
                    </div>
                    <div className="body">
                      <div className="name">{c.label}</div>
                    </div>
                    {isCur ? (
                      <div className="cta use">사용 중</div>
                    ) : first ? (
                      <button className="cta free" onClick={() => handlePick(c.k)}>선택하기</button>
                    ) : affordable ? (
                      <button className="cta buy" onClick={() => handlePick(c.k)}>{CHAR_CHANGE_COST}P 변경</button>
                    ) : (
                      <div className="cta locked">{pts}/{CHAR_CHANGE_COST}P</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          <div>
            <div className="wd-sec-t">오늘의 목표</div>
            <div className="goalrow">
              <span className="goal-lbl">단어</span>
              <button className="goal-step" onClick={() => setGoal("goalWords", prefs.goalWords - 5)}>−</button>
              <span className="goal-v">{prefs.goalWords}개</span>
              <button className="goal-step" onClick={() => setGoal("goalWords", prefs.goalWords + 5)}>+</button>
            </div>
            <div className="goalrow">
              <span className="goal-lbl">듣기</span>
              <button className="goal-step" onClick={() => setGoal("goalListen", prefs.goalListen - 5)}>−</button>
              <span className="goal-v">{prefs.goalListen}개</span>
              <button className="goal-step" onClick={() => setGoal("goalListen", prefs.goalListen + 5)}>+</button>
            </div>
            <div className="goalrow">
              <span className="goal-lbl">회화·작문</span>
              <button className="goal-step" onClick={() => setGoal("goalTalk", prefs.goalTalk - 5)}>−</button>
              <span className="goal-v">{prefs.goalTalk}개</span>
              <button className="goal-step" onClick={() => setGoal("goalTalk", prefs.goalTalk + 5)}>+</button>
            </div>
          </div>

          <div>
            <div className="wd-sec-t">듣기 속도</div>
            <div className="wlist">
              {Object.entries(SPEED_PRESETS).map(([k, s]) => (
                <button key={k} className={"prefrow" + (prefs.speed === k ? " on" : "")} onClick={() => setPref("speed", k)}>
                  <span className="pf-name">{s.label}</span>
                  <span className="pf-sub">{s.sub}</span>
                </button>
              ))}
            </div>
          </div>

          <div>
            <div className="wd-sec-t">악센트</div>
            <div className="chips">
              {Object.entries(ACCENT_PRESETS).map(([k, a]) => (
                <button key={k} className={"chip" + (prefs.accent === k ? " on" : "")} onClick={() => setPref("accent", k)}>{a.label}</button>
              ))}
            </div>
          </div>

          <div>
            <div className="wd-sec-t">CEFR 레벨이란?</div>
            <div className="cefrinfo">
              {CEFR_LEVELS.map(lv => (
                <div key={lv} className="cefrinfo-row">
                  <span className={"tag lv tier-" + cefrHl(lv)}>{lv}</span>
                  <span className="cefrinfo-nm">{CEFR_NAMES[lv]}</span>
                </div>
              ))}
              <div className="empty-note" style={{ marginTop: 6 }}>유럽 공통 언어 기준(CEFR)의 6단계 척도예요. 단어·의미마다 이 레벨이 매겨져 있고, 낮을수록 더 쉽고 흔한 뜻이에요.</div>
            </div>
          </div>

          <div className="empty-note" style={{ textAlign: "center", marginTop: 4 }}>{APP_VERSION} · {APP_BUILD}</div>
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ---------- 앱 셸 ---------- */
const TABS = [
  { k: "learn", label: "학습", icon: "school" },
  { k: "dict", label: "사전", icon: "menu_book" },
  { k: "home", label: "홈", icon: "home" },
  { k: "talk", label: "회화", icon: "forum" },
  { k: "box", label: "보관함", icon: "bookmark" },
];

function App() {
  const [tab, setTab] = useState("home");
  /* 탭 아이콘을 누르면(이미 그 탭이어도) 항상 그 탭의 메인 화면으로 돌아가게 하는 리셋 카운터(2026-07-18).
     탭별로 내부에 깊은 화면(회화 대화방, 사전 상세 등)이 있어도 이 값을 key에 섞어주면 그 탭 컴포넌트가
     통째로 리마운트되어 내부 state가 초기화됨 — 탭을 누른 채 안 바뀌면(setTab) 아무 일도 안 일어나던 문제 해결. */
  const [tabResetKey, setTabResetKey] = useState({ home: 0, dict: 0, learn: 0, talk: 0, box: 0 });
  const [immersive, setImmersive] = useState(false); // 학습 세션·회화 대화방 등 몰입 화면에서 탭바를 숨김(2026-07-18)
  const [stack, setStack] = useState(null); // 단어 상세 시트 스택
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [ltOpen, setLtOpen] = useState(false); // 레벨 테스트 — 학습 탭 메뉴와 설정 두 곳에서 진입하므로 앱 레벨에서 관리
  const [ltResultOpen, setLtResultOpen] = useState(false); // 홈의 레벨/어휘량/백분위 카드 → 저장된 결과 분석표 보기(2026-07-18, 예전엔 이 카드를 눌러도 사전 탭으로 넘어가버렸음)
  // 2026-07-18: 홈 히어로가 캐릭터 선택 여부와 무관하게 항상 고양이유령을 보여주도록 바뀌면서
  // (구 "캐릭터 미선택" 플레이스홀더 폐기), charK를 null로 방치할 이유가 없어져 기본값을 char1로
  // 변경 — "캐릭터 바꾸기" 화면에서도 고양이유령이 처음부터 "사용 중"으로 뜨는 게 자연스러움.
  const [charK, setCharKState] = useState(() => {
    try { return localStorage.getItem("en_char") || "char1"; } catch (e) { return "char1"; }
  });
  const changeChar = k => { setCharKState(k); try { localStorage.setItem("en_char", k); } catch (e) {} };
  const [customStudy, setCustomStudy] = useState(null); // 사전 > 내 단어장에서 '이 리스트로 학습' 요청
  const [customMode, setCustomMode] = useState("card"); // customStudy 진입 시 카드/듣기 중 어느 세션으로 열지
  const startCustomStudy = (items, mode = "card") => { setCustomStudy(items); setCustomMode(mode); setTab("learn"); };
  const [dictRootJump, setDictRootJump] = useState(null); // 단어상세 > 어근 칩 클릭 → 사전 카테고리(어근)로 이동
  const openRoot = affix => { setDictRootJump(affix); setTab("dict"); closeSheet(); };
  const [dictViewJump, setDictViewJump] = useState(null); // 보관함 > 즐겨찾기/내 단어장 → 사전의 해당 뷰로 바로 진입
  const openDictView = v => { setDictViewJump(v); setTab("dict"); };
  const startLevelTest = () => { setSettingsOpen(false); setLtOpen(true); };

  const openWord = w => setStack([w]);
  const pushWord = w => setStack(s => [...s, w]);
  const popWord = () => setStack(s => (s.length > 1 ? s.slice(0, -1) : s));
  const closeSheet = () => setStack(null);

  // allItems()의 SEED 캐시 + canBlank()의 항목별 캐시를 앱 마운트 직후(첫 페인트 뒤, 사용자가
  // 아직 아무것도 탭하기 전) 미리 데워둠 — 이 캐시들이 비어있는 상태로 "단어카드 시작"을 탭하면
  // pickSession()이 그 안에서 처음으로 채우느라 동기 블로킹이 생겨 뒤이은 입력창 focus()가
  // 늦어짐(2026-07-18). freshPool(0)이 내부에서 canBlank를 SEED 전체에 대해 한 번씩 호출하므로
  // 이거 한 번으로 두 캐시가 다 데워짐(부작용 없는 순수 조회라 RECENT_KEYS 등 상태는 안 건드림).
  useEffect(() => { freshPool(0); }, []);

  useEffect(() => {
    if (!stack) return;
    const onKey = e => { if (e.key === "Escape") closeSheet(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [stack]);

  /* 소프트 키보드가 하단 컨트롤(힌트·확인 버튼)을 가리지 않도록:
     visualViewport로 키보드가 가리는 높이를 재서 --kb CSS 변수로 내려줌(.content 바닥 패딩이 그만큼 늘어남).
     iOS는 키보드가 오버레이 방식이라 layout viewport(100dvh)가 안 줄어드는 것에 대한 대응. */
  useEffect(() => {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => {
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty("--kb", Math.round(kb) + "px");
    };
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    update();
    return () => { vv.removeEventListener("resize", update); vv.removeEventListener("scroll", update); };
  }, []);

  /* 새 버전 배포 감지: 앱을 열 때(최초 로드)와 백그라운드에서 돌아올 때(PWA를 껐다 켤 때 포함)
     version.json을 캐시 없이 확인해서 APP_VERSION과 다르면 배너 없이 바로 강제 새로고침.
     location.reload()는 캐시에서 그대로 서빙될 수 있어(특히 iOS 홈화면 standalone 앱)
     ?_=타임스탬프로 URL을 바꿔 강제 새 요청한다. 새로고침해도 같은 버전 문자열이 또 감지되면
     (배포 사고 등으로 version.json과 실제 코드가 어긋난 경우) sessionStorage로 재시도를 막아
     무한 새로고침 루프를 방지한다. */
  useEffect(() => {
    const check = () => {
      fetch("version.json?t=" + Date.now(), { cache: "no-store" })
        .then(r => (r.ok ? r.json() : null))
        .then(data => {
          if (!data || !data.v || data.v === APP_VERSION) return;
          const key = "en_reload_for_" + data.v;
          if (sessionStorage.getItem(key)) return;
          sessionStorage.setItem(key, "1");
          window.location.href = window.location.pathname + "?_=" + Date.now();
        })
        .catch(() => {});
    };
    check();
    const onVis = () => { if (document.visibilityState === "visible") check(); };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, []);

  /* 창을 닫거나 백그라운드로 보내도 재생 중이던 음성이 계속 나오던 문제 —
     탭이 숨겨지거나(다른 앱 전환·화면 끄기) 페이지가 떠날 때 강제로 정지. */
  useEffect(() => {
    const onHide = () => { if (document.visibilityState === "hidden") stopSpeaking(); };
    document.addEventListener("visibilitychange", onHide);
    window.addEventListener("pagehide", stopSpeaking);
    return () => { document.removeEventListener("visibilitychange", onHide); window.removeEventListener("pagehide", stopSpeaking); };
  }, []);

  const homeStreak = ACT.streak(); // 상단바 "연속 N일" 실데이터(2026-07-19, 구 하드코딩 4 대체). tab 전환마다 App 리렌더로 갱신.
  return (
    <div className="app">
      <div className="topbar">
        <div className="brand" role="button" tabIndex={0} onClick={() => { setLtOpen(false); setSettingsOpen(false); closeSheet(); setTab("home"); setTabResetKey(k => ({ ...k, home: k.home + 1 })); }} style={{ cursor: "pointer" }}>No<b>English</b></div>
        <div className="topbar-right">
          <span className="pill"><span className={"dot hl-" + streakHl(homeStreak)} />연속 {homeStreak}일</span>
          <button className="avatar-btn" aria-label="설정" onClick={() => setSettingsOpen(true)}><Icon name="settings" size={19} /></button>
        </div>
      </div>

      <div className={"scroll" + (immersive || ltOpen || ltResultOpen ? " notab" : "")}>
        {ltOpen ? (
          <LevelTest onExit={() => setLtOpen(false)} />
        ) : ltResultOpen ? (
          <LevelTestResult resultA={loadLevelTest().lex} resultB={loadLevelTest().flu} viewOnly
            onExit={() => setLtResultOpen(false)}
            onRetry={() => { setLtResultOpen(false); startLevelTest(); }} />
        ) : (
          <React.Fragment>
            {tab === "home" && <Home key={"home-" + tabResetKey.home} onGoTab={setTab} charK={charK} onChangeChar={changeChar} onOpenSettings={() => setSettingsOpen(true)} onOpenLtResult={() => setLtResultOpen(true)} onStartCards={() => startCustomStudy(pickSession(10))} onStartListen={() => { unlockAudio(); startCustomStudy(pickSession(10, listenLevelShift()), "listen"); }} />}
            {tab === "dict" && <Dict key={"dict-" + tabResetKey.dict} onOpen={openWord} onStudyList={startCustomStudy} rootJump={dictRootJump} onConsumeRootJump={() => setDictRootJump(null)} viewJump={dictViewJump} onConsumeViewJump={() => setDictViewJump(null)} />}
            {tab === "learn" && <Learn key={"learn-" + tabResetKey.learn} onOpenWord={openWord} onStartLevelTest={startLevelTest} customStudy={customStudy} customMode={customMode} onConsumeCustomStudy={() => setCustomStudy(null)} setImmersive={setImmersive} />}
            {tab === "talk" && <Talk key={"talk-" + tabResetKey.talk} onOpenWord={openWord} setImmersive={setImmersive} />}
            {tab === "box" && <Vault key={"box-" + tabResetKey.box} onGoTab={setTab} onOpenDict={openDictView} />}
          </React.Fragment>
        )}
      </div>

      {settingsOpen && <Settings charK={charK} onChangeChar={changeChar} onClose={() => setSettingsOpen(false)} onStartLevelTest={startLevelTest} />}

      {!(immersive || ltOpen || ltResultOpen) && <div className="tabbar">
        {TABS.map(t => (
          <button key={t.k}
                  className={"tab tab-" + t.k + (tab === t.k ? " on" : "")}
                  onClick={() => {
                    // 레벨테스트/설정/단어상세 시트처럼 탭 위를 덮고 있던 화면을 전부 닫고,
                    // 그 탭을 리마운트해서 항상 메인 화면으로 — 이미 그 탭이어도(재탭) 동작해야 하므로 매번 리셋(2026-07-18).
                    setLtOpen(false); setLtResultOpen(false); setSettingsOpen(false); closeSheet();
                    setTab(t.k);
                    setTabResetKey(k => ({ ...k, [t.k]: k[t.k] + 1 }));
                  }}>
            {/* 레벨테스트 중에도 탭 이동이 되도록 ltOpen을 닫음 — 안 닫으면 tab 상태만 바뀌고
                화면은 테스트가 계속 덮고 있어 "탭 터치가 안 먹는" 것처럼 보였음(2026-07-17) */}
            <span className="ti"><Icon name={t.icon} size={26} /></span>
            {t.label}
          </button>
        ))}
      </div>}

      {stack && <WordSheet stack={stack} onPush={pushWord} onPop={popWord} onClose={closeSheet} onOpenRoot={openRoot} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
