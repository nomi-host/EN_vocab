    const w = arr[Math.floor(Math.random() * arr.length)];
    if (!w || usedSet.has(w.word)) continue;
    usedSet.add(w.word);
    out.push(w);
  }
  return out;
}

/* ---- Part A. 어휘 — 적응형(1-up-1-down 계단식) ----
   문항 구성: know(아는 단어인지) → "알아요"면 meaning(뜻 4지선다 확인)이 즉시 이어짐.
   know+meaning 둘 다 통과해야 그 밴드 정답. 실단어 18문항 사이에 가짜 단어 3개 삽입
   ("알아요"를 누르면 조용히 false alarm 기록 — 뜻 확인 없이 다음으로). 매 4번째
   실단어마다 산출(produce: 앵커 뜻 → 영단어 타이핑) 문항 1개 — 인지/산출 이원 측정.

   UI 계약:
   const t = createLevelTestA();
   t.current() → null(종료) 또는
     {kind:"know",    word, idx, total}                          → t.answerKnow(bool)
     {kind:"meaning", word, choices:[ko×4], idx, total}          → t.answerMeaning(choiceIdx)
     {kind:"produce", ko, cue, len, idx, total}                  → t.answerProduce(text)
   모든 answer*는 자동으로 다음 문항으로 진행. t.result() → 종료 후 결과. */
const LT_REAL_N = 18, LT_FAKE_N = 3, LT_PRODUCE_EVERY = 4;
function createLevelTestA() {
  const used = new Set();
  let band = 1;               // A2에서 시작
  let realDone = 0, fakeDone = 0, produceDone = 0;
  let fakeYes = 0;
  let lastOkBand = 0;         // 마지막으로 맞힌 실단어의 밴드 — 산출 문항 출제 기준
  const bandStat = {};        // band6 → {n, ok}
  const trail = [];           // 실단어 문항의 밴드 궤적(능력치 추정용)
  const produceLog = [];      // {ok}
  let cur = null;             // 현재 문항
  let pendingMeaning = null;  // know에서 "알아요"한 단어의 뜻 확인 대기
  const totalN = LT_REAL_N + LT_FAKE_N + Math.floor(LT_REAL_N / LT_PRODUCE_EVERY);
  let seq = 0;

  const fakeSlots = new Set();
  while (fakeSlots.size < LT_FAKE_N) fakeSlots.add(1 + Math.floor(Math.random() * (LT_REAL_N + LT_FAKE_N - 2)));

  /* 한 단계 뒤로가기(실수 응답 복구) — 매 응답 직전 스냅샷을 쌓아두고 통째로 복원.
     used에 새로 추가된 단어는 되돌리지 않음(풀이 커서 무해, 같은 단어 재출제 방지에 오히려 유리). */
  const history = [];
  function snapshot() {
    history.push({
      cur, seq, band, realDone, fakeDone, produceDone, fakeYes, lastOkBand,
      trail: trail.slice(), produceLog: produceLog.slice(),
      bandStat: JSON.parse(JSON.stringify(bandStat)),
    });
  }
  function restore(s) {
    cur = s.cur; seq = s.seq; band = s.band; realDone = s.realDone; fakeDone = s.fakeDone;
    produceDone = s.produceDone; fakeYes = s.fakeYes; lastOkBand = s.lastOkBand;
    trail.length = 0; Array.prototype.push.apply(trail, s.trail);
    produceLog.length = 0; Array.prototype.push.apply(produceLog, s.produceLog);
    Object.keys(bandStat).forEach(k => delete bandStat[k]);
    Object.assign(bandStat, s.bandStat);
  }

  function gradeReal(ok) {
    bandStat[band] = bandStat[band] || { n: 0, ok: 0 };
    bandStat[band].n++;
    if (ok) { bandStat[band].ok++; lastOkBand = band; }
    trail.push(band);
    band = Math.max(0, Math.min(CEFR_LEVELS.length - 1, band + (ok ? 1 : -1)));
    realDone++;
  }
  function nextItem() {
    if (pendingMeaning) {
      // 뜻 확인은 같은 문항의 2단계 — 진행 카운트(seq)를 늘리지 않는다
      const w = pendingMeaning;
      const myKo = ltAnchor(w).ko;
      const myPos = ltPos(w);
      // 오답 품사 통일(2026-07-20 재작성) — 예전엔 같은 밴드에 같은 품사가 8개 미만이면 밴드 전체
      // (품사 무관)로 폴백해 오답 품사가 섞이는 경우가 있었음. 밴드를 안 가리고 SEED 전체에서 같은
      // 품사만 모으면 왠만한 품사는 충분히 채워지므로, 품사를 모르는 극히 드문 경우에만 밴드 폴백.
      const basePool = myPos
        ? SEED.filter(x => x.word !== w.word && x.ko && ltPos(x) === myPos && !isPureLoanword(x) && ltAnchor(x).ko !== myKo)
        : ltBandPool(CEFR_LEVELS.indexOf(w.cefr)).filter(x => x.word !== w.word && ltAnchor(x).ko !== myKo);
      // 유의어 오답 1개(2026-07-20) — 정답과 실제 뜻이 가까운 단어를 하나 우선 넣어 소거법을 막는다
      // (오답 3개가 전부 무관한 단어면 뜻을 몰라도 "그럴듯한 것" 하나만 골라 맞힐 수 있다는 지적).
      // w.syn(정방향)과 SYN_INDEX(역방향, "누가 나를 유의어로 꼽았는지")를 합쳐 같은 품사 풀 안에서 탐색.
      const synWords = new Set([...(w.syn || []), ...(SYN_INDEX[w.word.toLowerCase()] || [])].map(s => s.toLowerCase()));
      const synPool = basePool.filter(x => synWords.has(x.word.toLowerCase()));
      const usedWrong = new Set([w.word]);
      const wrongs = [];
      if (synPool.length) { const pick = synPool[Math.floor(Math.random() * synPool.length)]; wrongs.push(pick); usedWrong.add(pick.word); }
      wrongs.push(...ltPick(basePool, 3 - wrongs.length, usedWrong));
      const choices = wrongs.map(x => ltAnchor(x).ko);
      const answerIdx = Math.floor(Math.random() * (choices.length + 1));
      choices.splice(answerIdx, 0, myKo);
      cur = { kind: "meaning", word: w.word, choices, _answerIdx: answerIdx, _w: w, idx: seq, total: totalN };
      return;
    }
    seq++;
    if (realDone >= LT_REAL_N && fakeDone >= LT_FAKE_N) { cur = null; return; }
    if (realDone > 0 && realDone % LT_PRODUCE_EVERY === 0 && produceDone < Math.floor(realDone / LT_PRODUCE_EVERY)) {
      // 산출은 "아는 단어를 입으로 낼 수 있는가"(수동→능동, PLAN 4.12-1) 측정이므로
      // 계단식 현재 밴드(대개 실력 바로 위 = 모르는 단어)가 아니라 마지막으로 맞힌 밴드에서 출제
      const w = ltPick(ltBandPool(lastOkBand), 1, used)[0];
      if (w) {
        const a = ltAnchor(w);
        cur = { kind: "produce", ko: a.ko, cue: a.cue, len: w.word.length, _w: w, idx: seq, total: totalN };
        return;
      }
    }
    const useFake = fakeDone < LT_FAKE_N && (fakeSlots.has(realDone + fakeDone + 1) || realDone >= LT_REAL_N);
    if (useFake) {
      const fw = LT_FAKES[Math.floor(Math.random() * LT_FAKES.length)] ;
      cur = { kind: "know", word: fw, _fake: true, idx: seq, total: totalN };
      return;
    }
    const w = ltPick(ltBandPool(band), 1, used)[0];
    cur = w ? { kind: "know", word: w.word, _fake: false, _w: w, idx: seq, total: totalN } : null;
  }
  nextItem();

  return {
    current: () => cur,
    progress: () => ({ done: Math.min(seq, totalN), total: totalN }),
    canUndo: () => history.length > 0,
    undo() { if (history.length) restore(history.pop()); },
    answerKnow(knows) {
      if (!cur || cur.kind !== "know") return;
      snapshot();
      if (cur._fake) { fakeDone++; if (knows) fakeYes++; nextItem(); return; }
      if (!knows) { gradeReal(false); nextItem(); return; }
      pendingMeaning = cur._w; nextItem(); pendingMeaning = null;
    },
    answerMeaning(i) {
      if (!cur || cur.kind !== "meaning") return;
      snapshot();
      gradeReal(i === cur._answerIdx);
      nextItem();
    },
    answerProduce(text) {
      if (!cur || cur.kind !== "produce") return;
      snapshot();
      // 정확히 맞으면 만점, 오타(편집거리 1, 4글자 이상 단어만) 거의 만점, 유의어면 부분점수 —
      // 완전 정답이 아니어도 "말할 수 있는 단어"가 무조건 0으로 깔리지 않도록.
      const answer = (text || "").trim().toLowerCase();
      const target = cur._w.word.toLowerCase();
      const syns = (cur._w.syn || []).map(s => s.toLowerCase());
      let score = 0;
      if (answer) {
        // flatWord 비교 병행 — "carry-on"↔"carry on"↔"carryon" 같은 표기 차이는 만점,
        // 유의어도 언더스코어 표기("clog_up")와 사용자 입력("clog up")을 접어서 비교(2026-07-19)
        if (answer === target || flatWord(answer) === flatWord(target)) score = 1;
        else if (target.length >= 4 && editDistance(answer, target) <= 1) score = 0.85;
        else if (syns.some(s => s === answer || flatWord(s) === flatWord(answer))) score = 0.7;
      }
      const ok = score >= 1;
      produceLog.push({ ok, score });
      produceDone++;
      nextItem();
    },
    /* 종료 후 결과: 12밴드·추정 어휘량(인지/산출)·상위%(추정) */
    result() {
      const fa = fakeDone ? fakeYes / fakeDone : 0;
      // 능력치 = 궤적 후반(수렴 구간) 평균 → 6밴드 실수 → 12밴드
      const tail = trail.slice(-10);
      const band6f = tail.length ? tail.reduce((a, b) => a + b, 0) / tail.length : 0;
      const band12 = Math.max(0, Math.min(11, Math.round(band6f * 2)));
      // 밴드별 커버리지(방문 밴드는 실측+허수 보정, 미방문은 외삽) × 밴드 단어 수
      const counts = {};
      SEED.forEach(w => { counts[w.cefr] = (counts[w.cefr] || 0) + 1; });
      const visited = Object.keys(bandStat).map(Number);
      const lo = Math.min(...visited), hi = Math.max(...visited);
      let vocab = 0;
      CEFR_LEVELS.forEach((lv, b) => {
        let c;
        if (bandStat[b]) c = bandStat[b].ok / bandStat[b].n;
        else if (b < lo) c = 0.95;
        else if (b > hi) c = 0.05;
        else c = 0.5;
        c = fa >= 1 ? 0 : Math.max(0, (c - fa) / (1 - fa)); // 가짜단어 오인지율만큼 하향 보정(전부 오인지면 0)
        vocab += c * (counts[lv] || 0);
      });
      vocab = Math.round(vocab / 10) * 10;
      const produceRate = produceLog.length ? produceLog.reduce((s, p) => s + p.score, 0) / produceLog.length : 0;
      return {
        band12, band: LISTEN_LEVELS[band12],
        vocab, activeVocab: Math.round(vocab * produceRate / 10) * 10,
        pct: ltTopPercent(vocab, LT_DIST.vocab),
        falseAlarm: fa, produceRate,
      };
    },
  };
}

/* ---- Part B. 문장구사력 — v1은 어순 배열 스피드만(부분 측정) ----
   따라 말하기(EI)·순간영작은 STT/LLM 프록시(미구현) 필요 → 프록시 도입 후 확장.
   출제도 Part A처럼 적응형: A2에서 시작해 오탭 1개 이하로 완성하면 한 단계 위 문장,
   아니면 한 단계 아래 문장(고정 [A2,B1,B1,B2,B2] 순서였던 것을 2026-07-14 개정 —
   "맞으면 더 어려운 문제"가 체감되도록). 총 5문항. 채점: 밴드 궤적 + 단어당 속도 보정.

   UI 계약: const b = createLevelTestB();
   b.current() → null(종료) 또는 {band6, en, ko, words, shuffled}
   b.answer({ok, errors, seconds}) → 채점 기록 + 다음 문항으로(밴드 조정)
   b.progress() → {done, total} / b.report() → 결과 */
/* 칩 셔플 — 정답 어순 그대로 나오면(자명) 다시 섞는다. answer를 주면 답 조각의
   상대 순서가 정답과 같은 경우도 재셔플(허수가 섞여 있어도 답만 순서대로면 너무 쉬움). */
function ltShuffleChips(arr, answer) {
  const a = arr.slice();
  let guard = 0;
  do {
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  } while (answer && a.filter(x => answer.includes(x)).join(" ") === answer.join(" ") && guard++ < 8);
  return a;
}
/* 허수 칩 — 정답 조각 외에 헷갈리는 오답(시제 변형·조동사·관사·전치사)을 최대 3개.
   tapChip이 nextWord와 문자열로 비교하므로 허수는 절대 채택되지 않고 오탭(shake)만 유발. */
function ltDistractors(words) {
  const present = new Set(words.map(w => w.toLowerCase()));
  const out = [], outLower = new Set();
  const add = s => { const l = (s || "").toLowerCase(); if (!s || present.has(l) || outLower.has(l)) return; out.push(s); outLower.add(l); };
  // 1) 시제/굴절 변형 — 문장 속 굴절형에서 원형을 뽑아 "틀린 시제" 함정으로(played→play, making→make).
  //    e-탈락(landscaped→landscape) 등 애매한 경우는 후보를 여럿 만들고 실제 사전에 있는 형태만 채택(오탈자 방지).
  for (const w of words) {
    const cw = w.replace(/[^A-Za-z]/g, "");
    if (cw.length < 4 || /^[A-Z]/.test(w)) continue; // 문장 첫 단어·고유명사는 제외
    let cand = [];
    if (/ing$/.test(cw)) cand = [cw.slice(0, -3), cw.slice(0, -3) + "e"];
    else if (/ied$/.test(cw)) cand = [cw.slice(0, -3) + "y"];
    else if (/ies$/.test(cw)) cand = [cw.slice(0, -3) + "y"];
    else if (/ed$/.test(cw)) cand = [cw.slice(0, -2), cw.slice(0, -1)];
    else if (/es$/.test(cw)) cand = [cw.slice(0, -2), cw.slice(0, -1)];
    else if (/s$/.test(cw) && !/ss$/.test(cw) && !/us$/.test(cw)) cand = [cw.slice(0, -1)];
    const v = cand.find(c => c && c.length >= 3 && !present.has(c.toLowerCase()) && wordOf(c.toLowerCase()));
    if (v) { add(v); break; }
  }
  // 2) 관사·조동사·전치사 허수 — 문장에 없는 기능어 중 무작위로 채움
  const FUNCS = ["the", "a", "an", "to", "of", "in", "for", "did", "does", "will", "would", "have", "has", "was", "were", "is", "are", "not", "been", "be"];
  for (const f of ltShuffleChips(FUNCS)) { if (out.length >= 3) break; add(f); }
  return out.slice(0, 3);
}

const LT_B_N = 5;
function createLevelTestB() {
  const used = new Set();
  let band = 1; // A2 시작
  const logs = [];
  let cur = null;

  function makeItem(w, b) {
    const en = w.ex[0].en;
    const words = en.replace(/[.!?]$/, "").split(/\s+/);
    // 허수(distractor) 칩 — 정답 조각만 있으면 어순만 맞추면 돼 너무 쉬움. 시제·조동사·관사 등
    // 헷갈리는 오답 칩을 섞어 난이도를 올린다(사용자 지적). 탭하면 오탭(shake)으로만 처리되고
    // 답에는 들어가지 않음(tapChip이 nextWord와 문자열 비교 → 허수는 절대 일치 안 함).
    const shuffled = ltShuffleChips(words.concat(ltDistractors(words)), words);
    return { band6: b, en, ko: w.ex[0].ko, words, shuffled };
  }
  function pickSentence() {
    // 현재 밴드 우선, 풀이 비면 인접 밴드로 폴백
    for (const b of [band, band - 1, band + 1, band - 2, band + 2]) {
      if (b < 0 || b >= CEFR_LEVELS.length) continue;
      const pool = SEED.filter(w => w.cefr === CEFR_LEVELS[b] && w.ex && w.ex[0] && !used.has(w.word))
        .filter(w => { const n = w.ex[0].en.trim().split(/\s+/).length; return n >= 6 && n <= 9; });
      if (pool.length) {
        const w = pool[Math.floor(Math.random() * pool.length)];
        used.add(w.word);
        return makeItem(w, b);
      }
    }
    return null;
  }
  cur = pickSentence();

  return {
    current: () => cur,
    progress: () => ({ done: logs.length, total: LT_B_N }),
    answer(log) { // {ok, errors, seconds}
      if (!cur) return;
      logs.push({ band6: cur.band6, ok: !!log.ok, errors: log.errors || 0, seconds: log.seconds || 0, nWords: cur.words.length });
      // 적응 3단계(2026-07-20 재조정) — 오탭 0~1개(한 번에 맞춤·한 번 틀림)는 한 단계 위, 오탭 2개
      // (두 번 틀림)는 같은 단계 유지, 오탭 3개 이상(세 번 틀림)은 한 단계 강등. 예전엔 오탭 2개 이상이
      // 전부 "-1"로 뭉뚱그려져 있어서, 한 번만 크게 삐끗해도 다음 문장이 계속 쉬운 레벨에 머무는 것처럼
      // 느껴진다는 지적이 있었음 — "두 번까지는 봐주고, 세 번째부터 강등"으로 완충 구간을 둠.
      const errN = log.errors || 0;
      const delta = !log.ok ? -1 : errN <= 1 ? 1 : errN === 2 ? 0 : -1;
      band = Math.max(0, Math.min(CEFR_LEVELS.length - 1, band + delta));
      cur = logs.length >= LT_B_N ? null : pickSentence();
    },
    report() {
      const okLogs = logs.filter(l => l.ok && l.errors <= 1);
      let band6f;
      if (!okLogs.length) band6f = 0.5;
      else band6f = okLogs.reduce((a, l) => a + l.band6, 0) / okLogs.length;
      const spw = logs.length ? logs.reduce((a, l) => a + l.seconds / Math.max(1, l.nWords), 0) / logs.length : 3;
      if (spw <= 0.9) band6f += 0.5; else if (spw >= 2.2) band6f -= 0.5; // 자동화 속도 보정
      const band12 = Math.max(0, Math.min(11, Math.round(band6f * 2)));
      return { band12, band: LISTEN_LEVELS[band12], pct: ltTopPercent(band12, LT_DIST.flu), partial: true, spw };
    },
  };
}

/* 실측 지표 — 레벨 테스트 어휘(lex) 결과의 CEFR 밴드("B2+"→"B2")를 레벨 업 뱃지 티어로 매핑.

/* 보관함 티어 스트립 — 끊김 없이 계속 도는 벨트(2026-07-17). 티어가 5개뿐이라 화면을 거의
   채워 스크롤 여지가 거의 없던 것을, 같은 목록을 3벌 복제해 가운데 벌에서 시작하고, 스크롤이
   양끝 벌로 넘어가면 소리 없이 한 벌 폭만큼 되돌려 무한 루프처럼 보이게 한다. 탭은 그대로 동작. */
function MedalBelt({ cat, progress, onSelect }) {
  const ref = useRef(null);
  const tiers = cat.tiers;
  const loop = [...tiers, ...tiers, ...tiers];
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    // 홈(scrollLeft=0)에선 좌측 여백(패딩) 그대로 보이고, 스와이프해서 한 벌을 넘어가면
    // 소리 없이 한 벌 폭만큼 되돌려 패딩 없이 계속 도는 벨트처럼 보이게 한다.
    const per = tiers.length;
    const cells = el.querySelectorAll(".medal-cell");
    const oneW = () => (cells[per] ? cells[per].offsetLeft - cells[0].offsetLeft : el.scrollWidth / 3);
    el.scrollLeft = 0; // 홈: 좌측 여백 있는 원래 상태
    const onScroll = () => {
      const w = oneW();
      if (w > 0 && el.scrollLeft > w * 2) el.scrollLeft -= w;
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => el.removeEventListener("scroll", onScroll);
  }, [cat.k]);
  return (
    <div className="medal-strip belt" ref={ref}>
      {loop.map((tv, i) => {
        const idx = i % tiers.length;
        return (
          <div key={i} className="medal-cell">
            <BadgeMedal cat={cat} tierIdx={idx} earned={idx <= progress.tier} onClick={() => onSelect(idx)} />
            <span className="mth">{medalLabel(tv)}{cat.unit}</span>
          </div>
        );
      })}
    </div>
  );
}

/* 벨트 무한 루프 훅 — MedalBelt와 동일 로직 재사용. 홈(scrollLeft=0)은 좌측 여백,
   한 벌 넘어가면 소리 없이 되돌려 패딩 없이 계속 도는 벨트. */
function useBeltLoop(ref, perLen, dep) {
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const cells = el.querySelectorAll(".medal-cell");
    const oneW = () => (cells[perLen] ? cells[perLen].offsetLeft - cells[0].offsetLeft : el.scrollWidth / 3);
    el.scrollLeft = 0;
    const onScroll = () => {
      const w = oneW();
      if (w > 0 && el.scrollLeft > w * 2) el.scrollLeft -= w;
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => el.removeEventListener("scroll", onScroll);
  }, [dep]);
}

/* 뱃지 상세 — 카드는 고정, 동전(메달)만 뒤집기(탭 또는 밀기, 빠르게 밀면 관성으로 빙그르르).
   앞면=메달, 뒷면=블랙 원+획득일. 아래 랭크 스트립을 탭해 다른 티어 열람. sel={catKey,tierIdx}. */
function BadgeDetail({ sel, onClose }) {
  const cat = BADGE_CATS.find(c => c.k === sel.catKey);
  const prog = computeBadgeProgress()[sel.catKey];
  const [tierIdx, setTierIdx] = useState(sel.tierIdx);
  const [baseRot, setBaseRot] = useState(0); // 누적 회전(짝수*180=앞, 홀수*180=뒤)
  const [live, setLive] = useState(0);        // 드래그 중 추가 각도
  const [anim, setAnim] = useState(false);    // 손 뗀 뒤 정착 애니메이션
  const [spinning, setSpinning] = useState(false); // 빠르게 스와이프 후 관성 스핀 중(탭하면 멈춤)
  const drag = useRef(null);
  const spin = useRef({ angle: 0, vel: 0, raf: null });

  const earned = tierIdx <= prog.tier;
  const tier = BADGE_TIERS[tierIdx];
  const val = cat.tiers[tierIdx];

  useEffect(() => () => { if (spin.current.raf) cancelAnimationFrame(spin.current.raf); }, []);

  const tickSpin = () => {
    const s = spin.current;
    s.angle += s.vel * 16;
    s.vel *= 0.94; // 마찰 강화 — 예전 0.985는 너무 오래 빠르게 돌아 뒷면 글씨가 안 읽혔음(2026-07-17)
    setBaseRot(s.angle);
    if (Math.abs(s.vel) < 0.04) { stopSpin(s.angle); return; }
    s.raf = requestAnimationFrame(tickSpin);
  };
  const stopSpin = angleOverride => {
    if (spin.current.raf) cancelAnimationFrame(spin.current.raf);
    spin.current.raf = null;
    setSpinning(false);
    const angle = angleOverride != null ? angleOverride : spin.current.angle;
    setAnim(true);
    setBaseRot(Math.round(angle / 180) * 180);
  };
  const pickTier = i => { setTierIdx(i); setAnim(true); setBaseRot(Math.round(baseRot / 360) * 360); }; // 티어 바꾸면 앞면으로

  const onDown = e => {
    // 관성으로 도는 중에 터치하면 딱 정지(플립 없이) — 사용자가 "돌다가 한 번 터치하면 정지" 요청
    if (spinning) { stopSpin(); drag.current = null; return; }
    drag.current = { x: e.clientX, t: Date.now(), moved: false }; setAnim(false); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
  };
  const onMove = e => { if (drag.current) { const dx = e.clientX - drag.current.x; if (Math.abs(dx) > 4) drag.current.moved = true; setLive(dx * 0.7); } };
  const onUp = e => {
    if (!drag.current) return;
    const dx = e.clientX - drag.current.x;
    const wasTap = !drag.current.moved;
    const v = dx / Math.max(1, Date.now() - drag.current.t); // px/ms
    const dir = dx > 0 ? 1 : -1;
    drag.current = null;
    if (wasTap) { setAnim(true); setLive(0); setBaseRot(baseRot + 180); return; } // 탭 = 뒤집기
    if (Math.abs(v) > 0.55) {
      // 스핀 속도 하향(예전 *40, 캡 26은 잔상만 남고 뒷면이 안 읽힘) — 천천히 돌며 앞뒤가 보이게
      spin.current = { angle: baseRot + live, vel: dir * Math.min(Math.abs(v) * 16, 8), raf: null };
      setLive(0); setAnim(false); setSpinning(true);
      spin.current.raf = requestAnimationFrame(tickSpin);
    } else if (Math.abs(dx) > 40) {
      setAnim(true); setLive(0); setBaseRot(baseRot + dir * 180);
    } else {
      setAnim(true); setLive(0); setBaseRot(baseRot);
    }
  };

  return ReactDOM.createPortal(
    <div className="dlg-backdrop" onClick={onClose}>
      <div className="bd-card" onClick={e => { e.stopPropagation(); if (spinning) stopSpin(); }}>
        <div className="bd-title">{cat.title}</div>
        <div className="bd-coin-wrap">
          <div className="bd-coin"
            style={{ transform: `rotateY(${baseRot + live}deg)`, transition: anim ? "transform .55s cubic-bezier(.2,.7,.2,1)" : "none", touchAction: "pan-y" }}
            onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}>
            <div className="bd-coin-front"><BadgeMedal cat={cat} tierIdx={tierIdx} earned={earned} lg /></div>
            <div className="bd-coin-back">
              {earned ? (
                <React.Fragment>
                  <div className="bd-back-date">{prog.dates[tierIdx] || "달성"}</div>
                  <div className="bd-back-sub">달성일</div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div className="bd-back-date">미획득</div>
                  <div className="bd-back-sub">{medalLabel(val)}{cat.unit} 목표</div>
                </React.Fragment>
              )}
            </div>
          </div>
        </div>
        <div className="bd-tier" style={{ color: earned ? "var(--ink)" : "var(--muted)" }}>{tier.name} · {medalLabel(val)}{cat.unit}</div>
        <div className="bd-desc">{earned ? cat.desc(val) : "조건: " + cat.desc(val)}</div>
        <div className="bd-hint">뱃지를 탭하거나 밀어서 뒤집기</div>
        <div className="bd-ranks">
          {cat.tiers.map((tv, i) => (
            <div key={i} className={"bd-rank" + (i === tierIdx ? " cur" : "")}>
              <BadgeMedal cat={cat} tierIdx={i} earned={i <= prog.tier} sm onClick={() => pickTier(i)} />
              <span className="mth">{medalLabel(tv)}{cat.unit}</span>
            </div>
          ))}
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ===== 홈 히어로 씬 (2026-07-17): 걷는 고양이(Lottie) + 드래그 가능한 스티커 =====
   구 stage/badge-track(캐릭터 뒤 뱃지 롤링)/road/mlines/CharDoodle 폐기(PLAN 5.2.6).
   씬 전체를 하나의 Lottie로 굽지 않고 — 고양이+먼지 / 스마일(눈썹 모션)만 Lottie, 나머지 스티커는
   DOM 이미지 — 스티커를 개별로 드래그·교체·획득할 수 있어야 하므로. */
const HERO_V = "0.35.84";
// lottie-web(전역 window.lottie, img/hero/lottie.min.js)로 JSON을 컨테이너에 마운트.
function LottieBox({ src }) {
  const ref = useRef(null);
  useEffect(() => {
    let anim = null, cancelled = false, poll = null;
    const mount = () => {
      if (cancelled || !ref.current || !window.lottie) return;
      fetch(src).then(r => r.json()).then(data => {
        if (cancelled || !ref.current) return;
        anim = window.lottie.loadAnimation({ container: ref.current, renderer: "svg", loop: true, autoplay: true, animationData: data });
      }).catch(() => {});
    };
    if (window.lottie) mount();
    else { poll = setInterval(() => { if (window.lottie) { clearInterval(poll); poll = null; mount(); } }, 60);
           setTimeout(() => { if (poll) clearInterval(poll); }, 4000); }
    return () => { cancelled = true; if (poll) clearInterval(poll); if (anim) { try { anim.destroy(); } catch (e) {} } };
  }, [src]);
  return <div ref={ref} />;
}
// 3단계(날기) 전용 — 점프 인트로(cat_fly_intro.json, 1회 재생)를 먼저 재생하고 끝나면

function FlyCat({ onIntroEnd }) {
  const ref = useRef(null);

      // 예전엔 그냥 드래그 자체를 취소해버려서 "위치가 안 옮겨진다"는 버그였음(2026-07-18,
      // Playwright로 재현: 누르자마자 바로 움직이면 dx>10이 타이머보다 먼저 걸려 drag.current가
      // null이 됨). 취소 대신 그 자리에서 바로 드래그를 활성화하도록 변경 — 가만히 눌러 기다렸다가
      // 움직여도(롱프레스 선택), 누르자마자 바로 움직여도(일반 드래그) 둘 다 이동하게 됨.
      // 임계값 10→18px(2026-07-20) — 터치스크린은 가만히 탭해도 손끝이 몇 px씩 미세하게 흔들리는데,
      // 10px는 그 흔들림도 "드래그 시작"으로 잡아버려 탭을 하려다 자꾸 스티커가 살짝 밀리는(그리고
      // 그 순간 드래그 모드로 빠져 탭 선택은 못 하는) 원인이었음(사용자 지적 "자꾸 드래그됨").
      if (Math.abs(dx) > 18 || Math.abs(dy) > 18) { clearTimeout(d.timer); d.active = true; setDragId(d.id); setSelectedId(d.id); }
      else return;
    }
    e.preventDefault();
    let ncx = d.baseCx + (dx / d.rectW) * 100, ncy = d.baseCy + (dy / d.rectH) * 100;
    const mx = (50 / d.rectW) * 100, my = (50 / d.rectH) * 100;
    ncx = Math.max(-mx, Math.min(100 + mx, ncx)); ncy = Math.max(-my, Math.min(100 + my, ncy));

    // (320ms 타이머가 끝나기 전에 손을 뗀 보통의 탭) 선택(삭제·리사이즈 핸들 노출)이 전혀 안 되는
    // 버그였음(2026-07-20, "클릭이 잘 안 된다"는 지적). 탭이면 선택만 해준다.

     스티커를 캐릭터 뒤로 옮기면 캐릭터가 탭을 다 가로채 다시는 못 집던 문제. elementsFromPoint로
     그 지점의 최상위 스티커를 찾아 즉시 드래그 활성 상태로 인계받는다. 포인터 이벤트는 캐릭터
     히트영역에 잡혀 있으므로 window 레벨에서 move/up을 받고, iOS가 스크롤로 제스처를 뺏지 않도록

      startDragAt(clientX, clientY) {

        if (!s) return false;

        setDragId(s.id); setSelectedId(s.id);

        const up = () => { onUp(); endExternalDrag(); };

        window.addEventListener("pointerup", up);
        window.addEventListener("pointercancel", up);

    <>
      {allStickers.map(s => {

        const z = 3 + order.indexOf(s.id);

        return (
          <div key={s.id} data-sid={s.id} className={"hero-sticker" + (dragging ? " dragging" : " floaty") + (selected ? " selected" : "") + (s.type === "custom" ? " custom-frame" : "")}
            style={{ left: c.cx + "%", top: c.cy + "%", width: w + "%", zIndex: z, "--floatDur": s.floatDur + "s", "--floatRot": s.rot + "deg", aspectRatio: s.type === "custom" ? s.ratio : (s.type !== "img" ? "1 / 1" : undefined) }}
            onPointerDown={(e) => onDown(e, s)} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}>
            {s.type === "lottie" ? <LottieBox src={s.src} />
              : s.type === "badge" ? <div className="hero-badge-sticker"><BadgeMedal cat={s.cat} tierIdx={s.tierIdx} earned={s.earned} /></div>
              : s.type === "custom" ? <CustomStickerArt text={s.text} font={s.font} frame={s.frame} color={s.color} mode="fill" />
              : <img src={s.src} alt="" draggable={false} />}

              <>
                <div className="hero-sticker-del" onPointerDown={(e) => onDelete(e, s)}>
                  <Icon name="close" size={14} />
                </div>
                <div className="hero-sticker-resize" onPointerDown={(e) => onResizeDown(e, s)} onPointerMove={onResizeMove} onPointerUp={onResizeUp} onPointerCancel={onResizeUp}>
                  <Icon name="resize" size={14} />
                </div>
              </>
            )}
          </div>
        );
      })}
    </>
  );
}

  const weekHues = useMemo(() => {

  const monthSpans = useMemo(() => {

       학습일 수(0~7)를 집계해 그 열의 5칸을 아래에서부터 채우고, 강도(light/base/dark)는 그 주 학습일 수로,
       색은 그 주가 속한 달의 형광펜 색(weekHues)으로 표현. 학습 없는 주는 빈칸. */
    const studied = ACT.studiedDates();

  return (
    <div className="content">
      {/* 홈 히어로: 항상 걷는 고양이(Lottie) + 드래그 스티커. 캐릭터 선택 여부와 무관하게 표시. */}
      <HeroScene onOpenDecorate={() => setDecorateOpen(true)} decorateVersion={decorateVersion} stage={stage} />
      {decorateOpen && (
        <DecorateNoteModal charK={charK} onChangeChar={onChangeChar}
          onClose={() => setDecorateOpen(false)}
          onStickersChanged={() => setDecorateVersion(v => v + 1)} />
      )}

      {lastLt ? (() => {
        // 레벨 테스트 실제 기록에서 그대로 읽음 — 실제로 테스트를 다시 보면 이 3칸도 그 결과로 즉시 갱신된다.
        const lex = lastLt.lex;
        const lexBase = lex.band.replace("+", "");
        const pctHl = lex.pct <= 10 ? "blue" : lex.pct <= 25 ? "pink" : lex.pct <= 50 ? "yellow" : "green";
        return (
          <div className="level-row" onClick={onOpenLtResult}>
            {/* 형광펜 색은 cefrHl 하이어라키 규칙 공유(A1·A2=연두, B1·B2=옐로우, C1=핑크, C2=블루),
                백분위는 상위 구간일수록 상급 색(<=10 블루·<=25 핑크·<=50 옐로우·그외 연두)로 매핑. */}
            <div className={"stat tier-" + cefrHl(lexBase)}><div className="v"><span className={"hl hl-" + cefrHl(lexBase)} style={{ transform: "rotate(-1.5deg)" }}>{lex.band}</span></div><div className="l">CEFR 레벨</div></div>
            <div className={"stat tier-" + cefrHl(lexBase)}><div className="v"><span className={"hl hl-" + cefrHl(lexBase)} style={{ transform: "rotate(1deg)" }}>{lex.vocab.toLocaleString()}</span></div><div className="l">추정 어휘량</div></div>
            <div className={"stat tier-" + pctHl}><div className="v"><span className={"hl hl-" + pctHl} style={{ transform: "rotate(-1deg)" }}>상위 {lex.pct}%</span></div><div className="l">백분위</div></div>
          </div>
        );
      })() : (
        // 레벨테스트 미실시(실사용자 기본 상태, 2026-07-20 데모 폴백 제거) — 결과 대신 시작 유도.
        <div className="level-row level-empty" onClick={onStartLevelTest}>
          <div className="stat" style={{ gridColumn: "1 / -1", padding: "18px 14px" }}>
            <div className="l" style={{ fontSize: 13, fontWeight: 700 }}>레벨 테스트를 보면 내 CEFR 레벨·어휘량·백분위가 여기 표시돼요</div>
          </div>
        </div>
      )}

      <div className="sec">오늘의 루틴</div>
      {routine.map(s => (
        <div key={s.n}
             className={"step" + (s.state === "active" ? " active" : "") + (s.state === "done" ? " done" : "")}
             onClick={() => (s.direct ? s.start() : onGoTab(s.tab))}>
          <div className="step-ico round">{s.state === "done" ? <Icon name="check" size={20} /> : s.n}</div>
          <div className="step-body">
            <div className="step-title">{s.title}</div>
            <div className="step-sub">{s.sub}</div>
          </div>
          <div className="step-cta">
            {s.state === "done" ? <span className="check">완료</span> : s.state === "active" ? "이어서" : "시작"}
          </div>
        </div>
      ))}

      <div className="sec">학습 캘린더 <span className="more">최근 17주</span></div>
      <div className="card" style={{ padding: "16px" }}>
        <div className="grass-months">
          {monthSpans.map((m, i) => <span key={i} style={{ flex: m.span }}>{MONTH_NAMES_EN[m.month]}</span>)}
        </div>
        <div className="grass">{grass.map((c, i) => <i key={i} style={c ? { backgroundColor: c } : undefined} />)}</div>
      </div>
    </div>
  );
}

/* 문법 태그 칩(2026-07-19, docs/PLAN.md 2.5) — 예문 하나에 detectGrammar()를 1회 호출해 매칭된
   태그를 알약으로. openVocabWord처럼 화면마다 재구현하지 않는 공용 컴포넌트 — 사전 예문(이 파일의
   첫 적용처)뿐 아니라 회화·작문·딕테이션 예문에도 그대로 재사용할 것. */
function GrammarChips({ text, onTap }) {
  const tags = useMemo(() => (text ? detectGrammar(text) : []), [text]);
  if (!tags.length) return null;
  return (
    <div className="gram-chips">
      {tags.map(id => (
        <button key={id} className="gram-chip" onClick={e => { e.stopPropagation(); onTap(id); }}>
          {GRAMMAR_TAGS[id].name_kr}
        </button>
      ))}
    </div>
  );
}
/* 문법 태그 설명 시트 — 탭한 칩의 desc_kr+예문. 기존 sheet-backdrop/sheet 패턴 재사용(새 모달 계층 안 만듦). */
function GrammarTagSheet({ tagId, onClose }) {
  const g = GRAMMAR_TAGS[tagId];
  if (!g) return null;
  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          <b>문법 포인트</b>
          <span className="sp" />
          <button className="back" onClick={onClose} aria-label="닫기"><Icon name="close" size={20} /></button>
        </div>
        <div className="sheet-body">
          <div className="gram-sheet-cat">{g.category}</div>
          <div className="gram-sheet-name">{g.name_kr}</div>
          <div className="gram-sheet-desc">{g.desc_kr}</div>
          <div className="wd-ex" onClick={() => speakText(g.example.en)}>
            <div className="en">{g.example.en}</div>
            <div className="ko">{g.example.ko}</div>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

/* 예문 속 단어를 개별 칩으로 — 사전에 있는 단어만 탭하면 그 단어 상세로 스택 진입(타고타고).
   문장 클릭(발음 재생)과 겹치므로 단어 클릭은 stopPropagation.
   단어 부분은 정규식 match()로 한 번에 찾아서(위치+길이를 그 매치 자체에서 가져옴) lead/trail을
   슬라이스한다 — 예전엔 replace()로 따로 "clean"을 만들고 그 길이로 trail 위치를 계산했는데,
   곱슬따옴표(’, U+2019)처럼 매치 밖 문자가 clean에서만 제거되면 clean.length가 원본 부분 문자열
   길이보다 짧아져서 trail이 엉뚱한 위치부터 시작 — 끝 글자가 중복돼 "I've"가 "Ivee"로 깨졌다
   (2026-07-18, Gemini가 곱슬따옴표를 흔히 써서 회화 말풍선에서 실제로 겪음). */
function ExampleWords({ text, onOpen }) {
  const parts = text.split(/(\s+)/);
  return parts.map((p, idx) => {
    if (!p || /^\s+$/.test(p)) return p;
    // 하이픈 합성어는 통째로 한 토큰 — 예전 /[A-Za-z'’]+/는 하이픈에서 끊겨 "duty-free"에서
    // "duty"만 링크가 됐음(2026-07-19). 통째로는 사전에 없으면 첫 조각으로 폴백(기존 동작 보존).
    const m = p.match(/[A-Za-z'’]+(?:-[A-Za-z'’]+)*/);
    if (!m) return p;
    let tok = m[0];
    let w = wordOfFlat(tok.replace(/[’‘]/g, "'").toLowerCase());
    if (!w && tok.indexOf("-") >= 0) {
      tok = tok.split("-")[0];
      w = wordOf(tok.replace(/[’‘]/g, "'").toLowerCase());
    }
    if (!w) return p;
    const lead = p.slice(0, m.index);
    const trail = p.slice(m.index + tok.length);
    return (
      <React.Fragment key={idx}>
        {lead}<span className="ex-word" onClick={ev => { ev.stopPropagation(); onOpen(w.word); }}>{tok}</span>{trail}
      </React.Fragment>
    );
  });
}

/* ---------- 단어 상세 바텀시트 (팝업 → 타고타고 모달 스택) ---------- */
/* 다의어 상한선: 실사전은 뜻이 수십 개인 단어(run, set 등)가 있어 기본 노출을 제한 */
const SENSE_CAP = 6;

function WordSheet({ stack, onPush, onPop, onClose }) {
  const top = stack[stack.length - 1];
  // 어근 칩("타고타고")은 사전 탭으로 이동하는 대신 이 모달 스택 안에 목록 패널을 하나 더 쌓는다
  // (2026-07-20) — 예전엔 탭을 강제 전환해서, 학습카드 세션 중 어근 칩을 누르면 세션이 통째로
  // 중단됐음(learn 탭이 unmount됨). 스택 항목은 단어(문자열) 또는 {root:affix}(어근 목록) 둘 중 하나.
  const isRootView = top && typeof top === "object" && top.root;
  const word = isRootView ? null : top;
  const w = word ? wordOf(word) : null;
  const [senseOpen, setSenseOpen] = useState(0); // 다의어: 첫 의미 펼침
  const [showAllSenses, setShowAllSenses] = useState(false);
  const [, bump] = useState(0); // 즐겨찾기·내 단어장 토글 리렌더용
  const [showPicker, setShowPicker] = useState(false);
  const [grammarSheet, setGrammarSheet] = useState(null); // 탭한 문법 태그 id — 설명 시트 오픈
  useEffect(() => { setSenseOpen(0); setShowAllSenses(false); }, [word]);
  // 어원 탐험 뱃지(roots) 실데이터 — 이 단어의 어근(affix)을 열람한 것으로 기록(단어 바뀔 때마다).
  useEffect(() => { if (w && w.roots) w.roots.forEach(r => r && r.affix && ACT.addRoot(r.affix)); }, [word]);
  // 내가 추가한 단어 자동 조회(Free Dictionary → Gemini 폴백) — pending일 때만, word가 바뀔 때 한 번
  useEffect(() => {
    if (w && w.mine && w.lookupStatus === "pending") {
      autoLookupWord(w.word).then(() => bump(v => v + 1));
    }
    // eslint-disable-next-line
  }, [word]);
  const retryLookup = () => { EXTRA[word].lookupStatus = "pending"; saveExtra(); bump(v => v + 1); autoLookupWord(word).then(() => bump(v => v + 1)); };
  const speak = useCallback(speakText, []);
  // 유의어/반의어 칩(2026-07-20 정비): 데이터엔 "on_time"처럼 언더스코어로 저장되지만 표시는
  // 공백으로("on time") — CardSession의 qsyn 칩과 동일 규칙. 우리 사전에 없는 단어는 비활성 칩
  // 색(.lchip 기본, .link 아님)은 그대로 두되 외부링크 아이콘을 달아 네이버 사전으로 연결한다
  // (아예 안 눌리는 죽은 버튼이었던 것 개선).
  const Chip = ({ label }) => {
    const shown = label.replace(/_/g, " ");
    if (wordOf(label)) return <button className="lchip link" onClick={() => onPush(label)}>{shown}</button>;
    return (
      <a className="lchip ext" target="_blank" rel="noopener noreferrer"
         href={"https://en.dict.naver.com/#/search?query=" + encodeURIComponent(shown)}>
        {shown}<Icon name="open_in_new" size={11} />
      </a>
    );
  };
  if (isRootView) {
    const { gloss, ws } = wordsByRoot(top.root);
    return ReactDOM.createPortal(
      <div className="sheet-backdrop" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <div className="sheet-grab" />
          <div className="sheet-head">
            {stack.length > 1
              ? <button className="back" onClick={onPop} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
              : <span style={{ width: 8 }} />}
            <span className="sp" />
            <button className="back" onClick={onClose} style={{ marginLeft: 4 }} aria-label="닫기"><Icon name="close" size={20} /></button>
          </div>
          <div className="sheet-body">
            <div className="wd-top">
              <span className="wd-word">{top.root}</span>
              {gloss && <span className="wd-ipa">{gloss}</span>}
            </div>
            <div className="wd-sec-t">이 어근을 포함한 단어 {ws.length}개</div>
            <WList list={ws} onOpen={onPush} />
          </div>
        </div>
      </div>,
      document.body
    );
  }
  if (!w) return null;
  // 이 단어가 이미 담긴 내 단어장 목록 — 있으면 헤더 버튼에 리스트명을 노출(2026-07-20).
  const inLists = WORDLISTS.filter(l => l.words.includes(w.word));
  const favLabel = inLists.length === 0 ? "내 단어장"
    : inLists.length === 1 ? `${inLists[0].name}에 담긴 단어`
    : `${inLists[0].name} 외 ${inLists.length - 1}개에 담긴 단어`;
  // 공백 포함 표제어("carry on")·아포스트로피("driver's license")가 URL에 그대로 들어가 링크가
  // 깨지지 않도록 인코딩(2026-07-19). Cambridge는 구동사 URL이 하이픈 관례라 공백→하이픈으로.
  const ext = q => [
    ["네이버", `https://en.dict.naver.com/#/search?query=${encodeURIComponent(q)}`],
    ["Cambridge", `https://dictionary.cambridge.org/dictionary/english/${encodeURIComponent(q.replace(/\s+/g, "-"))}`],
    ["Etymonline", `https://www.etymonline.com/word/${encodeURIComponent(q)}`],
  ];
  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          {stack.length > 1
            ? <button className="back" onClick={onPop} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
            : <span style={{ width: 8 }} />}
          <span className="sp" />
          <button className={"fav" + (inLists.length ? " saved" : "")} onClick={() => setShowPicker(true)}>{favLabel}</button>
          <button className={"favstar" + (FAVS.has(w.word) ? " on" : "")} onClick={() => { toggleFav(w.word); bump(v => v + 1); }} aria-label="즐겨찾기">
            <Icon name="star" size={22} />
          </button>
          <button className="back" onClick={onClose} style={{ marginLeft: 4 }} aria-label="닫기"><Icon name="close" size={20} /></button>
        </div>
        {showPicker && (
          <ListPicker words={[w.word]} onClose={() => setShowPicker(false)} onChanged={() => bump(v => v + 1)} />
        )}
        <div className="sheet-body">
          <div>
            <div className="wd-top">
              <span className="wd-word">{w.word}</span>
              <span className="wd-ipa">{w.ipa}</span>
              <button className="wd-play" onClick={() => speak(w.word)}><Icon name="volume_up" size={15} /> 발음 듣기</button>
            </div>
            {w.lookupStatus === "pending" ? (
              <div className="wd-lookup" style={{ marginTop: 6 }}>뜻·예문 불러오는 중…</div>
            ) : w.lookupStatus === "error" ? (
              <div className="wd-lookup err" style={{ marginTop: 6 }}>
                뜻·예문을 불러오지 못했어요.
                <button className="wd-retry" onClick={retryLookup}>다시 시도</button>
              </div>
            ) : (
              <React.Fragment>
                <div className="wd-pos" style={{ marginTop: 6 }}>
                  <span className={"tag lv tier-" + cefrHl(w.cefr)} style={{ marginRight: 6 }}>{w.cefr}</span>
                  {w.pos && w.pos.length > 0 && w.pos.map(p => (
                    <span key={p} className="tag" style={{ marginRight: 6 }}>{POS_KO[p] || p}</span>
                  ))}
                  {w.senses && w.senses.length ? <span className="tag sensecount">뜻 {w.senses.length}개</span> : w.ko}
                </div>
                {!(w.senses && w.senses.length) && <div className="wd-en" style={{ marginTop: 4 }}>{w.en}</div>}
              </React.Fragment>
            )}
          </div>

          {w.lookupStatus === "pending" || w.lookupStatus === "error" ? null : w.senses && w.senses.length ? (
            /* 다의어: 의미별 카드 — 뜻마다 별도 예문·별도 학습 단위.
               뜻이 많은 단어(예: run·set 수십 개 의미)에서 목록이 무한정 길어지지 않도록
               기본 SENSE_CAP개만 보여주고 나머지는 '더보기'로 펼친다. */
            <div>
              <div className="wd-sec-t">의미별로 학습해요 (탭해서 펼치기)</div>
              {(showAllSenses ? w.senses : w.senses.slice(0, SENSE_CAP)).map((s, i) => (
                <div key={i} className={"sense" + (senseOpen === i ? " open" : "")}
                     onClick={() => setSenseOpen(senseOpen === i ? -1 : i)}>
                  <div className="s-head">
                    <div>
                      <div className="s-cue">{s.cue}</div>
                      <div className="s-ko">{s.ko}</div>
                    </div>
                    <div className="s-meta">
                      <span className="tag">{s.pos}</span>
                      <span className="tag lv">{s.cefr || ("레벨 " + s.lv)}</span>
                    </div>
                  </div>
                  {senseOpen === i && (
                    <React.Fragment>
                      <div className="s-en">{s.en}</div>
                      {(s.ex || []).map((e, j) => (
                        <div className="wd-ex" key={j} onClick={ev => { ev.stopPropagation(); speak(e.en); }}>
                          <div className="en-row">
                            <div className="en"><ExampleWords text={e.en} onOpen={onPush} /></div>
                            <span className="wd-ex-play" aria-label="예문 발음 듣기"><Icon name="volume_up" size={14} /></span>
                          </div>
                          <div className="ko">{e.ko}</div>
                          <GrammarChips text={e.en} onTap={id => setGrammarSheet(id)} />
                        </div>
                      ))}
                      <button className={"s-add" + (SRS.get(w.word + "#" + i) ? " added" : "")}
                              onClick={ev => { ev.stopPropagation(); if (SRS.markForStudy(w.word + "#" + i)) bump(v => v + 1); }}>
                        {SRS.get(w.word + "#" + i) ? "✓ 학습에 추가됨" : "+ 이 의미를 학습에 추가"}
                      </button>
                    </React.Fragment>
                  )}
                </div>
              ))}
              {!showAllSenses && w.senses.length > SENSE_CAP && (
                <button className="s-more" onClick={() => setShowAllSenses(true)}>
                  + {w.senses.length - SENSE_CAP}개 뜻 더보기
                </button>
              )}
            </div>
          ) : (
            <div className="wd-ex-wrap">
              <div className="wd-sec-t">예문</div>
              {w.ex.map((e, i) => (
                <div className="wd-ex" key={i} onClick={() => speak(e.en)}>
                  <div className="en-row">
                    <div className="en"><ExampleWords text={e.en} onOpen={onPush} /></div>
                    <span className="wd-ex-play" aria-label="예문 발음 듣기"><Icon name="volume_up" size={14} /></span>
                  </div>
                  <div className="ko">{e.ko}</div>
                  <GrammarChips text={e.en} onTap={id => setGrammarSheet(id)} />
                </div>
              ))}
            </div>
          )}
          {grammarSheet && <GrammarTagSheet tagId={grammarSheet} onClose={() => setGrammarSheet(null)} />}

          {(w.syn.length > 0 || w.ant.length > 0) && (
            <div>
              <div className="wd-sec-t">유의어 · 반의어</div>
              <div className="wd-chips">
                {w.syn.map(s => <Chip key={s} label={s} />)}
                {w.ant.map(a => <Chip key={a} label={a} />)}
              </div>
            </div>
          )}

          {w.forms.length > 0 && (
            <div>
              <div className="wd-sec-t">같은 단어, 다른 품사</div>
              <div className="wd-chips">
                {w.forms.map(f => (
                  wordOf(f.word)
                    ? <button key={f.word} className="lchip link" onClick={() => onPush(f.word)}>{f.word}<span className="g">{f.pos}</span></button>
                    : <span key={f.word} className="lchip">{f.word}<span className="g">{f.pos}</span></span>
                ))}
              </div>
            </div>
          )}

          {w.roots.length > 0 && (
            <div>
              <div className="wd-sec-t">어근 · 접사</div>
              <div className="wd-chips">
                {w.roots.map(r => (
                  <button key={r.affix} className="lchip affix" onClick={() => onPush({ root: r.affix })}>
                    {r.affix}<span className="g" style={{ color: "rgba(255,251,241,.62)" }}>{r.gloss}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          <div>
            <div className="wd-sec-t">외부 사전</div>
            <div className="ext">
              {ext(w.word).map(([label, url]) => (
                <a key={label} href={url} target="_blank" rel="noopener noreferrer">{label}</a>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ---------- 사전 탭 ---------- */
/* 진입 시 목록을 쏟아내지 않고 허브(메뉴)에서 선택해 들어가는 구조.
   검색은 어느 화면에서든 최상단 — 입력을 시작하면 즉시 검색 결과로 전환. */
const CEFR_LEVELS = ["A1", "A2", "B1", "B2", "C1", "C2"];
/* 형광펜 하이어라키 규칙(낮음→높음, 2026-07-20 재정렬): 핑크(A1·A2, 입문) → 옐로우(B1·B2, 중급) →
   초록(C1, 고급) → 블루(C2, 최상급) — 앱 전체가 공유하는 성취 위계(streakHl·dueCardHl·scoreHl·뱃지
   티어와 같은 순서: 핑크<옐로우<초록<블루)에 맞춘 것. 예전엔 연두<옐로우<핑크<블루라는 별도 순서를
   써서, 레벨테스트 결과 화면처럼 이 위계(CEFR 밴드 칩)와 다른 위계(분석 텍스트의 좋음/나쁨 tier)가
   같은 화면에 같이 뜰 때 같은 색(예: 핑크)이 서로 반대 의미로 쓰여 "임의로 칠해진 것처럼" 보였음.
   뱃지·레벨 강조·카테고리 카드 등 "레벨/난이도"를 표시하는 곳은 전부 이 규칙을 공유한다. */
function cefrHl(lv) {
  return lv === "A1" || lv === "A2" ? "pink" : lv === "B1" || lv === "B2" ? "yellow" : lv === "C1" ? "green" : "blue";
}

/* 복습까지 남은 일수 → 잉크 위계(잔디 히트맵과 같은 원리) — 긴박할수록(임박할수록) 더 진한 잉크. */
function dueUrgencyCls(dueIn) {
  return dueIn <= 0 ? "due-t0" : dueIn <= 2 ? "due-t1" : dueIn <= 5 ? "due-t2" : "due-t3";
}

function WordRow({ w, onOpen, pickMode, picked, onTogglePick }) {
  const st = wordStatus(w);
  const multi = w.senses && w.senses.length > 1;
  return (
    <div className="wrow" onClick={() => (pickMode ? onTogglePick(w.word) : onOpen(w.word))}>
      {pickMode && <span className={"wchk" + (picked ? " on" : "")}>{picked && <Icon name="check" size={13} />}</span>}
      <div>
        <div className="w">{w.word}</div>
        <div className="k">{multi ? w.senses[0].ko + " 외 " + (w.senses.length - 1) + "개 뜻" : w.lookupStatus === "pending" ? "뜻 불러오는 중…" : w.lookupStatus === "error" ? "뜻을 불러오지 못했어요" : w.ko}</div>
      </div>
      {/* 뱃지는 최대 2줄 — CEFR은 윗줄 단독, 뜻·상태(완료/복습)는 아랫줄에 같이(2026-07-17) */}
      <div className="meta">
        <div className="meta-line"><span className={"tag lv tier-" + cefrHl(w.cefr)}>{w.cefr}</span></div>
        <div className="meta-line">
          {multi && <span className="tag sensecount">뜻 {w.senses.length}개</span>}
          {w.mine && <span className="tag mine">내 단어</span>}
          {st?.status === "done" && <span className="tag done">완료</span>}
          {st?.status === "learning" && <span className={"tag " + dueUrgencyCls(st.dueIn)}>{st.dueIn === 0 ? "오늘 복습" : st.dueIn + "일 뒤 복습"}</span>}
          {!st && !w.mine && <span className="tag">미학습</span>}
        </div>
      </div>
    </div>
  );
}

/* 긴 목록 분할 렌더 — 한 번에 다 그리면(레벨당 1,000+행) 프리즈되므로 "더 보기"로 나눔 */
const LIST_CHUNK = 100;
function WList({ list, onOpen, pickMode, picked, onTogglePick }) {
  const [limit, setLimit] = useState(LIST_CHUNK);
  useEffect(() => setLimit(LIST_CHUNK), [list]);
  return (
    <div className="wlist">
      {list.slice(0, limit).map(w => (
        <WordRow key={w.word} w={w} onOpen={onOpen}
          pickMode={pickMode} picked={picked && picked.has(w.word)} onTogglePick={onTogglePick} />
      ))}
      {list.length === 0 && <div className="empty-note">아직 여기에 단어가 없어요.</div>}
      {list.length > limit && (
        <button className="more-btn" onClick={() => setLimit(l => l + LIST_CHUNK * 2)}>
          더 보기 ({list.length - limit}개 남음)
        </button>
      )}
    </div>
  );
}

/* 단어(들)를 내 단어장(커스텀 리스트)에 담는 공용 다이얼로그 — 사전 다중선택, 단어 상세 모달에서 공용 */
function ListPicker({ words, onClose, onChanged }) {
  const [newName, setNewName] = useState("");
  const commit = id => { addToWordlist(id, words); onChanged(); onClose(); };
  const createAndCommit = () => {
    if (!newName.trim()) return;
    const list = createWordlist(newName);
    commit(list.id);
  };
  return ReactDOM.createPortal(
    <div className="dlg-backdrop" onClick={onClose}>
      <div className="dlg" onClick={e => e.stopPropagation()}>
        <div className="dlg-title">리스트에 담기</div>
        <div className="dlg-sub">{words.length}개 단어</div>
        {WORDLISTS.length === 0 ? (
          <div className="empty-note" style={{ margin: "10px 0" }}>아직 만든 리스트가 없어요.</div>
        ) : (
          <div className="wl-picklist">
            {WORDLISTS.map(l => (
              <button key={l.id} className="rootrow" onClick={() => commit(l.id)}>
                <span className="ax" style={{ minWidth: 0, flex: 1 }}>{l.name}</span>
                <span className="n">{l.words.length}개 ›</span>
              </button>
            ))}
          </div>
        )}
        <div className="wl-newrow">
          <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="새 리스트 이름 (예: 비즈니스용)" autoCapitalize="none" />
          <button onClick={createAndCommit}>만들기</button>
        </div>
        <button className="ghost" style={{ width: "100%", marginTop: 12, padding: 12, borderRadius: 0, background: "var(--fill)", color: "var(--ink-2)", fontWeight: 700 }} onClick={onClose}>닫기</button>
      </div>
    </div>,
    document.body
  );
}

const CEFR_NAMES = { A1: "입문", A2: "초급", B1: "중급", B2: "중상급", C1: "고급", C2: "최상급" };

function Dict({ onOpen, onStudyList, viewJump, onConsumeViewJump }) {
  const [q, setQ] = useState("");
  const [view, setView] = useState(null);      // null=허브 | learned|category|fav|mine|add
  const [catMode, setCatModeState] = useState("cefr"); // cefr | root
  const [catSel, setCatSel] = useState(null);   // 선택된 레벨(A1) 또는 어근(-tion) — null이면 선택 화면
  const setCatMode = m => { setCatModeState(m); setCatSel(null); setRootQuery(""); };
  const [, bump] = useState(0);                 // EXTRA·즐겨찾기·내 단어장 변경 리렌더용
  const [listSel, setListSel] = useState(null); // 내 단어장 안에서 연 리스트 id ("__added__"=직접 등록한 단어)
  const [newListName, setNewListName] = useState("");
  const [pickMode, setPickMode] = useState(false); // 단어 목록 다중선택(담기) 모드
  const [picked, setPicked] = useState(() => new Set());
  const [showPicker, setShowPicker] = useState(false); // 리스트 선택 다이얼로그
  const [rootQuery, setRootQuery] = useState(""); // 카테고리 > 어근별 목록 내 필터(어근·뜻)
  const [learnedMode, setLearnedMode] = useState("date"); // 내가 학습한 단어: date(날짜별) | status(상태별)

  // 보관함에서 즐겨찾기/내 단어장 바로가기로 넘어온 경우: 허브를 거치지 않고 해당 뷰로 바로 진입
  useEffect(() => {
    if (!viewJump) return;
    setQ(""); setListSel(null); setView(viewJump);
    onConsumeViewJump && onConsumeViewJump();
    // eslint-disable-next-line
  }, [viewJump]);

  const words = allWords();
  const learned = words.filter(w => wordStatus(w));
  const favs = words.filter(w => FAVS.has(w.word));
  const mine = Object.values(EXTRA);

  // 학습한 단어를 마지막 학습 날짜(SRS at)로 묶어 최신순으로 — "날짜별" 뷰용(2026-07-17)
  const learnedByDate = useMemo(() => {
    const g = {};
    learned.forEach(w => {
      const keys = (w.senses && w.senses.length) ? w.senses.map((_, i) => w.word + "#" + i) : [w.word];
      let at = 0;
      keys.forEach(k => { const s = SRS.get(k); if (s && s.at && s.at > at) at = s.at; });
      const d = at ? new Date(at) : null;
      const label = d ? `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}` : "날짜 미상";
      (g[label] = g[label] || []).push(w);
    });
    return Object.entries(g).sort((a, b) => (a[0] === "날짜 미상" ? 1 : b[0] === "날짜 미상" ? -1 : b[0].localeCompare(a[0])));
  }, [learned.length]);

  const query = q.trim().toLowerCase();
  // flatWord prefix 매칭 병행 — "carry on"·"carryon"으로 "carry-on"을, "duty free"로
  // "duty-free"를 찾을 수 있게(2026-07-19, 구분 기호가 다르면 검색이 안 되던 문제).
  const flatQ = flatWord(query);
  const hits = query ? words.filter(w => {
    const lw = w.word.toLowerCase();
    return lw.startsWith(query) || (flatQ && flatWord(lw).startsWith(flatQ));
  }).sort((a, b) => a.word.localeCompare(b.word)) : [];
  const noHit = query && hits.length === 0;
  // 표제어는 원형만 수록되므로 children/ran 같은 굴절형 검색은 표제어로 역추적해 안내.
  // prefix 일치(ran→range 등)가 있어도, 검색어 자체가 표제어가 아니고 변화형이면 최상단에 안내
  const lemma = query && !wordOf(query) ? dictLookup(query) : null;
  const lemmaHit = lemma && lemma.word !== query ? lemma : null;

  const addWord = name => {
    const key = name.trim().toLowerCase();
    if (!key || wordOf(key)) return;
    EXTRA[key] = { word: key, ipa: "", pos: [], cefr: "—", ko: "", en: "", syn: [], ant: [], forms: [], roots: [], ex: [], mine: true, lookupStatus: "pending" };
    saveExtra(); bump(x => x + 1);
    setQ(""); onOpen(key);
  };

  const MENUS = [
    { k: "add", icon: "add", title: "새 단어 등록하기", sub: "사전에 없는 단어도 내 단어로" },
    { k: "learned", icon: "school", title: "내가 학습한 단어", sub: learned.length + "개 · SRS 진행 상태별" },
    { k: "category", icon: "grid_view", title: "카테고리별로 보기", sub: "레벨(CEFR) · 어근별 · 주제(예정)" },
    { k: "fav", icon: "star", title: "즐겨찾기한 단어", sub: favs.length + "개" },
    { k: "mine", icon: "bookmark", title: "내 단어장", sub: "내가 만든 리스트 " + WORDLISTS.length + "개" },
  ];
  const TITLES = { learned: "내가 학습한 단어", category: "카테고리별", fav: "즐겨찾기", mine: "내 단어장", add: "새 단어 등록" };

  const togglePick = w => setPicked(s => { const n = new Set(s); n.has(w) ? n.delete(w) : n.add(w); return n; });
  const togglePickMode = () => { setPickMode(v => !v); setPicked(new Set()); };
  const rows = list => <WList list={list} onOpen={onOpen} pickMode={pickMode} picked={picked} onTogglePick={togglePick} />;
  const pickToggleBtn = (
    <button className="chip" style={{ marginLeft: "auto" }} onClick={togglePickMode}>{pickMode ? "선택 취소" : "담기"}</button>
  );
  const pickBar = pickMode && (
    <div className="addbar">
      <div className="t">{picked.size > 0 ? `${picked.size}개 선택됨` : "담을 단어를 선택하세요"}</div>
      <button disabled={picked.size === 0} style={picked.size === 0 ? { opacity: .5 } : undefined} onClick={() => setShowPicker(true)}>리스트에 담기</button>
    </div>
  );

  const catList = level => words.filter(w => w.cefr === level).sort((a, b) => a.word.localeCompare(b.word));
  const rootIndex = useMemo(() => {
    const m = {};
    words.forEach(w => (w.roots || []).forEach(r => { (m[r.affix] = m[r.affix] || { gloss: r.gloss, ws: [] }).ws.push(w); }));
    return Object.entries(m).sort((a, b) => b[1].ws.length - a[1].ws.length);
  }, [words.length]);

  return (
    <div className="content">
      <div className="search">
        <span className="mag"><Icon name="search" size={20} /></span>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="단어를 검색하세요 (예: alert)" autoCapitalize="none" />
      </div>

      {query ? (
        <React.Fragment>
          {lemmaHit && (
            <React.Fragment>
              <div className="addbar">
                <div className="t"><b>"{q.trim()}"</b> 은(는) <b>{lemmaHit.word}</b>의 변화형이에요</div>
              </div>
              <WordRow w={lemmaHit} onOpen={onOpen} />
            </React.Fragment>
          )}
          {noHit && !lemmaHit && (
            <div className="addbar">
              <div className="t">사전에 없는 단어인가요?<br/><b>"{q.trim()}"</b> 를 내 단어로 추가</div>
              <button onClick={() => addWord(q)}>추가하기</button>
            </div>
          )}
          {!noHit && hits.length > 0 && <div className="listhead" style={{ margin: "0 0 2px" }}>{pickToggleBtn}</div>}
          {pickBar}
          {rows(hits)}
        </React.Fragment>
      ) : view === null ? (
        <React.Fragment>
          {MENUS.map(m => (
            <div key={m.k} className="step" onClick={() => setView(m.k)}>
              <div className="step-ico round black"><Icon name={m.icon} size={20} /></div>
              <div className="step-body">
                <div className="step-title">{m.title}</div>
                <div className="step-sub">{m.sub}</div>
              </div>
              <span className="arrow">›</span>
            </div>
          ))}
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="listhead">
            <button className="back" onClick={() => {
              if (view === "mine" && listSel !== null) { setListSel(null); setPickMode(false); setPicked(new Set()); }
              else if (view === "category" && catSel !== null) setCatSel(null);
              else { setCatSel(null); setListSel(null); setPickMode(false); setPicked(new Set()); setView(null); }
            }} aria-label="뒤로"><Icon name="chevron_left" size={22} /></button>
            <b>
              {view === "mine" && listSel === "__added__" ? "직접 등록한 단어"
                : view === "mine" && listSel ? (WORDLISTS.find(l => l.id === listSel) || {}).name
                : TITLES[view]}
            </b>
            {view === "learned" && <span className="cnt">{learned.length}</span>}
            {view === "fav" && <span className="cnt">{favs.length}</span>}
            {view === "mine" && listSel === "__added__" && <span className="cnt">{mine.length}</span>}
            {view === "mine" && listSel === null && <span className="cnt">{WORDLISTS.length}</span>}
            {(view === "learned" || view === "fav" || (view === "mine" && listSel === "__added__")) && pickToggleBtn}
          </div>

          {view === "learned" && (
            <div className="seg">
              <button className={"seg-b" + (learnedMode === "date" ? " on" : "")} onClick={() => setLearnedMode("date")}>날짜별</button>
              <button className={"seg-b" + (learnedMode === "status" ? " on" : "")} onClick={() => setLearnedMode("status")}>상태별</button>
            </div>
          )}
          {view === "learned" && pickBar}
          {view === "learned" && (learnedMode === "status"
            ? rows(learned)
            : (learned.length === 0
              ? <div className="empty-note">아직 학습한 단어가 없어요.</div>
              : learnedByDate.map(([label, ws]) => (
                <div key={label} className="date-group">
                  <div className="date-head">{label} <span className="dn">{ws.length}개</span></div>
                  {rows(ws)}
                </div>
              ))))}
          {view === "fav" && pickBar}
          {view === "fav" && rows(favs)}
          {view === "mine" && listSel === null && (
            <React.Fragment>
              <div className="wl-newrow">
                <input value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="새 리스트 이름 (예: 비즈니스용)" autoCapitalize="none" />
                <button onClick={() => { if (newListName.trim()) { createWordlist(newListName); setNewListName(""); bump(x => x + 1); } }}>만들기</button>
              </div>
              {WORDLISTS.length === 0 && mine.length === 0 && (
                <div className="empty-note">아직 만든 리스트가 없어요. 카테고리별 목록이나 검색 결과에서 '담기'로 단어를 모아보세요.</div>
              )}
              <div className="wlist">
                {WORDLISTS.map(l => (
                  <button key={l.id} className="rootrow" onClick={() => setListSel(l.id)}>
                    <span className="ax" style={{ minWidth: 0, flex: 1 }}>{l.name}</span>
                    <span className="n">{l.words.length}개 ›</span>
                  </button>
                ))}
                {mine.length > 0 && (
                  <button className="rootrow" onClick={() => setListSel("__added__")}>
                    <span className="ax" style={{ minWidth: 0, flex: 1 }}>직접 등록한 단어</span>
                    <span className="n">{mine.length}개 ›</span>
                  </button>
                )}
              </div>
            </React.Fragment>
          )}
          {view === "mine" && listSel === "__added__" && (
            <React.Fragment>
              <div className="addbar">
                <div className="t">위 검색창에 단어를 입력하면<br/><b>사전에 없는 단어</b>를 등록할 수 있어요</div>
              </div>
              {pickBar}
              {rows(mine)}
            </React.Fragment>
          )}
          {view === "mine" && listSel !== null && listSel !== "__added__" && (() => {
            const list = WORDLISTS.find(l => l.id === listSel);
            if (!list) return null;
            const listWords = list.words.map(w => wordOf(w)).filter(Boolean);
            const studyItems = itemsFromWords(listWords).filter(canBlank); // 예문 빈칸 가능한 것만
            return (
              <React.Fragment>
                <div className="wl-actions">
                  <button className="primary" disabled={!studyItems.length} style={!studyItems.length ? { opacity: .5 } : undefined} onClick={() => onStudyList(studyItems)}>이 리스트로 학습</button>
                  <button className="ghost" onClick={() => { const nm = prompt("리스트 이름", list.name); if (nm) { renameWordlist(list.id, nm); bump(x => x + 1); } }}>이름 변경</button>
                  <button className="ghost" onClick={() => { if (confirm(`"${list.name}" 리스트를 삭제할까요?`)) { deleteWordlist(list.id); setListSel(null); bump(x => x + 1); } }}>삭제</button>
                </div>
                {listWords.length === 0 && <div className="empty-note">아직 담긴 단어가 없어요.</div>}
                <div className="wlist">
                  {listWords.map(w => (
                    <div key={w.word} className="wrow" onClick={() => onOpen(w.word)}>
                      <div>
                        <div className="w">{w.word}</div>
                        <div className="k">{(w.senses && w.senses.length) ? w.senses[0].ko : w.ko}</div>
                      </div>

                <button className={"chip" + (catMode === "cefr" ? " on" : "")} onClick={() => setCatMode("cefr")}>레벨 (CEFR)</button>
                <button className={"chip" + (catMode === "root" ? " on" : "")} onClick={() => setCatMode("root")}>어근별</button>

              </div>
              {catSel === null ? (
                /* 선택 화면 — 목록을 쏟아내지 않고 레벨/어근을 먼저 고른다 */
                catMode === "cefr" ? (
                  <div className="lv-grid">

                      <button key={lv} className={"lv-card tier-" + cefrHl(lv)} onClick={() => setCatSel(lv)}>

                ) : (
                  <React.Fragment>
                    <div className="search" style={{ marginBottom: 10 }}>

                      <input value={rootQuery} onChange={e => setRootQuery(e.target.value)} placeholder="어근을 검색하세요 (예: tion)" autoCapitalize="none" />
                    </div>
                    <div className="wlist">
                      {rootIndex
                        .filter(([affix, info]) => {
                          const q2 = rootQuery.trim().toLowerCase();
                          return !q2 || affix.toLowerCase().includes(q2) || info.gloss.toLowerCase().includes(q2);

                        .map(([affix, info]) => (
                          <button key={affix} className="rootrow" onClick={() => setCatSel(affix)}>
                            <span className="ax">{affix}</span>
                            <span className="gl">{info.gloss}</span>
                            <span className="n">{info.ws.length}개 ›</span>

                        ))}
                    </div>
                  </React.Fragment>
                )
              ) : (
                /* 선택한 레벨/어근의 단어 목록 */
                <React.Fragment>
                  <div className="sec" style={{ display: "flex", alignItems: "center" }}>
                    {catMode === "cefr" ? catSel + " · " + CEFR_NAMES[catSel] : catSel}
                    {catMode === "root" && <span style={{ color: "var(--muted)", fontWeight: 500 }}> {(rootIndex.find(([a]) => a === catSel) || [null, { gloss: "" }])[1].gloss}</span>}
                    {pickToggleBtn}
                  </div>
                  {pickBar}
                  {rows(
                    catMode === "cefr"
                      ? catList(catSel)
                      : ((rootIndex.find(([a]) => a === catSel) || [null, { ws: [] }])[1].ws.slice().sort((a, b) => a.word.localeCompare(b.word)))
                  )}
                </React.Fragment>
              )}
            </React.Fragment>
          )}
        </React.Fragment>
      )}
      {showPicker && (
        <ListPicker
          words={[...picked]}
          onClose={() => setShowPicker(false)}
          onChanged={() => { setPickMode(false); setPicked(new Set()); bump(x => x + 1); }}

      )}
    </div>
  );
}

/* Gemini 프록시에 "JSON만 응답하도록" 프롬프트를 보내고 파싱까지 해주는 공용 헬퍼(회화·작문 기능 여러
   곳이 공유). 모델이 지시를 어기고 JSON 앞뒤에 설명을 덧붙이는 경우가 있어(2026-07-18, "상대의 대답을
   불러오지 못했어요"/"첨삭을 불러오지 못했어요" 원인 중 하나로 확인) 여러 단계로 폴백:
   1) 코드펜스(```json ... ```)가 있으면 그중 **마지막** 블록을 우선 시도 — 일부 모델(특히 폴백
      체인의 pro 계열)이 "생각 과정"을 코드펜스 밖에 프리텍스트로 길게 늘어놓고 맨 끝에 정리된
      JSON을 펜스로 감싸는 패턴을 보임(실측: natural_pct 응답이 장문의 영어 사고 과정 뒤에 최종
      JSON이 나옴) — 첫 펜스가 아니라 마지막 펜스를 잡아야 함.
   2) 안 되면 기존처럼 통짜 텍스트를 정리해 직접 파싱.
   3) 그래도 안 되면 텍스트에서 {...} 블록만 정규식으로 뽑아 재시도.
   그래도 실패하면 원문 일부를 에러 메시지에 남겨 다음에 원인을 바로 알 수 있게 한다(막연한 "실패" 대신). */
async function geminiJSON(prompt) {
  const text = await geminiText(prompt);
  if (!text) throw new Error("gemini empty response");
  const fences = [...text.matchAll(/```(?:json)?\s*([\s\S]*?)```/g)];
  if (fences.length) {
    try { return JSON.parse(fences[fences.length - 1][1].trim()); } catch (e) {}
  }
  const cleaned = text.replace(/^```json\s*|^```\s*|```\s*$/g, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    const m = cleaned.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch (e2) {} }
    throw new Error("gemini json parse failed: " + cleaned.slice(0, 200));
  }
}
function containsKorean(text) { return /[가-힣]/.test(text || ""); }
/* 표기 관용 비교용 — 하이픈·공백·언더스코어·아포스트로피 등 구분 기호를 전부 걷어내고
   글자·숫자만 남김. "carry-on"과 "carry on"과 "carryon", "don't"와 "dont"를 같은 답으로
   취급하기 위한 공통 헬퍼(2026-07-19). 정답 판정·검색 매칭에서 양쪽 모두에 적용해서 쓸 것 —
   한쪽만 접으면 "사용자는 맞게 썼는데 오답" 계열 버그가 재발한다. */
function flatWord(s) { return (s || "").toLowerCase().replace(/[^a-z0-9]/g, ""); }
/* 대화방 날짜 구분 알약(2026-07-18) — 저장 시점(m.at)이 없는 옛 메시지(이 기능 이전에 저장된 대화)는
   1970-01-01로 묶어서 한 덩어리로만 보이게(크래시 방지 목적, 실제 날짜를 알 방법이 없음). */
function talkDayKey(ts) { const d = new Date(ts || 0); return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); }
function talkDayLabel(ts) { const d = new Date(ts || 0); return (d.getMonth() + 1) + "월 " + d.getDate() + "일"; }
/* 회화(SOS·대화방)에서 단어를 탭해 단어 상세로 연결하는 공용 헬퍼(2026-07-18) — 사전(SEED/EXTRA)에
   없는 단어는 "내 단어장" 새 단어 등록(Dict의 addWord)과 같은 방식으로 EXTRA에 pending 등록해두고
   여는데, WordSheet가 열리자마자 자동조회(Free Dictionary→Gemini)로 채워준다. */
function openVocabWord(word, onOpenWord) {
  const key = (word || "").trim().toLowerCase();
  if (!key || !onOpenWord) return;
  // 표기 접기 조회 먼저 — "carry-on"을 탭했는데 사전엔 "carry on"으로 있으면 그 표제어를 연다.
  // 예전엔 정확 키 조회만 해서 이미 있는 단어가 EXTRA에 하이픈 표기로 중복 등록됐음(2026-07-19).
  const hit = wordOfFlat(key);
  if (hit) { onOpenWord(hit.word); return; }
  EXTRA[key] = { word: key, ipa: "", pos: [], cefr: "—", ko: "", en: "", syn: [], ant: [], forms: [], roots: [], ex: [], mine: true, lookupStatus: "pending" };
  saveExtra();
  onOpenWord(key);
}
/* 회화 대화방 상대 말풍선의 모든 단어를 탭 가능하게(2026-07-18) — 사전 예문의 ExampleWords와 달리
   이미 사전에 있는 단어만이 아니라 전부 링크로 만든다(대화는 사전 밖 단어가 자주 나오므로).
   탭하면 openVocabWord로 상세(+ 없으면 자동조회) 연결. 곱슬따옴표 처리는 ExampleWords와 동일
   (match()로 위치·길이를 한 번에 얻어야 trail이 안 밀림 — 위 주석 참고). */
function ChatBubbleWords({ text, onOpenWord }) {
  const parts = (text || "").split(/(\s+)/);
  return parts.map((p, idx) => {
    if (!p || /^\s+$/.test(p)) return p;
    // 하이픈 합성어 통째 토큰화 — ExampleWords와 동일 수정(2026-07-19). "carry-on"을 탭하면
    // "carry"가 아니라 "carry-on" 전체가 openVocabWord로 넘어가 표제어 "carry on"으로 연결된다.
    const m = p.match(/[A-Za-z'’]+(?:-[A-Za-z'’]+)*/);
    if (!m) return p;
    const clean = m[0].replace(/[’‘]/g, "'");
    const lead = p.slice(0, m.index);
    const trail = p.slice(m.index + m[0].length);
    return (
      <React.Fragment key={idx}>
        {lead}<span className="ex-word" onClick={ev => { ev.stopPropagation(); openVocabWord(clean.toLowerCase(), onOpenWord); }}>{clean}</span>{trail}
      </React.Fragment>
    );
  });
}

/* 첨삭 결과 점수 → 형광펜 하이어라키 색(연속학습일 streakHl과 같은 의미 축: 위험/보통/좋음/매우좋음) */
function scoreHl(pct) {
  if (pct < 60) return "pink";
  if (pct < 80) return "yellow";
  if (pct < 95) return "green";
  return "blue";
}

/* 음성 입력 — MediaRecorder로 녹음한 오디오를 Worker(/stt, Gemini 멀티모달)로 보내 전사.
   브라우저 내장 SpeechRecognition은 Safari(특히 iOS)에 아예 없어 대신 이 방식을 씀 —
   getUserMedia/MediaRecorder는 iOS Safari 14.3+에서도 지원돼 어디서든 녹음 가능. */
const STT_SUPPORTED = typeof navigator !== "undefined" && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) &&
  typeof window !== "undefined" && !!window.MediaRecorder;
function pickRecorderMimeType() {
  const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4", "audio/aac", "audio/ogg;codecs=opus"];
  for (const c of candidates) { if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(c)) return c; }
  return "";
}
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve((reader.result || "").toString().split(",")[1] || "");
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
async function transcribeAudio(blob, mimeType) {
  const audio = await blobToBase64(blob);
  if (getGeminiKey()) {
    return await geminiDirect(
      [{
        parts: [
          { text: "Transcribe the following English speech verbatim as plain text. Output only the transcription itself — no quotes, no commentary, no formatting. If nothing intelligible is said, output nothing." },
          { inline_data: { mime_type: mimeType, data: audio } },
        ],
      }],
      { temperature: 0, maxOutputTokens: 500 },
      GEMINI_AUDIO_MODELS);
  }
  // 30초 타임아웃(2026-07-20) — 응답 스톨 시 transcribing 상태가 수 분간 잠기지 않게(geminiText와 동일 패턴)
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 30000);
  let r;
  try {
    r = await fetch(geminiEndpoint("stt"), {
      method: "POST", headers: proxyHeaders(),
      body: JSON.stringify({ audio, mimeType }),
      signal: ctrl.signal,
    });
  } catch (e) {
    throw new Error(e && e.name === "AbortError" ? "응답 시간 초과" : (e && e.message) || "stt failed");
  } finally { clearTimeout(timer); }
  const data = await r.json().catch(() => null);
  if (!r.ok || !data) throw new Error((data && data.error) || "stt failed");
  return (data.text || "").trim();
}

  useEffect(() => { TALK_ROOMS[persona.id] = { messages }; saveTalkRooms(); }, [messages]);

  // 경로)는 App의 탭 클릭 핸들러가 도는 stopSpeaking()을 안 타므로, 봇 음성이 재생 중이면 방을
  // 나가도 안 끊기는 사각지대가 있었음(2026-07-20) — 언마운트 시 직접 정지.
  // + 녹음 중 이탈 시 MediaRecorder/스트림도 여기서 정리(2026-07-20) — 안 하면 방을 나가도
  // 마이크가 계속 점유돼 iOS 상단 주황 표시등이 꺼지지 않는 프라이버시 체감 버그.
  useEffect(() => () => {
    aliveRef.current = false;
    playAllStopRef.current = true;

  // 대화 진행 중(봇 응답 도착·첨삭 완료 등) 자동 포커스는 유지하되, 방에 "처음 들어갈 때"는 자동으로
  // 키보드가 안 뜨게(2026-07-18) — 예전엔 마운트 직후에도 이 effect가 돌아서 진입하자마자 키보드가
  // 튀어나오고, 그 과정에서 레이아웃이 한 박자 깨져 보이는 문제가 있었음(스크린샷으로 확인). 이제
  // 입력창을 직접 탭해야만 키보드가 뜨고, 대화창 빈 곳을 탭하면 내려간다(아래 onPointerDown 참고).
  const mountedRef = useRef(false);
  useEffect(() => {
    if (!mountedRef.current) { mountedRef.current = true; return; }

  }, [voiceMode, awaitingAck, loadingBot, loadingFb]);

  const fetchBotLine = async hist => {
    setLoadingBot(true); setErr(null); setFailedHist(null);
    try {
      const r = await talkNextLine(persona, hist);
      if (!aliveRef.current) return; // 방을 나간 뒤 도착한 응답 — 다른 화면에서 봇 음성이 갑자기 재생되던 버그 방지(2026-07-20)
      const msg = { role: "bot", en: (r.en || "").trim(), ko: (r.ko || "").trim(), at: Date.now() };

      setErr("상대의 대답을 불러오지 못했어요. (" + (e && e.message || "error") + ")");
      setFailedHist(hist);
    } finally {
      setLoadingBot(false);
    }
  };

  useEffect(() => {
    // 첫 진입(새 대화)일 때만 상대의 첫 대사. 기본 페르소나는 고정 intro를 네트워크 왕복 없이 즉시,
    // 커스텀 페르소나(intro 없음)는 talkNextLine으로 설정에 맞는 첫 대사를 생성(2026-07-19).
    if (messages.length === 0) {

        setMessages([introMsg]);
        speakText(introMsg.en, personaSpeakRate(persona), persona.accent, persona.gender);

      }
    }
    // eslint-disable-next-line

                                    // 사이 연타가 가드를 뚫고 레코더 2개(스트림 하나 영구 누수 + 청크 혼입)를 만들던 레이스를 ref로 즉시 차단(2026-07-20)
  const startListening = async () => {
    if (!STT_SUPPORTED || listening || transcribing || recBusyRef.current) return;
    recBusyRef.current = true;
