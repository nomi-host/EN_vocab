          </div>
          <div className="step-cta">
            {s.state === "done" ? <span className="check">완료</span> : s.state === "active" ? "이어서" : "시작"}
          </div>
        </div>
      ))}

      <div className="sec">학습 캘린더 <span className="more">최근 17주</span></div>
      <div className="card" style={{ padding: "16px" }}>
        <div className="grass-months">
          {monthSpans.map((m, i) => <span key={i} style={{ flex: m.span }}>{MONTH_NAMES_EN[m.month]}</span>)}
        </div>
        <div className="grass">{grass.map((c, i) => <i key={i} style={c ? { backgroundColor: c } : undefined} />)}</div>
      </div>
    </div>
  );
}

/* 예문 속 단어를 개별 칩으로 — 사전에 있는 단어만 탭하면 그 단어 상세로 스택 진입(타고타고).
   문장 클릭(발음 재생)과 겹치므로 단어 클릭은 stopPropagation.
   단어 부분은 정규식 match()로 한 번에 찾아서(위치+길이를 그 매치 자체에서 가져옴) lead/trail을
   슬라이스한다 — 예전엔 replace()로 따로 "clean"을 만들고 그 길이로 trail 위치를 계산했는데,
   곱슬따옴표(’, U+2019)처럼 매치 밖 문자가 clean에서만 제거되면 clean.length가 원본 부분 문자열
   길이보다 짧아져서 trail이 엉뚱한 위치부터 시작 — 끝 글자가 중복돼 "I've"가 "Ivee"로 깨졌다
   (2026-07-18, Gemini가 곱슬따옴표를 흔히 써서 회화 말풍선에서 실제로 겪음). */
function ExampleWords({ text, onOpen }) {
  const parts = text.split(/(\s+)/);
  return parts.map((p, idx) => {
    if (!p || /^\s+$/.test(p)) return p;
    // 하이픈 합성어는 통째로 한 토큰 — 예전 /[A-Za-z'’]+/는 하이픈에서 끊겨 "duty-free"에서
    // "duty"만 링크가 됐음(2026-07-19). 통째로는 사전에 없으면 첫 조각으로 폴백(기존 동작 보존).
    const m = p.match(/[A-Za-z'’]+(?:-[A-Za-z'’]+)*/);
    if (!m) return p;
    let tok = m[0];
    let w = wordOfFlat(tok.replace(/[’‘]/g, "'").toLowerCase());
    if (!w && tok.indexOf("-") >= 0) {
      tok = tok.split("-")[0];
      w = wordOf(tok.replace(/[’‘]/g, "'").toLowerCase());
    }
    if (!w) return p;
    const lead = p.slice(0, m.index);
    const trail = p.slice(m.index + tok.length);
    return (
      <React.Fragment key={idx}>
        {lead}<span className="ex-word" onClick={ev => { ev.stopPropagation(); onOpen(w.word); }}>{tok}</span>{trail}
      </React.Fragment>
    );
  });
}

/* ---------- 단어 상세 바텀시트 (팝업 → 타고타고 모달 스택) ---------- */
/* 다의어 상한선: 실사전은 뜻이 수십 개인 단어(run, set 등)가 있어 기본 노출을 제한 */
const SENSE_CAP = 6;

function WordSheet({ stack, onPush, onPop, onClose, onOpenRoot }) {
  const word = stack[stack.length - 1];
  const w = wordOf(word);
  const [senseOpen, setSenseOpen] = useState(0); // 다의어: 첫 의미 펼침
  const [showAllSenses, setShowAllSenses] = useState(false);
  const [, bump] = useState(0); // 즐겨찾기·내 단어장 토글 리렌더용
  const [showPicker, setShowPicker] = useState(false);
  useEffect(() => { setSenseOpen(0); setShowAllSenses(false); }, [word]);
  // 어원 탐험 뱃지(roots) 실데이터 — 이 단어의 어근(affix)을 열람한 것으로 기록(단어 바뀔 때마다).
  useEffect(() => { if (w && w.roots) w.roots.forEach(r => r && r.affix && ACT.addRoot(r.affix)); }, [word]);
  // 내가 추가한 단어 자동 조회(Free Dictionary → Gemini 폴백) — pending일 때만, word가 바뀔 때 한 번
  useEffect(() => {
    if (w && w.mine && w.lookupStatus === "pending") {
      autoLookupWord(w.word).then(() => bump(v => v + 1));
    }
    // eslint-disable-next-line
  }, [word]);
  const retryLookup = () => { EXTRA[word].lookupStatus = "pending"; saveExtra(); bump(v => v + 1); autoLookupWord(word).then(() => bump(v => v + 1)); };
  const speak = useCallback(speakText, []);
  const Chip = ({ label }) => (
    wordOf(label)
      ? <button className="lchip link" onClick={() => onPush(label)}>{label}</button>
      : <span className="lchip">{label}</span>
  );
  if (!w) return null;
  // 공백 포함 표제어("carry on")·아포스트로피("driver's license")가 URL에 그대로 들어가 링크가
  // 깨지지 않도록 인코딩(2026-07-19). Cambridge는 구동사 URL이 하이픈 관례라 공백→하이픈으로.
  const ext = q => [
    ["네이버", `https://en.dict.naver.com/#/search?query=${encodeURIComponent(q)}`],
    ["Cambridge", `https://dictionary.cambridge.org/dictionary/english/${encodeURIComponent(q.replace(/\s+/g, "-"))}`],
    ["Etymonline", `https://www.etymonline.com/word/${encodeURIComponent(q)}`],
  ];
  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          {stack.length > 1
            ? <button className="back" onClick={onPop} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
            : <span style={{ width: 8 }} />}
          <span className="sp" />
          <button className="fav" onClick={() => setShowPicker(true)}>내 단어장</button>
          <button className={"favstar" + (FAVS.has(w.word) ? " on" : "")} onClick={() => { toggleFav(w.word); bump(v => v + 1); }} aria-label="즐겨찾기">
            <Icon name="star" size={22} />
          </button>
          <button className="back" onClick={onClose} style={{ marginLeft: 4 }} aria-label="닫기"><Icon name="close" size={20} /></button>
        </div>
        {showPicker && (
          <ListPicker words={[w.word]} onClose={() => setShowPicker(false)} onChanged={() => bump(v => v + 1)} />
        )}
        <div className="sheet-body">
          <div>
            <div className="wd-top">
              <span className="wd-word">{w.word}</span>
              <span className="wd-ipa">{w.ipa}</span>
              <button className="wd-play" onClick={() => speak(w.word)}><Icon name="volume_up" size={15} /> 발음 듣기</button>
            </div>
            {w.lookupStatus === "pending" ? (
              <div className="wd-lookup" style={{ marginTop: 6 }}>뜻·예문 불러오는 중…</div>
            ) : w.lookupStatus === "error" ? (
              <div className="wd-lookup err" style={{ marginTop: 6 }}>
                뜻·예문을 불러오지 못했어요.
                <button className="wd-retry" onClick={retryLookup}>다시 시도</button>
              </div>
            ) : (
              <React.Fragment>
                <div className="wd-pos" style={{ marginTop: 6 }}>
                  <span className={"tag lv tier-" + cefrHl(w.cefr)} style={{ marginRight: 6 }}>{w.cefr}</span>
                  {w.pos && w.pos.length > 0 && w.pos.map(p => (
                    <span key={p} className="tag" style={{ marginRight: 6 }}>{POS_KO[p] || p}</span>
                  ))}
                  {w.senses && w.senses.length ? <span className="tag sensecount">뜻 {w.senses.length}개</span> : w.ko}
                </div>
                {!(w.senses && w.senses.length) && <div className="wd-en" style={{ marginTop: 4 }}>{w.en}</div>}
              </React.Fragment>
            )}
          </div>

          {w.lookupStatus === "pending" || w.lookupStatus === "error" ? null : w.senses && w.senses.length ? (
            /* 다의어: 의미별 카드 — 뜻마다 별도 예문·별도 학습 단위.
               뜻이 많은 단어(예: run·set 수십 개 의미)에서 목록이 무한정 길어지지 않도록
               기본 SENSE_CAP개만 보여주고 나머지는 '더보기'로 펼친다. */
            <div>
              <div className="wd-sec-t">의미별로 학습해요 (탭해서 펼치기)</div>
              {(showAllSenses ? w.senses : w.senses.slice(0, SENSE_CAP)).map((s, i) => (
                <div key={i} className={"sense" + (senseOpen === i ? " open" : "")}
                     onClick={() => setSenseOpen(senseOpen === i ? -1 : i)}>
                  <div className="s-head">
                    <div>
                      <div className="s-cue">{s.cue}</div>
                      <div className="s-ko">{s.ko}</div>
                    </div>
                    <div className="s-meta">
                      <span className="tag">{s.pos}</span>
                      <span className="tag lv">{s.cefr || ("레벨 " + s.lv)}</span>
                    </div>
                  </div>
                  {senseOpen === i && (
                    <React.Fragment>
                      <div className="s-en">{s.en}</div>
                      {(s.ex || []).map((e, j) => (
                        <div className="wd-ex" key={j} onClick={ev => { ev.stopPropagation(); speak(e.en); }}>
                          <div className="en"><ExampleWords text={e.en} onOpen={onPush} /></div>
                          <div className="ko">{e.ko}</div>
                        </div>
                      ))}
                      <button className={"s-add" + (SRS.get(w.word + "#" + i) ? " added" : "")}
                              onClick={ev => { ev.stopPropagation(); if (SRS.markForStudy(w.word + "#" + i)) bump(v => v + 1); }}>
                        {SRS.get(w.word + "#" + i) ? "✓ 학습에 추가됨" : "+ 이 의미를 학습에 추가"}
                      </button>
                    </React.Fragment>
                  )}
                </div>
              ))}
              {!showAllSenses && w.senses.length > SENSE_CAP && (
                <button className="s-more" onClick={() => setShowAllSenses(true)}>
                  + {w.senses.length - SENSE_CAP}개 뜻 더보기
                </button>
              )}
            </div>
          ) : (
            <div className="wd-ex-wrap">
              <div className="wd-sec-t">예문</div>
              {w.ex.map((e, i) => (
                <div className="wd-ex" key={i} onClick={() => speak(e.en)}>
                  <div className="en"><ExampleWords text={e.en} onOpen={onPush} /></div>
                  <div className="ko">{e.ko}</div>
                </div>
              ))}
            </div>
          )}

          {(w.syn.length > 0 || w.ant.length > 0) && (
            <div>
              <div className="wd-sec-t">유의어 · 반의어</div>
              <div className="wd-chips">
                {w.syn.map(s => <Chip key={s} label={s} />)}
                {w.ant.map(a => <Chip key={a} label={a} />)}
              </div>
            </div>
          )}

          {w.forms.length > 0 && (
            <div>
              <div className="wd-sec-t">같은 단어, 다른 품사</div>
              <div className="wd-chips">
                {w.forms.map(f => (
                  wordOf(f.word)
                    ? <button key={f.word} className="lchip link" onClick={() => onPush(f.word)}>{f.word}<span className="g">{f.pos}</span></button>
                    : <span key={f.word} className="lchip">{f.word}<span className="g">{f.pos}</span></span>
                ))}
              </div>
            </div>
          )}

          {w.roots.length > 0 && (
            <div>
              <div className="wd-sec-t">어근 · 접사</div>
              <div className="wd-chips">
                {w.roots.map(r => (
                  <button key={r.affix} className="lchip affix" onClick={() => onOpenRoot(r.affix)}>
                    {r.affix}<span className="g" style={{ color: "rgba(255,251,241,.62)" }}>{r.gloss}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          <div>
            <div className="wd-sec-t">외부 사전</div>
            <div className="ext">
              {ext(w.word).map(([label, url]) => (
                <a key={label} href={url} target="_blank" rel="noopener noreferrer">{label}</a>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ---------- 사전 탭 ---------- */
/* 진입 시 목록을 쏟아내지 않고 허브(메뉴)에서 선택해 들어가는 구조.
   검색은 어느 화면에서든 최상단 — 입력을 시작하면 즉시 검색 결과로 전환. */
const CEFR_LEVELS = ["A1", "A2", "B1", "B2", "C1", "C2"];
/* 형광펜 하이어라키 규칙(낮음→높음): 연두(A1·A2, 입문) → 옐로우(B1·B2, 중급) → 핑크(C1, 고급) → 블루(C2, 최상급).
   뱃지·레벨 강조·카테고리 카드 등 "레벨/난이도"를 표시하는 곳은 전부 이 규칙을 공유한다. */
function cefrHl(lv) {
  return lv === "A1" || lv === "A2" ? "green" : lv === "B1" || lv === "B2" ? "yellow" : lv === "C1" ? "pink" : "blue";
}

/* 복습까지 남은 일수 → 잉크 위계(잔디 히트맵과 같은 원리) — 긴박할수록(임박할수록) 더 진한 잉크. */
function dueUrgencyCls(dueIn) {
  return dueIn <= 0 ? "due-t0" : dueIn <= 2 ? "due-t1" : dueIn <= 5 ? "due-t2" : "due-t3";
}

function WordRow({ w, onOpen, pickMode, picked, onTogglePick }) {
  const st = wordStatus(w);
  const multi = w.senses && w.senses.length > 1;
  return (
    <div className="wrow" onClick={() => (pickMode ? onTogglePick(w.word) : onOpen(w.word))}>
      {pickMode && <span className={"wchk" + (picked ? " on" : "")}>{picked && <Icon name="check" size={13} />}</span>}
      <div>
        <div className="w">{w.word}</div>
        <div className="k">{multi ? w.senses[0].ko + " 외 " + (w.senses.length - 1) + "개 뜻" : w.lookupStatus === "pending" ? "뜻 불러오는 중…" : w.lookupStatus === "error" ? "뜻을 불러오지 못했어요" : w.ko}</div>
      </div>
      {/* 뱃지는 최대 2줄 — CEFR은 윗줄 단독, 뜻·상태(완료/복습)는 아랫줄에 같이(2026-07-17) */}
      <div className="meta">
        <div className="meta-line"><span className={"tag lv tier-" + cefrHl(w.cefr)}>{w.cefr}</span></div>
        <div className="meta-line">
          {multi && <span className="tag sensecount">뜻 {w.senses.length}개</span>}
          {w.mine && <span className="tag mine">내 단어</span>}
          {st?.status === "done" && <span className="tag done">완료</span>}
          {st?.status === "learning" && <span className={"tag " + dueUrgencyCls(st.dueIn)}>{st.dueIn === 0 ? "오늘 복습" : st.dueIn + "일 뒤 복습"}</span>}
          {!st && !w.mine && <span className="tag">미학습</span>}
        </div>
      </div>
    </div>
  );
}

/* 긴 목록 분할 렌더 — 한 번에 다 그리면(레벨당 1,000+행) 프리즈되므로 "더 보기"로 나눔 */
const LIST_CHUNK = 100;
function WList({ list, onOpen, pickMode, picked, onTogglePick }) {
  const [limit, setLimit] = useState(LIST_CHUNK);
  useEffect(() => setLimit(LIST_CHUNK), [list]);
  return (
    <div className="wlist">
      {list.slice(0, limit).map(w => (
        <WordRow key={w.word} w={w} onOpen={onOpen}
          pickMode={pickMode} picked={picked && picked.has(w.word)} onTogglePick={onTogglePick} />
      ))}
      {list.length === 0 && <div className="empty-note">아직 여기에 단어가 없어요.</div>}
      {list.length > limit && (
        <button className="more-btn" onClick={() => setLimit(l => l + LIST_CHUNK * 2)}>
          더 보기 ({list.length - limit}개 남음)
        </button>
      )}
    </div>
  );
}

/* 단어(들)를 내 단어장(커스텀 리스트)에 담는 공용 다이얼로그 — 사전 다중선택, 단어 상세 모달에서 공용 */
function ListPicker({ words, onClose, onChanged }) {
  const [newName, setNewName] = useState("");
  const commit = id => { addToWordlist(id, words); onChanged(); onClose(); };
  const createAndCommit = () => {
    if (!newName.trim()) return;
    const list = createWordlist(newName);
    commit(list.id);
  };
  return ReactDOM.createPortal(
    <div className="dlg-backdrop" onClick={onClose}>
      <div className="dlg" onClick={e => e.stopPropagation()}>
        <div className="dlg-title">리스트에 담기</div>
        <div className="dlg-sub">{words.length}개 단어</div>
        {WORDLISTS.length === 0 ? (
          <div className="empty-note" style={{ margin: "10px 0" }}>아직 만든 리스트가 없어요.</div>
        ) : (
          <div className="wl-picklist">
            {WORDLISTS.map(l => (
              <button key={l.id} className="rootrow" onClick={() => commit(l.id)}>
                <span className="ax" style={{ minWidth: 0, flex: 1 }}>{l.name}</span>
                <span className="n">{l.words.length}개 ›</span>
              </button>
            ))}
          </div>
        )}
        <div className="wl-newrow">
          <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="새 리스트 이름 (예: 비즈니스용)" autoCapitalize="none" />
          <button onClick={createAndCommit}>만들기</button>
        </div>
        <button className="ghost" style={{ width: "100%", marginTop: 12, padding: 12, borderRadius: 0, background: "var(--fill)", color: "var(--ink-2)", fontWeight: 700 }} onClick={onClose}>닫기</button>
      </div>
    </div>,
    document.body
  );
}

const CEFR_NAMES = { A1: "입문", A2: "초급", B1: "중급", B2: "중상급", C1: "고급", C2: "최상급" };

function Dict({ onOpen, onStudyList, rootJump, onConsumeRootJump, viewJump, onConsumeViewJump }) {
  const [q, setQ] = useState("");
  const [view, setView] = useState(null);      // null=허브 | learned|category|fav|mine|add
  const [catMode, setCatModeState] = useState("cefr"); // cefr | root
  const [catSel, setCatSel] = useState(null);   // 선택된 레벨(A1) 또는 어근(-tion) — null이면 선택 화면
  const setCatMode = m => { setCatModeState(m); setCatSel(null); setRootQuery(""); };
  const [, bump] = useState(0);                 // EXTRA·즐겨찾기·내 단어장 변경 리렌더용
  const [listSel, setListSel] = useState(null); // 내 단어장 안에서 연 리스트 id ("__added__"=직접 등록한 단어)
  const [newListName, setNewListName] = useState("");
  const [pickMode, setPickMode] = useState(false); // 단어 목록 다중선택(담기) 모드
  const [picked, setPicked] = useState(() => new Set());
  const [showPicker, setShowPicker] = useState(false); // 리스트 선택 다이얼로그
  const [rootQuery, setRootQuery] = useState(""); // 카테고리 > 어근별 목록 내 필터(어근·뜻)
  const [learnedMode, setLearnedMode] = useState("date"); // 내가 학습한 단어: date(날짜별) | status(상태별)

  // 단어상세의 어근 칩에서 넘어온 경우: 카테고리 > 어근별 > 그 어근 목록으로 바로 진입
  useEffect(() => {
    if (!rootJump) return;
    setQ(""); setView("category"); setCatModeState("root"); setCatSel(rootJump);
    onConsumeRootJump();
    // eslint-disable-next-line
  }, [rootJump]);
  // 보관함에서 즐겨찾기/내 단어장 바로가기로 넘어온 경우: 허브를 거치지 않고 해당 뷰로 바로 진입
  useEffect(() => {
    if (!viewJump) return;
    setQ(""); setListSel(null); setView(viewJump);
    onConsumeViewJump && onConsumeViewJump();
    // eslint-disable-next-line
  }, [viewJump]);

  const words = allWords();
  const learned = words.filter(w => wordStatus(w));
  const favs = words.filter(w => FAVS.has(w.word));
  const mine = Object.values(EXTRA);

  // 학습한 단어를 마지막 학습 날짜(SRS at)로 묶어 최신순으로 — "날짜별" 뷰용(2026-07-17)
  const learnedByDate = useMemo(() => {
    const g = {};
    learned.forEach(w => {
      const keys = (w.senses && w.senses.length) ? w.senses.map((_, i) => w.word + "#" + i) : [w.word];
      let at = 0;
      keys.forEach(k => { const s = SRS.get(k); if (s && s.at && s.at > at) at = s.at; });
      const d = at ? new Date(at) : null;
      const label = d ? `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}` : "날짜 미상";
      (g[label] = g[label] || []).push(w);
    });
    return Object.entries(g).sort((a, b) => (a[0] === "날짜 미상" ? 1 : b[0] === "날짜 미상" ? -1 : b[0].localeCompare(a[0])));
  }, [learned.length]);

  const query = q.trim().toLowerCase();
  // flatWord prefix 매칭 병행 — "carry on"·"carryon"으로 "carry-on"을, "duty free"로
  // "duty-free"를 찾을 수 있게(2026-07-19, 구분 기호가 다르면 검색이 안 되던 문제).
  const flatQ = flatWord(query);
  const hits = query ? words.filter(w => {
    const lw = w.word.toLowerCase();
    return lw.startsWith(query) || (flatQ && flatWord(lw).startsWith(flatQ));
  }).sort((a, b) => a.word.localeCompare(b.word)) : [];
  const noHit = query && hits.length === 0;
  // 표제어는 원형만 수록되므로 children/ran 같은 굴절형 검색은 표제어로 역추적해 안내.
  // prefix 일치(ran→range 등)가 있어도, 검색어 자체가 표제어가 아니고 변화형이면 최상단에 안내
  const lemma = query && !wordOf(query) ? dictLookup(query) : null;
  const lemmaHit = lemma && lemma.word !== query ? lemma : null;

  const addWord = name => {
    const key = name.trim().toLowerCase();
    if (!key || wordOf(key)) return;
    EXTRA[key] = { word: key, ipa: "", pos: [], cefr: "—", ko: "", en: "", syn: [], ant: [], forms: [], roots: [], ex: [], mine: true, lookupStatus: "pending" };
    saveExtra(); bump(x => x + 1);
    setQ(""); onOpen(key);
  };

  const MENUS = [
    { k: "add", icon: "add", title: "새 단어 등록하기", sub: "사전에 없는 단어도 내 단어로" },
    { k: "learned", icon: "school", title: "내가 학습한 단어", sub: learned.length + "개 · SRS 진행 상태별" },
    { k: "category", icon: "grid_view", title: "카테고리별로 보기", sub: "레벨(CEFR) · 어근별 · 주제(예정)" },
    { k: "fav", icon: "star", title: "즐겨찾기한 단어", sub: favs.length + "개" },
    { k: "mine", icon: "bookmark", title: "내 단어장", sub: "내가 만든 리스트 " + WORDLISTS.length + "개" },
  ];
  const TITLES = { learned: "내가 학습한 단어", category: "카테고리별", fav: "즐겨찾기", mine: "내 단어장", add: "새 단어 등록" };

  const togglePick = w => setPicked(s => { const n = new Set(s); n.has(w) ? n.delete(w) : n.add(w); return n; });
  const togglePickMode = () => { setPickMode(v => !v); setPicked(new Set()); };
  const rows = list => <WList list={list} onOpen={onOpen} pickMode={pickMode} picked={picked} onTogglePick={togglePick} />;
  const pickToggleBtn = (
    <button className="chip" style={{ marginLeft: "auto" }} onClick={togglePickMode}>{pickMode ? "선택 취소" : "담기"}</button>
  );
  const pickBar = pickMode && (
    <div className="addbar">
      <div className="t">{picked.size > 0 ? `${picked.size}개 선택됨` : "담을 단어를 선택하세요"}</div>
      <button disabled={picked.size === 0} style={picked.size === 0 ? { opacity: .5 } : undefined} onClick={() => setShowPicker(true)}>리스트에 담기</button>
    </div>
  );

  const catList = level => words.filter(w => w.cefr === level).sort((a, b) => a.word.localeCompare(b.word));
  const rootIndex = useMemo(() => {
    const m = {};
    words.forEach(w => (w.roots || []).forEach(r => { (m[r.affix] = m[r.affix] || { gloss: r.gloss, ws: [] }).ws.push(w); }));
    return Object.entries(m).sort((a, b) => b[1].ws.length - a[1].ws.length);
  }, [words.length]);

  return (
    <div className="content">
      <div className="search">
        <span className="mag"><Icon name="search" size={20} /></span>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="단어를 검색하세요 (예: alert)" autoCapitalize="none" />
      </div>

      {query ? (
        <React.Fragment>
          {lemmaHit && (
            <React.Fragment>
              <div className="addbar">
                <div className="t"><b>"{q.trim()}"</b> 은(는) <b>{lemmaHit.word}</b>의 변화형이에요</div>
              </div>
              <WordRow w={lemmaHit} onOpen={onOpen} />
            </React.Fragment>
          )}
          {noHit && !lemmaHit && (
            <div className="addbar">
              <div className="t">사전에 없는 단어인가요?<br/><b>"{q.trim()}"</b> 를 내 단어로 추가</div>
              <button onClick={() => addWord(q)}>추가하기</button>
            </div>
          )}
          {!noHit && hits.length > 0 && <div className="listhead" style={{ margin: "0 0 2px" }}>{pickToggleBtn}</div>}
          {pickBar}
          {rows(hits)}
        </React.Fragment>
      ) : view === null ? (
        <React.Fragment>
          {MENUS.map(m => (
            <div key={m.k} className="step" onClick={() => setView(m.k)}>
              <div className="step-ico round black"><Icon name={m.icon} size={20} /></div>
              <div className="step-body">
                <div className="step-title">{m.title}</div>
                <div className="step-sub">{m.sub}</div>
              </div>
              <span className="arrow">›</span>
            </div>
          ))}
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="listhead">
            <button className="back" onClick={() => {
              if (view === "mine" && listSel !== null) { setListSel(null); setPickMode(false); setPicked(new Set()); }
              else if (view === "category" && catSel !== null) setCatSel(null);
              else { setCatSel(null); setListSel(null); setPickMode(false); setPicked(new Set()); setView(null); }
            }} aria-label="뒤로"><Icon name="chevron_left" size={22} /></button>
            <b>
              {view === "mine" && listSel === "__added__" ? "직접 등록한 단어"
                : view === "mine" && listSel ? (WORDLISTS.find(l => l.id === listSel) || {}).name
                : TITLES[view]}
            </b>
            {view === "learned" && <span className="cnt">{learned.length}</span>}
            {view === "fav" && <span className="cnt">{favs.length}</span>}
            {view === "mine" && listSel === "__added__" && <span className="cnt">{mine.length}</span>}
            {view === "mine" && listSel === null && <span className="cnt">{WORDLISTS.length}</span>}
            {(view === "learned" || view === "fav" || (view === "mine" && listSel === "__added__")) && pickToggleBtn}
          </div>

          {view === "learned" && (
            <div className="seg">
              <button className={"seg-b" + (learnedMode === "date" ? " on" : "")} onClick={() => setLearnedMode("date")}>날짜별</button>
              <button className={"seg-b" + (learnedMode === "status" ? " on" : "")} onClick={() => setLearnedMode("status")}>상태별</button>
            </div>
          )}
          {view === "learned" && pickBar}
          {view === "learned" && (learnedMode === "status"
            ? rows(learned)
            : (learned.length === 0
              ? <div className="empty-note">아직 학습한 단어가 없어요.</div>
              : learnedByDate.map(([label, ws]) => (
                <div key={label} className="date-group">
                  <div className="date-head">{label} <span className="dn">{ws.length}개</span></div>
                  {rows(ws)}
                </div>
              ))))}
          {view === "fav" && pickBar}
          {view === "fav" && rows(favs)}
          {view === "mine" && listSel === null && (
            <React.Fragment>
              <div className="wl-newrow">
                <input value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="새 리스트 이름 (예: 비즈니스용)" autoCapitalize="none" />
                <button onClick={() => { if (newListName.trim()) { createWordlist(newListName); setNewListName(""); bump(x => x + 1); } }}>만들기</button>
              </div>
              {WORDLISTS.length === 0 && mine.length === 0 && (
                <div className="empty-note">아직 만든 리스트가 없어요. 카테고리별 목록이나 검색 결과에서 '담기'로 단어를 모아보세요.</div>
              )}
              <div className="wlist">
                {WORDLISTS.map(l => (
                  <button key={l.id} className="rootrow" onClick={() => setListSel(l.id)}>
                    <span className="ax" style={{ minWidth: 0, flex: 1 }}>{l.name}</span>
                    <span className="n">{l.words.length}개 ›</span>
                  </button>
                ))}
                {mine.length > 0 && (
                  <button className="rootrow" onClick={() => setListSel("__added__")}>
                    <span className="ax" style={{ minWidth: 0, flex: 1 }}>직접 등록한 단어</span>
                    <span className="n">{mine.length}개 ›</span>
                  </button>
                )}
              </div>
            </React.Fragment>
          )}
          {view === "mine" && listSel === "__added__" && (
            <React.Fragment>
              <div className="addbar">
                <div className="t">위 검색창에 단어를 입력하면<br/><b>사전에 없는 단어</b>를 등록할 수 있어요</div>
              </div>
              {pickBar}
              {rows(mine)}
            </React.Fragment>
          )}
          {view === "mine" && listSel !== null && listSel !== "__added__" && (() => {
            const list = WORDLISTS.find(l => l.id === listSel);
            if (!list) return null;
            const listWords = list.words.map(w => wordOf(w)).filter(Boolean);
            const studyItems = itemsFromWords(listWords).filter(canBlank); // 예문 빈칸 가능한 것만
            return (
              <React.Fragment>
                <div className="wl-actions">
                  <button className="primary" disabled={!studyItems.length} style={!studyItems.length ? { opacity: .5 } : undefined} onClick={() => onStudyList(studyItems)}>이 리스트로 학습</button>
                  <button className="ghost" onClick={() => { const nm = prompt("리스트 이름", list.name); if (nm) { renameWordlist(list.id, nm); bump(x => x + 1); } }}>이름 변경</button>
                  <button className="ghost" onClick={() => { if (confirm(`"${list.name}" 리스트를 삭제할까요?`)) { deleteWordlist(list.id); setListSel(null); bump(x => x + 1); } }}>삭제</button>
                </div>
                {listWords.length === 0 && <div className="empty-note">아직 담긴 단어가 없어요.</div>}
                <div className="wlist">
                  {listWords.map(w => (
                    <div key={w.word} className="wrow" onClick={() => onOpen(w.word)}>
                      <div>
                        <div className="w">{w.word}</div>
                        <div className="k">{(w.senses && w.senses.length) ? w.senses[0].ko : w.ko}</div>
                      </div>
                      <button className="wl-remove" onClick={ev => { ev.stopPropagation(); removeFromWordlist(list.id, w.word); bump(x => x + 1); }} aria-label="리스트에서 제거"><Icon name="close" size={16} /></button>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            );
          })()}
          {view === "add" && (
            <div className="addbar">
              <div className="t">위 검색창에 추가할 단어를 입력하세요.<br/>사전에 없으면 <b>추가하기</b> 버튼이 나타납니다.</div>
            </div>
          )}
          {view === "category" && (
            <React.Fragment>
              <div className="chips">
                <button className={"chip" + (catMode === "cefr" ? " on" : "")} onClick={() => setCatMode("cefr")}>레벨 (CEFR)</button>
                <button className={"chip" + (catMode === "root" ? " on" : "")} onClick={() => setCatMode("root")}>어근별</button>
                <button className="chip" style={{ opacity: .45 }}>주제별 (예정)</button>
              </div>
              {catSel === null ? (
                /* 선택 화면 — 목록을 쏟아내지 않고 레벨/어근을 먼저 고른다 */
                catMode === "cefr" ? (
                  <div className="lv-grid">
                    {CEFR_LEVELS.map(lv => (
                      <button key={lv} className={"lv-card tier-" + cefrHl(lv)} onClick={() => setCatSel(lv)}>
                        <div className={"lv hl hl-" + cefrHl(lv)}>{lv}</div>
                        <div className="nm">{CEFR_NAMES[lv]}</div>
                        <div className="n">{catList(lv).length.toLocaleString()}개</div>
                      </button>
                    ))}
                  </div>
                ) : (
                  <React.Fragment>
                    <div className="search" style={{ marginBottom: 10 }}>
                      <span className="mag"><Icon name="search" size={20} /></span>
                      <input value={rootQuery} onChange={e => setRootQuery(e.target.value)} placeholder="어근을 검색하세요 (예: tion)" autoCapitalize="none" />
                    </div>
                    <div className="wlist">
                      {rootIndex
                        .filter(([affix, info]) => {
                          const q2 = rootQuery.trim().toLowerCase();
                          return !q2 || affix.toLowerCase().includes(q2) || info.gloss.toLowerCase().includes(q2);
                        })
                        .map(([affix, info]) => (
                          <button key={affix} className="rootrow" onClick={() => setCatSel(affix)}>
                            <span className="ax">{affix}</span>
                            <span className="gl">{info.gloss}</span>
                            <span className="n">{info.ws.length}개 ›</span>
                          </button>
                        ))}
                    </div>
                  </React.Fragment>
                )
              ) : (
                /* 선택한 레벨/어근의 단어 목록 */
                <React.Fragment>
                  <div className="sec" style={{ display: "flex", alignItems: "center" }}>
                    {catMode === "cefr" ? catSel + " · " + CEFR_NAMES[catSel] : catSel}
                    {catMode === "root" && <span style={{ color: "var(--muted)", fontWeight: 500 }}> {(rootIndex.find(([a]) => a === catSel) || [null, { gloss: "" }])[1].gloss}</span>}
                    {pickToggleBtn}
                  </div>
                  {pickBar}
                  {rows(
                    catMode === "cefr"
                      ? catList(catSel)
                      : ((rootIndex.find(([a]) => a === catSel) || [null, { ws: [] }])[1].ws.slice().sort((a, b) => a.word.localeCompare(b.word)))
                  )}
                </React.Fragment>
              )}
            </React.Fragment>
          )}
        </React.Fragment>
      )}
      {showPicker && (
        <ListPicker
          words={[...picked]}
          onClose={() => setShowPicker(false)}
          onChanged={() => { setPickMode(false); setPicked(new Set()); bump(x => x + 1); }}
        />
      )}
    </div>
  );
}

/* Gemini 프록시에 "JSON만 응답하도록" 프롬프트를 보내고 파싱까지 해주는 공용 헬퍼(회화·작문 기능 여러
   곳이 공유). 모델이 지시를 어기고 JSON 앞뒤에 설명을 덧붙이는 경우가 있어(2026-07-18, "상대의 대답을
   불러오지 못했어요"/"첨삭을 불러오지 못했어요" 원인 중 하나로 확인) 여러 단계로 폴백:
   1) 코드펜스(```json ... ```)가 있으면 그중 **마지막** 블록을 우선 시도 — 일부 모델(특히 폴백
      체인의 pro 계열)이 "생각 과정"을 코드펜스 밖에 프리텍스트로 길게 늘어놓고 맨 끝에 정리된
      JSON을 펜스로 감싸는 패턴을 보임(실측: natural_pct 응답이 장문의 영어 사고 과정 뒤에 최종
      JSON이 나옴) — 첫 펜스가 아니라 마지막 펜스를 잡아야 함.
   2) 안 되면 기존처럼 통짜 텍스트를 정리해 직접 파싱.
   3) 그래도 안 되면 텍스트에서 {...} 블록만 정규식으로 뽑아 재시도.
   그래도 실패하면 원문 일부를 에러 메시지에 남겨 다음에 원인을 바로 알 수 있게 한다(막연한 "실패" 대신). */
async function geminiJSON(prompt) {
  const text = await geminiText(prompt);
  if (!text) throw new Error("gemini empty response");
  const fences = [...text.matchAll(/```(?:json)?\s*([\s\S]*?)```/g)];
  if (fences.length) {
    try { return JSON.parse(fences[fences.length - 1][1].trim()); } catch (e) {}
  }
  const cleaned = text.replace(/^```json\s*|^```\s*|```\s*$/g, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    const m = cleaned.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch (e2) {} }
    throw new Error("gemini json parse failed: " + cleaned.slice(0, 200));
  }
}

   없는 단어는 "내 단어장" 새 단어 등록(Dict의 addWord)과 같은 방식으로 EXTRA에 pending 등록해두고
   여는데, WordSheet가 열리자마자 자동조회(Free Dictionary→Gemini)로 채워준다. */
function openVocabWord(word, onOpenWord) {

  EXTRA[key] = { word: key, ipa: "", pos: [], cefr: "—", ko: "", en: "", syn: [], ant: [], forms: [], roots: [], ex: [], mine: true, lookupStatus: "pending" };

/* 회화 대화방 상대 말풍선의 모든 단어를 탭 가능하게(2026-07-18) — 사전 예문의 ExampleWords와 달리
   이미 사전에 있는 단어만이 아니라 전부 링크로 만든다(대화는 사전 밖 단어가 자주 나오므로).
   탭하면 openVocabWord로 상세(+ 없으면 자동조회) 연결. 곱슬따옴표 처리는 ExampleWords와 동일
   (match()로 위치·길이를 한 번에 얻어야 trail이 안 밀림 — 위 주석 참고). */
function ChatBubbleWords({ text, onOpenWord }) {
  const parts = (text || "").split(/(\s+)/);
  return parts.map((p, idx) => {
    if (!p || /^\s+$/.test(p)) return p;
    // 하이픈 합성어 통째 토큰화 — ExampleWords와 동일 수정(2026-07-19). "carry-on"을 탭하면
    // "carry"가 아니라 "carry-on" 전체가 openVocabWord로 넘어가 표제어 "carry on"으로 연결된다.
    const m = p.match(/[A-Za-z'’]+(?:-[A-Za-z'’]+)*/);
    if (!m) return p;
    const clean = m[0].replace(/[’‘]/g, "'");
    const lead = p.slice(0, m.index);
    const trail = p.slice(m.index + m[0].length);
    return (
      <React.Fragment key={idx}>
        {lead}<span className="ex-word" onClick={ev => { ev.stopPropagation(); openVocabWord(clean.toLowerCase(), onOpenWord); }}>{clean}</span>{trail}
      </React.Fragment>
    );
  });
}

/* 최근에 뽑은 문구는 피해서 골라줌(en_writing_recent, 장르별 배열) — 풀 크기의 60%를 "최근"으로
   보관해두면 100개 기준 최소 40개는 새 걸로 순환하면서도 너무 이르게 반복은 안 됨. */
let WRITING_RECENT = (() => { try { return JSON.parse(localStorage.getItem("en_writing_recent") || "{}"); } catch (e) { return {}; } })();
function saveWritingRecent() { try { localStorage.setItem("en_writing_recent", JSON.stringify(WRITING_RECENT)); } catch (e) {} }
function pickWritingPrompt(genreId) {
  const pool = WRITING_PROMPTS[genreId] || [];
  if (!pool.length) return "";
  const recent = WRITING_RECENT[genreId] || [];
  const avoid = new Set(recent);
  let candidates = pool.filter(p => !avoid.has(p));
  if (!candidates.length) candidates = pool; // 다 써봤으면 전체 풀에서 다시
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  WRITING_RECENT[genreId] = [pick, ...recent].slice(0, Math.floor(pool.length * 0.6));
  saveWritingRecent();
  return pick;
}
let WRITING_HISTORY = (() => { try { return JSON.parse(localStorage.getItem("en_writing_history") || "[]"); } catch (e) { return []; } })();
function saveWritingHistory() { try { localStorage.setItem("en_writing_history", JSON.stringify(WRITING_HISTORY)); } catch (e) {} }
function writingFeedback(genre, situationText, text) {
  const prompt = "아래는 한국인 영어 학습자가 \"" + genre.name + "\" 장르(추천 상황: " + situationText + " — 학습자가 이 주제와 다르게 썼어도 오답은 아니니 주제 일치 여부는 채점하지 말 것)로 작성한 영어 글입니다.\n글:\n\"\"\"\n" + text + "\n\"\"\"" +
    "\n이 글을 문장 단위로 첨삭하세요. 자연스러운 문장은 교정문을 원문과 동일하게 두고, 어색한 문장만 교정하세요." +
    "\ngrammar_ok는 전체 글에 문법적 오류가 있는지 반드시 명시적으로 판단하세요(true=문법 오류 없음, false=하나라도 있음) — 자연스러움 점수와 별개로 문법 정오는 항상 체크." +
    "\n아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON 객체 하나만 출력하세요." +
    '\n{"natural_pct":0~100 사이 정수,"formality":"적절"또는"너무 캐주얼"또는"너무 격식적","grammar_ok":true 또는 false,"overall_ko":"총평 한국어 한 줄",' +
    '"sentences":[{"original":"원문 문장","corrected":"교정문(문제 없으면 원문과 동일)","note_ko":"짧은 한국어 코멘트(문제 없으면 빈 문자열)"}]}';
  return geminiJSON(prompt);
}
/* 첨삭 결과 점수 → 형광펜 하이어라키 색(연속학습일 streakHl과 같은 의미 축: 위험/보통/좋음/매우좋음) */
function scoreHl(pct) {
  if (pct < 60) return "pink";
  if (pct < 80) return "yellow";
  if (pct < 95) return "green";
  return "blue";
}

/* 음성 입력 — MediaRecorder로 녹음한 오디오를 Worker(/stt, Gemini 멀티모달)로 보내 전사.
   브라우저 내장 SpeechRecognition은 Safari(특히 iOS)에 아예 없어 대신 이 방식을 씀 —
   getUserMedia/MediaRecorder는 iOS Safari 14.3+에서도 지원돼 어디서든 녹음 가능. */
const STT_SUPPORTED = typeof navigator !== "undefined" && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) &&
  typeof window !== "undefined" && !!window.MediaRecorder;
function pickRecorderMimeType() {
  const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4", "audio/aac", "audio/ogg;codecs=opus"];
  for (const c of candidates) { if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(c)) return c; }
  return "";
}
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve((reader.result || "").toString().split(",")[1] || "");
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
async function transcribeAudio(blob, mimeType) {
  const audio = await blobToBase64(blob);
  if (getGeminiKey()) {
    return await geminiDirect(
      [{
        parts: [
          { text: "Transcribe the following English speech verbatim as plain text. Output only the transcription itself — no quotes, no commentary, no formatting. If nothing intelligible is said, output nothing." },
          { inline_data: { mime_type: mimeType, data: audio } },
        ],
      }],
      { temperature: 0, maxOutputTokens: 500 },
      GEMINI_AUDIO_MODELS);
  }
  const r = await fetch(geminiEndpoint("stt"), {
    method: "POST", headers: proxyHeaders(),
    body: JSON.stringify({ audio, mimeType }),
  });
  const data = await r.json().catch(() => null);
  if (!r.ok || !data) throw new Error((data && data.error) || "stt failed");
  return (data.text || "").trim();
}

  // 대화 진행 중(봇 응답 도착·첨삭 완료 등) 자동 포커스는 유지하되, 방에 "처음 들어갈 때"는 자동으로
  // 키보드가 안 뜨게(2026-07-18) — 예전엔 마운트 직후에도 이 effect가 돌아서 진입하자마자 키보드가
  // 튀어나오고, 그 과정에서 레이아웃이 한 박자 깨져 보이는 문제가 있었음(스크린샷으로 확인). 이제
  // 입력창을 직접 탭해야만 키보드가 뜨고, 대화창 빈 곳을 탭하면 내려간다(아래 onPointerDown 참고).
  const mountedRef = useRef(false);
  useEffect(() => {
    if (!mountedRef.current) { mountedRef.current = true; return; }
    if (!voiceMode && inputRef.current) inputRef.current.focus();
  }, [voiceMode, awaitingAck, loadingBot, loadingFb]);

  const fetchBotLine = async hist => {
    setLoadingBot(true); setErr(null); setFailedHist(null);
    try {
      const r = await talkNextLine(persona, hist);
      const msg = { role: "bot", en: (r.en || "").trim(), ko: (r.ko || "").trim(), at: Date.now() };
      setMessages(m => [...m, msg]);
      speakText(msg.en, persona.rate, persona.accent);
    } catch (e) {
      // 원인을 화면에 그대로 노출(2026-07-18) — 예전엔 뭉뚱그린 메시지라 재발 시 원인 파악이 안 됐음.
      // hist를 기억해뒀다가 "다시 시도"로 같은 요청을 재실행할 수 있게.
      setErr("상대의 대답을 불러오지 못했어요. (" + (e && e.message || "error") + ")");
      setFailedHist(hist);
    } finally {
      setLoadingBot(false);
    }
  };

  useEffect(() => {
    // 페르소나별 기본 자기소개 — 네트워크 왕복 없이 즉시 표시(새 대화일 때만, 이어하는 대화는 그대로 유지)
    if (messages.length === 0) {
      const introMsg = { role: "bot", en: persona.intro, ko: persona.introKo, at: Date.now() };
      setMessages([introMsg]);
      speakText(introMsg.en, persona.rate, persona.accent);
    }
    // eslint-disable-next-line
  }, []);

  const startListening = async () => {
    if (!STT_SUPPORTED || listening || transcribing) return;
    setErr(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = pickRecorderMimeType();
      const rec = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      audioChunksRef.current = [];
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunksRef.current.push(e.data); };
      rec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setListening(false);
        const blob = new Blob(audioChunksRef.current, { type: rec.mimeType || mimeType || "audio/webm" });
        if (blob.size < 500) { setErr("녹음된 소리가 너무 짧아요. 다시 시도해 주세요."); setVoiceMode(false); return; }
        setTranscribing(true);
        try {
          const text = await transcribeAudio(blob, rec.mimeType || mimeType || "audio/webm");
          if (text) setInput(v => (v ? v + " " : "") + text);
          else setErr("음성을 알아듣지 못했어요. 다시 시도해 주세요.");
        } catch (e) {
          setErr("음성 인식에 실패했어요. 다시 시도해 주세요.");
        } finally {
          setTranscribing(false);
          setVoiceMode(false); // 인식 결과를 텍스트 입력창에 채우고 검토 후 전송하도록 복귀
        }
      };
      mediaRecorderRef.current = rec;
      rec.start();
      setListening(true);
    } catch (e) {
      setErr("마이크 권한이 필요해요. 브라우저 설정에서 허용해 주세요.");
    }
  };
  const stopListening = () => { if (mediaRecorderRef.current && listening) mediaRecorderRef.current.stop(); };

  const send = async () => {
    const text = input.trim();
    if (!text || loadingBot || loadingFb || awaitingAck) return;
    const histBefore = messages; // 이 턴 이전까지의 히스토리 — 다음 상대 대사 프롬프트용
    // 회화 세션 카운트(뱃지 talk) — 실제 대화로 진입한 방만 1회. 사용자 2번째 발화 시점에 기록해
    // "열자마자 닫음"은 안 세고, 한 방을 여러 번 드나들어도 mount당 한 번만(talkCountedRef).
    if (!talkCountedRef.current && histBefore.filter(m => m.role === "user").length >= 1) {
      talkCountedRef.current = true; ACT.addTalk();
    }
    setMessages(m => [...m, { role: "user", en: text, at: Date.now() }]);
    setInput(""); setLoadingFb(true); setErr(null);
    pendingBotLineRef.current = null;
    try {
      const r = await talkFeedbackAndNext(persona, histBefore, text);
      const fb = { ok: r.ok, note_ko: r.note_ko || "", corrected: r.corrected || text, user_ko: r.user_ko || "" };
      setMessages(m => m.map((msg, i) => (i === m.length - 1 ? { ...msg, feedback: fb, ko: fb.user_ko || "" } : msg)));
      const botEn = (r.bot_en || "").trim();
      if (botEn) pendingBotLineRef.current = { en: botEn, ko: (r.bot_ko || "").trim() };
    } catch (e) {
      setMessages(m => m.map((msg, i) => (i === m.length - 1 ? { ...msg, feedback: { ok: true, note_ko: "", corrected: text } } : msg)));
    } finally {
      setLoadingFb(false); setAwaitingAck(true);
    }
  };
  const ackFeedback = () => {
    setAwaitingAck(false);
    const pending = pendingBotLineRef.current;
    if (pending) {
      pendingBotLineRef.current = null;
      const msg = { role: "bot", en: pending.en, ko: pending.ko, at: Date.now() };
      setMessages(m => [...m, msg]);
      speakText(msg.en, persona.rate, persona.accent);
    } else {
      fetchBotLine(messages); // talkFeedbackAndNext가 대사를 못 받아왔을 때(에러 등)만 예전 방식으로 폴백
    }
  };
  const toggleFav = m => { toggleFavSentence(m.en, m.ko || "", persona.name); bump(v => v + 1); };
  const deleteMsg = i => {
    if (!confirm("이 메시지를 삭제할까요?")) return;
    if (awaitingAck && i === messages.length - 1) setAwaitingAck(false); // 삭제한 메시지가 확인 대기 중이던 마지막 메시지면 대기 해제
    setMessages(m => m.filter((_, idx) => idx !== i));
  };
  const corrections = messages.filter(m => m.role === "user" && m.feedback && !m.feedback.ok);

  if (showSummary) {
    return (
      <div className="content">
        <div className="talk-head">
          <button className="back" onClick={() => setShowSummary(false)} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
          <div className="talk-head-name">대화 요약 · {persona.name}</div>
        </div>
        {corrections.length === 0 ? (
          <div className="empty-note">이번 대화에서는 교정할 부분이 없었어요. 잘하고 있어요.</div>
        ) : corrections.map((m, i) => (
          <div key={i} className="talk-summary-item">
            <div style={{ color: "var(--muted)", marginBottom: 4 }}>{m.en}</div>
            <div style={{ fontWeight: 700 }}>→ {m.feedback.corrected}</div>
            {m.feedback.note_ko && <div style={{ marginTop: 4, fontSize: 12, color: "var(--ink-2)" }}>{m.feedback.note_ko}</div>}
          </div>
        ))}
        <button className="qsub" style={{ marginTop: 10 }} onClick={() => setShowSummary(false)}>대화로 돌아가기</button>
      </div>
    );
  }

  return (
    <div className="content talk-room-screen">
      <div className="talk-head">
        <button className="back" onClick={onExit} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
        <div style={{ flex: 1 }}>
          <div className="talk-head-name">{persona.name}</div>
          <div className="talk-head-trait">{persona.trait}</div>
        </div>
        {messages.length > 1 && <button className="talk-end-btn" onClick={() => setShowSummary(true)}>대화 요약</button>}
      </div>
      <div className="talk-toggles">
        <button className={"talk-toggle" + (showEn ? " on" : "")} onClick={() => setShowEn(v => !v)}>대사 {showEn ? "표시" : "숨김"}</button>
        <button className={"talk-toggle" + (showKo ? " on" : "")} onClick={() => setShowKo(v => !v)}>번역 {showKo ? "표시" : "숨김"}</button>
      </div>

      <div className="talk-msgs" ref={scrollRef} onPointerDown={() => { if (inputRef.current) inputRef.current.blur(); }}>
        {(() => {
          let lastDay = null;
          return messages.map((m, i) => {
            const day = talkDayKey(m.at);
            const showDivider = day !== lastDay;
            lastDay = day;
            const collapsed = !!collapsedDays[day];
            return (
              <React.Fragment key={i}>
                {showDivider && (
                  <div className="talk-daypill-row">
                    <button className="talk-daypill" onClick={() => setCollapsedDays(c => ({ ...c, [day]: !c[day] }))}>
                      {talkDayLabel(m.at)}
                      <Icon name={collapsed ? "expand_more" : "expand_less"} size={13} />
                    </button>
                  </div>
                )}
                {!collapsed && (
          <div className={"talk-msg-row " + m.role}>
            {m.role === "bot" && <div className={"talk-avatar-sm hi-" + persona.avatar}>{persona.letter}</div>}
            <div className={"talk-msg " + m.role}>
              <div className="talk-bubble">
                {m.role === "bot" && !showEn ? "•••" : m.role === "bot" ? <span><ChatBubbleWords text={m.en} onOpenWord={onOpenWord} /></span> : m.en}
                {m.role === "bot" && (
                  <button className="talk-play" onClick={() => speakText(m.en, persona.rate, persona.accent)} aria-label="다시 듣기">
                    <Icon name="volume_up" size={13} />
                  </button>
                )}
              </div>
              {showKo && m.ko && <div className="talk-msg-ko">{m.ko}</div>}
              <div className="talk-msg-actions">
                <button className={"talk-msg-fav" + (isFavSentence(m.en) ? " on" : "")} onClick={() => toggleFav(m)} aria-label="문장 즐겨찾기">
                  <Icon name="favorite" size={14} />
                </button>
                {m.role === "user" && (
                  <button className="talk-msg-del" onClick={() => deleteMsg(i)} aria-label="메시지 삭제">
                    <Icon name="delete" size={15.4} />
                  </button>
                )}
              </div>
              {m.role === "user" && m.feedback && (
                <div className={"talk-fb" + (m.feedback.ok ? " ok" : "")}>
                  <div className="t">{m.feedback.ok ? "좋아요!" : containsKorean(m.en) ? "영어로 이렇게 말해보세요" : "이렇게 말하면 더 자연스러워요"}</div>
                  {!m.feedback.ok && m.feedback.corrected && <div>{m.feedback.corrected}</div>}
                  {m.feedback.note_ko && <div>{m.feedback.note_ko}</div>}
                  {awaitingAck && i === messages.length - 1 && <button onClick={ackFeedback}>확인</button>}
                </div>
              )}
            </div>
          </div>
                )}
              </React.Fragment>
            );
          });
        })()}
        {loadingBot && <div className="empty-note">상대가 대답을 준비하고 있어요…</div>}
        {loadingFb && <div className="empty-note">확인하고 있어요…</div>}
        {err && (
          <div className="empty-note" style={{ color: "var(--danger)" }}>
            {err}
            {failedHist && <button className="qhint-btn" style={{ marginLeft: 8 }} onClick={() => fetchBotLine(failedHist)}>다시 시도</button>}
          </div>
        )}
      </div>

      <div className="talk-input-row">
        {voiceMode ? (
          <button className={"talk-voice-btn" + (listening ? " listening" : "")}
                  onClick={listening ? stopListening : startListening}
                  disabled={awaitingAck || loadingBot || loadingFb || transcribing}>
            <Icon name="mic" size={18} />
            {transcribing ? "인식하는 중…" : listening ? "듣고 있어요… 탭해서 멈추기" : "탭해서 말하기"}
          </button>
        ) : (
          <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} placeholder="영어로 답해보세요 (막히면 한국어도 괜찮아요)"
            disabled={awaitingAck || loadingBot || loadingFb}
            onKeyDown={e => { if (e.key === "Enter") send(); }}
            autoCapitalize="none" autoComplete="off" autoCorrect="off" />
        )}
        {STT_SUPPORTED && (
          <button className="talk-voice-toggle" onClick={() => { stopListening(); setVoiceMode(v => !v); }}
                  disabled={awaitingAck || loadingBot || loadingFb || transcribing} aria-label="입력 방식 전환">
            <Icon name={voiceMode ? "keyboard" : "mic"} size={18} />
          </button>
        )}
        {!voiceMode && <button onClick={send} disabled={!input.trim() || awaitingAck || loadingBot || loadingFb}>전송</button>}
      </div>
    </div>
  );
}

/* ---------- 발음 클리닉 (회화 탭) ----------
   짧은 문장을 듣고 따라 말하면 STT(MediaRecorder+Gemini 전사)로 받아쓴 뒤 목표 문장과
   단어 단위로 대조해 발음 점수·단어별 정오를 보여준다. 마이크가 없거나 STT 미지원이면
   "데모 채점"으로 같은 결과 UI를 보여줘 프레임이 항상 완성돼 보이게 한다(2026-07-17). */
const PRONUN_DRILLS = [
  { en: "I would like a cup of coffee.", ko: "커피 한 잔 주세요.", focus: "would like 연음" },
  { en: "She thought about the third theory.", ko: "그녀는 세 번째 이론에 대해 생각했다.", focus: "th 발음(θ)" },
  { en: "The weather is really lovely today.", ko: "오늘 날씨가 정말 좋네요.", focus: "r / l 구분" },
  { en: "Could you turn it off, please?", ko: "그것 좀 꺼 주시겠어요?", focus: "turn it off 연음" },
  { en: "I have already finished my work.", ko: "나는 이미 일을 끝냈어요.", focus: "강세·리듬" },
  { en: "We are going to the airport tomorrow.", ko: "우리는 내일 공항에 가요.", focus: "going to(gonna) 축약" },
];
function pronScore(target, said) {
  const norm = s => (s || "").toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
  const heard = new Set(norm(said).map(w => w.replace(/'.*$/, "")));
  const words = norm(target).map(w => ({ w, ok: heard.has(w.replace(/'.*$/, "")) }));
  const score = words.length ? Math.round(words.filter(x => x.ok).length / words.length * 100) : 0;
  return { score, words };
}
function PronunClinic({ onBack }) {
  const [idx, setIdx] = useState(0);
  const [result, setResult] = useState(null); // {score, words, said} | null
  const [recording, setRecording] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [err, setErr] = useState(null);
  const recRef = useRef(null);
  const chunksRef = useRef([]);
  const drill = PRONUN_DRILLS[idx];

  useEffect(() => () => stopSpeaking(), []);

  const play = () => { unlockAudio(); speakText(drill.en); };

  const next = () => { setResult(null); setErr(null); setIdx(i => (i + 1) % PRONUN_DRILLS.length); };
  const retry = () => { setResult(null); setErr(null); };

  // STT 미지원/오류 시: 목표 문장 기준 데모 채점(마지막 1~2개 단어를 '부정확'으로) — 프레임 완성용
  const demoScore = () => {
    const norm = drill.en.toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
    const weak = new Set(norm.slice(-1).concat(norm.length > 4 ? [norm[1]] : []));
    const words = norm.map(w => ({ w, ok: !weak.has(w) }));
    setResult({ score: Math.round(words.filter(x => x.ok).length / words.length * 100), words, demo: true });
  };

  const startRec = async () => {
    if (recording || scoring) return;
    setErr(null); setResult(null);
    if (!STT_SUPPORTED) { demoScore(); return; }
    try {
      unlockAudio();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = pickRecorderMimeType();
      const rec = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      chunksRef.current = [];
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
      rec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setRecording(false);
        const blob = new Blob(chunksRef.current, { type: rec.mimeType || mimeType || "audio/webm" });
        if (blob.size < 500) { setErr("녹음이 너무 짧아요. 다시 시도해 주세요."); return; }
        setScoring(true);
        try {
          const said = await transcribeAudio(blob, rec.mimeType || mimeType || "audio/webm");
          if (said) setResult({ ...pronScore(drill.en, said), said });
          else setErr("음성을 알아듣지 못했어요. 다시 시도해 주세요.");
        } catch (e) { setErr("채점에 실패했어요. 잠시 후 다시 시도해 주세요."); }
        finally { setScoring(false); }
      };
      recRef.current = rec; rec.start(); setRecording(true);
    } catch (e) { setErr("마이크를 사용할 수 없어요. 권한을 확인해 주세요."); }
  };
  const stopRec = () => { if (recRef.current && recording) recRef.current.stop(); };

  // 점수 하이어라키(핑크<노랑<초록<파랑) — 형광펜 색
  const scoreHl = s => s >= 90 ? "blue" : s >= 75 ? "green" : s >= 60 ? "yellow" : "pink";

  return (
    <div className="content">
      <div className="sub-head">
        <button className="back" onClick={onBack} aria-label="뒤로">‹</button>
        <div className="sec" style={{ padding: 0 }}>발음 클리닉</div>
      </div>
      <div className="pron-prog">{idx + 1} / {PRONUN_DRILLS.length}</div>

      <div className="pron-card">
        <span className="tag">{drill.focus}</span>
        <div className="pron-en">{drill.en}</div>
        <div className="pron-ko">{drill.ko}</div>
        <button className="pron-play" onClick={play}><Icon name="volume_up" size={18} /> 들어보기</button>
      </div>

      {!result ? (
        <div className="pron-actions">
          <button className={"pron-mic" + (recording ? " on" : "")} onClick={recording ? stopRec : startRec} disabled={scoring}>
            <Icon name={recording ? "stop" : "mic"} size={22} />
            <span>{scoring ? "채점 중…" : recording ? "녹음 중 — 누르면 멈춤" : STT_SUPPORTED ? "눌러서 따라 말하기" : "데모 채점 보기"}</span>
          </button>
          {err && <div className="empty-note" style={{ color: "var(--danger)" }}>{err}</div>}
        </div>
      ) : (
        <div className="pron-result">
          <div className="pron-score">
            <span className={"pv hl hl-" + scoreHl(result.score)}>{result.score}</span><div className="pl">발음 점수</div>
          </div>
          <div className="pron-words">
            {result.words.map((x, i) => <span key={i} className={"pron-w" + (x.ok ? " ok" : " no")}>{x.w}</span>)}
          </div>
          <div className="pron-tip">
            {result.score >= 85 ? "아주 좋아요! 자연스러운 발음이에요."
              : result.score >= 60 ? "좋아요. 회색으로 표시된 단어를 또박또박 다시 발음해 보세요."
              : "천천히 또박또박 다시 해볼까요? 회색 단어에 집중해 보세요."}
            {result.demo && " (데모 채점 — 실제 기기에서는 녹음으로 채점돼요.)"}
          </div>
          <div className="qactions">
            <button className="ghost" onClick={retry}>다시 하기</button>
            <button className="primary" onClick={next}>다음 문장</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Talk({ onOpenWord, setImmersive }) {
  const [view, setView] = useState(null); // null=대화방 목록 | "sos" | "writing" | "pronun" | 페르소나 id
  /* 대화방·작문·발음클리닉은 몰입 화면이라 탭바를 숨김 — SOS·목록은 잠깐 들르는 도구라 탭바 유지(2026-07-18).
     cleanup에서 항상 false로 되돌려야 상단 로고로 홈에 갔을 때도 탭바가 안 갇힘. */
  useEffect(() => {
    if (!setImmersive) return;
    setImmersive(!!view && view !== "sos");
    return () => setImmersive(false);
  }, [view]); // eslint-disable-line
  if (!PROXY_BASE) return <Soon title="회화 탭은 준비 중입니다" desc="메신저형 대화방 · 작문 연습 · 발음 클리닉" />;
  if (view === "sos") return <TalkSOS onBack={() => setView(null)} onOpenWord={onOpenWord} />;
  if (view === "writing") return <Writing onExit={() => setView(null)} />;
  if (view === "pronun") return <PronunClinic onBack={() => setView(null)} />;
  if (view) {
    const persona = PERSONAS.find(p => p.id === view);
    return <TalkRoom persona={persona} onExit={() => setView(null)} onOpenWord={onOpenWord} />;
  }
  return <TalkRooms onOpenRoom={setView} onOpenSOS={() => setView("sos")} onOpenWriting={() => setView("writing")} onOpenPronun={() => setView("pronun")} />;
}

/* ---------- 회화 탭 — SOS 미니 도구 (PLAN 4.12-5) ----------
   한국어로 하고 싶은 말을 입력 → Gemini 프록시가 자연스러운 영어 한 문장으로 알려줌.
   onBack이 있으면(대화방 목록에서 들어온 경우) 뒤로가기 헤더 표시, 없으면(구버전 단독 탭) 기존과 동일. */
function TalkSOS({ onBack, onOpenWord }) {
  const [ko, setKo] = useState("");
  const [result, setResult] = useState(null);
  const [resultKo, setResultKo] = useState(""); // 결과가 나온 시점의 한국어 원문(즐겨찾기에 같이 저장) — 이후 textarea를 수정해도 안 바뀜
  const [vocab, setVocab] = useState([]); // 결과 문장의 핵심 어휘 [{word, ko}]
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [, bump] = useState(0); // 즐겨찾기 하트 토글 리렌더용

  const ask = async () => {
    const text = ko.trim();
    if (!text || loading) return;
    setLoading(true); setErr(null); setResult(null); setVocab([]);
    try {
      const prompt = "당신은 한국인 영어 학습자를 돕는 회화 코치입니다. 아래 한국어 문장을 자연스럽고 " +
        "일상적인 영어 구어체 한 문장으로 번역하세요." +
        "\n그 영어 문장에 실제로 쓰인 단어 중 학습자가 새로 익히면 좋을 핵심 어휘를 최대 4개까지 뽑으세요." +
        " 각 단어는 문장에 쓰인 굴절형이 아니라 사전 원형(소문자, 예: 'smells'→'smell', 'loved'→'love')으로 쓰고," +
        " a/the/is/are/very 같은 아주 기초적인 단어는 제외하세요." +
        "\n아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON 객체 하나만 출력하세요." +
        '\n{"en":"번역된 영어 문장","vocab":[{"word":"사전 원형","ko":"그 단어의 뜻(1~3단어)"}]}' +
        "\n\n한국어: " + text;
      const r = await geminiJSON(prompt);
      setResult((r.en || "").trim());
      setVocab(Array.isArray(r.vocab) ? r.vocab.filter(v => v && v.word) : []);
      setResultKo(text);
    } catch (e) {
      setErr("지금 연결이 안 돼요. 잠시 후 다시 시도해 주세요. (" + (e && e.message || "error") + ")");
    } finally {
      setLoading(false);
    }
  };

  const openVocab = word => openVocabWord(word, onOpenWord);

  if (!PROXY_BASE) return <Soon title="회화 탭은 준비 중입니다" desc="메신저형 대화방 · 작문 연습 · 발음 클리닉" />;

  return (
    <div className="content">
      {onBack ? (
        <div className="talk-head">
          <button className="back" onClick={onBack} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
          <div className="talk-head-name">SOS — 하고 싶은 말을 영어로</div>
        </div>
      ) : (
        <div className="sec">SOS — 하고 싶은 말을 영어로</div>
      )}
      <div className="qcard">
        <textarea className="qdictate" rows={3} value={ko} onChange={e => setKo(e.target.value)}
          placeholder="예: 저 화장실 좀 다녀와도 될까요?" autoCapitalize="none" />
        <button className="qsub" disabled={loading || !ko.trim()} onClick={ask}>
          <Icon name="auto_awesome" size={16} /> {loading ? "생각 중…" : "영어로 보기"}
        </button>
        {err && <div className="empty-note" style={{ color: "var(--danger)" }}>{err}</div>}
        {result && (
          <div className="qdictate-result">
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
              <div style={{ fontWeight: 800, fontSize: 17 }}>{result}</div>
              <button className={"talk-msg-fav" + (isFavSentence(result) ? " on" : "")} style={{ flex: "none" }}
                      onClick={() => { toggleFavSentence(result, resultKo, "SOS"); bump(v => v + 1); }} aria-label="문장 즐겨찾기">
                <Icon name="favorite" size={16} />
              </button>
            </div>
            <button className="qhint-btn" style={{ marginTop: 10 }} onClick={() => speakText(result)}>
              <Icon name="volume_up" size={16} /> 들어보기
            </button>
            {vocab.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <div className="talk-msg-ko" style={{ padding: 0, marginBottom: 6 }}>핵심 어휘</div>
                <div className="qsyn-chips">
                  {vocab.map((v, i) => (
                    <button key={i} className="qsyn-chip link" onClick={() => openVocab(v.word)}>
                      {v.word}{v.ko ? " · " + v.ko : ""}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {!onBack && <div className="empty-note" style={{ marginTop: 4 }}>대화방·작문 연습·발음 클리닉은 준비 중이에요. 막힐 때 이 SOS부터 써보세요.</div>}
    </div>
  );
}

/* 성장 기록 — SRS 기록(box·at)에서 학습한 단어·완료·총 학습일·연속일을 실측하고, 마지막 학습
   시각(at)으로 최근 8주 학습량 막대그래프를 그린다. 데모 시드가 at을 최근 ~90일에 뿌려둬서
   실제 기록이 없어도 통계가 채워져 보인다(2026-07-17 — "성장 기록 준비 중" 자리 채움). */
function GrowthRecord() {
  const now = Date.now();
  const recs = allItems().map(it => SRS.get(it.key)).filter(Boolean);
  const learned = recs.length;
  const mastered = recs.filter(s => s.box >= 6).length;
  const dset = new Set(recs.map(s => (s.at != null ? Math.floor(s.at / DAY) : null)).filter(x => x != null));
  // 연속 학습일 = 가장 최근 학습일에서 하루씩 거슬러 끊기지 않고 이어진 날 수(오늘 학습 안 했어도 최근 구간 표시)
  const sortedDays = [...dset].sort((a, b) => b - a);
  let streak = 0;
  if (sortedDays.length) { streak = 1; let prev = sortedDays[0]; for (let k = 1; k < sortedDays.length; k++) { if (sortedDays[k] === prev - 1) { streak++; prev = sortedDays[k]; } else break; } }
  const thisWeek = recs.filter(s => s.at != null && now - s.at < 7 * DAY).length;
  const weeks = Array.from({ length: 8 }, () => 0);
  recs.forEach(s => { if (s.at == null) return; const w = Math.floor((now - s.at) / (7 * DAY)); if (w >= 0 && w < 8) weeks[7 - w]++; });
  const maxW = Math.max(1, ...weeks);
  // 포스트잇 색은 성취 색 하이어라키(핑크<노랑<초록<파랑) 순서로 4칸에 매핑
  const tiles = [
    { v: streak, l: "연속 학습일", hl: "pink" },
    { v: learned, l: "학습한 단어", hl: "yellow" },
    { v: mastered, l: "완료(마스터)", hl: "green" },
    { v: dset.size, l: "총 학습일", hl: "blue" },
  ];
  return (
    <div className="vault-sec">
      <div className="sec">성장 기록</div>
      <div className="growth-tiles">
        {tiles.map((t, i) => (
          <div key={t.l} className={"stat tier-" + t.hl}>
            <div className="v"><span className={"hl hl-" + t.hl} style={{ transform: "rotate(" + (i % 2 ? 1 : -1.3) + "deg)" }}>{t.v}</span></div>
            <div className="l">{t.l}</div>
          </div>
        ))}
      </div>
      <div className="growth-card">
        <div className="growth-head"><span>주간 학습량</span><span className="gsub">최근 8주 · 이번 주 {thisWeek}개</span></div>
        <div className="growth-bars">
          {weeks.map((c, i) => {
            const r = c / maxW; // 잔디와 같은 크림톤 강도 위계(빈칸/g1/g2/g3)
            const lvl = c === 0 ? "g0" : r < 0.4 ? "g1" : r < 0.7 ? "g2" : "g3";
            return (
              <div key={i} className="gbar-col">
                <div className="gbar-track"><div className={"gbar " + lvl} style={{ height: (c === 0 ? 4 : Math.round(r * 100)) + "%" }} /></div>
                <div className="gbar-lbl">{i === 7 ? "이번" : (7 - i) + "주"}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="growth-pts"><Icon name="star" size={15} /> 학습 포인트 <b>{POINTS.get()}</b>점</div>
    </div>
  );
}
