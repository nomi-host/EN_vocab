<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f5f6f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NoEnglish — 영포자 탈출</title>
<!-- 캐시 무효화용 버전 태그. APP_VERSION을 올릴 때 이 ?v= 값도 반드시 같이 올릴 것(같은 날 여러 번 배포해도 캐시가 갱신되도록 날짜가 아닌 버전 기준) -->
<link rel="manifest" href="manifest.json?v=0.13.0">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="words.js?v=0.13.0"></script>
<script src="img/rat_run.js?v=0.13.0"></script>
<style>
/* ============================================================================
   NoEnglish — 디자인 토큰 (라이트 온리 · 토스/iOS 톤 + 팝 코럴 포인트)
   ※ 포인트 컬러(--accent)는 임시 플레이스홀더. 디자이너가 교체할 자리.
============================================================================ */
:root{
  --bg:#f5f6f8;          /* 살짝 차가운 뉴트럴 배경 */
  --surface:#ffffff;
  --ink:#17181c;
  --ink-2:#3c3d44;
  --muted:#8b8c95;
  --line:#ececef;
  --fill:#eef0f3;
  --accent:#6b86ff;      /* 포인트 컬러 (페리윙클 블루) */
  --accent-deep:#3f56e0; /* 흰 배경 위 텍스트 강조 (진한 톤) */
  --accent-soft:#e9edff; /* 옅은 배경 */
  --on-accent:#ffffff;
  --good:#12b886;
  --radius:20px;
  --shadow:0 1px 2px rgba(20,20,30,.04), 0 8px 24px rgba(20,20,30,.05);
  --shadow-sheet:0 -8px 40px rgba(20,20,30,.16);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--ink);}
#root{height:100%;}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;}

.app{height:100vh;height:100dvh;height:var(--app-vh, 100dvh);display:flex;flex-direction:column;background:var(--bg);max-width:520px;margin:0 auto;position:relative;}
.topbar{padding:calc(env(safe-area-inset-top) + 12px) 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:20px;font-weight:800;letter-spacing:-0.4px;}
.brand b{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;box-shadow:var(--shadow);}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--fill);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}

/* 탭바가 고정(fixed)으로 빠지면서 밑에 가려질 콘텐츠 여유분 확보 */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + env(safe-area-inset-bottom));}
.content{padding:8px 20px 28px;display:flex;flex-direction:column;gap:14px;}

/* 섹션 라벨 */
.sec{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-0.2px;margin:6px 2px 0;}
.sec .more{float:right;font-size:12px;color:var(--muted);font-weight:600;}

/* 카드 공통 */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.card.tap{transition:transform .12s ease;}
.card.tap:active{transform:scale(.985);}

/* 캐릭터 히어로 */
.hero{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 16px 18px;text-align:center;}
.mascot{width:112px;height:112px;border-radius:26px;background:linear-gradient(160deg,#fff,#f1f2f5);border:1.5px dashed #cfd1d6;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);line-height:1.5;}
.sign{display:inline-block;background:var(--ink);color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;padding:6px 12px;border-radius:8px;transform:rotate(-3deg);}

/* 캐릭터 스테이지: 가운데 캐릭터(앞) + 뒤로 뱃지 가로 스크롤 트랙(스와이프해서 봄) */
.stage{position:relative;height:240px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.badge-track{position:absolute;left:0;right:0;top:44%;transform:translateY(-50%);display:flex;gap:14px;align-items:center;overflow-x:auto;padding:0 42%;scrollbar-width:none;z-index:1;-webkit-overflow-scrolling:touch;}
.badge-track::-webkit-scrollbar{display:none;}
.badge{flex:none;width:62px;height:62px;border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;text-align:center;line-height:1.15;padding:4px;transition:transform .1s;}
.badge:active{transform:scale(.94);}
.badge.earned{background:var(--accent-soft);color:var(--accent-deep);border:1.5px solid var(--accent);}
.badge.locked{background:var(--fill);color:var(--muted);font-size:20px;}
.hero-char{position:relative;z-index:2;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:9px;}
.char-face{width:156px;height:156px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);text-align:center;line-height:1.4;font-weight:600;}
/* 달리는 씬(placeholder). 실제 캐릭터는 Lottie/Rive/스프라이트로 이 슬롯 교체 */
.hero-char.run .char-face{animation:runbob var(--bob,.5s) ease-in-out infinite alternate;}
@keyframes runbob{from{transform:translateY(1px) rotate(-1.5deg);}to{transform:translateY(-7px) rotate(1.5deg);}}
/* 스프라이트 프레임 전환 크로스페이드 — 프레임이 뚝뚝 끊기지 않고 자연스럽게 이어지도록 */
.sprite-frame{position:absolute;inset:0;display:block;}
@keyframes spriteFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spriteFadeOut{from{opacity:1;}to{opacity:0;}}
@media (prefers-reduced-motion: reduce){.sprite-frame{animation:none!important;opacity:1!important;}}
.road{position:absolute;left:0;right:0;bottom:16px;height:6px;z-index:0;border-radius:3px;
  background:repeating-linear-gradient(90deg,var(--line) 0 20px,transparent 20px 44px);
  animation:roadmove var(--road,.6s) linear infinite;}
@keyframes roadmove{from{background-position:0 0;}to{background-position:-44px 0;}}
.mlines{position:absolute;z-index:1;left:calc(50% - 96px);top:46%;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.mlines i{height:3px;border-radius:2px;background:var(--accent);animation:whoosh var(--bob,.5s) linear infinite;}
.mlines i:nth-child(1){width:28px;}
.mlines i:nth-child(2){width:18px;animation-delay:.16s;}
.mlines i:nth-child(3){width:24px;animation-delay:.32s;}
@keyframes whoosh{0%{opacity:0;transform:translateX(10px);}40%{opacity:.55;}100%{opacity:0;transform:translateX(-16px);}}
/* 교통표지판(위젯 콘셉트 프리뷰) — 연속일에 따라 표지가 바뀜 */
.signpost{position:absolute;z-index:3;top:14px;left:14px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.sign-speed{width:46px;height:46px;border-radius:50%;background:#fff;border:5px solid #e5484d;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--ink);box-shadow:var(--shadow);font-variant-numeric:tabular-nums;}
.sign-warn{width:46px;height:41px;background:#ffcf3f;clip-path:polygon(50% 4%,96% 92%,4% 92%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-weight:800;font-size:17px;color:var(--ink);box-shadow:var(--shadow);}
.sign-lbl{font-size:10px;font-weight:700;color:var(--muted);}
@media (prefers-reduced-motion: reduce){.hero-char.run .char-face,.road,.mlines i{animation:none!important;}}
.char-picker{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:2px;}
.char-opt{font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);box-shadow:var(--shadow);}
.char-opt.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* 뱃지 팝업 */
.dlg-backdrop{position:fixed;inset:0;background:rgba(20,20,30,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:32px;animation:fade .15s ease;}
.dlg{background:var(--surface);border-radius:24px;padding:28px 24px 22px;text-align:center;max-width:300px;width:100%;box-shadow:0 24px 64px rgba(20,20,30,.3);animation:pop .22s cubic-bezier(.2,.9,.3,1.2);}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.dlg-badge{width:80px;height:80px;border-radius:22px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;}
.dlg-badge.earned{background:var(--accent-soft);color:var(--accent-deep);border:2px solid var(--accent);}
.dlg-badge.locked{background:var(--fill);color:var(--muted);font-size:30px;}
.dlg-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;}
.dlg-sub{font-size:14px;color:var(--accent-deep);font-weight:800;margin-top:4px;}
.dlg-sub.locked{color:var(--muted);}
.dlg-date{font-size:13px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums;}
.dlg button{margin-top:20px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:12px;border-radius:13px;width:100%;}

/* 레벨 3칸 */
.level-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:14px 8px;text-align:center;}
.stat .v{font-size:22px;font-weight:800;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;}
.stat .v.accent{color:var(--accent-deep);}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}

/* 루틴 스텝 */
.step{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:14px 16px;}
.step.active{border:1.5px solid var(--accent);}
.step-ico{width:38px;height:38px;border-radius:12px;background:var(--fill);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--ink-2);flex:none;}
.step.done .step-ico{background:var(--accent-soft);color:var(--accent-deep);}
.step-body{flex:1;min-width:0;}
.step-title{font-size:15px;font-weight:700;}
.step-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.step-cta{font-size:13px;font-weight:700;color:var(--accent-deep);flex:none;}
.step .check{color:var(--good);font-weight:800;}

/* 잔디 */
.grass{display:grid;grid-template-columns:repeat(17,1fr);gap:3px;}
.grass i{aspect-ratio:1;border-radius:3px;background:var(--fill);}
.grass i.g1{background:#ccd6ff;}.grass i.g2{background:#95a9ff;}.grass i.g3{background:var(--accent);}

/* 사전 검색 */
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;box-shadow:var(--shadow);}
.search input{flex:1;border:none;outline:none;font-size:15px;background:none;color:var(--ink);}
.search input::placeholder{color:var(--muted);}
.search .mag{color:var(--muted);display:flex;align-items:center;}
.icon{display:inline-block;vertical-align:middle;fill:currentColor;flex:none;}

.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* 사전 허브 목록 헤더 */
.listhead{display:flex;align-items:center;gap:4px;margin:2px 0 0;}
.listhead .back{color:var(--muted);display:flex;padding:4px 8px 4px 0;}
.listhead b{font-size:17px;letter-spacing:-0.3px;}
.listhead .cnt{font-size:13px;color:var(--muted);font-weight:600;margin-left:2px;}

.addbar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);border-radius:14px;padding:12px 14px;}
.addbar .t{font-size:13px;color:var(--ink-2);}
.addbar .t b{color:var(--accent-deep);}
.addbar button{background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:8px 14px;border-radius:10px;}

/* 단어 리스트 행 */
.wlist{display:flex;flex-direction:column;gap:8px;}
.wrow{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;transition:transform .1s;}
.wrow:active{transform:scale(.99);}
.wrow .w{font-size:16px;font-weight:700;}
.wrow .k{font-size:13px;color:var(--muted);margin-top:1px;}
.wrow .meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--fill);color:var(--muted);letter-spacing:.2px;}
.tag.lv{background:var(--accent-soft);color:var(--accent-deep);}
.tag.done{background:#e6f7f0;color:#0a9d6f;}
.tag.learning{background:#fff2e0;color:#c77a11;}

/* 카테고리 선택: 레벨 카드 그리드 · 어근 행 목록 */
.lv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.lv-card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:16px 8px 14px;text-align:center;transition:transform .1s;}
.lv-card:active{transform:scale(.96);}
.lv-card .lv{font-size:21px;font-weight:800;color:var(--accent-deep);letter-spacing:-0.3px;}
.lv-card .nm{font-size:12px;font-weight:700;color:var(--ink-2);margin-top:2px;}
.lv-card .n{font-size:11px;color:var(--muted);margin-top:1px;font-weight:600;font-variant-numeric:tabular-nums;}
.rootrow{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;transition:transform .1s;}
.rootrow:active{transform:scale(.99);}
.rootrow .ax{font-size:16px;font-weight:800;color:var(--accent-deep);min-width:62px;}
.rootrow .gl{flex:1;font-size:13px;color:var(--ink-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rootrow .n{font-size:12px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;flex:none;}
.more-btn{display:block;width:100%;text-align:center;background:var(--fill);color:var(--ink-2);font-weight:700;font-size:13px;padding:12px;border-radius:13px;}

/* 사전 목록 다중선택(담기) 체크 · 내 단어장(커스텀 리스트) UI */
.wchk{width:22px;height:22px;border-radius:999px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;}
.wchk.on{background:var(--accent);border-color:var(--accent);}
.wl-newrow{display:flex;gap:8px;}
.wl-newrow input{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:14px;background:var(--surface);outline:none;color:var(--ink);}
.wl-newrow input::placeholder{color:var(--muted);}
.wl-newrow button{background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:0 16px;border-radius:12px;white-space:nowrap;flex:none;}
.wl-actions{display:flex;gap:8px;}
.wl-actions button{flex:1;padding:11px 6px;border-radius:13px;font-weight:700;font-size:12px;white-space:nowrap;}
.wl-actions .primary{flex:1.5;}
.wl-actions .primary{background:var(--accent);color:#fff;}
.wl-actions .ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink-2);box-shadow:var(--shadow);}
.wl-remove{margin-left:auto;flex:none;color:var(--muted);display:flex;padding:6px;}

/* 준비중 */
.soon{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:64px 24px;text-align:center;color:var(--muted);}
.soon .big{font-size:16px;font-weight:700;color:var(--ink-2);}
.soon .mascot{width:88px;height:88px;font-size:11px;}

/* 하단 탭바 (홈 중앙) — 화면 실제 하단에 고정. 키보드가 뜨면(레이아웃 뷰포트 기준 고정이라)
   키보드 뒤로 가려지고, 키보드가 내려가면 다시 보인다. 그만큼 학습카드 쪽 공간이 넉넉해짐. */
.tabbar{display:flex;align-items:flex-end;justify-content:space-around;background:var(--surface);border-top:1px solid var(--line);padding:10px 8px calc(env(safe-area-inset-bottom) + 8px);position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;z-index:5;overflow:visible;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;padding:2px 0;overflow:visible;}
.tab.on{color:var(--accent-deep);}
.tab .ti{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
/* 홈: 바 위로 튀어나오는 원형 FAB. 조상 overflow가 자르지 않도록 tabbar를 overflow:visible로 두고
   음수 마진으로 바 상단선 위로 올린다. .scroll의 뒤 형제라 스크롤 콘텐츠 위에 항상 얹혀 안 잘린다. */
.tab.home{position:relative;}
.tab.home .ti{width:54px;height:54px;margin-top:-30px;margin-bottom:2px;border-radius:50%;background:var(--accent);color:#fff;box-shadow:0 8px 20px rgba(107,134,255,.5);border:4px solid var(--surface);}
.tab.home.on{color:var(--accent-deep);}

/* 바텀시트 (단어 상세) */
.sheet-backdrop{position:fixed;inset:0;background:rgba(20,20,30,.32);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .18s ease;}
.sheet{width:100%;max-width:520px;background:var(--surface);border-radius:24px 24px 0 0;box-shadow:var(--shadow-sheet);max-height:88vh;display:flex;flex-direction:column;animation:slideup .24s cubic-bezier(.2,.8,.2,1);}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grab{width:38px;height:4px;background:#d9dade;border-radius:2px;margin:10px auto 2px;flex:none;}
.sheet-head{display:flex;align-items:center;gap:10px;padding:6px 18px 10px;flex:none;}
.sheet-head .back{font-size:20px;color:var(--muted);padding:2px 6px;margin-left:-6px;}
.sheet-head .sp{flex:1;}
.sheet-head .fav{font-size:13px;font-weight:600;color:var(--muted);}
.favstar{color:var(--muted);display:flex;padding:2px 4px;}
.favstar.on{color:var(--accent);}
/* flex:1+min-height:0 필수 — 없으면 내용이 길어질 때(다의어 등) 이 영역이 축소되지 않고
   시트 전체가 화면 밖으로 밀려 상단 헤더(닫기 버튼)까지 넘어간다(flex item min-height:auto 버그). */
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px 28px;display:flex;flex-direction:column;gap:16px;flex:1;min-height:0;}
.wd-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.wd-word{font-size:28px;font-weight:800;letter-spacing:-0.5px;}
.wd-ipa{font-size:14px;color:var(--muted);}
.wd-play{margin-left:auto;background:var(--fill);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--ink-2);}
.wd-pos{font-size:13px;color:var(--ink-2);line-height:1.6;}
.wd-en{font-size:13px;color:var(--muted);line-height:1.55;}
.wd-sec-t{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.2px;}
.wd-chips{display:flex;flex-wrap:wrap;gap:7px;}
.lchip{font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--fill);color:var(--ink);border:1px solid transparent;}
.lchip.link{background:var(--surface);border-color:var(--line);}
.lchip.link:active{background:var(--accent-soft);}
.lchip.affix{background:var(--ink);color:#fff;}
.lchip .g{color:var(--muted);font-weight:500;font-size:11px;margin-left:4px;}
.wd-ex{background:var(--bg);border-radius:14px;padding:13px 15px;}
.wd-ex .en{font-size:14px;font-weight:600;line-height:1.5;}
.wd-ex .en em{font-style:normal;color:var(--accent-deep);}
.wd-ex .ko{font-size:12px;color:var(--muted);margin-top:5px;}
.wd-ex + .wd-ex{margin-top:8px;}
.ex-word{color:var(--accent-deep);text-decoration:underline;text-decoration-color:var(--accent-soft);text-underline-offset:2px;}

/* 다의어: 의미(sense) 카드 리스트 */
.sense{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:13px 15px;transition:border-color .12s;}
.sense + .sense{margin-top:8px;}
.sense.open{background:var(--surface);border:1.5px solid var(--accent);box-shadow:var(--shadow);}
.s-head{display:flex;align-items:flex-start;gap:8px;}
.s-cue{font-size:12px;color:var(--muted);}
.s-ko{font-size:16px;font-weight:800;margin-top:1px;letter-spacing:-0.2px;}
.s-meta{margin-left:auto;display:flex;gap:4px;flex:none;align-items:center;}
.s-en{font-size:13px;color:var(--ink-2);font-style:italic;line-height:1.5;margin-top:9px;}
.sense .wd-ex{margin-top:9px;background:var(--fill);}
.s-add{display:block;width:100%;margin-top:10px;text-align:center;background:var(--accent-soft);color:var(--accent-deep);font-weight:700;font-size:13px;padding:9px;border-radius:11px;}
.s-add.added{background:var(--fill);color:var(--muted);}
.s-more{display:block;width:100%;margin-top:6px;text-align:center;background:var(--fill);color:var(--ink-2);font-weight:700;font-size:13px;padding:11px;border-radius:13px;}

.ext{display:flex;flex-wrap:wrap;gap:7px;}
.ext a{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:6px 12px;text-decoration:none;}
.empty-note{font-size:12px;color:var(--muted);}

/* 학습 카드 세션. min-height(고정 height 아님)라 공간이 부족하면(키보드 등) 자연스럽게
   더 자라나고 .scroll(overflow-y:auto)이 스크롤을 맡는다 — 문제(qcard)는 맨 위라 항상
   스크롤 없이 바로 보이고, 부족분은 힌트·확인 버튼 쪽이 스크롤 대상이 된다. */
.study{display:flex;flex-direction:column;gap:14px;min-height:100%;}
.study-top{display:flex;align-items:center;gap:12px;}
.study-top .x{color:var(--muted);display:flex;padding:2px;}
.study-bar{flex:1;height:8px;background:var(--fill);border-radius:999px;overflow:hidden;}
.study-bar i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .3s ease;}
.study-n{font-size:13px;font-weight:700;color:var(--ink-2);font-variant-numeric:tabular-nums;flex:none;}
.qcard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px;display:flex;flex-direction:column;gap:14px;}
.qlvrow{display:flex;align-items:center;margin-bottom:-6px;}
.qlvrow .tag.lv{margin-left:auto;}
.qaudio{display:flex;align-items:center;gap:6px;}
.qaudio button{display:flex;align-items:center;gap:3px;color:var(--muted);background:var(--fill);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;}
.study-top .favstar{margin-left:4px;}
.qcue{font-size:12px;color:var(--muted);}
.qko{font-size:17px;font-weight:800;letter-spacing:-0.3px;line-height:1.4;}
.qdiv{height:1px;background:var(--line);margin:2px 0;}
.qen{font-size:17px;font-weight:600;line-height:1.65;}
.qen .blank{display:inline-block;min-width:74px;border-bottom:2.5px solid var(--accent);vertical-align:baseline;height:1.1em;margin:0 2px;}
.qen .fill{color:var(--accent-deep);font-weight:800;border-bottom:2.5px solid var(--accent);padding:0 2px;}
.qen .fill.bad{color:#d64545;border-color:#d64545;text-decoration:line-through;text-decoration-color:#d6454577;}
.qhint{font-size:12px;color:var(--muted);}
.qnudge{font-size:12px;color:var(--accent-deep);background:var(--accent-soft);border-radius:10px;padding:8px 10px;line-height:1.4;}
/* 입력창 = 문장 속 빈칸. 회색 솔리드 + 살짝 라운드, 문장 글자 크기 그대로, 네이티브 캐럿이 깜빡임 */
.qbox{border:none;border-radius:8px;background:var(--fill);font:inherit;font-weight:800;font-size:inherit;line-height:inherit;color:var(--accent-deep);text-align:center;padding:2px 8px;outline:none;vertical-align:baseline;caret-color:var(--accent);min-width:64px;}
.qbox:focus{background:#e9ebef;} /* 포커스 링 없이 톤만 반 단계 — 포커스 표시는 깜빡이는 캐럿이 담당 */
/* 글자수 힌트: 정답 글자 수만큼 칸(cell)으로 분리 — 같은 회색 솔리드 톤, 다음 입력 칸에 캐럿 깜빡임 */
.cellrow{display:inline-flex;gap:5px;position:relative;vertical-align:middle;}
.cell{width:26px;height:36px;border-radius:8px;background:var(--fill);display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:var(--accent-deep);text-transform:none;}
.cell.correct{background:var(--accent-soft);color:var(--accent-deep);}
.cell.wrong{background:var(--fill);color:var(--muted);}
.cell.cur::after{content:"";width:2px;height:17px;border-radius:1px;background:var(--accent);animation:caretblink 1.06s steps(1) infinite;}
.cell-gap{width:10px;flex:none;} /* 구동사 빈칸의 단어 사이 간격 */
@keyframes caretblink{50%{opacity:0;}}
@media (prefers-reduced-motion: reduce){.cell.cur::after{animation:none;}}
.cell-catch{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0;font-size:16px;}
/* 힌트 버튼 */
.qhintrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.qhint-lbl{font-size:12px;font-weight:700;color:var(--muted);}
.qhint-btn{font-size:13px;font-weight:700;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:8px 14px;}
.qhint-btn.on{background:var(--accent-soft);color:var(--accent-deep);}
.qsub{background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px 20px;border-radius:14px;width:100%;}
.qres{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;}
.qres.ok{color:var(--good);}
.qres.no{color:#d64545;}
.qres .due{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600;background:var(--fill);padding:5px 10px;border-radius:999px;}
.qsyn{display:flex;flex-direction:column;gap:6px;}
.qsyn-lbl{font-size:12px;font-weight:700;color:var(--muted);}
.qsyn-chips{display:flex;gap:6px;flex-wrap:wrap;}
.qsyn-chip{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--fill);border-radius:999px;padding:5px 10px;}
.qsyn-chip.link{color:var(--accent-deep);}
/* 퀴즈: 4지선다 뜻 맞추기 */
.qchoices{display:flex;flex-direction:column;gap:8px;}
.qchoice{width:100%;text-align:left;padding:13px 15px;border-radius:13px;background:var(--fill);font-size:15px;font-weight:700;color:var(--ink-2);border:1.5px solid transparent;}
.qchoice.correct{background:var(--accent-soft);color:var(--accent-deep);border-color:var(--accent);}
.qchoice.wrong{background:#fbe9e9;color:#d64545;border-color:#d64545;}
/* 듣기 세션(딕테이션) */
.qdictate{width:100%;border:none;border-radius:12px;background:var(--fill);font:inherit;font-weight:600;font-size:16px;line-height:1.5;color:var(--ink);padding:12px 14px;outline:none;resize:none;}
.qdictate:focus{background:#e9ebef;}
.qdictate-result{font-size:16px;line-height:1.7;}
.dw-ok{color:var(--ink);}
.dw-bad{color:#d64545;text-decoration:underline;text-decoration-color:#d6454577;}
.qactions{margin-top:auto;display:flex;gap:8px;}
.qactions button{flex:1;padding:14px;border-radius:14px;font-weight:700;font-size:15px;}
.qactions .ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink-2);box-shadow:var(--shadow);}
.qactions .primary{background:var(--accent);color:#fff;}
.finish{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding:40px 20px;}
.finish .big{font-size:40px;font-weight:800;color:var(--accent-deep);font-variant-numeric:tabular-nums;}
.finish .msg{font-size:15px;font-weight:700;}
.finish .sub{font-size:13px;color:var(--muted);}
.finish .mascot{width:96px;height:96px;margin-bottom:6px;}

/* 학습 탭 허브 */
.learnmenu .step.soon{opacity:.5;}

/* 설정 화면 (캐릭터 변경 등) — WordSheet와 동일한 바텀시트 패턴 재사용 */
.charrow{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:12px 14px;}
.charrow .cf{width:52px;height:52px;border-radius:14px;background:var(--fill);display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;font-size:9px;color:var(--muted);text-align:center;line-height:1.2;}
.charrow .body{flex:1;min-width:0;}
.charrow .name{font-size:14px;font-weight:700;}
.charrow .move{font-size:11px;color:var(--muted);margin-top:1px;}
.charrow .cta{flex:none;font-size:12px;font-weight:700;padding:9px 12px;border-radius:11px;text-align:center;white-space:nowrap;}
.charrow .cta.use{background:var(--accent-soft);color:var(--accent-deep);}
.charrow .cta.free{background:var(--accent);color:#fff;}
.charrow .cta.buy{background:var(--ink);color:#fff;}
.charrow .cta.locked{background:var(--fill);color:var(--muted);}
.ptbox{display:flex;align-items:center;justify-content:space-between;background:var(--accent-soft);border-radius:16px;padding:14px 16px;}
.ptbox .v{font-size:20px;font-weight:800;color:var(--accent-deep);font-variant-numeric:tabular-nums;}
.ptbox .l{font-size:12px;color:var(--ink-2);}

/* 설정 — 일일 목표 스테퍼 · 듣기 속도 프리셋 */
.goalrow{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:11px 15px;margin-bottom:8px;}
.goal-lbl{font-size:14px;font-weight:700;flex:1;}
.goal-step{width:30px;height:30px;border-radius:999px;background:var(--fill);color:var(--ink-2);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;flex:none;}
.goal-v{font-size:14px;font-weight:800;color:var(--accent-deep);min-width:44px;text-align:center;font-variant-numeric:tabular-nums;flex:none;}
.prefrow{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:12px 15px;text-align:left;}
.prefrow.on{background:var(--accent-soft);}
.pf-name{font-size:14px;font-weight:700;}
.prefrow.on .pf-name{color:var(--accent-deep);}
.pf-sub{font-size:12px;color:var(--muted);}
.cefrinfo{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:12px 15px;}
.cefrinfo-row{display:flex;align-items:center;gap:10px;padding:4px 0;}
.cefrinfo-nm{font-size:13px;color:var(--ink-2);}
</style>

const MAX_BOX = BOX_INTERVALS.length - 1; // 최고 박스 인덱스(6) — 정답 시 box 상한

/* Material Symbols (filled) 아이콘 — 공식 SVG 패스 인라인(Apache 2.0).
   외부 폰트/네트워크 의존 없이 오프라인·아티팩트에서도 동일하게 렌더. */
const ICONS = {
  home: "M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z",
  menu_book: "M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z",

};
function Icon({ name, size = 24 }) {
  return (
    <svg className="icon" width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">
      <path d={ICONS[name]} />
    </svg>
  );
}

const SEED = (typeof window !== "undefined" && window.SEED) ? window.SEED : [];
const byWord = Object.fromEntries(SEED.map(w => [w.word, w]));

/* 사용자가 직접 추가한 단어(내 단어장) — localStorage 보존.
   v0에선 플레이스홀더 항목 생성만, 뜻·예문 자동 생성(LLM)은 프록시 연동 시. */
let EXTRA = (() => { try { return JSON.parse(localStorage.getItem("en_mywords") || "{}"); } catch (e) { return {}; } })();
function saveExtra() { try { localStorage.setItem("en_mywords", JSON.stringify(EXTRA)); } catch (e) {} }
function wordOf(w) { return byWord[w] || EXTRA[w]; }
function allWords() { return SEED.concat(Object.values(EXTRA)); }

/* 즐겨찾기 — localStorage 보존(EXTRA·SRS와 동일 패턴). 첫 실행에만 데모 시드. */
let FAVS = (() => {
  try {
    const raw = localStorage.getItem("en_favs");
    if (raw === null) return new Set(["alert", "idiomatic"]);
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(["alert", "idiomatic"]); }
})();
function saveFavs() { try { localStorage.setItem("en_favs", JSON.stringify([...FAVS])); } catch (e) {} }
function toggleFav(word) { if (FAVS.has(word)) FAVS.delete(word); else FAVS.add(word); saveFavs(); }

/* 내 단어장(커스텀 리스트) — localStorage 보존. { id, name, words:[word,...] } 배열.
   전체 표제어 중 고른 단어를 이름 붙인 리스트로 묶어서 그 리스트만 따로 학습할 수 있게 함. */
let WORDLISTS = (() => { try { return JSON.parse(localStorage.getItem("en_wordlists") || "[]"); } catch (e) { return []; } })();
function saveWordlists() { try { localStorage.setItem("en_wordlists", JSON.stringify(WORDLISTS)); } catch (e) {} }
function createWordlist(name) {
  const list = { id: "wl_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), name: name.trim(), words: [] };
  WORDLISTS.push(list); saveWordlists();
  return list;
}
function addToWordlist(id, words) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list) return;
  words.forEach(w => { if (!list.words.includes(w)) list.words.push(w); });
  saveWordlists();
}
function removeFromWordlist(id, word) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list) return;
  list.words = list.words.filter(w => w !== word);
  saveWordlists();
}
function renameWordlist(id, name) {
  const list = WORDLISTS.find(l => l.id === id);
  if (!list || !name.trim()) return;
  list.name = name.trim(); saveWordlists();
}
function deleteWordlist(id) {
  WORDLISTS = WORDLISTS.filter(l => l.id !== id);
  saveWordlists();
}

/* ===================== 학습 환경설정 (일일 목표 · 듣기 속도/악센트) — localStorage =====================
   속도는 SpeechSynthesisUtterance.rate로 실제 반영됨. 악센트는 lang 코드 + 가능하면 그 lang의 브라우저
   음성을 매칭(en-US/en-GB/en-AU) — 단, "뉴욕/캘리포니아/텍사스" 같은 도시 단위 악센트는 브라우저 TTS는
   물론 상용 TTS(Google/Azure 등)에도 그 단위로 구분된 음성이 없어 구현 불가. 국가 단위까지만 지원. */
const SPEED_PRESETS = {
  teacher: { label: "영어선생님", sub: "수능 듣기평가 수준", rate: 0.82 },
  casual: { label: "일상회화", sub: "연음 강조", rate: 1.0 },
  native: { label: "원어민대화", sub: "원어민 수준의 빠른 말", rate: 1.3 },
};
const ACCENT_PRESETS = {
  us: { label: "미국", lang: "en-US" },
  gb: { label: "영국", lang: "en-GB" },
  au: { label: "호주", lang: "en-AU" },
};
const PREFS = (() => {
  let p;
  try { p = JSON.parse(localStorage.getItem("en_prefs") || "null"); } catch (e) {}
  if (!p || typeof p !== "object") p = {};
  if (!SPEED_PRESETS[p.speed]) p.speed = "casual";
  if (!ACCENT_PRESETS[p.accent]) p.accent = "us";
  p.goalWords = Number.isFinite(p.goalWords) ? p.goalWords : 20;
  p.goalListen = Number.isFinite(p.goalListen) ? p.goalListen : 20;
  p.goalTalk = Number.isFinite(p.goalTalk) ? p.goalTalk : 10;
  const save = () => { try { localStorage.setItem("en_prefs", JSON.stringify(p)); } catch (e) {} };
  save();
  return { get: () => p, set(patch) { Object.assign(p, patch); save(); } };
})();

/* 앱 전체 공용 TTS — 저장된 속도·악센트 설정을 실제 발화에 반영.
   rateOverride: 카드의 "느리게 듣기"처럼 그 순간만 설정과 무관하게 속도를 강제할 때. */
function speakText(text, rateOverride) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    const prefs = PREFS.get();
    const accent = ACCENT_PRESETS[prefs.accent];
    u.lang = accent.lang;
    u.rate = rateOverride || SPEED_PRESETS[prefs.speed].rate;
    const voices = speechSynthesis.getVoices();
    const voice = voices.find(v => v.lang === accent.lang) || voices.find(v => v.lang && v.lang.startsWith("en"));
    if (voice) u.voice = voice;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch (e) {}
}

/* ===================== SRS 엔진 (Leitner · localStorage) =====================
   학습 단위 키 = 다의어면 `word#senseIndex`, 단일 의미면 `word`.
   box↑ → 다음 복습 간격↑(BOX_INTERVALS). 오답 시 box=1로 리셋. box>=6이면 '완료'에 근접. */
const DAY = 86400000;
const SRS = (() => {
  let store;
  try { store = JSON.parse(localStorage.getItem("en_srs") || "null"); } catch (e) {}
  if (!store) {
    const t = Date.now();
    store = { // 첫 실행 데모 시드(앱이 비어 보이지 않게) — 실제 학습하면 덮어써짐
      "alert": { box: 4, due: t + 3 * DAY, seen: true },
      "possibility": { box: 6, due: t + 30 * DAY, seen: true },
      "interact": { box: 2, due: t - DAY, seen: true },
      "deadline": { box: 1, due: t + DAY, seen: true },
    };
  }
  const save = () => { try { localStorage.setItem("en_srs", JSON.stringify(store)); } catch (e) {} };
  return {
    get: k => store[k],
    status(k) {
      const s = store[k]; if (!s) return null;
      return { status: s.box >= 6 ? "done" : "learning", box: s.box, dueIn: Math.max(0, Math.round((s.due - Date.now()) / DAY)) };
    },
    isDue: k => { const s = store[k]; return s && s.seen && s.due <= Date.now(); },
    grade(k, ok) {
      const s = store[k] || { box: 0, seen: false };
      s.box = ok ? Math.min(MAX_BOX, s.box + 1) : 1;
      s.seen = true;
      s.due = Date.now() + BOX_INTERVALS[s.box] * DAY;
      store[k] = s; save();
      if (ok) POINTS.add(10); // 꾸준한 학습으로만 쌓이는 포인트 — 캐릭터 변경 잠금 해제에 사용
      return s;
    },
    // 다의어 상세의 "+ 이 의미를 학습에 추가" — 이미 학습 중이면 그대로 두고(진행 유지),
    // 처음이면 즉시 복습 대상(due=지금)으로 등록해 바로 다음 세션에 나오게 함.
    markForStudy(k) {
      if (store[k]) return false;
      store[k] = { box: 0, seen: true, due: Date.now() };
      save();
      return true;
    },
  };
})();

/* ===================== 포인트 엔진 =====================
   캐릭터는 처음 1회는 무료로 선택하고, 이후 변경하려면 학습으로 쌓은 포인트가 필요(소모형).
   포인트는 카드 정답 시에만 적립 — "일정 학습량 유지"를 계량하는 유일한 지표. */
const CHAR_CHANGE_COST = 300;
const POINTS = (() => {
  let n = 0;
  try { n = parseInt(localStorage.getItem("en_points") || "0", 10) || 0; } catch (e) {}
  const save = () => { try { localStorage.setItem("en_points", String(n)); } catch (e) {} };
  return {
    get: () => n,
    add(v) { n += v; save(); },
    spend(v) { if (n < v) return false; n -= v; save(); return true; },
  };
})();

/* 단어의 표시 상태: 의미 중 하나라도 학습 중이면 learning, 전부 done이면 done */
function wordStatus(w) {
  const keys = (w.senses && w.senses.length) ? w.senses.map((_, i) => w.word + "#" + i) : [w.word];
  const sts = keys.map(k => SRS.status(k)).filter(Boolean);
  if (!sts.length) return null;
  if (sts.every(s => s.status === "done")) return { status: "done" };
  return sts.find(s => s.status === "learning") || sts[0];
}

/* 학습 아이템(카드 단위) = 의미별 1개. 예문 하나를 문맥으로 사용.
   syn: 그 의미(sense) 하나에 한정된 문맥 치환어 — 없는(백필 전) sense는 표제어 전체
   유의어(w.syn)로 폴백(부정확할 수 있음, 데이터 채워지면 자동으로 정밀해짐). */
function itemsFromWords(list) {
  const items = [];
  list.forEach(w => {
    if (w.senses && w.senses.length) {
      w.senses.forEach((s, i) => { if ((s.ex || []).length) items.push({ key: w.word + "#" + i, word: w.word, ko: s.ko, cue: s.cue, ex: s.ex[0], cefr: s.cefr || w.cefr, syn: s.syn && s.syn.length ? s.syn : (w.syn || []) }); });
    } else if ((w.ex || []).length) {
      items.push({ key: w.word, word: w.word, ko: w.ko, cue: null, ex: w.ex[0], cefr: w.cefr, syn: w.syn || [] });
    }
  });
  return items;
}
function allItems() {
  return itemsFromWords(allWords());
}

/* 영어 예문에서 타깃 단어를 빈칸으로. 굴절형(saved/delivers)도 어간 매칭. 실패 시 null.
   구동사·숙어(give up, carve out 등)는 첫 단어만 어간 매칭하고 나머지 단어(불변화사)는
   그대로 이어지는지 확인 — "She carved out a career"에서 "carved out" 전체를 빈칸으로. */
function makeBlank(en, word) {
  const parts = en.split(/(\s+)/); // 짝수 인덱스=단어, 홀수=공백(원문 보존)
  const clean = t => t.replace(/[^A-Za-z']/g, "").toLowerCase();
  const stemOf = w => w.replace(/e$/, "").toLowerCase();
  const targets = word.toLowerCase().split(/\s+/);
  const stem = stemOf(targets[0]);
  const matchHead = t => t && (t === targets[0] || (stem.length >= 3 && t.startsWith(stem)));

  for (let i = 0; i < parts.length; i += 2) {
    if (!matchHead(clean(parts[i]))) continue;
    if (targets.length === 1) {
      return { before: parts.slice(0, i).join(""), answer: clean(parts[i]), after: parts.slice(i + 1).join("") };
    }
    // 다단어: 뒤따르는 단어들이 순서대로 일치하는지(불변화사는 굴절이 없어 완전 일치)
    const endIdx = i + (targets.length - 1) * 2;
    if (endIdx >= parts.length) continue;
    let ok = true;
    for (let k = 1; k < targets.length; k++) {
      if (clean(parts[i + k * 2]) !== targets[k]) { ok = false; break; }
    }
    if (ok) {
      const answer = [];
      for (let k = 0; k < targets.length; k++) answer.push(clean(parts[i + k * 2]));
      return { before: parts.slice(0, i).join(""), answer: answer.join(" "), after: parts.slice(endIdx + 1).join("") };
    }
  }
  return null;
}

/* 오늘 세션 아이템 선정: 복습 예정(due) 우선 → 신규 순, 최대 n개 */
function pickSession(n = 10) {
  const its = allItems();
  const due = its.filter(it => SRS.isDue(it.key));
  const fresh = its.filter(it => !SRS.get(it.key));
  return due.concat(fresh).slice(0, n);
}

/* 퀴즈 문제 구성: 이미 학습(SRS 기록 있음)한 단어 중에서만 출제 — 카드로 한 번도
   안 본 단어가 나오면 실질적으로 풀 수 없는 문제라 대상에서 제외. 뜻 4지선다와
   스펠링을 절반씩 섞음. 학습한 단어가 4개 미만이면 문제 구성 불가(null). */
function buildQuiz(n = 10) {
  const studied = allItems().filter(it => SRS.get(it.key));
  if (studied.length < 4) return null;
  const shuffled = [...studied].sort(() => Math.random() - 0.5).slice(0, n);
  const distractorPool = allItems();
  return shuffled.map((it, i) => {
    if (i % 2 === 1) return { type: "spell", it };
    const pool = [...distractorPool].sort(() => Math.random() - 0.5);
    const distractors = [];
    for (const p of pool) {
      if (distractors.length >= 3) break;
      if (p.key === it.key || p.ko === it.ko) continue;
      if (distractors.some(d => d.ko === p.ko)) continue;
      distractors.push(p);
    }
    const choices = [it.ko, ...distractors.map(d => d.ko)];
    for (let a = choices.length - 1; a > 0; a--) { const b = Math.floor(Math.random() * (a + 1));[choices[a], choices[b]] = [choices[b], choices[a]]; }
    return { type: "choice", it, choices };
  });
}

/* 듣기 세션(딕테이션) 문제 구성: 퀴즈와 같은 이유로 이미 학습한 단어의 예문만 사용.
   학습한 단어가 4개 미만이면 문제 구성 불가(null). */
function buildDictation(n = 10) {
  const studied = allItems().filter(it => SRS.get(it.key));
  if (studied.length < 4) return null;
  return [...studied].sort(() => Math.random() - 0.5).slice(0, n);
}

/* 프레임 배열(svgo 최적화된 자체 생성 SVG, 외부 입력 아님) 순환 재생 — 실제 캐릭터 아트 슬롯.
   모든 프레임을 한 번만 마운트해두고 opacity만 토글해 크로스페이드 — 매 프레임 SVG를
   언마운트/재파싱하던 이전 방식의 깜빡임(flicker)을 제거. */
function SpriteChar({ frames, size = 100, fps = 8 }) {
  const [i, setI] = useState(0);
  const reduceMotion = useMemo(
    () => typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches,
    []
  );
  useEffect(() => {
    if (!frames || frames.length < 2 || reduceMotion) return;
    const id = setInterval(() => setI(v => (v + 1) % frames.length), 1000 / fps);
    return () => clearInterval(id);
  }, [frames, fps, reduceMotion]);
  if (!frames || !frames.length) return null;
  const dur = Math.round(1000 / fps / 2) + "ms"; // 전환 시간은 프레임 간격의 절반
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      {frames.map((f, idx) => (
        <svg key={idx} className="sprite-frame" width={size} height={size} viewBox={f.vb}
             style={{ opacity: idx === i ? 1 : 0, transition: reduceMotion ? "none" : `opacity ${dur} linear` }}
             dangerouslySetInnerHTML={{ __html: f.inner }} />
      ))}
    </div>
  );
}

            <div className="dlg-title">{badge.earned ? badge.title : "미획득 뱃지"}</div>
            {badge.earned
              ? <div className="dlg-sub">달성!</div>
              : <div className="dlg-sub locked">아직 획득하지 못했어요</div>}
            <div className="dlg-date">{badge.earned ? badge.earned : "조건: " + badge.cond}</div>
            <button onClick={() => setBadge(null)}>확인</button>
          </div>
        </div>,
        document.body
      )}

      <div className="level-row" onClick={() => onGoTab("dict")}>
        <div className="stat"><div className="v accent">B1</div><div className="l">CEFR 레벨</div></div>
        <div className="stat"><div className="v">4,200</div><div className="l">추정 어휘량</div></div>
        <div className="stat"><div className="v">상위 18%</div><div className="l">백분위</div></div>
      </div>

      <div className="sec">오늘의 루틴</div>
      {routine.map(s => (
        <div key={s.n}
             className={"step" + (s.state === "active" ? " active" : "") + (s.state === "done" ? " done" : "")}
             onClick={() => (s.direct ? onStartCards() : onGoTab(s.tab))}>
          <div className="step-ico">{s.state === "done" ? <Icon name="check" size={20} /> : s.n}</div>
          <div className="step-body">
            <div className="step-title">{s.title}</div>
            <div className="step-sub">{s.sub}</div>
          </div>
          <div className="step-cta">
            {s.state === "done" ? <span className="check">완료</span> : s.state === "active" ? "이어서" : "시작"}
          </div>
        </div>
      ))}

      <div className="sec">잔디 <span className="more">최근 17주</span></div>
      <div className="card" style={{ padding: "16px" }}>
        <div className="grass">{grass.map((c, i) => <i key={i} className={c} />)}</div>
      </div>
    </div>
  );
}

/* 예문 속 단어를 개별 칩으로 — 사전에 있는 단어만 탭하면 그 단어 상세로 스택 진입(타고타고).
   문장 클릭(발음 재생)과 겹치므로 단어 클릭은 stopPropagation. */
function ExampleWords({ text, onOpen }) {
  const parts = text.split(/(\s+)/);
  return parts.map((p, idx) => {
    if (!p || /^\s+$/.test(p)) return p;
    const cleanStart = p.search(/[A-Za-z']/);
    if (cleanStart === -1) return p;
    const clean = p.replace(/[^A-Za-z']/g, "");
    const w = clean && wordOf(clean.toLowerCase());
    if (!w) return p;
    const lead = p.slice(0, cleanStart);
    const trail = p.slice(cleanStart + clean.length);
    return (
      <React.Fragment key={idx}>
        {lead}<span className="ex-word" onClick={ev => { ev.stopPropagation(); onOpen(w.word); }}>{clean}</span>{trail}
      </React.Fragment>
    );
  });
}

/* ---------- 단어 상세 바텀시트 (팝업 → 타고타고 모달 스택) ---------- */
/* 다의어 상한선: 실사전은 뜻이 수십 개인 단어(run, set 등)가 있어 기본 노출을 제한 */
const SENSE_CAP = 6;

function WordSheet({ stack, onPush, onPop, onClose, onOpenRoot }) {
  const word = stack[stack.length - 1];
  const w = wordOf(word);
  const [senseOpen, setSenseOpen] = useState(0); // 다의어: 첫 의미 펼침
  const [showAllSenses, setShowAllSenses] = useState(false);
  const [, bump] = useState(0); // 즐겨찾기·내 단어장 토글 리렌더용
  const [showPicker, setShowPicker] = useState(false);
  useEffect(() => { setSenseOpen(0); setShowAllSenses(false); }, [word]);
  const speak = useCallback(speakText, []);
  const Chip = ({ label }) => (
    wordOf(label)
      ? <button className="lchip link" onClick={() => onPush(label)}>{label}</button>
      : <span className="lchip">{label}</span>
  );
  if (!w) return null;
  const ext = q => [
    ["네이버", `https://en.dict.naver.com/#/search?query=${q}`],
    ["Cambridge", `https://dictionary.cambridge.org/dictionary/english/${q}`],
    ["Etymonline", `https://www.etymonline.com/word/${q}`],
  ];
  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          {stack.length > 1
            ? <button className="back" onClick={onPop} aria-label="뒤로"><Icon name="chevron_left" size={24} /></button>
            : <span style={{ width: 8 }} />}
          <span className="sp" />
          <button className="fav" onClick={() => setShowPicker(true)}>내 단어장</button>
          <button className={"favstar" + (FAVS.has(w.word) ? " on" : "")} onClick={() => { toggleFav(w.word); bump(v => v + 1); }} aria-label="즐겨찾기">
            <Icon name="star" size={22} />
          </button>
          <button className="back" onClick={onClose} style={{ marginLeft: 4 }} aria-label="닫기"><Icon name="close" size={20} /></button>
        </div>
        {showPicker && (
          <ListPicker words={[w.word]} onClose={() => setShowPicker(false)} onChanged={() => bump(v => v + 1)} />
        )}
        <div className="sheet-body">
          <div>
            <div className="wd-top">
              <span className="wd-word">{w.word}</span>
              <span className="wd-ipa">{w.ipa}</span>
              <button className="wd-play" onClick={() => speak(w.word)}><Icon name="volume_up" size={15} /> 발음 듣기</button>
            </div>
            <div className="wd-pos" style={{ marginTop: 6 }}>
              <span className="tag lv" style={{ marginRight: 6 }}>{w.cefr}</span>
              {w.senses && w.senses.length ? <span className="tag">뜻 {w.senses.length}개</span> : w.ko}
            </div>
            {!(w.senses && w.senses.length) && <div className="wd-en" style={{ marginTop: 4 }}>{w.en}</div>}
          </div>

          {w.senses && w.senses.length ? (
            /* 다의어: 의미별 카드 — 뜻마다 별도 예문·별도 학습 단위.
               뜻이 많은 단어(예: run·set 수십 개 의미)에서 목록이 무한정 길어지지 않도록
               기본 SENSE_CAP개만 보여주고 나머지는 '더보기'로 펼친다. */
            <div>
              <div className="wd-sec-t">의미별로 학습해요 (탭해서 펼치기)</div>
              {(showAllSenses ? w.senses : w.senses.slice(0, SENSE_CAP)).map((s, i) => (
                <div key={i} className={"sense" + (senseOpen === i ? " open" : "")}
                     onClick={() => setSenseOpen(senseOpen === i ? -1 : i)}>
                  <div className="s-head">
                    <div>
                      <div className="s-cue">{s.cue}</div>
                      <div className="s-ko">{s.ko}</div>
                    </div>
                    <div className="s-meta">
                      <span className="tag">{s.pos}</span>
                      <span className="tag lv">{s.cefr || ("레벨 " + s.lv)}</span>
                    </div>
                  </div>
                  {senseOpen === i && (
                    <React.Fragment>
                      <div className="s-en">{s.en}</div>
                      {(s.ex || []).map((e, j) => (
                        <div className="wd-ex" key={j} onClick={ev => { ev.stopPropagation(); speak(e.en); }}>
                          <div className="en"><ExampleWords text={e.en} onOpen={onPush} /></div>
                          <div className="ko">{e.ko}</div>
                        </div>
                      ))}
                      <button className={"s-add" + (SRS.get(w.word + "#" + i) ? " added" : "")}
                              onClick={ev => { ev.stopPropagation(); if (SRS.markForStudy(w.word + "#" + i)) bump(v => v + 1); }}>
                        {SRS.get(w.word + "#" + i) ? "✓ 학습에 추가됨" : "+ 이 의미를 학습에 추가"}
                      </button>
                    </React.Fragment>
                  )}
                </div>
              ))}
              {!showAllSenses && w.senses.length > SENSE_CAP && (
                <button className="s-more" onClick={() => setShowAllSenses(true)}>
                  + {w.senses.length - SENSE_CAP}개 뜻 더보기
                </button>
              )}
            </div>
          ) : (
            <div className="wd-ex-wrap">
              <div className="wd-sec-t">예문</div>
              {w.ex.map((e, i) => (
                <div className="wd-ex" key={i} onClick={() => speak(e.en)}>
                  <div className="en"><ExampleWords text={e.en} onOpen={onPush} /></div>
                  <div className="ko">{e.ko}</div>
                </div>
              ))}
            </div>
          )}

          {(w.syn.length > 0 || w.ant.length > 0) && (
            <div>
              <div className="wd-sec-t">유의어 · 반의어</div>
              <div className="wd-chips">
                {w.syn.map(s => <Chip key={s} label={s} />)}
                {w.ant.map(a => <Chip key={a} label={a} />)}
              </div>
            </div>
          )}

          {w.forms.length > 0 && (
            <div>
              <div className="wd-sec-t">같은 단어, 다른 품사</div>
              <div className="wd-chips">
                {w.forms.map(f => (
                  wordOf(f.word)
                    ? <button key={f.word} className="lchip link" onClick={() => onPush(f.word)}>{f.word}<span className="g">{f.pos}</span></button>
                    : <span key={f.word} className="lchip">{f.word}<span className="g">{f.pos}</span></span>
                ))}
              </div>
            </div>
          )}

          {w.roots.length > 0 && (
            <div>
              <div className="wd-sec-t">어근 · 접사</div>
              <div className="wd-chips">
                {w.roots.map(r => (
                  <button key={r.affix} className="lchip affix" onClick={() => onOpenRoot(r.affix)}>
                    {r.affix}<span className="g" style={{ color: "#c3ceff" }}>{r.gloss}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          <div>
            <div className="wd-sec-t">외부 사전</div>
            <div className="ext">
              {ext(w.word).map(([label, url]) => (
                <a key={label} href={url} target="_blank" rel="noopener noreferrer">{label}</a>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ---------- 사전 탭 ---------- */
/* 진입 시 목록을 쏟아내지 않고 허브(메뉴)에서 선택해 들어가는 구조.
   검색은 어느 화면에서든 최상단 — 입력을 시작하면 즉시 검색 결과로 전환. */
const CEFR_LEVELS = ["A1", "A2", "B1", "B2", "C1", "C2"];

function WordRow({ w, onOpen, pickMode, picked, onTogglePick }) {
  const st = wordStatus(w);
  const multi = w.senses && w.senses.length > 1;
  return (
    <div className="wrow" onClick={() => (pickMode ? onTogglePick(w.word) : onOpen(w.word))}>
      {pickMode && <span className={"wchk" + (picked ? " on" : "")}>{picked && <Icon name="check" size={13} />}</span>}
      <div>
        <div className="w">{w.word}</div>
        <div className="k">{multi ? w.senses[0].ko + " 외 " + (w.senses.length - 1) + "개 뜻" : w.ko}</div>
      </div>
      <div className="meta">
        <span className="tag lv">{w.cefr}</span>
        {multi && <span className="tag">뜻 {w.senses.length}</span>}
        {w.mine && <span className="tag">내 단어</span>}
        {st?.status === "done" && <span className="tag done">완료</span>}
        {st?.status === "learning" && <span className="tag learning">박스 {st.box} · {st.dueIn === 0 ? "오늘" : st.dueIn + "일 뒤"}</span>}
        {!st && !w.mine && <span className="tag">미학습</span>}
      </div>
    </div>
  );
}

/* 긴 목록 분할 렌더 — 한 번에 다 그리면(레벨당 1,000+행) 프리즈되므로 "더 보기"로 나눔 */
const LIST_CHUNK = 100;
function WList({ list, onOpen, pickMode, picked, onTogglePick }) {
  const [limit, setLimit] = useState(LIST_CHUNK);
  useEffect(() => setLimit(LIST_CHUNK), [list]);
  return (
    <div className="wlist">
      {list.slice(0, limit).map(w => (
        <WordRow key={w.word} w={w} onOpen={onOpen}
          pickMode={pickMode} picked={picked && picked.has(w.word)} onTogglePick={onTogglePick} />
      ))}
      {list.length === 0 && <div className="empty-note">아직 여기에 단어가 없어요.</div>}
      {list.length > limit && (
        <button className="more-btn" onClick={() => setLimit(l => l + LIST_CHUNK * 2)}>
          더 보기 ({list.length - limit}개 남음)
        </button>
      )}
    </div>
  );
}

/* 단어(들)를 내 단어장(커스텀 리스트)에 담는 공용 다이얼로그 — 사전 다중선택, 단어 상세 모달에서 공용 */
function ListPicker({ words, onClose, onChanged }) {
  const [newName, setNewName] = useState("");
  const commit = id => { addToWordlist(id, words); onChanged(); onClose(); };
  const createAndCommit = () => {
    if (!newName.trim()) return;
    const list = createWordlist(newName);
    commit(list.id);
  };
  return ReactDOM.createPortal(
    <div className="dlg-backdrop" onClick={onClose}>
      <div className="dlg" onClick={e => e.stopPropagation()}>
        <div className="dlg-title">리스트에 담기</div>
        <div className="dlg-sub">{words.length}개 단어</div>
        {WORDLISTS.length === 0 ? (
          <div className="empty-note" style={{ margin: "10px 0" }}>아직 만든 리스트가 없어요.</div>
        ) : (
          <div className="wl-picklist">
            {WORDLISTS.map(l => (
              <button key={l.id} className="rootrow" onClick={() => commit(l.id)}>
                <span className="ax" style={{ minWidth: 0, flex: 1 }}>{l.name}</span>
                <span className="n">{l.words.length}개 ›</span>
              </button>
            ))}
          </div>
        )}
        <div className="wl-newrow">
          <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="새 리스트 이름 (예: 비즈니스용)" autoCapitalize="none" />
          <button onClick={createAndCommit}>만들기</button>
        </div>
        <button className="ghost" style={{ width: "100%", marginTop: 12, padding: 12, borderRadius: 13, background: "var(--fill)", color: "var(--ink-2)", fontWeight: 700 }} onClick={onClose}>닫기</button>
      </div>
    </div>,
    document.body
  );
}

const CEFR_NAMES = { A1: "입문", A2: "초급", B1: "중급", B2: "중상급", C1: "고급", C2: "최상급" };

function Dict({ onOpen, onStudyList, rootJump, onConsumeRootJump }) {
  const [q, setQ] = useState("");
  const [view, setView] = useState(null);      // null=허브 | learned|category|fav|mine|add
  const [catMode, setCatModeState] = useState("cefr"); // cefr | root
  const [catSel, setCatSel] = useState(null);   // 선택된 레벨(A1) 또는 어근(-tion) — null이면 선택 화면
  const setCatMode = m => { setCatModeState(m); setCatSel(null); };
  const [, bump] = useState(0);                 // EXTRA·즐겨찾기·내 단어장 변경 리렌더용
  const [listSel, setListSel] = useState(null); // 내 단어장 안에서 연 리스트 id ("__added__"=직접 등록한 단어)
  const [newListName, setNewListName] = useState("");
  const [pickMode, setPickMode] = useState(false); // 단어 목록 다중선택(담기) 모드
  const [picked, setPicked] = useState(() => new Set());
  const [showPicker, setShowPicker] = useState(false); // 리스트 선택 다이얼로그

  // 단어상세의 어근 칩에서 넘어온 경우: 카테고리 > 어근별 > 그 어근 목록으로 바로 진입
  useEffect(() => {
    if (!rootJump) return;
    setQ(""); setView("category"); setCatModeState("root"); setCatSel(rootJump);
    onConsumeRootJump();
    // eslint-disable-next-line
  }, [rootJump]);

  const words = allWords();
  const learned = words.filter(w => wordStatus(w));
  const favs = words.filter(w => FAVS.has(w.word));
  const mine = Object.values(EXTRA);

  const query = q.trim().toLowerCase();
  const hits = query ? words.filter(w => w.word.toLowerCase().startsWith(query)).sort((a, b) => a.word.localeCompare(b.word)) : [];
  const noHit = query && hits.length === 0;

  const addWord = name => {
    const key = name.trim().toLowerCase();
    if (!key || wordOf(key)) return;
    EXTRA[key] = { word: key, ipa: "", pos: [], cefr: "—", ko: "직접 추가한 단어 · 뜻과 예문은 자동 생성 예정", en: "", syn: [], ant: [], forms: [], roots: [], ex: [], mine: true };
    saveExtra(); bump(x => x + 1);
    setQ(""); onOpen(key);
  };

  const MENUS = [
    { k: "add", icon: "add", title: "새 단어 등록하기", sub: "사전에 없는 단어도 내 단어로" },
    { k: "learned", icon: "school", title: "내가 학습한 단어", sub: learned.length + "개 · SRS 진행 상태별" },
    { k: "category", icon: "grid_view", title: "카테고리별로 보기", sub: "레벨(CEFR) · 어근별 · 주제(예정)" },
    { k: "fav", icon: "star", title: "즐겨찾기한 단어", sub: favs.length + "개" },
    { k: "mine", icon: "bookmark", title: "내 단어장", sub: "내가 만든 리스트 " + WORDLISTS.length + "개" },
  ];
  const TITLES = { learned: "내가 학습한 단어", category: "카테고리별", fav: "즐겨찾기", mine: "내 단어장", add: "새 단어 등록" };

  const togglePick = w => setPicked(s => { const n = new Set(s); n.has(w) ? n.delete(w) : n.add(w); return n; });
  const togglePickMode = () => { setPickMode(v => !v); setPicked(new Set()); };
  const rows = list => <WList list={list} onOpen={onOpen} pickMode={pickMode} picked={picked} onTogglePick={togglePick} />;
  const pickToggleBtn = (
    <button className="chip" style={{ marginLeft: "auto" }} onClick={togglePickMode}>{pickMode ? "선택 취소" : "담기"}</button>
  );
  const pickBar = pickMode && (
    <div className="addbar">
      <div className="t">{picked.size > 0 ? `${picked.size}개 선택됨` : "담을 단어를 선택하세요"}</div>
      <button disabled={picked.size === 0} style={picked.size === 0 ? { opacity: .5 } : undefined} onClick={() => setShowPicker(true)}>리스트에 담기</button>
    </div>
  );

  const catList = level => words.filter(w => w.cefr === level).sort((a, b) => a.word.localeCompare(b.word));
  const rootIndex = useMemo(() => {
    const m = {};
    words.forEach(w => (w.roots || []).forEach(r => { (m[r.affix] = m[r.affix] || { gloss: r.gloss, ws: [] }).ws.push(w); }));
    return Object.entries(m).sort((a, b) => b[1].ws.length - a[1].ws.length);
  }, [words.length]);

  return (
    <div className="content">
      <div className="search">
        <span className="mag"><Icon name="search" size={20} /></span>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="단어를 검색하세요 (예: alert)" autoCapitalize="none" />
      </div>

      {query ? (
        <React.Fragment>
          {noHit && (
            <div className="addbar">
              <div className="t">사전에 없는 단어인가요?<br/><b>"{q.trim()}"</b> 를 내 단어로 추가</div>
              <button onClick={() => addWord(q)}>추가하기</button>
            </div>
          )}
          {!noHit && hits.length > 0 && <div className="listhead" style={{ margin: "0 0 2px" }}>{pickToggleBtn}</div>}
          {pickBar}
          {rows(hits)}
        </React.Fragment>
      ) : view === null ? (
        <React.Fragment>
          {MENUS.map(m => (
            <div key={m.k} className="step" onClick={() => setView(m.k)}>
              <div className="step-ico"><Icon name={m.icon} size={20} /></div>
              <div className="step-body">
                <div className="step-title">{m.title}</div>
                <div className="step-sub">{m.sub}</div>
              </div>
              <span className="arrow" style={{ color: "var(--muted)" }}>›</span>
            </div>
          ))}
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="listhead">
            <button className="back" onClick={() => {
              if (view === "mine" && listSel !== null) { setListSel(null); setPickMode(false); setPicked(new Set()); }
              else if (view === "category" && catSel !== null) setCatSel(null);
              else { setCatSel(null); setListSel(null); setPickMode(false); setPicked(new Set()); setView(null); }
            }} aria-label="뒤로"><Icon name="chevron_left" size={22} /></button>
            <b>
              {view === "mine" && listSel === "__added__" ? "직접 등록한 단어"
                : view === "mine" && listSel ? (WORDLISTS.find(l => l.id === listSel) || {}).name
                : TITLES[view]}
            </b>
            {view === "learned" && <span className="cnt">{learned.length}</span>}
            {view === "fav" && <span className="cnt">{favs.length}</span>}
            {view === "mine" && listSel === "__added__" && <span className="cnt">{mine.length}</span>}
            {view === "mine" && listSel === null && <span className="cnt">{WORDLISTS.length}</span>}
            {(view === "learned" || view === "fav" || (view === "mine" && listSel === "__added__")) && pickToggleBtn}
          </div>

          {view === "learned" && pickBar}
          {view === "learned" && rows(learned)}
          {view === "fav" && pickBar}
          {view === "fav" && rows(favs)}
          {view === "mine" && listSel === null && (
            <React.Fragment>
              <div className="wl-newrow">
                <input value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="새 리스트 이름 (예: 비즈니스용)" autoCapitalize="none" />
                <button onClick={() => { if (newListName.trim()) { createWordlist(newListName); setNewListName(""); bump(x => x + 1); } }}>만들기</button>
              </div>
              {WORDLISTS.length === 0 && mine.length === 0 && (
                <div className="empty-note">아직 만든 리스트가 없어요. 카테고리별 목록이나 검색 결과에서 '담기'로 단어를 모아보세요.</div>
              )}
              <div className="wlist">
                {WORDLISTS.map(l => (
                  <button key={l.id} className="rootrow" onClick={() => setListSel(l.id)}>
                    <span className="ax" style={{ minWidth: 0, flex: 1 }}>{l.name}</span>
                    <span className="n">{l.words.length}개 ›</span>
                  </button>
                ))}
                {mine.length > 0 && (
                  <button className="rootrow" onClick={() => setListSel("__added__")}>
                    <span className="ax" style={{ minWidth: 0, flex: 1 }}>직접 등록한 단어</span>
                    <span className="n">{mine.length}개 ›</span>
                  </button>
                )}
              </div>
            </React.Fragment>
          )}
          {view === "mine" && listSel === "__added__" && (
            <React.Fragment>
              <div className="addbar">
                <div className="t">위 검색창에 단어를 입력하면<br/><b>사전에 없는 단어</b>를 등록할 수 있어요</div>
              </div>
              {pickBar}
              {rows(mine)}
            </React.Fragment>
          )}
          {view === "mine" && listSel !== null && listSel !== "__added__" && (() => {
            const list = WORDLISTS.find(l => l.id === listSel);
            if (!list) return null;
            const listWords = list.words.map(w => wordOf(w)).filter(Boolean);
            const studyItems = itemsFromWords(listWords);
            return (
              <React.Fragment>
                <div className="wl-actions">
                  <button className="primary" disabled={!studyItems.length} style={!studyItems.length ? { opacity: .5 } : undefined} onClick={() => onStudyList(studyItems)}>이 리스트로 학습</button>
                  <button className="ghost" onClick={() => { const nm = prompt("리스트 이름", list.name); if (nm) { renameWordlist(list.id, nm); bump(x => x + 1); } }}>이름 변경</button>
                  <button className="ghost" onClick={() => { if (confirm(`"${list.name}" 리스트를 삭제할까요?`)) { deleteWordlist(list.id); setListSel(null); bump(x => x + 1); } }}>삭제</button>
                </div>
                {listWords.length === 0 && <div className="empty-note">아직 담긴 단어가 없어요.</div>}
                <div className="wlist">
                  {listWords.map(w => (
                    <div key={w.word} className="wrow" onClick={() => onOpen(w.word)}>
                      <div>
                        <div className="w">{w.word}</div>
                        <div className="k">{(w.senses && w.senses.length) ? w.senses[0].ko : w.ko}</div>
                      </div>
                      <button className="wl-remove" onClick={ev => { ev.stopPropagation(); removeFromWordlist(list.id, w.word); bump(x => x + 1); }} aria-label="리스트에서 제거"><Icon name="close" size={16} /></button>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            );
          })()}
          {view === "add" && (
            <div className="addbar">
              <div className="t">위 검색창에 추가할 단어를 입력하세요.<br/>사전에 없으면 <b>추가하기</b> 버튼이 나타납니다.</div>
            </div>
          )}
          {view === "category" && (
            <React.Fragment>
              <div className="chips">
                <button className={"chip" + (catMode === "cefr" ? " on" : "")} onClick={() => setCatMode("cefr")}>레벨 (CEFR)</button>
                <button className={"chip" + (catMode === "root" ? " on" : "")} onClick={() => setCatMode("root")}>어근별</button>
                <button className="chip" style={{ opacity: .45 }}>주제별 (예정)</button>
              </div>
              {catSel === null ? (
                /* 선택 화면 — 목록을 쏟아내지 않고 레벨/어근을 먼저 고른다 */
                catMode === "cefr" ? (
                  <div className="lv-grid">
                    {CEFR_LEVELS.map(lv => (
                      <button key={lv} className="lv-card" onClick={() => setCatSel(lv)}>
                        <div className="lv">{lv}</div>
                        <div className="nm">{CEFR_NAMES[lv]}</div>
                        <div className="n">{catList(lv).length.toLocaleString()}개</div>
                      </button>
                    ))}
                  </div>
                ) : (
                  <div className="wlist">
                    {rootIndex.map(([affix, info]) => (
                      <button key={affix} className="rootrow" onClick={() => setCatSel(affix)}>
                        <span className="ax">{affix}</span>
                        <span className="gl">{info.gloss}</span>
                        <span className="n">{info.ws.length}개 ›</span>
                      </button>
                    ))}
                  </div>
                )
              ) : (
                /* 선택한 레벨/어근의 단어 목록 */
                <React.Fragment>
                  <div className="sec" style={{ display: "flex", alignItems: "center" }}>
                    {catMode === "cefr" ? catSel + " · " + CEFR_NAMES[catSel] : catSel}
                    {catMode === "root" && <span style={{ color: "var(--muted)", fontWeight: 500 }}> {(rootIndex.find(([a]) => a === catSel) || [null, { gloss: "" }])[1].gloss}</span>}
                    {pickToggleBtn}
                  </div>
                  {pickBar}
                  {rows(
                    catMode === "cefr"
                      ? catList(catSel)
                      : ((rootIndex.find(([a]) => a === catSel) || [null, { ws: [] }])[1].ws.slice().sort((a, b) => a.word.localeCompare(b.word)))
                  )}
                </React.Fragment>
              )}
            </React.Fragment>
          )}
        </React.Fragment>
      )}
      {showPicker && (
        <ListPicker
          words={[...picked]}
          onClose={() => setShowPicker(false)}
          onChanged={() => { setPickMode(false); setPicked(new Set()); bump(x => x + 1); }}
        />
      )}
    </div>
  );
}

function Soon({ title, desc }) {

    <div className="content">
      <div className="soon">
        <div className="mascot">캐릭터</div>
        <div className="big">{title}</div>
        <div>{desc}</div>
      </div>
