<svg xmlns="http://www.w3.org/2000/svg" width="350" height="660" viewBox="0 0 350 660" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif">
<text x="8" y="22" font-size="15" font-weight="700" fill="#211C15">홈 히어로 스테이지 — 픽셀 스펙 (기준 뷰포트 390px 폭)</text>
