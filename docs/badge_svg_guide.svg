  <rect class="st14" width="800" height="1102"/>
  <text class="st4" transform="translate(40 56)"><tspan x="0" y="0">NoEnglish 뱃지 제작 가이드</tspan></text>
  <text class="st0" transform="translate(40 92)"><tspan x="0" y="0">• 제작 방식(권장): 카테고리별 심볼 1개씩 = 9개. 티어(5단계) 색은 코드가 자동으로 입힙니다.</tspan></text>
  <text class="st0" transform="translate(40 116)"><tspan x="0" y="0">• 캔버스: 150×150 (원형 메달). 심볼은 가운데 점선 원(지름 96) 안에 맞춰 그리세요.</tspan></text>
  <text class="st0" transform="translate(40 140)"><tspan x="0" y="0">• 스타일: 두꺼운 잉크 아웃라인(약 3px) + 단색 채움. 이모지 금지. 손그림 러프닝 OK.</tspan></text>
  <text class="st0" transform="translate(40 164)"><tspan x="0" y="0">• 심볼은 단색(잉크)으로 — 앱이 티어 색조(xdark 톤)로 자동 착색합니다. 다색 금지.</tspan></text>
  <text class="st0" transform="translate(40 188)"><tspan x="0" y="0">• 파일: 카테고리 key로 저장(예: streak.svg). viewBox 0 0 150 150, 배경 투명.</tspan></text>
  <text class="st3" transform="translate(40 226)"><tspan x="0" y="0">티어 색(코드가 자동 적용):</tspan></text>
